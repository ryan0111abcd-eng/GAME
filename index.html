<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Super Human - Pixel Perfect Fix</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #menu { position: fixed; inset: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1a1a1a; color: #f1c40f; }
        .btn { padding: 25px 70px; font-size: 35px; cursor: pointer; background: #f1c40f; border: none; border-radius: 15px; font-weight: bold; box-shadow: 0 8px 0 #b8860b; }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #b8860b; }
        #hud { position: fixed; top: 10px; left: 10px; z-index: 50; background: rgba(0,0,0,0.8); color: white; padding: 10px; border: 2px solid #f1c40f; display: none; }
        canvas { display: none; position: absolute; top: 0; left: 0; z-index: 10; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>SUPER HUMAN (已修復跳躍與穿牆)</h1>
        <button class="btn" onclick="start()">開始遊戲</button>
        <p style="color:white">WASD 移動 | 空白鍵跳躍 | R 鍵重置</p>
    </div>

    <div id="hud">❤️ HP: <span id="hp">100</span> | 📍 Pos: <span id="pos">0,0</span></div>
    <canvas id="g"></canvas>

<script>
    const cvs = document.getElementById('g'), ctx = cvs.getContext('2d');
    let run = false, keys = {}, world = {};
    let p = { x: 100, y: 0, w: 22, h: 42, vx: 0, vy: 0, ground: false };
    const TILE = 32;

    function start() {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
        cvs.style.display = 'block';
        cvs.width = window.innerWidth;
        cvs.height = window.innerHeight;
        // 初始高度：從天空掉下來
        p.y = -200;
        run = true;
        loop();
    }

    function getH(gx) { return Math.floor(35 + Math.sin(gx * 0.1) * 4); }
    function getB(gx, gy) {
        if (world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
        return gy < getH(gx) ? 0 : (gy === getH(gx) ? 2 : 1);
    }

    // 關鍵：碰撞檢測函數 (檢查角色矩形是否碰到任何方塊)
    function isCollide(x, y) {
        for (let i = Math.floor(x / TILE); i <= Math.floor((x + p.w) / TILE); i++) {
            for (let j = Math.floor(y / TILE); j <= Math.floor((y + p.h) / TILE); j++) {
                if (getB(i, j) > 0) return true;
            }
        }
        return false;
    }

    window.onkeydown = e => { 
        keys[e.code] = true; 
        if(e.code === 'KeyR') { p.x = 0; p.y = -200; p.vx = 0; p.vy = 0; }
    };
    window.onkeyup = e => keys[e.code] = false;

    function loop() {
        if(!run) return;

        // --- Y 軸移動與碰撞 (處理跳躍與重力) ---
        p.vy += 0.8; // 重力
        p.y += p.vy;
        p.ground = false;

        if (isCollide(p.x, p.y)) {
            if (p.vy > 0) { // 向下掉撞到地
                p.y = Math.floor(p.y / TILE) * TILE + (TILE - p.h) % TILE;
                // 修正：如果還是撞到，就往上推
                while(isCollide(p.x, p.y)) p.y -= 1;
                p.ground = true;
            } else if (p.vy < 0) { // 向上跳撞到天花板
                while(isCollide(p.x, p.y)) p.y += 1;
            }
            p.vy = 0;
        }

        // --- X 軸移動與碰撞 (處理走路與穿牆) ---
        let speed = 5;
        let dx = (keys['KeyD'] ? speed : 0) - (keys['KeyA'] ? speed : 0);
        if (dx !== 0) {
            p.x += dx;
            if (isCollide(p.x, p.y)) {
                // 如果撞牆，就退回剛才的位置
                p.x -= dx;
            }
        }

        // --- 跳躍指令 ---
        if ((keys['Space'] || keys['KeyW']) && p.ground) {
            p.vy = -14;
            p.ground = false;
        }

        // 更新 UI
        document.getElementById('pos').innerText = Math.floor(p.x/TILE) + "," + Math.floor(p.y/TILE);

        draw();
        requestAnimationFrame(loop);
    }

    function draw() {
        ctx.fillStyle = '#87ceeb';
        ctx.fillRect(0, 0, cvs.width, cvs.height);

        let cx = p.x - cvs.width / 2, cy = p.y - cvs.height / 2;

        for (let x = Math.floor(cx / TILE); x <= Math.ceil((cx + cvs.width) / TILE); x++) {
            for (let y = Math.floor(cy / TILE); y <= Math.ceil((cy + cvs.height) / TILE); y++) {
                let b = getB(x, y);
                if (b > 0) {
                    ctx.fillStyle = b === 2 ? '#2ecc71' : '#795548';
                    ctx.fillRect(x * TILE - cx, y * TILE - cy, TILE + 1, TILE + 1); // +1 消除縫隙
                }
            }
        }

        ctx.fillStyle = '#e67e22'; // 玩家
        ctx.fillRect(p.x - cx, p.y - cy, p.w, p.h);
    }
</script>
</body>
</html>
