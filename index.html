<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>SUPER HUMAN 2026 - 穩定救援版</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        #rescue-ui { position: fixed; inset: 0; z-index: 999999; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #050505; color: #f1c40f; }
        .start-btn { padding: 30px 80px; font-size: 40px; cursor: pointer; background: #f1c40f; border: 6px solid #fff; border-radius: 20px; font-weight: bold; color: #000; box-shadow: 0 10px 0 #b8860b; }
        .start-btn:active { transform: translateY(5px); box-shadow: 0 4px 0 #b8860b; }
        #hud { position: fixed; top: 10px; left: 10px; z-index: 100; color: white; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; display: none; pointer-events: none; border: 2px solid #f1c40f; }
        canvas#g { display: none; position: absolute; top: 0; left: 0; z-index: 10; }
    </style>
</head>
<body>

    <div id="rescue-ui">
        <h1 style="font-size: 50px;">SUPER HUMAN 2026</h1>
        <p style="color:white;">點擊下方按鈕啟動世界</p>
        <button class="start-btn" onclick="startNow()">👤 進入世界</button>
    </div>

    <div id="hud">❤️ <span id="hp">100</span> | 📍 <span id="pos">0,0</span></div>
    <canvas id="g"></canvas>

<script>
    const cvs = document.getElementById('g'), ctx = cvs.getContext('2d');
    let live = false, world = {}, p = { x: 0, y: -600, w: 22, h: 42, vx: 0, vy: 0, hp: 100, gr: false };

    function startNow() {
        document.getElementById('rescue-ui').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
        cvs.style.display = 'block'; 
        cvs.width = window.innerWidth; cvs.height = window.innerHeight;
        live = true;
        loop();
    }

    function getB(gx, gy) {
        if (world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
        let x = Math.abs(gx);
        let h = (x % 100 < 70) ? 8 : 4; // 簡單地形權重
        let f = Math.floor(h + Math.sin(gx * 0.1) * 3);
        return gy < f ? 0 : (gy === f ? 2 : 1);
    }

    function check(x, y) {
        for (let i = Math.floor(x/32); i <= Math.floor((x+22)/32); i++)
            for (let j = Math.floor(y/32); j <= Math.floor((y+42)/32); j++)
                if(getB(i, j) > 0) return true;
        return false;
    }

    function loop() {
        if(!live) return;
        p.vy += 0.8; p.y += p.vy;
        if(check(p.x, p.y)) {
            if(p.vy > 0) { while(check(p.x, p.y)) p.y -= 0.5; p.gr = true; }
            p.vy = 0;
        } else p.gr = false;

        // 渲染
        ctx.fillStyle = "#87ceeb"; ctx.fillRect(0,0,cvs.width,cvs.height);
        let cx = p.x - cvs.width/2, cy = p.y - cvs.height/2;
        for(let x=Math.floor(cx/32); x<=Math.ceil((cx+cvs.width)/32); x++){
            for(let y=Math.floor(cy/32); y<=Math.ceil((cy+cvs.height)/32); y++){
                let b = getB(x, y);
                if(b > 0) {
                    ctx.fillStyle = b===2 ? "#2ecc71" : "#795548";
                    ctx.fillRect(x*32-cx, y*32-cy, 32.5, 32.5);
                }
            }
        }
        ctx.fillStyle = "#e67e22"; ctx.fillRect(p.x-cx, p.y-cy, p.w, p.h);
        document.getElementById('pos').innerText = Math.floor(p.x/32) + "," + Math.floor(p.y/32);
        requestAnimationFrame(loop);
    }
    window.onkeydown = e => { if(e.code==='Space'&&p.gr) p.vy=-14; };
</script>
</body>
</html>
