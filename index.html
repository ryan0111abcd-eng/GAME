<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Super Human - 完整物理同調版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: "Microsoft JhengHei", sans-serif; }
        canvas { display: block; }
        .screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; color: white; background: rgba(0,0,0,0.9);
        }
        .btn { padding: 15px 50px; font-size: 22px; background: #f1c40f; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; margin: 10px; }
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; display: none; border: 1px solid #f1c40f; }
    </style>
</head>
<body>

    <div id="menu" class="screen">
        <h1>未來的 Super Human</h1>
        <button class="btn" onclick="startGame(5)">進入世界 (含 4 名隊友)</button>
    </div>

    <div id="ui">❤️ 生命: <span id="hp">100</span> | 👥 隊伍人數: <span id="p-count">1</span></div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let isPlaying = false;
    let cameraX = 0;
    let keys = {};

    // 核心物理參數 ⚙️
    const PHYSICS = { gravity: 0.6, jump: -11, speed: 4, tile: 32 };

    // 角色類別：定義玩家與隊友共同的靈魂 🧠
    class Entity {
        constructor(x, y, color) {
            this.x = x; this.y = y; this.w = 22; this.h = 42;
            this.vx = 0; this.vy = 0; this.color = color;
            this.grounded = false;
        }

        // 核心邏輯：大家共用的移動與碰撞規則
        update(inputX, wantJump) {
            this.vx = inputX;
            let nx = this.x + this.vx;

            // 1. 水平碰撞 + 自動爬坡 🧗
            if (checkCollision(nx, this.y, this.w, this.h)) {
                // 如果撞牆，看看往上一格是不是空的
                if (!checkCollision(nx, this.y - PHYSICS.tile, this.w, this.h)) {
                    this.x = nx;
                    this.y -= 8; // 走上一格高度
                } else {
                    this.vx = 0; // 真的撞死牆了
                }
            } else {
                this.x = nx;
            }

            // 2. 垂直重力 🍎
            this.vy += PHYSICS.gravity;
            if (wantJump && this.grounded) {
                this.vy = PHYSICS.jump;
                this.grounded = false;
            }

            if (!checkCollision(this.x, this.y + this.vy, this.w, this.h)) {
                this.y += this.vy;
                this.grounded = false;
            } else {
                if (this.vy > 0) this.grounded = true;
                this.vy = 0;
            }
        }

        draw() {
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x - cameraX, this.y, this.w, this.h);
        }
    }

    let player = new Entity(300, -500, '#e67e22'); // 橘色玩家
    let teammates = [];

    function startGame(count) {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('ui').style.display = 'block';
        document.getElementById('p-count').innerText = count;
        // 產生隊友
        for(let i=0; i<count-1; i++) teammates.push(new Entity(300 + (i+1)*40, -500, '#f1c40f')); // 黃色隊友
        isPlaying = true;
        resize();
        loop();
    }

    // 簡單的地形碰撞檢查
    function checkCollision(nx, ny, w, h) {
        let x1 = Math.floor(nx / 32), x2 = Math.floor((nx + w) / 32);
        let y1 = Math.floor(ny / 32), y2 = Math.floor((ny + h) / 32);
        for (let x = x1; x <= x2; x++) for (let y = y1; y <= y2; y++) {
            let ground = Math.floor(15 + Math.sin(x * 0.1) * 3);
            if (y >= ground) return true;
        }
        return false;
    }

    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
