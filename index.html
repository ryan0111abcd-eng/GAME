<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Super Human - 點擊修復最終版</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #111; overflow: hidden; font-family: sans-serif; }
        
        /* 選單容器：確保它在最前面，且背景不擋點擊 */
        #ui-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; pointer-events: auto;
        }

        .menu-box {
            background: rgba(40, 40, 40, 0.95);
            padding: 40px; border-radius: 20px; border: 4px solid #f1c40f;
            text-align: center; color: white; box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .btn {
            padding: 15px 40px; font-size: 24px; cursor: pointer; margin: 10px;
            background: #f1c40f; border: none; font-weight: bold; border-radius: 10px;
            color: black; display: block; width: 100%; transition: 0.2s;
        }
        .btn:hover { background: white; transform: scale(1.05); }

        #hud { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 12px; border: 2px solid #f1c40f; display: none; z-index: 5000; color: white; border-radius: 10px; }
        
        /* 物品欄 */
        #inventory {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: none; gap: 10px; background: rgba(0,0,0,0.8); padding: 15px;
            border-radius: 15px; z-index: 5000; border: 2px solid #fff;
        }
        .slot {
            width: 65px; height: 65px; border: 3px solid #555;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 14px; color: white; background: #222; transition: 0.2s;
        }
        .slot.active { border-color: #f1c40f; background: #444; transform: translateY(-10px) scale(1.1); box-shadow: 0 0 20px #f1c40f; }
        
        select { padding: 10px; font-size: 20px; width: 100%; margin: 10px 0; border-radius: 5px; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
    </style>
</head>
<body>

    <div id="ui-container">
        <div id="m-layer" class="menu-box">
            <h1 style="color: #f1c40f; margin: 0 0 20px 0;">SUPER HUMAN</h1>
            <button class="btn" onclick="runGame(1)">單人探險模式</button>
            <button class="btn" style="background:#3498db; color:white;" onclick="showMulti()">多人連線模式</button>
        </div>

        <div id="s-layer" class="menu-box" style="display:none;">
            <h2>選擇連線人數</h2>
            <select id="p-num">
                <option value="2">2 人</option>
                <option value="5" selected>5 人</option>
                <option value="10">10 人</option>
            </select>
            <button class="btn" onclick="runGame(document.getElementById('p-num').value)">開始遊戲</button>
            <button class="btn" style="background:#777;" onclick="hideMulti()">返回</button>
        </div>
    </div>

    <div id="hud">❤️ 血量: <span id="hp">100</span> | 🕒 <span id="time">07:00</span> | ⚔️ K 攻擊 | ⛏️ 左挖右蓋</div>

    <div id="inventory">
        <div class="slot active" id="sl-1"><div style="width:20px;height:20px;background:#8B4513;margin-bottom:5px;"></div>1:泥土</div>
        <div class="slot" id="sl-2"><div style="width:20px;height:20px;background:#228B22;margin-bottom:5px;"></div>2:草地</div>
        <div class="slot" id="sl-3"><div style="width:20px;height:20px;background:#666;margin-bottom:5px;"></div>3:石頭</div>
        <div class="slot" id="sl-4"><div style="width:20px;height:20px;background:#cd853f;margin-bottom:5px;"></div>4:木頭</div>
    </div>
