<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPER HUMAN 2026 - FINAL</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; user-select: none; }
        /* 啟動介面層 */
        .ui { position: fixed; inset: 0; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a0a0a; color: #f1c40f; text-align: center; }
        .btn { padding: 25px 60px; font-size: 32px; cursor: pointer; margin: 15px; background: #f1c40f; border: 4px solid #fff; border-radius: 20px; font-weight: bold; color: #000; box-shadow: 0 8px 0 #b8860b; }
        .btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #b8860b; }
        .in { padding: 18px; font-size: 30px; border: 4px solid #f1c40f; border-radius: 12px; background: #000; color: #f1c40f; text-align: center; margin-bottom: 25px; width: 350px; outline: none; }
        /* 遊戲資訊 HUD */
        #hud { position: fixed; top: 15px; left: 15px; z-index: 100; color: white; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 10px; border: 2px solid #f1c40f; display: none; pointer-events: none; line-height: 1.6; }
        canvas#gCanvas { display: none; position: absolute; top: 0; left: 0; z-index: 10; }
        #rain-fx { position: fixed; inset: 0; pointer-events: none; z-index: 50; background: rgba(40,40,80,0.3); display: none; }
    </style>
</head>
<body>

    <div id="step-auth" class="ui">
        <h1 style="font-size: 45px; letter-spacing: 5px; margin-bottom: 10px;">SUPER HUMAN 系統</h1>
        <p style="font-size: 24px; color: #fff; margin-bottom: 30px;">請輸入啟動碼</p>
        <input type="password" id="code-input" class="in" maxlength="11" onkeydown="if(event.key==='Enter') checkCode()">
        <button class="btn" onclick="checkCode()">認證啟動</button>
        <p id="err-msg" style="color:#e74c3c; display:none; margin-top:20px; font-weight:bold;">啟動碼錯誤，請重新輸入</p>
    </div>

    <div id="step-setup" class="ui" style="display:none;">
        <h1>認證成功</h1>
        <div style="margin: 20px 0;">
            <h2 id="p-label">小隊人數: <span style="color:#f1c40f;">5</span></h2>
            <input type="range" min="2" max="15" value="5" oninput="document.getElementById('p-label').innerHTML='小隊人數: <span style=color:#f1c40f;>'+this.value+'</span>'" id="p-slider" style="width:350px; height:40px;">
        </div>
        <button class="btn" onclick="startWorld()">進入世界</button>
    </div>

    <div id="hud">
        ❤️ 血量: <span id="hp">100</span> | 📍 座標: <span id="pos">0,0</span><br>
        🕒 時間: <span id="tm">12:00</span> | ☀️ 狀態: <span id="sun-status">日間</span>
    </div>
    <div id="rain-fx"></div>
    <canvas id="gCanvas"></canvas>

<script>
    const cvs = document.getElementById('gCanvas'), ctx = cvs.getContext('2d');
    let live = false, world = {}, keys = {}, ents = [], ticks = 600;
    let p = { x: 0, y: -800, w: 22, h: 42, vx: 0, vy: 0, hp: 100, max: 100, gr: false, hitBy: null };
    const TILE = 32;

    function checkCode() {
        // 啟動碼仍為：ryan0111407
        if(document.getElementById('code-input').value === 'ryan0111407') {
            document.getElementById('step-auth').style.display='none';
            document.getElementById('step-setup').style.display='flex';
        } else {
            document.getElementById('err-msg').style.display='block';
            document.getElementById('code-input').value = '';
        }
    }

    function startWorld() {
        let squad = document.getElementById('p-slider').value;
        document.getElementById('step-setup').style.display='none';
        document.getElementById('hud').style.display='block';
        cvs.style.display = 'block'; cvs.width = window.innerWidth; cvs.height = window.innerHeight;
        
        if(Math.random() < 0.4) document.getElementById('rain-fx').style.display = 'block';
        for(let i=0; i<squad-1; i++) spawn('ally', (Math.random()-0.5)*800);
        for(let i=0; i<5; i++) spawn('pig', (Math.random()-0.5)*2000);
        
        live = true; loop();
    }

    function spawn(t, x) {
        ents.push({ type: t, x, y: -700, w: 22, h: 42, vx: 0, vy: 0, hp: 100, max: 100, dir: 1, mineCd: 0 });
    }

    function getB(gx, gy) {
        if(world[gx+'_'+gy]!==undefined) return world[gx+'_'+gy];
        let x = Math.abs(gx);
        let h = (x%100 < 70) ? 8 : (x%100 < 50 ? 4 : 10);
        let f = Math.floor(h + Math.sin(gx * 0.15) * 6);
        return gy < f ? 0 : (gy === f ? 2 : 1);
    }

    function check(x,y) {
        for(let i=Math.floor(x/TILE); i<=Math.floor((x+22)/TILE); i++)
            for(let j=Math.floor(y/TILE); j<=Math.floor((y+42)/TILE); j++)
                if(getB(i,j)>0) return true;
        return false;
    }

    // 左鍵：攻擊+挖掘 | 右鍵：放置
    window.onmousedown = e => {
        if(!live) return;
        let gx = Math.floor((e.clientX + (p.x - cvs.width/2))/TILE);
        let gy = Math.floor((e.clientY + (p.y - cvs.height/2))/TILE);
        if(e.button === 0) {
            if(getB(gx, gy) > 0) world[gx+'_'+gy] = 0; 
            else atk(p);
        } else if(e.button === 2) {
            if(getB(gx, gy) === 0) world[gx+'_'+gy] = 3;
        }
    };
    window.oncontextmenu = e => e.preventDefault();

    function atk(o, t=null) {
        ents.concat(p).forEach(e=>{
            if(e!==o && Math.abs(e.x-o.x)<70 && Math.abs(e.y-o.y)<70){
                e.hp -= 25; e.vx = (e.x>o.x?12:-12);
                if(e===p) p.hitBy = o;
            }
        });
    }

    window.onkeydown=e=>{keys[e.code]=true; if(e.code==='Escape') location.reload();};
    window.onkeyup=e=>keys[e.code]=false;

    function loop() {
        if(!live) return;
        ticks = (ticks + 0.8) % 1440;
        let isNight = ticks > 1050 || ticks < 350;

        // --- 早上殭屍全部消失 ---
        if(!isNight) {
            ents = ents.filter(e => e.type !== 'mob');
            document.getElementById('sun-status').innerText = "日間 (安全)";
            document.getElementById('sun-status').style.color = "#f1c40f";
        } else {
            document.getElementById('sun-status').innerText = "夜間 (危險)";
            document.getElementById('sun-status').style.color = "#e74c3c";
        }

        // 物理更新
        [p, ...ents].forEach(e => {
            e.vy += 0.8; e.y += e.vy;
            if(check(e.x, e.y)) {
                if(e.vy > 0) { while(check(e.x, e.y)) e.y -= 0.5; e.gr = true; }
                e.vy = 0;
            } else e.gr = false;

            if(e===p) {
                let dx = (keys['KeyD']?5:0) - (keys['KeyA']?5:0);
                if(dx!==0) { p.x += dx; if(check(p.x, p.y)) p.x -= dx; }
                if(keys['Space'] && p.gr) p.vy = -14;
            } else {
                if(e.type==='ally') {
