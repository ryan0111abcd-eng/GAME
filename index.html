<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Future Super Human - Final Rescue 2026</title>
    <style>
        /* 基礎設定 */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        
        /* 選單：啟動前唯一的內容 */
        #main-menu {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #111; color: #f1c40f;
        }

        .btn {
            padding: 20px 60px; font-size: 30px; cursor: pointer; margin: 15px;
            background: #f1c40f; border: 4px solid #fff; border-radius: 15px;
            font-weight: bold; color: #000; box-shadow: 0 8px 0 #b8860b;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #b8860b; }

        /* 遊戲專用 HUD */
        #hud {
            position: fixed; top: 15px; left: 15px; z-index: 100;
            background: rgba(0,0,0,0.8); color: white; padding: 12px;
            border: 2px solid #f1c40f; border-radius: 8px; display: none; pointer-events: none;
        }

        #radar-box {
            position: fixed; top: 15px; right: 15px; width: 140px; height: 140px;
            border: 3px solid #fff; border-radius: 50%; overflow: hidden;
            z-index: 100; display: none; background: rgba(0,0,0,0.5);
        }

        #esc-screen {
            position: fixed; inset: 0; z-index: 10000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.9);
        }

        /* 畫布：初始不佔空間 */
        canvas#gCvs { display: none; position: absolute; top: 0; left: 0; z-index: 1; }
    </style>
</head>
<body>

    <div id="main-menu">
        <h1 style="font-size: 45px;">SUPER HUMAN 終極修復</h1>
        <div id="ui-1">
            <button class="btn" onclick="chooseMode(1)">👤 單人連線</button>
            <button class="btn" onclick="chooseMode(5)" style="background:#3498db; color:white;">👥 多人連線</button>
        </div>
