<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>未來的 Super Human</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; color: white; }
        
        /* 選單層級確保在最上方 */
        .layer { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1a1a1a; z-index: 10001; }
        .title-text { color: #f1c40f; font-size: 50px; margin-bottom: 40px; text-shadow: 3px 3px 0 #000; }
        .btn { padding: 15px 50px; font-size: 24px; cursor: pointer; margin: 10px; background: #f1c40f; border: none; font-weight: bold; border-radius: 12px; color: black; box-shadow: 0 6px 0 #b8860b; position: relative; z-index: 10002; }
        .btn:hover { background: #fff; transform: scale(1.05); }
        .btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #b8860b; }
        
        /* 遊戲內 UI */
        #hud { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 15px; border: 2px solid #f1c40f; display: none; z-index: 5000; border-radius: 10px; pointer-events: none; }
        #minimap-container { position: fixed; top: 10px; right: 10px; width: 150px; height: 150px; border-radius: 50%; border: 3px solid #fff; background: rgba(0,0,0,0.5); overflow: hidden; display: none; z-index: 5000; }
        #esc-menu { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10005; }
        
        #inv { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; gap: 8px; z-index: 5000; }
        .slot { width: 45px; height: 45px; border: 2px solid #777; background: #333; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; }
        .slot.active { border-color: #f1c40f; transform: scale(1.1); background: #444; }

        canvas#gameCanvas { display: none; position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>

    <div id="ui-main" class="layer">
        <h1 class="title-text">未來的 SUPER HUMAN</h1>
        <button class="btn" id="btn-start">開始鍵</button>
        <button class="btn" id="btn-multi-go" style="background:#3498db; color:white; box-shadow: 0 6px 0 #2980b9;">多人連線鍵</button>
    </div>

    <div id="ui-multi" class="layer" style="display:none;">
        <h1 class="title-text">多人小隊設定</h1>
        <h2 style="font-size: 24px;">選擇電腦隊友人數 (2-10)</h2>
        <input type="range" id="p-range" min="2" max="10" value="5" style="width:300px; margin:20px;">
        <div style="font-size:32px; margin-bottom: 30px;">總人數：<span id="pv" style="color:#f1c40f;">5</span> 人</div>
        <button class="btn" id="btn-multi-start">開始遊戲</button>
        <button class="btn" onclick="location.reload()" style="background:#666; box-shadow: 0 6px 0 #444;">返回</button>
    </div>

    <div id="esc-menu">
        <h1 class="title-text">遊戲暫停</h1>
        <button class="btn" onclick="location.reload()">離開遊戲 (重新開始)</button>
        <p style="margin-top:20px;">按 ESC 鍵回到遊戲</p>
    </div>

    <div id="hud">
        📍 座標: <span id="posX">0</span>, <span id="posY">0</span><br>
        ❤️ 血量: <span id="hp">100</span> | 🕒 時間: <span id="time-text">07:00</span>
    </div>

    <div id="minimap-container">
        <canvas id="m-cvs" width="150" height="150"></canvas>
    </div>

    <div id="inv">
        <div class="slot active" id="sl1">1:土</div>
        <div class="slot" id="sl2">2:草</div>
        <div class="slot" id="sl3">3:石</div>
        <div class="slot" id="sl4">4:木</div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const cvs = document.getElementById('gameCanvas'), ctx = cvs.getContext('2d');
const mcvs = document.getElementById('m-cvs'), mctx = mcvs.getContext('2d');
let isRunning = false, isEsc = false;
let ticks = 420, world = {}, camX = 0, camY = 0, curB = 1;
let p = { x: 500, y: 0, w: 20, h: 40, vx: 0, vy: 0, hp: 100, ground: false, atk: 0 };
let agents = [], keys = {};
const TILE = 32, COLORS = { 1: '#8B4513', 2: '#228B22', 3: '#666', 4: '#cd853f' };

// 按鈕事件綁定
document.getElementById('p-range').oninput = function() { document.getElementById('pv').innerText = this.value; };
document.getElementById('btn-start').onclick = () => boot(1);
document.getElementById('btn-multi-go').onclick = () => {
    document.getElementById('ui-main').style.display = 'none';
    document.getElementById('ui-multi').style.display = 'flex';
};
document.getElementById('btn-multi-start').onclick = () => boot(document.getElementById('p-range').value);

// 無限地圖算法
function getGY(gx) { return Math.floor(35 + Math.sin(gx*0.05)*8 + Math.cos(gx*0.02)*10); }
function getB(gx, gy) {
    if(world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
    let fY = getGY(gx); return gy < fY ? 0 : (gy === fY ? 2 : 1);
}

function boot(num) {
    document.getElementById('ui-main').style.display = 'none';
    document.getElementById('ui-multi').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    document.getElementById('minimap-container').style.display = 'block';
    document.getElementById('inv').style.display = 'flex';
    cvs.style.display = 'block';
    cvs.width = window.innerWidth; cvs.height = window.innerHeight;

    p.y = getGY(Math.floor(p.x/TILE))*TILE - 150;
    
    // 生成隊友與村民
    for(let i=0; i < num-1; i++) {
        agents.push({x: p.x + (i+1)*200, y:-100, w:20, h:40, vx:0, vy:0, hp:100, type:'ally', dir:1, sTimer:50});
    }
    // 生成一些動物
    for(let i=0; i<3; i++) {
        agents.push({x: p.x - 300 - i*150, y:-100, w:20, h:20, vx:0, vy:0, hp:30, type:'animal', dir:1, sTimer:40});
    }

    isRunning = true;
    requestAnimationFrame(loop);
}

// 控制邏輯
window.addEventListener('keydown', e => {
    if(e.code === 'Escape' && isRunning) {
        isEsc = !isEsc;
        document.getElementById('esc-menu').style.display = isEsc ? 'flex' : 'none';
    }
    keys[e.code] = true;
    if(e.code === 'KeyK') p.atk = 10;
    if(e.key >= '1' && e.key <= '4') {
        curB = parseInt(e.key);
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
        document.getElementById('sl'+curB).classList.add('active');
    }
});
window.addEventListener('keyup', e => keys[e.code] = false);
window.addEventListener('mousedown', e => {
    if(!isRunning || isEsc) return;
    let gx = Math.floor((e.clientX + camX)/TILE), gy = Math.floor((e.clientY + camY)/TILE);
    if(e.button === 0) world[gx+'_'+gy] = 0; // 挖
    if(e.button === 2) if(getB(gx, gy) === 0) world[gx+'_'+gy] = curB; // 放
});
window.oncontextmenu = e => e.preventDefault();

function loop() {
    if(isRunning && !isEsc) {
        ticks = (ticks + 0.4) % 1440;
        // 物理更新
        p.vx = keys['KeyD'] ? 5 : (keys['KeyA'] ? -5 : 0);
        if((keys['KeyW'] || keys['Space']) && p.ground) p.vy = -12;
        updatePhys(p, true);
        agents.forEach(a => updatePhys(a, false));

        // 晚上生成怪物 (18:10 - 06:30)
        if((ticks >= 1090 || ticks < 390) && Math.random() < 0.01) {
            agents.push({x: p.x + (Math.random()-0.5)*1200, y:-200, w:20, h:40, vx:0, vy:0, hp:50, type:'monster', dir:1, sTimer:30});
        }
    }
    render();
    requestAnimationFrame(loop);
}

function updatePhys(o, isP) {
    if(!isP) {
        o.sTimer--;
        if(o.sTimer <= 0) { o.dir = Math.random()>0.5?1:-1; o.sTimer = 60+Math.random()*120; }
        o.vx = o.dir * (o.type==='monster'?3.5:2);
        if(getB(Math.floor((o.x+o.vx*8)/TILE), Math.floor((o.y+o.h-5)/TILE))>0 && o.ground) o.vy = -11;
    }
    o.vy += 0.7; o.y += o.vy; o.ground = false;
    let fy = Math.floor((o.y+o.h)/TILE), lx = Math.floor((o.x+2)/TILE), rx = Math.floor((o.x+o.w-2)/TILE);
    if(getB(lx, fy)>0 || getB(rx, fy)>0) { o.y = fy*TILE-o.h; o.vy = 0; o.ground = true; }
    o.x += o.vx;
}

function render() {
    // 天空顏色
    let sky = '#87ceeb';
    if(ticks >= 1050 && ticks < 1080) sky = '#ff7f50'; // 17:30 傍晚
    if(ticks >= 1090 || ticks < 390) sky = '#191970'; // 18:10 晚上
    ctx.fillStyle = sky; ctx.fillRect(0, 0, cvs.width, cvs.height);

    camX += (p.x - cvs.width/2 - camX) * 0.1;
    camY += (p.y - cvs.height/2 - camY) * 0.1;
    let cx = Math.floor(camX), cy = Math.floor(camY);

    // 繪製方塊
    for(let x=Math.floor(cx/TILE); x<Math.floor((cx+cvs.width)/TILE)+1; x++) {
        for(let y=Math.floor(cy/TILE); y<Math.floor((cy+cvs.height)/TILE)+1; y++) {
            let b = getB(x, y);
            if(b!==0) { ctx.fillStyle = COLORS[b]; ctx.fillRect(x*TILE-cx, y*TILE-cy, TILE, TILE); }
        }
    }

    // AI 與 玩家渲染
    agents.forEach((a, i) => {
        ctx.fillStyle = a.type==='monster'?'#f00':(a.type==='animal'?'#fff':'#f1c40f');
        ctx.fillRect(a.x-cx, a.y-cy, a.w, a.h);
        if(p.atk > 0 && Math.abs(a.x-p.x)<50 && Math.abs(a.y-p.y)<50) {
            a.hp -= 20; a.vx = (a.x>p.x?15:-15); if(a.hp<=0) agents.splice(i, 1);
        }
        if(a.type==='monster' && Math.abs(a.x-p.x)<25) p.hp -= 0.1;
    });

    ctx.fillStyle = "#FF5733"; ctx.fillRect(p.x-cx, p.y-cy, p.w, p.h);
    if(p.atk > 0) { ctx.strokeStyle="#fff"; ctx.lineWidth=3; ctx.strokeRect(p.x-cx-10, p.y-cy-10, p.w+20, p.h+20); p.atk--; }

    // 更新 HUD
    document.getElementById('posX').innerText = Math.floor(p.x/TILE);
    document.getElementById('posY').innerText = Math.floor(p.y/TILE);
    document.getElementById('hp').innerText = Math.ceil(p.hp);
    let h = Math.floor(ticks/60).toString().padStart(2,'0'), m = Math.floor(ticks%60).toString().padStart(2,'0');
    document.getElementById('time-text').innerText = `${h}:${m}`;

    // 小地圖繪製
    mctx.fillStyle = sky; mctx.fillRect(0,0,150,150);
    mctx.fillStyle = "#FF5733"; mctx.fillRect(75, 75, 4, 4); // 你
    agents.forEach(a => {
        mctx.fillStyle = a.type==='monster'?'#f00':(a.type==='ally'?'#f1c40f':'#fff');
        mctx.fillRect(75+(a.x-p.x)/10, 75+(a.y-p.y)/10, 3, 3);
    });
}
</script>
</body>
</html>
