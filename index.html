<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Future Super Human - 修復版</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #1a1a1a; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; }
        
        /* 選單層級：確保 z-index 最高 */
        .layer { 
            position: fixed; inset: 0; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: #1a1a1a; color: white; z-index: 10000; 
        }
        
        /* 超醒目好點按鈕 */
        .btn { 
            padding: 20px 60px; font-size: 28px; cursor: pointer; margin: 15px; 
            background: #f1c40f; border: 4px solid #fff; font-weight: bold; border-radius: 15px; 
            color: black; box-shadow: 0 8px 0 #b8860b; 
            pointer-events: auto !important;
        }
        .btn:hover { background: #fff; transform: scale(1.05); }
        .btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #b8860b; }

        /* 遊戲 UI */
        #hud { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 15px; border: 2px solid #f1c40f; border-radius: 10px; color: white; display: none; z-index: 5000; pointer-events: none; }
        #minimap { position: fixed; top: 15px; right: 15px; width: 140px; height: 140px; border-radius: 50%; border: 3px solid #fff; background: rgba(0,0,0,0.5); display: none; z-index: 5000; overflow: hidden; }
        
        #esc-menu { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 20000; color: white; }

        /* 畫布：初始隱藏且禁止點擊 */
        canvas#gameCanvas { display: none; position: absolute; top: 0; left: 0; z-index: 100; pointer-events: none; }
        canvas#gameCanvas.active { pointer-events: auto; }
    </style>
</head>
<body>

    <div id="ui-main" class="layer">
        <h1 style="color:#f1c40f; font-size:50px; text-shadow: 3px 3px 0 #000;">未來的 SUPER HUMAN</h1>
        <button class="btn" onclick="startGame(1)">開始遊戲</button>
        <button class="btn" onclick="showMulti()" style="background:#3498db; color:white;">多人連線模式</button>
    </div>

    <div id="ui-multi" class="layer" style="display:none;">
        <h1 style="font-size:35px;">選擇隊友人數 (2-10)</h1>
        <input type="range" id="p-count" min="2" max="10" value="5" oninput="document.getElementById('pv').innerText=this.value" style="width:300px; height:30px;">
        <div style="font-size:40px; margin:20px;"><span id="pv" style="color:#f1c40f;">5</span> 人</div>
        <button class="btn" onclick="startGame(document.getElementById('p-count').value)">開始小隊遊戲</button>
    </div>

    <div id="esc-menu">
        <h1 style="color:#f1c40f; font-size:40px;">暫停暫停</h1>
        <button class="btn" onclick="location.reload()">離開遊戲 (重新開始)</button>
        <button class="btn" onclick="togglePause()" style="background:#888; color:white;">繼續遊戲</button>
    </div>

    <div id="hud">
        📍 <span id="posX">0</span>, <span id="posY">0</span> | ❤️ <span id="hp">100</span><br>
        🕒 <span id="time-text">07:00</span> <span id="day-icon">☀️</span>
    </div>
    <div id="minimap"><canvas id="miniCanvas" width="140" height="140"></canvas></div>

    <canvas id="gameCanvas"></canvas>

<script>
    const cvs = document.getElementById('gameCanvas'), ctx = cvs.getContext('2d');
    const mcvs = document.getElementById('miniCanvas'), mctx = mcvs.getContext('2d');
    
    let isRunning = false, isPaused = false, ticks = 420; // 07:00
    let world = {}, camX = 0, camY = 0, p = { x: 0, y: 0, w: 20, h: 40, vx: 0, vy: 0, hp: 100, ground: false, atk: 0 };
    let agents = [], keys = {};
    const TILE = 32;

    function showMulti() {
        document.getElementById('ui-main').style.display = 'none';
        document.getElementById('ui-multi').style.display = 'flex';
    }

    function startGame(num) {
        // 1. 隱藏所有選單
        document.getElementById('ui-main').style.display = 'none';
        document.getElementById('ui-multi').style.display = 'none';
        
        // 2. 顯示遊戲元件
        document.getElementById('hud').style.display = 'block';
        document.getElementById('minimap').style.display = 'block';
        cvs.style.display = 'block';
        cvs.classList.add('active'); // 啟用點擊穿透
        
        // 3. 設定畫布尺寸
        cvs.width = window.innerWidth;
        cvs.height = window.innerHeight;
        
        // 4. 初始化角色座標 (確保在地面上方)
        p.y = getGY(0)*TILE - 100;
        
        // 5. 生成隊友/NPC
        for(let i=0; i < num-1; i++) spawnAgent('ally', (Math.random()-0.5)*1000);
        for(let i=0; i < 4; i++) spawnAgent('villager', (Math.random()-0.5)*2000); // 村民
        for(let i=0; i < 4; i++) spawnAgent('animal', (Math.random()-0.5)*2000); // 動物

        isRunning = true;
        requestAnimationFrame(loop);
    }

    // 地形邏輯 (平原, 山地, 村莊混和)
    function getGY(gx) {
        let x = Math.abs(gx);
        let h = 35; // 基礎高度
        if(x % 800 < 200) h = 25; // 山地
        if(x % 800 > 600) h = 32; // 台地/村莊區
        return Math.floor(h + Math.sin(gx * 0.1) * 5);
    }

    function getB(gx, gy) {
        if(world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
        let fY = getGY(gx);
        return gy < fY ? 0 : (gy === fY ? 2 : 1); // 2是草, 1是土
    }

    function spawnAgent(type, sx) {
        agents.push({ type, x: sx, y: getGY(Math.floor(sx/TILE))*TILE-80, w: 20, h: 40, hp: 100, dir: 1, sTimer: 50 });
    }

    function togglePause() {
        isPaused = !isPaused;
        document.getElementById('esc-menu').style.display = isPaused ? 'flex' : 'none';
    }

    // 控制與點擊
    window.onkeydown = e => { if(e.code==='Escape') togglePause(); if(!isPaused) keys[e.code]=true; if(e.code==='KeyK') p.atk=15; };
    window.onkeyup = e => keys[e.code]=false;
    window.onmousedown = e => {
        if(!isRunning || isPaused) return;
        let gx = Math.floor((e.clientX + camX)/TILE), gy = Math.floor((e.clientY + camY)/TILE);
        if(e.button === 0) world[gx+'_'+gy] = 0; // 挖掘
        if(e.button === 2) world[gx+'_'+gy] = 3; // 放置石頭
    };
    window.oncontextmenu = e => e.preventDefault();

    function loop() {
        if(isRunning && !isPaused) {
            ticks = (ticks + 0.4) % 1440;
            let isNight = (ticks > 1090 || ticks < 390);

            // 怪物生成
            if(isNight && Math.random() < 0.01) spawnAgent('monster', p.x + (Math.random()>0.5?500:-500));

            // 物理
            p.vx = keys['KeyD'] ? 5 : (keys['KeyA'] ? -5 : 0);
            p.vy += 0.8; if(keys['KeyW'] && p.ground) p.vy = -12;
            p.y += p.vy; p.ground = false;
            let fy = Math.floor((p.y+p.h)/TILE), lx = Math.floor((p.x+2)/TILE);
            if(getB(lx, fy)>0) { p.y=fy*TILE-p.h; p.vy=0; p.ground=true; }
            p.x += p.vx;

            // NPC 邏輯
            agents.forEach((a, idx) => {
                a.sTimer--; if(a.sTimer<=0){ a.dir = Math.random()>0.5?1:-1; a.sTimer=100; }
                if(a.type==='monster') a.dir = p.x > a.x ? 1 : -1;
                a.x += a.dir * (a.type==='monster'?3:1.5);
                a.y += (getGY(Math.floor(a.x/TILE))*TILE - a.h - a.y) * 0.1;
                if(p.atk>0 && Math.abs(a.x-p.x)<50 && Math.abs(a.y-p.y)<50) a.hp -= 10;
                if(a.hp <= 0) agents.splice(idx, 1);
            });
            if(p.atk > 0) p.atk--;
        }
        render();
        requestAnimationFrame(loop);
    }

    function render() {
        // 天空變色 (白天/傍晚/晚上)
        let sky = '#87ceeb';
        if(ticks > 1050 && ticks <= 1080) sky = '#e67e22'; // 傍晚
        else if(ticks > 1080 || ticks < 390) sky = '#1a1a2e'; // 晚上
        ctx.fillStyle = sky; ctx.fillRect(0,0,cvs.width, cvs.height);

        camX += (p.x - cvs.width/2 - camX) * 0.1;
        camY += (p.y - cvs.height/2 - camY) * 0.1;

        // 畫地圖
        for(let x=Math.floor(camX/TILE); x<Math.floor((camX+cvs.width)/TILE)+1; x++) {
            for(let y=Math.floor(camY/TILE); y<Math.floor((camY+cvs.height)/TILE)+1; y++) {
                let b = getB(x, y);
                if(b===1) ctx.fillStyle='#8B4513';
                if(b===2) ctx.fillStyle='#228B22';
                if(b===3) ctx.fillStyle='#666';
                if(b!==0) ctx.fillRect(x*TILE-camX, y*TILE-camY, TILE, TILE);
            }
        }

        // 畫角色與 NPC
        agents.forEach(a => {
            let color = '#f1c40f'; // 隊友
            if(a.type==='monster') color='#e74c3c';
            if(a.type==='villager') color='#9b59b6';
            if(a.type==='animal') color='#2ecc71';
            ctx.fillStyle = color; ctx.fillRect(a.x-camX, a.y-camY, a.w, a.h);
            ctx.fillStyle = 'lime'; ctx.fillRect(a.x-camX-5, a.y-camY-10, 30*(a.hp/100), 4);
        });

        ctx.fillStyle = '#FF5733'; ctx.fillRect(p.x-camX, p.y-camY, p.w, p.h);
        if(p.atk > 0) { ctx.strokeStyle='white'; ctx.strokeRect(p.x-camX-10, p.y-camY-10, p.w+20, p.h+20); }

        // 圓形小地圖
        mctx.fillStyle = '#222'; mctx.fillRect(0,0,140,140);
        mctx.save(); mctx.beginPath(); mctx.arc(70, 70, 65, 0, Math.PI*2); mctx.clip();
        agents.forEach(a => {
            let dx = (a.x-p.x)/TILE*4, dy = (a.y-p.y)/TILE*4;
            mctx.fillStyle = a.type==='monster'?'red':'yellow';
            mctx.fillRect(70+dx, 70+dy, 4, 4);
        });
        mctx.fillStyle = 'orange'; mctx.fillRect(68, 68, 5, 5); mctx.restore();

        // 更新文字
        document.getElementById('posX').innerText = Math.floor(p.x/TILE);
        document.getElementById('posY').innerText = Math.floor(p.y/TILE);
        document.getElementById('hp').innerText = Math.ceil(p.hp);
        let h = Math.floor(ticks/60).toString().padStart(2,'0'), m = Math.floor(ticks%60).toString().padStart(2,'0');
        document.getElementById('time-text').innerText = `${h}:${m}`;
        document.getElementById('day-icon').innerText = (ticks > 1080 || ticks < 390) ? "🌙" : "☀️";
    }
</script>
</body>
</html>
