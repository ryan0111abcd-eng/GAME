<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>SUPER HUMAN 2026</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; user-select: none; }
        .page { position: fixed; inset: 0; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #050505; color: #f1c40f; text-align: center; }
        .btn { padding: 22px 60px; font-size: 30px; cursor: pointer; margin: 12px; background: #f1c40f; border: 4px solid #fff; border-radius: 20px; font-weight: bold; color: #000; box-shadow: 0 8px 0 #b8860b; }
        .btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #b8860b; }
        .in-box { padding: 18px; font-size: 30px; border: 4px solid #f1c40f; border-radius: 12px; background: #000; color: #f1c40f; text-align: center; margin-bottom: 25px; width: 420px; outline: none; }
        #hud { position: fixed; top: 15px; left: 15px; z-index: 1000; color: white; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 12px; border: 2px solid #f1c40f; display: none; pointer-events: none; line-height: 1.6; }
        #mini-map { position: fixed; top: 15px; right: 15px; width: 150px; height: 150px; border: 3px solid #fff; border-radius: 50%; z-index: 1000; display: none; background: rgba(0,0,0,0.5); overflow: hidden; }
        #esc-menu { position: fixed; inset: 0; z-index: 200000; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); }
        canvas#g { display: none; position: absolute; top: 0; left: 0; z-index: 10; }
    </style>
</head>
<body>

    <div id="p-auth" class="page">
        <h1 style="font-size: 50px; letter-spacing: 5px;">SUPER HUMAN 系統</h1>
        <p style="font-size: 24px; color: #666; margin-bottom: 30px;">請輸入啟動碼以存取系統</p>
        <input type="text" id="pw" class="in-box" placeholder="Security Key">
        <button class="btn" onclick="auth()">認證啟動</button>
        <p id="err" style="color:red; display:none; margin-top:15px;">啟動碼無效</p>
    </div>

    <div id="p-mode" class="page" style="display:none;">
        <h1>認證成功</h1>
        <button class="btn" onclick="setM(1)">👤 單人模式</button>
        <button class="btn" onclick="document.getElementById('p-mode').style.display='none';document.getElementById('p-set').style.display='flex';" style="background:#3498db; color:white;">👥 多人模式</button>
    </div>

    <div id="p-set" class="page" style="display:none;">
        <h1>小隊規模設定</h1>
        <h2 id="pv">5 人</h2>
        <input type="range" min="2" max="15" value="5" oninput="document.getElementById('pv').innerText=this.value+' 人'" id="sld" style="width:300px; height:40px;">
        <button class="btn" onclick="setM(document.getElementById('sld').value)">下一步</button>
    </div>

    <div id="esc-menu">
        <h1 style="color:#f1c40f; font-size: 50px;">遊戲暫停</h1>
        <button class="btn" onclick="location.reload()">🚪 離開遊戲 (重新開始)</button>
        <button class="btn" onclick="toggleEsc()" style="background:#555; color:white;">⬅️ 返回遊戲</button>
    </div>

    <div id="hud">❤️ HP: <span id="hp-u">100</span> | 📍 <span id="pos-u">0,0</span><br>☀️ <span id="sun-u">日間</span> | 🕒 <span id="tm-u">12:00</span></div>
    <div id="mini-map"><canvas id="mC" width="150" height="150"></canvas></div>
    <canvas id="g"></canvas>

<script>
    var live = false, esc = false, world = {}, keys = {}, ents = [], ticks = 600, sSize = 1;
    var p = { x: 0, y: -800, w: 22, h: 42, vx: 0, vy: 0, hp: 100, gr: false, hitBy: null };
    var T = 32;

    function auth() {
        if(document.getElementById('pw').value.trim() === 'ryan0111407') {
            document.getElementById('p-auth').style.display = 'none';
            document.getElementById('p-mode').style.display = 'flex';
        } else { document.getElementById('err').style.display = 'block'; document.getElementById('pw').value=''; }
    }

    function setM(n) {
        sSize = n;
        document.querySelectorAll('.page').forEach(el => el.style.display = 'none');
        document.getElementById('hud').style.display = 'block';
        document.getElementById('mini-map').style.display = 'block';
        var cvs = document.getElementById('g');
        cvs.style.display = 'block'; cvs.width = window.innerWidth; cvs.height = window.innerHeight;
        for(var i=0; i<sSize-1; i++) spawn('ally', (Math.random()-0.5)*800);
        for(var i=0; i<6; i++) spawn('pig', (Math.random()-0.5)*2000);
        live = true; loop();
    }

    function spawn(t, x) {
        ents.push({ type: t, x: x, y: -700, w: 22, h: 42, vx: 0, vy: 0, hp: 100, max: 100, dir: 1, actionCd: Math.random()*2000 });
    }

    function toggleEsc() { if(!live) return; esc = !esc; document.getElementById('esc-menu').style.display = esc ? 'flex' : 'none'; }

    function getB(gx, gy) {
        if(world[gx+'_'+gy]!==undefined) return world[gx+'_'+gy];
        var x = Math.abs(gx);
        var h = (x%100 < 30)?10:(x%100 < 70?8:5);
        var f = Math.floor(h + Math.sin(gx * 0.15) * 6);
        return gy < f ? 0 : (gy === f ? 2 : 1);
    }

    function check(x,y) {
        for(var i=Math.floor(x/T); i<=Math.floor((x+22)/T); i++)
            for(var j=Math.floor(y/T); j<=Math.floor((y+42)/T); j++)
                if(getB(i,j)>0) return true;
        return false;
    }

    function atk(o) {
        ents.concat(p).forEach(function(e){
            if(e!==o && Math.abs(e.x-o.x)<70 && Math.abs(e.y-o.y)<70){
                e.hp -= 20; e.vx = (e.x>o.x?12:-12);
                if(e === p) p.hitBy = o;
            }
        });
    }

    window.onmousedown = function(e) {
        if(!live || esc) return;
        var cvs = document.getElementById('g');
        var gx = Math.floor((e.clientX + (p.x - cvs.width/2))/T), gy = Math.floor((e.clientY + (p.y - cvs.height/2))/T);
        if(e.button === 0) { if(getB(gx, gy) > 0) world[gx+'_'+gy] = 0; else atk(p); } 
        else if(e.button === 2) { if(getB(gx, gy) === 0) world[gx+'_'+gy] = 3; }
    };

    window.onkeydown = function(e){
        if(e.code === 'Escape') toggleEsc();
        keys[e.code] = true;
        if(e.code === 'KeyQ') p.hp = Math.min(100, p.hp + 20);
        if(e.code === 'KeyK') atk(p);
    };
    window.onkeyup = function(e){ keys[e.code] = false; };
    window.oncontextmenu = function(e){ e.preventDefault(); };

    function loop() {
        if(!live || esc) { requestAnimationFrame(loop); return; }
        var cvs = document.getElementById('g'), ctx = cvs.getContext('2d');
        ticks = (ticks + 0.5) % 1440;
        var isNight = ticks > 1050 || ticks < 350;

        if(!isNight) ents = ents.filter(function(e){ return e.type !== 'mob'; });

        [p].concat(ents).forEach(function(e) {
            e.vy += 0.8; e.y += e.vy;
            if(check(e.x, e.y)) { if(e.vy > 0) { while(check(e.x, e.y)) e.y -= 0.5; e.gr = true; } e.vy = 0; } else e.gr = false;

            if(e===p) {
                var dx = (keys['KeyD']?5:0) - (keys['KeyA']?5:0);
                if(dx!==0) { p.x += dx; if(check(p.x, p.y)) p.x -= dx; }
                if(keys['Space'] && p.gr) p.vy = -14;
            } else {
                if(e.type==='ally') {
                    if(p.hitBy && p.hitBy.hp>0) {
                        e.x += (p.hitBy.x > e.x ? 4.2 : -4.2);
                        if(Math.abs(e.x-p.hitBy.x)<60) atk(e);
                    } else {
                        if(Math.abs(p.x-e.x)>220) e.x += (p.x>e.x?2.5:-2.5);
                        e.actionCd++;
                        if(e.actionCd > 2200) { // 約 35-40 秒動作一次
                            if(Math.random() < 0.05) { 
                                var gx = Math.floor(e.x/T), gy = Math.floor(e.y/T)+2;
                                if(getB(gx, gy)>0) world[gx+'_'+gy]=0; else world[gx+'_'+(gy-1)]=3;
                            }
                            e
