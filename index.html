<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>未來的 Super Human - 多人連線版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        
        /* 選單樣式 */
        #menu, #multi-setup {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; color: white;
        }
        #multi-setup { display: none; background: rgba(20,20,40,0.95); }
        
        h1 { color: #f1c40f; font-size: 50px; text-shadow: 0 0 20px #f1c40f; }
        .btn {
            padding: 15px 40px; font-size: 20px; background: #f1c40f; color: #000;
            border: none; border-radius: 50px; cursor: pointer; font-weight: bold;
            margin: 10px; transition: 0.3s;
        }
        .btn:hover { transform: scale(1.1); background: #fff; }
        
        input[type=range] { width: 200px; margin: 20px; }

        #ui { 
            position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.6); 
            color: #fff; padding: 12px; border-radius: 8px; display: none;
        }
    </style>
</head>
<body>

    <div id="menu">
        <h1>未來的 Super Human</h1>
        <button class="btn" onclick="startSingle()">單人開始</button>
        <button class="btn" style="background:#3498db" onclick="showMulti()">多人連線 (與電腦玩)</button>
    </div>

    <div id="multi-setup">
        <h1>設定連線人數</h1>
        <p>選擇人數 (2-10人): <span id="num-display">5</span></p>
        <input type="range" id="player-count" min="2" max="10" value="5" oninput="document.getElementById('num-display').innerText=this.value">
        <button class="btn" onclick="startMulti()">開始連線遊戲</button>
        <button onclick="location.reload()" style="background:none; border:none; color:gray; cursor:pointer;">返回</button>
    </div>

    <div id="ui">
        <b>🌍 時間：<span id="clock" style="color:#f1c40f">07:00</span></b><br>
        ❤️ 生命：<span id="hp">100</span> | 👥 隊友：<span id="p-count">0</span>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let gameActive = false;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    function startSingle() { initGame(1); }
    function showMulti() { document.getElementById('menu').style.display = 'none'; document.getElementById('multi-setup').style.display = 'flex'; }
    function startMulti() { 
        const count = document.getElementById('player-count').value;
        initGame(parseInt(count)); 
    }

    function initGame(numPlayers) {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('multi-setup').style.display = 'none';
        document.getElementById('ui').style.display = 'block';
        document.getElementById('p-count').innerText = numPlayers - 1;
        
        // 生成隊友 (黃色方塊)
        for(let i=0; i < numPlayers - 1; i++) {
            teammates.push({ x: 350 + i*40, y: -200, w: 20, h: 40, vx: 0, vy: 0, speed: 3.5 });
        }
        gameActive = true;
    }

    const tileSize = 32;
    let cameraX = 0;
    let worldData = {}; 
    let gameTime = 420; // 07:00
    let atkTimer = 0;
    let keys = {};

    let player = { x: 300, y: -300, w: 22, h: 42, vx: 0, vy: 0, speed: 4, jump: -11, grounded: false, hp: 100 };
    let teammates = [], enemies = [], animals = [], villagers = [];

    function getBlock(x, y) {
        const key = `${x}_${y}`;
        if (worldData[key] !== undefined) return worldData[key];
        let ground = Math.floor(15 + Math.sin(x * 0.1) * 3);
        if (y < ground) {
            if (y === ground - 1 && x % 60 === 0) { // 村莊
                for(let i=0; i<5; i++) for(let j=0; j<4; j++) if(i===0||i===4||j===3) worldData[`${x+i}_${y-j}`] = 4;
                villagers.push({ x: (x+2)*tileSize, y: (y-1)*tileSize, w: 20, h: 40, vx: 0.3 });
            }
            if (y === ground - 1 && Math.abs(Math.sin(x)) > 0.98) return 4;
            return 0;
        }
        return (y === ground) ? 2 : 1; 
    }

    canvas.onmousedown = (e) => {
        if (!gameActive) return;
        const gx = Math.floor((e.clientX + cameraX) / tileSize);
        const gy = Math.floor(e.clientY / tileSize);
        if (e.button === 0) { 
            atkTimer = 10;
            enemies.forEach(en => { if (Math.hypot(en.x - (gx*tileSize), en.y - (gy*tileSize)) < 60) en.hp -= 20; });
            worldData[`${gx}_${gy}`] = 0;
        } else if (e.button === 2) { worldData[`${gx}_${gy}`] = 4; }
    };
    canvas.oncontextmenu = (e) => e.preventDefault();

    function isColliding(nx, ny, w, h) {
        let x1 = Math.floor(nx / tileSize), x2 = Math.floor((nx + w) / tileSize);
        let y1 = Math.floor(ny / tileSize), y2 = Math.floor((ny + h) / tileSize);
        for (let x = x1; x <= x2; x++) for (let y = y1; y <= y2; y++) if (getBlock(x, y) > 0) return true;
        return false;
    }

    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;
    for(let i=0; i<3; i++) animals.push({x: 600+i*800, y:0, w:24, h:20, vx:0.6});

    function loop() {
        if (!gameActive) return requestAnimationFrame(loop);
        gameTime = (gameTime + 0.3) % 1440;
        let totalM = Math.floor(gameTime);
        let h = Math.floor(totalM / 60), m = totalM % 60;
        
        // 天空邏輯
        let sky = "#000", isDark = true;
        if (totalM >= 420 && totalM < 1020) { sky = "#87ceeb"; isDark = false; }
        else if (totalM >= 1050 && totalM < 1080) { sky = "#ff7832"; isDark = false; }
        
        // 玩家運動
        player.vx = keys['KeyA'] ? -player.speed : (keys['KeyD'] ? player.speed : 0);
        let nx = player.x + player.vx;
        if (isColliding(nx, player.y, player.w, player.h)) { if (!isColliding(nx, player.y-tileSize, player.w, player.h)) { player.x = nx; player.y -= tileSize; } } else { player.x = nx; }
        player.vy += 0.6;
        if (keys['Space'] && player.grounded) { player.vy = player.jump; player.grounded = false; }
        if (!isColliding(player.x, player.y+player.vy, player.w, player.h)) { player.y += player.vy; player.grounded = false; } else { if (player.vy > 0) player.grounded = true; player.vy = 0; }
        cameraX += (player.x - canvas.width / 2 - cameraX) * 0.1;

        // 繪製背景與方塊
        ctx.fillStyle = sky; ctx.fillRect(0, 0, canvas.width, canvas.height);
        let sx = Math.floor(cameraX / tileSize), ex = sx + Math.ceil(canvas.width / tileSize) + 1;
        for (let x = sx; x < ex; x++) for (let y = 0; y < 25; y++) {
            let b = getBlock(x, y); if (b === 0) continue;
            ctx.fillStyle = (b===1)?'#6d4c41':(b===2)?'#4caf50':'#5d4037';
            ctx.fillRect(x * tileSize - cameraX, y * tileSize, tileSize, tileSize);
        }

        // 隊友 AI (跟隨玩家)
        teammates.forEach(t => {
            t.vx = (player.x > t.x + 40) ? t.speed : (player.x < t.x - 40) ? -t.speed : 0;
            t.vy += 0.6;
            if (!isColliding(t.x + t.vx, t.y, t.w, t.h)) t.x += t.vx;
            if (!isColliding(t.x, t.y + t.vy, t.w, t.h)) t.y += t.vy; else t.vy = 0;
            ctx.fillStyle = '#f1c40f'; ctx.fillRect(t.x - cameraX, t.y, t.w, t.h);
        });

        // 怪物、村民、動物繪製
        if ((totalM >= 1090 || totalM < 390) && Math.random() < 0.01 && enemies.length < 5) enemies.push({ x: player.x+500, y: 0, w: 20, h: 40, hp: 50 });
        enemies.forEach(en => {
            en.vx = (player.x > en.x) ? 1.5 : -1.5; en.vy += 0.6;
            if (!isColliding(en.x+en.vx, en.y, en.w, en.h)) en.x += en.vx;
            if (!isColliding(en.x, en.y+en.vy, en.w, en.h)) en.y += en.vy; else en.vy = 0;
            if (Math.abs(en.x-player.x)<20 && Math.abs(en.y-player.y)<20) player.hp -= 0.5;
            ctx.fillStyle = '#27ae60'; ctx.fillRect(en.x-cameraX, en.y, en.w, en.h);
        });
        villagers.forEach(v => { v.vy += 0.6; if (Math.random()<0.02) v.vx*=-1; if (!isColliding(v.x+v.vx, v.y, v.w, v.h)) v.x+=v.vx; if (!isColliding(v.x, v.y+v.vy, v.w, v.h)) v.y+=v.vy; else v.vy=0; ctx.fillStyle = '#3498db'; ctx.fillRect(v.x-cameraX, v.y, v.w, v.h); });
        animals.forEach(an => { an.vy += 0.5; if (!isColliding(an.x+an.vx, an.y, an.w, an.h)) an.x+=an.vx; else an.vx*=-1; if (!isColliding(an.x, an.y+an.vy, an.w, an.h)) an.y+=an.vy; else an.vy=0; ctx.fillStyle = '#fff'; ctx.fillRect(an.x-cameraX, an.y, an.w, an.h); });

        // 光源與玩家
        if (isDark) { let grd = ctx.createRadialGradient(player.x-cameraX+10, player.y+20, 10, player.x-cameraX+10, player.y+20, 160); grd.addColorStop(0, "rgba(255,255,255,0.3)"); grd.addColorStop(1, "transparent"); ctx.fillStyle = grd; ctx.fillRect(0,0,canvas.width,canvas.height); }
        ctx.fillStyle = '#e67e22'; ctx.fillRect(player.x-cameraX, player.y, player.w, player.h);
        if (atkTimer > 0) { ctx.strokeStyle = "white"; ctx.beginPath(); ctx.arc(player.x-cameraX+10, player.y+20, 50, 0, Math.PI*2); ctx.stroke(); atkTimer--; }

        document.getElementById('clock').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
        document.getElementById('hp').innerText = Math.floor(player.hp);
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
