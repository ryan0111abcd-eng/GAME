<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Super Human 2026 - Ultimate Fix</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; }
        
        /* 選單層：強制置頂且背景不透明 */
        .overlay-menu { 
            position: fixed; inset: 0; z-index: 99999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: #111; color: #f1c40f; 
        }

        .btn { 
            padding: 20px 60px; font-size: 30px; cursor: pointer; margin: 15px; 
            background: #f1c40f; border: 4px solid #fff; border-radius: 15px; 
            font-weight: bold; color: #000; box-shadow: 0 8px 0 #b8860b; 
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #b8860b; }

        /* HUD 與 雷達 */
        #hud { position: fixed; top: 15px; left: 15px; z-index: 500; color: white; background: rgba(0,0,0,0.8); padding: 15px; border: 2px solid #f1c40f; border-radius: 10px; display: none; pointer-events: none; }
        #radar-ui { position: fixed; top: 15px; right: 15px; width: 150px; height: 150px; border: 3px solid #fff; border-radius: 50%; overflow: hidden; z-index: 500; display: none; background: rgba(0,0,0,0.5); }
        
        canvas#gameCanvas { display: none; position: absolute; top: 0; left: 0; z-index: 10; }
        #rain-filter { position: fixed; inset: 0; pointer-events: none; z-index: 50; background: rgba(40, 40, 80, 0.25); display: none; }
    </style>
</head>
<body>

    <div id="step1" class="overlay-menu">
        <h1 style="font-size: 50px;">SUPER HUMAN: 生態權重版</h1>
        <button class="btn" onclick="nextStep(2, 1)">單人連線</button>
        <button class="btn" onclick="nextStep(2, 5)" style="background:#3498db; color:white;">多人連線</button>
    </div>

    <div id="step2" class="overlay-menu" style="display:none;">
        <h1>選擇小隊人數</h1>
        <h2 id="p-val">5 人</h2>
        <input type="range" min="2" max="10" value="5" oninput="document.getElementById('p-val').innerText=this.value+' 人'" id="p-slider" style="width:300px; height:30px;">
        <button class="btn" onclick="nextStep(3)">下一步：查看說明</button>
    </div>

    <div id="step3" class="overlay-menu" style="display:none;">
        <div style="background:#2c3e50; padding:30px; border-radius:15px; border:2px solid #f1c40f; max-width:450px; text-align:left; color:white;">
            <h2 style="color:#f1c40f; text-align:center;">📜 任務說明單</h2>
            <p>● <b>WASD</b> 移動 | <b>左鍵</b> 挖 | <b>右鍵</b> 放方塊</p>
            <p>● <b>K</b> 攻擊 | <b>Q</b> 回血 | <b>ESC</b> 選單</p>
            <p>● <b>生態機率</b>：平原30%、台地20%、丘陵70%、山地50%、古蹟65%、下雨40%。</p>
            <p>● <b>保鑣 AI</b>：隊友會分散活動，但<b>你被攻擊時，他們會衝過來救援！</b></p>
            <button class="btn" onclick="startGame()" style="width:100%">進入世界</button>
        </div>
    </div>

    <div id="hud">❤️ HP: <span id="hp-ui">100</span> | 📍 <span id="pos-ui">0,0</span><br>🗺️ <span id="biome-ui">載入中...</span> | 🕒 <span id="time-ui">12:00</span></div>
    <div id="radar-ui"><canvas id="mCvs" width="150" height="150"></canvas></div>
    <div id="rain-filter"></div>
    <canvas id="gameCanvas"></canvas>

<script>
    const cvs = document.getElementById('gameCanvas'), ctx = cvs.getContext('2d');
    const mcvs = document.getElementById('mCvs'), mctx = mcvs.getContext('2d');
    
    let isLive = false, world = {}, keys = {}, entities = [], ticks = 600;
    let p = { x: 0, y: -300, w: 22, h: 42, vx: 0, vy: 0, hp: 100, maxHp: 100, ground: false, lastHitBy: null };
    let squadSize = 1, rainEnabled = false;
    const TILE = 32;

    function nextStep(s, val) {
        document.querySelectorAll('.overlay-menu').forEach(el => el.style.display = 'none');
        if (val) squadSize = val;
        document.getElementById('step' + s).style.display = 'flex';
    }

    function startGame() {
        if (squadSize > 1) squadSize = document.getElementById('p-slider').value;
        document.getElementById('step3').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
        document.getElementById('radar-ui').style.display = 'block';
        cvs.style.display = 'block';
        cvs.width = window.innerWidth; cvs.height = window.innerHeight;

        // 40% 下雨判定
        if(Math.random() < 0.4) {
            rainEnabled = true;
            document.getElementById('rain-filter').style.display = 'block';
        }

        // 生成 AI (隊友、村民、豬)
        for(let i=0; i<squadSize-1; i++) spawn('ally', (Math.random()-0.5)*800);
        for(let i=0; i<6; i++) spawn('npc', (Math.random()-0.5)*3000);
        for(let i=0; i<5; i++) spawn('pig', (Math.random()-0.5)*3000);

        isLive = true; loop();
    }

    function spawn(type, x) {
        let h = (type==='pig')?30:100;
        entities.push({ type, x, y: -500, w: 22, h: 42, vx: 0, vy: 0, hp: h, maxHp: h, dir: 1 });
    }

    // 地形生成器 (嚴格權重)
    function getBiome(gx) {
        let x = Math.abs(gx);
        let tags = [];
        let h = 35, c = "#2ecc71", amp = 1;

        if (x % 100 < 30) { tags.push("平原"); c = "#2ecc71"; } 
        if (x % 100 < 20) { tags.push("台地"); c = "#e67e22"; h=32; amp=0.5; }
        if (x % 100 < 70) { tags.push("丘陵"); c = "#27ae60"; h=28; amp=6; }
        if (x % 100 < 50) { tags.push("山地"); c = "#95a5a6"; h=15; amp=14; }
        let ruins = (x % 100 < 65); // 65% 古蹟

        return { tags, h, c, amp, ruins };
    }

    function getB(gx, gy) {
        if (world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
        let b = getBiome(gx);
        let h = Math.floor(b.h + Math.sin(gx * 0.1) * b.amp);
        if (b.ruins && gy < h && gy > h-4 && Math.random() < 0.08) return 3;
