<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let isStarted = false, ticks = 420; 
let world = {}, selBlock = 2;
const tileSize = 32;
const WORLD_COLS = 100; // 球體一圈
const WORLD_PX = WORLD_COLS * tileSize;
const colors = { 1: '#8B4513', 2: '#228B22', 3: '#666' };

// 星球設定
let centerX, centerY;
const planetRadius = 300; // 星球地殼半徑

// 玩家位置初始化 (y 設為負數代表在地面上方)
let p = { x: 300, y: -100, w: 20, h: 35, vx: 0, vy: 0, hp: 100, grounded: false, atk: 0 };
let teams = [], mobs = [];

function showMulti() {
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('multi-screen').style.display = 'flex';
}

function preStart(n) {
    document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
    document.getElementById('ui-bar').style.display = 'block';
    document.getElementById('hotbar').style.display = 'flex';
    
    // 生成隊友
    for(let i=0; i < n-1; i++) {
        teams.push({ x: 400 + i*50, y: -100, w: 20, h: 35, vx: 0, vy: 0, grounded: false });
    }
    
    isStarted = true;
    resize(); // 強制重新整理畫面尺寸
    loop();
}

function getB(gx, gy) {
    let wrapX = ((gx % WORLD_COLS) + WORLD_COLS) % WORLD_COLS;
    const key = `${wrapX}_${gy}`;
    if (world[key] !== undefined) return world[key];
    // 基礎地形：10層深
    let g = Math.floor(10 + Math.sin(wrapX * 0.2) * 2); 
    return gy < g ? 0 : (gy === g ? 2 : 1);
}

function physics(o) {
    o.vy += 0.5; // 模擬重力
    o.x = ((o.x + o.vx) % WORLD_PX + WORLD_PX) % WORLD_PX;
    o.y += o.vy;
    
    o.grounded = false;
    let gx = Math.floor((o.x + o.w/2) / tileSize);
    let gy = Math.floor((o.y + o.h) / tileSize);

    // 簡單碰撞檢測 (星球表面)
    if (getB(gx, gy) !== 0) {
        o.y = gy * tileSize - o.h;
        o.vy = 0;
        o.grounded = true;
    }
}

let keys = {};
window.onkeydown = e => { 
    keys[e.code] = true; 
    if (e.key >= '1' && e.key <= '3') { 
        selBlock = [0, 2, 1, 3][parseInt(e.key)]; 
        updateSlot(e.key); 
    }
};
window.onkeyup = e => keys[e.code] = false;

function updateSlot(idx) {
    document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
    const slot = document.getElementById('slot' + idx);
    if(slot) slot.classList.add('active');
}

function loop() {
    if (!isStarted) return;
    ticks = (ticks + 0.5) % 1440;
    
    p.vx = (keys['KeyA'] ? -4 : keys['KeyD'] ? 4 : 0);
    if (keys['Space'] && p.grounded) p.vy = -12;
    
    physics(p);
    teams.forEach(t => physics(t));

    render();
    requestAnimationFrame(loop);
}

function render() {
    centerX = canvas.width / 2;
    centerY = canvas.height / 2;
    
    // 背景：隨時間變色
    let hr = Math.floor(ticks / 60);
    ctx.fillStyle = (hr >= 18 || hr < 6) ? "#050515" : "#87ceeb";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(centerX, centerY);
    
    // 關鍵旋轉：讓玩家維持在 12 點鐘方向
    let playerAngle = (p.x / WORLD_PX) * Math.PI * 2;
    ctx.rotate(-playerAngle); 

    // 繪製星球
    for (let gx = 0; gx < WORLD_COLS; gx++) {
        // 只繪製玩家附近的方塊以節省效能
        let wrapGX = ((Math.floor(p.x/tileSize) - 20) + gx) % WORLD_COLS; 
        for (let gy = 0; gy < 15; gy++) {
            let b = getB(gx, gy);
            if (b !== 0) {
                let angle = (gx / WORLD_COLS) * Math.PI * 2;
                let dist = planetRadius + (gy * tileSize);
                
                ctx.save();
                ctx.rotate(angle);
                ctx.fillStyle = colors[b];
                // 方塊繪製
                ctx.fillRect(-tileSize/2, dist, tileSize + 0.5, tileSize + 0.5);
                ctx.restore();
            }
        }
    }

    // 繪製角色
    const drawEnt = (e, col) => {
        let angle = (e.x / WORLD_PX) * Math.PI * 2;
        let dist = planetRadius + e.y;
        ctx.save();
        ctx.rotate(angle);
        ctx.fillStyle = col;
        ctx.fillRect(-e.w/2, dist, e.w, e.h);
        ctx.restore();
    };

    teams.forEach(t => drawEnt(t, "#f1c40f"));
    drawEnt(p, "#FF5733"); // 玩家

    ctx.restore();

    // 更新 UI
    document.getElementById('hp-val').innerText = Math.ceil(p.hp);
    document.getElementById('time-val').innerText = `${hr.toString().padStart(2,'0')}:00`;
}

function resize() { 
    canvas.width = window.innerWidth; 
    canvas.height = window.innerHeight; 
}
window.onresize = resize;
resize(); // 初始化畫布
</script>
