<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>未來的 Super Human - 進階版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: "Microsoft JhengHei", sans-serif; }
        canvas { display: block; }
        
        .screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; color: white; background: rgba(0,0,0,0.95);
        }
        h1 { color: #f1c40f; font-size: 60px; text-shadow: 0 0 20px #f1c40f; margin-bottom: 40px; }
        .btn {
            padding: 15px 60px; font-size: 26px; background: #f1c40f; border: none;
            border-radius: 50px; cursor: pointer; font-weight: bold; margin: 15px; transition: 0.2s;
        }
        .btn:hover { transform: scale(1.1); background: #fff; color: #000; }
        
        #esc-menu { display: none; background: rgba(0,0,0,0.85); }
        #ui-overlay { 
            position: absolute; top: 20px; left: 20px; color: #fff; 
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; 
            display: none; border: 2px solid #f1c40f; pointer-events: none; z-index: 10;
        }
        /* 小地圖容器 */
        #minimap-container {
            position: absolute; top: 20px; right: 20px; width: 150px; height: 150px;
            border-radius: 50%; border: 3px solid #f1c40f; overflow: hidden;
            background: rgba(0,0,0,0.5); display: none; z-index: 11;
        }
        input[type=range] { width: 300px; margin: 25px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="main-menu" class="screen">
        <h1>未來的 Super Human</h1>
        <button class="btn" onclick="initGame(1)">開始遊戲</button>
        <button class="btn" style="background:#3498db; color:white;" onclick="document.getElementById('multi-menu').style.display='flex'">多人連線</button>
    </div>

    <div id="multi-menu" class="screen" style="display:none;">
        <h1>多人連線設定</h1>
        <div style="font-size:24px;">設定人數 (2-10): <span id="p-label" style="color:#f1c40f">5</span></div>
        <input type="range" id="p-slider" min="2" max="10" value="5" oninput="document.getElementById('p-label').innerText=this.value">
        <button class="btn" onclick="initGame(document.getElementById('p-slider').value)">開始</button>
    </div>

    <div id="esc-menu" class="screen">
        <h1>選單</h1>
        <button class="btn" style="background:#e74c3c; color:white;" onclick="location.reload()">離開遊戲</button>
        <p>再次按 ESC 返回</p>
    </div>

    <div id="ui-overlay">
        <b>🌍 時間：<span id="clock">07:00</span></b><br>
        📍 座標：<span id="pos">0, 0</span><br>
        ❤️ 生命：<span id="hp">100</span>
    </div>

    <div id="minimap-container"><canvas id="minimapCanvas"></canvas></div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const mCanvas = document.getElementById('minimapCanvas');
    const mCtx = mCanvas.getContext('2d');
    
    let isPlaying = false, isPaused = false, gameTime = 420;
    let cameraX = 0, keys = {}, entities = [], teammates = [];
    const PHYSICS = { gravity: 0.6, jump: -11, speed: 4.5 };

    class Character {
        constructor(x, y, color, type) {
            this.x = x; this.y = y; this.w = 24; this.h = 44;
            this.vx = 0; this.vy = 0; this.hp = 100;
            this.color = color; this.type = type; this.grounded = false;
            // 隊友分散偏移量
            this.offset = (Math.random() - 0.5) * 200; 
        }
        update(moveX = 0, jump = false) {
            if (isPaused) return;
            this.vx = moveX;
            let nx = this.x + this.vx;
            if (checkMapCol(nx, this.y, this.w, this.h)) {
                if (!checkMapCol(nx, this.y-32, this.w, this.h)) { this.x = nx; this.y -= 8; }
                else { this.vx = 0; }
            } else { this.x = nx; }
            this.vy += PHYSICS.gravity;
            if (jump && this.grounded) { this.vy = PHYSICS.jump; this.grounded = false; }
            if (!checkMapCol(this.x, this.y + this.vy, this.w, this.h)) { this.y += this.vy; this.grounded = false; }
            else { if (this.vy > 0) this.grounded = true; this.vy = 0; }
        }
        draw() {
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x - cameraX, this.y, this.w, this.h);
        }
    }

    let player = new Character(300, -500, '#FF5733', 'player');

    function initGame(count) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById('ui-overlay').style.display = 'block';
        document.getElementById('minimap-container').style.display = 'block';
        mCanvas.width = 150; mCanvas.height = 150;

        for(let i=0; i < count - 1; i++) teammates.push(new Character(350 + i*40, -500, '#f1c40f', 'teammate'));
        for(let i=0; i<4; i++) entities.push(new Character(2000 + i*400, -500, '#3498db', 'villager'));
        for(let i=0; i<6; i++) entities.push(new Character(1000 + i*300, -500, '#fff', 'animal'));

        isPlaying = true;
        resize(); loop();
    }

    function checkMapCol(nx, ny, w, h) {
        let x = Math.floor(nx / 32), y = Math.floor(ny / 32);
        return y >= Math.floor(15 + Math.sin(x * 0.1) * 3);
    }

    window.addEventListener('keydown', (e) => {
        if (e.code === 'Escape' && isPlaying) {
            isPaused = !isPaused;
            document.getElementById('esc-menu').style.display = isPaused ? 'flex' : 'none';
        }
        keys[e.code] = true;
    });
    window.addEventListener('keyup', (e) => keys[e.code] = false);

    canvas.addEventListener('mousedown', () => {
        if(isPaused) return;
        entities.forEach(en => {
            if(en.type==='enemy' && Math.hypot(en.x-player.x, en.y-player.y) < 100) en.hp -= 40;
        });
    });

    function drawMinimap() {
        mCtx.clearRect(0,0,150,150);
        mCtx.save();
        mCtx.translate(75, 75); // 中心點
        mCtx.scale(0.2, 0.2); // 縮放地圖顯示範圍

        // 畫地型
        mCtx.fillStyle = "#4caf50";
        for(let i = -300; i < 300; i += 10) {
            let gx = (player.x + i) / 32;
            let gy = Math.floor(15 + Math.sin(gx * 0.1) * 3) * 32;
            mCtx.fillRect(i - 5, gy - player.y, 10, 200);
        }

        // 畫點位
        const drawDot = (x, y, color) => {
            mCtx.fillStyle = color;
            mCtx.beginPath(); mCtx.arc(x - player.x, y - player.y, 15, 0, Math.PI*2); mCtx.fill();
        };
        drawDot(player.x, player.y, "#FF5733"); // 玩家
        teammates.forEach(t => drawDot(t.x, t.y, "#f1c40f")); // 隊友
        entities.forEach(e => {
            let c = e.type==='enemy'?'#2ecc71':(e.type==='villager'?'#3498db':'#fff');
            drawDot(e.x, e.y, c);
        });
        mCtx.restore();
    }

    function loop() {
        if (!isPlaying) return;
        if (!isPaused) {
            gameTime = (gameTime + 0.4) % 1440;
            if ((gameTime >= 1090 || gameTime < 390) && Math.random() < 0.015 && entities.length < 20) {
                entities.push(new Character(player.x + (Math.random()>0.5?600:-600), -500, '#2ecc71', 'enemy'));
            }
        }

        let sky = (gameTime >= 1050 && gameTime < 1080) ? "#ff7832" : (gameTime >= 1090 || gameTime < 390 ? "#050510" : "#87ceeb");
        ctx.fillStyle = sky; ctx.fillRect(0, 0, canvas.width, canvas.height);

        let pDir = isPaused ? 0 : (keys['KeyA']?-1:keys['KeyD']?1:0)*PHYSICS.speed;
        player.update(pDir, isPaused?false:keys['Space']);
        cameraX += (player.x - canvas.width/2 - cameraX) * 0.1;

        // 地型
        let sx = Math.floor(cameraX/32), ex = sx + Math.ceil(canvas.width/32)+1;
        for(let x=sx; x<ex; x++) {
            let gr = Math.floor(15 + Math.sin(x*0.1)*3);
            ctx.fillStyle = '#4caf50'; ctx.fillRect(x*32-cameraX, gr*32, 32, 200);
        }

        // 隊友 AI (分散跟隨)
        teammates.forEach(tm => {
            let targetX = player.x + tm.offset;
            let d = targetX - tm.x;
            let mv = Math.abs(d) > 20 ? (d > 0 ? 1 : -1) * PHYSICS.speed : 0;
            tm.update(mv, checkMapCol(tm.x+(mv*5), tm.y, tm.w, tm.h));
            tm.draw();
        });

        entities = entities.filter
