<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Super Human - 點擊修復最終版</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #1a1a1a; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; color: white; }
        
        /* 選單層：確保絕對在最上層 */
        .ui-layer { 
            position: fixed; inset: 0; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 999999; 
            background: #1a1a1a;
        }
        
        .title-text { color: #f1c40f; font-size: 50px; margin-bottom: 30px; text-shadow: 4px 4px 0 #000; }
        
        /* 超大好點按鈕 */
        .btn { 
            padding: 25px 80px; font-size: 32px; cursor: pointer; 
            margin: 20px; background: #f1c40f; border: 5px solid #fff; 
            font-weight: bold; border-radius: 20px; color: black; 
            box-shadow: 0 10px 0 #b8860b;
            display: block;
            pointer-events: auto !important; /* 強制啟動點擊 */
        }
        .btn:hover { background: #fff; transform: translateY(-5px); }
        .btn:active { transform: translateY(5px); box-shadow: 0 5px 0 #b8860b; }

        /* 說明書 */
        #ui-guide-box { 
            background: #222; padding: 40px; border-radius: 20px; border: 4px solid #f1c40f; 
            max-width: 600px; line-height: 1.8; font-size: 20px;
        }

        /* 遊戲介面 (初始隱藏) */
        #hud { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 15px; border: 2px solid #f1c40f; display: none; z-index: 5000; border-radius: 10px; }
        #minimap-wrapper { position: fixed; top: 20px; right: 20px; width: 150px; height: 150px; border-radius: 50%; border: 3px solid #fff; background: rgba(0,0,0,0.6); display: none; z-index: 5000; overflow: hidden; }
        #inv { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; gap: 10px; z-index: 5000; }
