<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>我的類 Minecraft 網頁版</title>
    <style>

        nav { background: #16213e; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #4ecca3; }
        .game-header { margin-top: 10px; font-size: 14px; color: #95a5a6; }
        
        /* 遊戲畫布容器 */
        #game-container { 
            width: 800px; height: 400px; background: #000; margin: 20px auto; 
            border: 4px solid #333; border-radius: 10px; position: relative; overflow: hidden;
        }
        .vip-active { border-color: gold !important; box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
        
        /* 介面元素 */
        .badge { background: gold; color: black; padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 12px; }
        .shop-link { background: #f1c40f; color: black; padding: 8px 15px; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .price-info { margin-top: 10px; font-size: 18px; color: #4ecca3; }
    </style>
</head>
<body>

<nav>
    <div id="user-tag">載入玩家...</div>
    <div>
        <span id="version-tag">版本：v1.0.0</span>
        <a href="buy.html" class="shop-link">進入商店 (會員75折)</a>
    </div>
</nav>

<div class="game-header">操控：WASD 移動 | 空白鍵跳躍</div>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
</div>

<div class="price-info" id="price-display">
    今日方塊特價：$100 <span id="discount-text"></span>
</div>

    }

        if (keys['Space'] && player.grounded) {
            player.dy = player.jumpForce;
            player.grounded = false;
        }

        player.dy += gravity;
