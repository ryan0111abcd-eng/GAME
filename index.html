<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>未來的 Super Human - 村莊與動物版</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        
        /* 選單介面 */
        #menu-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #111; z-index: 9999; color: #f1c40f; }
        .btn { padding: 18px 60px; font-size: 26px; cursor: pointer; margin: 15px; background: #f1c40f; border: none; font-weight: bold; border-radius: 12px; color: black; }
        .btn:hover { background: #fff; transform: scale(1.05); }
        
        /* 選擇人數介面 */
        #select-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; background: #111; z-index: 9999; color: white; }
        select { font-size: 30px; padding: 15px; margin: 25px; border-radius: 10px; width: 250px; }

        /* 遊戲 HUD */
        #hud { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 12px; border: 2px solid #f1c40f; display: none; z-index: 5000; color: white; border-radius: 10px; }
        #minimap-container { position: fixed; top: 20px; right: 20px; width: 160px; height: 160px; border: 3px solid white; border-radius: 50%; overflow: hidden; background: #000; display: none; z-index: 5000; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="menu-layer">
        <h1 style="font-size: 48px; margin-bottom: 40px;">未來的 Super Human</h1>
        <button class="btn" onclick="openModeSelect('single')">單人探險</button>
        <button class="btn" style="background:#3498db; color:white;" onclick="openModeSelect('multi')">多人連線 (5人)</button>
    </div>

    <div id="select-layer">
        <h1>選擇小隊總人數</h1>
        <select id="pNumInput"><option value="2">2 人</option><option value="5" selected>5 人</option><option value="10">10 人</option></select>
        <button class="btn" onclick="goToGame(parseInt(document.getElementById('pNumInput').value))">出發！</button>
    </div>

    <div id="hud">❤️ 我的血量: <span id="hp">100</span> | 🕒 <span id="time">07:00</span></div>
    <div id="minimap-container"><canvas id="mini-canvas" width="160" height="160"></canvas></div>

<script>
let canvas, ctx, miniCtx, isRunning = false;
let ticks = 420, world = {}, camX = 0, camY = 0, bType = 2;
const TILE = 32, COLORS = { 1: '#8B4513', 2: '#228B22', 3: '#666', 4: '#cd853f', 5: '#a0522d' }; // 4=木頭, 5=石塊
let p = { x: 500, y: 0, w: 24, h: 44, vx: 0, vy: 0, hp: 100, ground: false, atk: 0 };
let allies = [], vils = [], anis = [], mobs = [], keys = {};

function openModeSelect(mode) {
    document.getElementById('menu-layer').style.display = 'none';
    if(mode === 'single') goToGame(1);
    else document.getElementById('select-layer').style.display = 'flex';
}

function goToGame(count) {
    document.getElementById('select-layer').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    document.getElementById('minimap-container').style.display = 'block';

    canvas = document.createElement('canvas');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    document.body.appendChild(canvas);
    ctx = canvas.getContext('2d');
    miniCtx = document.getElementById('mini-canvas').getContext('2d');

    // 初始化位置與隊友
    p.y = getGroundY(p.x/TILE)*TILE - 200;
    allies = []; vils = []; anis = [];
    for(let i=0; i < count - 1; i++){
        let ax = p.x + (i + 1) * 60;
        allies.push({ x: ax, y: p.y, w: 24, h: 44, vx: 0, vy: 0, hp: 100, maxHp: 100, atk: 0, dir: 1, timer: 0 });
    }
    // 生成一些村民與動物
    for(let i=0; i<5; i++) vils.push({ x: 1000+i*200, y: -200, w: 24, h: 44, vx: 0, vy: 0, ground: false });
    for(let i=0; i<6; i++) anis.push({ x: 800+i*300, y: -200, w: 20, h: 20, vx: 0, vy: 0, ground: false });

    // 生成一個村莊
    spawnVillage(60); 

    isRunning = true;
    window.onkeydown = e => { keys[e.code] = true; if(e.key==='1') bType=2; if(e.key==='2') bType=1; if(e.key==='3') bType=3; };
    window.onkeyup = e => keys[e.code] = false;
    canvas.onmousedown = (e) => {
        const rect = canvas.getBoundingClientRect();
        const gx = Math.floor((e.clientX - rect.left + camX) / TILE);
        const gy = Math.floor((e.clientY - rect.top + camY) / TILE);
        if (e.button === 0) world[`${gx}_${gy}`] = 0;
        if (e.button === 2) world[`${gx}_${gy}`] = bType;
    };
    canvas.oncontextmenu = e => e.preventDefault();
    requestAnimationFrame(loop);
}

// 地形與建築
function getGroundY(gx) { return Math.floor(35 + Math.sin(gx*0.05)*10 + Math.cos(gx*0.02)*15); }
function getB(gx, gy) { 
    if (world[`${gx}_${gy}`] !== undefined) return world[`${gx}_${gy}`];
    let gY = getGroundY(gx);
    return gy < gY ? 0 : (gy === gY ? 2 : 1);
}
function spawnVillage(gx) {
    let gy = getGroundY(gx);
    for(let h=0; h<5; h++) { // 蓋一排小房子
        let startGX = gx + h*10;
        let groundY = getGroundY(startGX);
        for(let w=0; w<6; w++) { // 房子寬度
            for(let r=1; r<5; r++) { world[`${startGX+w}_${groundY-r}`] = 4; } // 牆
            world[`${startGX+w}_${groundY-5}`] = 5; // 屋頂
        }
        world[`${startGX+3}_${groundY-1}`] = 0; world[`${startGX+3}_${groundY-2}`] = 0; // 門
    }
}

function physics(o, isPlayer) {
    if (isPlayer) {
        o.vx = (keys['KeyA'] ? -5 : keys['KeyD'] ? 5 : 0);
        if (keys['Space'] && o.ground) o.vy = -12;
    } else {
        // AI 跟隨或隨機走動
        if (o.type === 'ally') {
            let dist = p.x - o.x;
            if (Math.abs(dist) > 120) o.vx = (dist > 0 ? 3.5 : -3.5); else o.vx = 0;
            // 跳躍與挖掘邏輯修復
            let aheadX = Math.floor((o.x + (o.vx >= 0 ? 30 : -10)) / TILE);
            let footY = Math.floor((o.y + o.h - 5) / TILE);
            if (getB(aheadX, footY) !== 0) {
                if (o.ground) o.vy = -12; // 跳
                if (Math.random() < 0.05) world[`${aheadX}_${footY}`] = 0; // 挖開
            }
        } else { // 村民、動物隨機走
            if (Math.random() < 0.01) o.vx = (Math.random() - 0.5) * 2;
        }
    }
    o.vy += 0.7;
    let nx = o.x + o.vx, gx = (o.vx > 0) ? Math.floor((nx + o.w) / TILE) : Math.floor(nx / TILE);
    let ty = Math.floor(o.y / TILE), by = Math.floor((o.y + o.h - 5) / TILE);
    if (getB(gx, ty) === 0 && getB(gx, by) === 0) o.x = nx;
    o.y += o.vy; o.ground = false;
    let lx = Math.floor(o.x/TILE), rx = Math.floor((o.x+o.w-1)/TILE), fy = Math.floor((o.y+o.h)/TILE);
    if (getB(lx, fy) !== 0 || getB(rx, fy) !== 0) { o.y = fy*TILE-o.h; o.vy = 0; o.ground = true; }
}

function loop() {
    if (!isRunning) return;
    ticks = (ticks + 0.4) % 1440;
    physics(p, true); camX += (p.x - canvas.width/2 - camX)*0.1; camY += (p.y - canvas.height/2 - camY)*0.1;

    // 隊友
    allies.forEach(a => { a.type='ally'; physics(a, false); mobs.forEach(m => { if(Math.abs(m.x-a.x)<40){a.hp-=0.1; a.atk=10; m.hp-=5;}}); if(a.atk>0)a.atk--; if(a.hp<=0) a.dead=true; });
    allies = allies.filter(a => !a.dead);
    // 村民與動物
    vils.forEach(v => { v.type='vil'; physics(v, false); });anis.forEach(an => { an.type='ani'; physics(an, false); });

    // 怪獸
    let isDay = (ticks/60 >= 7 && ticks/60 < 17.5);
    if (!isDay && Math.random() < 0.02) mobs.push({ x: p.x + (Math.random()-0.5)*1500, y: p.y-400, w: 24, h: 44, vx: 0, vy: 0, hp: 20 });
    mobs.forEach((m, i) => {
        if (isDay) m.hp -= 0.5;
        m.vx = (m.x < p.x) ? 2.5 : -2.5; physics(m, false);
        if (Math.abs(m.x - p.x) < 30) p.hp -= 0.3; if (m.hp <= 0) mobs.splice(i, 1);
    });

    if (keys['KeyK'] && p.atk <= 0) { p.atk = 15; mobs.forEach(m => { if(Math.abs(m.x-p.x)<80) m.hp -= 10; }); }
    if (p.atk > 0) p.atk--; if (p.hp <= 0) { alert("你倒下了！"); location.reload(); }

    render(); requestAnimationFrame(loop);
}

function render() {
    let hr = ticks / 60;
    ctx.fillStyle = (hr > 7 && hr < 17) ? "#87ceeb" : (hr >= 17 && hr < 18.5) ? "#ff7832" : "#050515";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    let sx = Math.floor(camX/TILE), ex = sx + Math.ceil(canvas.width/TILE)+1;
    let sy = Math.floor(camY/TILE), ey = sy + Math.ceil(canvas.height/TILE)+1;
    for (let x=sx; x<ex; x++) { for (let y=sy; y<ey; y++) { let b=getB(x,y); if(b!==0){ctx.fillStyle=COLORS[b]; ctx.fillRect(x*TILE-camX, y*TILE-camY, TILE, TILE);}}}
    
    // 實體渲染
    allies.forEach(a => { ctx.fillStyle="#f1c40f"; ctx.fillRect(a.x-camX, a.y-camY, a.w, a.h); ctx.fillStyle="red"; ctx.fillRect(a.x-camX-5, a.y-camY-15, 34, 5); ctx.fillStyle="#2ecc71"; ctx.fillRect(a.x-camX-5, a.y-camY-15, 34*(a.hp/a.maxHp), 5); });
    vils.forEach(v => { ctx.fillStyle="#3498db"; ctx.fillRect(v.x-camX, v.y-camY, v.w, v.h); });
    anis.forEach
