<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>2D Minecraft: 完美碰撞版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: monospace; }
        canvas { display: block; background: #87CEEB; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.5); padding: 10px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">❤️ HP: <span id="hp">100</span> | A/D 移動 | 空白 跳躍 | 左鍵 挖/打 | 右鍵 蓋</div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    const tileSize = 32;
    let cameraX = 0;
    let worldData = JSON.parse(localStorage.getItem('mc_fix_save')) || {};
    let keys = {};
    let selectedBlock = 2;

    let player = { x: 100, y: 100, w: 22, h: 44, vx: 0, vy: 0, speed: 4, jump: -11, grounded: false, hp: 100 };
    let enemies = [{ x: 500, y: 0, w: 24, h: 44, vx: 0, vy: 0, hp: 50 }];

    function getBlock(x, y) {
        const key = `${Math.floor(x)}_${Math.floor(y)}`;
        if (worldData[key] !== undefined) return worldData[key];
        let ground = Math.floor(12 + Math.sin(x * 0.1) * 3);
        return (y < ground) ? 0 : (y === ground ? 2 : 1);
    }

    // --- 核心：修正後的碰撞偵測 ---
    function moveAndCollide(obj, vx, vy) {
        // 1. 先處理 X 軸位移
        obj.x += vx;
        if (isColliding(obj)) {
            // 如果撞到牆，就把位置推回方塊邊緣
            if (vx > 0) obj.x = Math.floor((obj.x + obj.w) / tileSize) * tileSize - obj.w - 1;
            if (vx < 0) obj.x = Math.floor(obj.x / tileSize) * tileSize + tileSize + 1;
            obj.vx = 0;
        }

        // 2. 再處理 Y 軸位移
        obj.grounded = false;
        obj.y += vy;
        if (isColliding(obj)) {
            if (vy > 0) { // 落地
                obj.y = Math.floor((obj.y + obj.h) / tileSize) * tileSize - obj.h;
                obj.grounded = true;
            }
            if (vy < 0) { // 撞到頭
                obj.y = Math.floor(obj.y / tileSize) * tileSize + tileSize;
            }
            obj.vy = 0;
        }
    }

    // 檢查目前位置是否重疊到任何固體方塊
    function isColliding(obj) {
        let x1 = Math.floor(obj.x / tileSize);
        let x2 = Math.floor((obj.x + obj.w) / tileSize);
        let y1 = Math.floor(obj.y / tileSize);
        let y2 = Math.floor((obj.y + obj.h) / tileSize);

        for (let x = x1; x <= x2; x++) {
            for (let y = y1; y <= y2; y++) {
                if (getBlock(x, y) > 0) return true;
            }
        }
        return false;
    }

    window.onkeydown = (e) => {
        keys[e.code] = true;
        if(e.key === '1') selectedBlock = 2;
        if(e.key === '2') selectedBlock = 1;
        if(e.key === '3') selectedBlock = 3;
    };
    window.onkeyup = (e) => keys[e.code] = false;

    canvas.onmousedown = (e) => {
        const gx = Math.floor((e.clientX + cameraX) / tileSize);
        const gy = Math.floor(e.clientY / tileSize);
        if (e.button === 0) {
            enemies.forEach(en => {
                let d = Math.hypot(en.x - player.x, en.y - player.y);
                if (d < 60) { en.hp -= 20; en.vx = (player.x < en.x ? 8 : -8); }
            });
            worldData[`${gx}_${gy}`] = 0;
        }
        if (e.button === 2) worldData[`${gx}_${gy}`] = selectedBlock;
        localStorage.setItem('mc_fix_save', JSON.stringify(worldData));
    };
    canvas.oncontextmenu = (e) => e.preventDefault();

    function loop() {
        // 玩家輸入
        player.vx = keys['KeyA'] ? -player.speed : (keys['KeyD'] ? player.speed : 0);
        player.vy += 0.6; // 重力
        if (keys['Space'] && player.grounded) player.vy = player.jump;

        // 執行修正後的物理運動
        moveAndCollide(player, player.vx, player.vy);
        cameraX = player.x - canvas.width / 2;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 畫地圖
        let startX = Math.floor(cameraX / tileSize);
        let endX = startX + Math.ceil(canvas.width / tileSize) + 1;
        for (let x = startX; x < endX; x++) {
            for (let y = 0; y < 25; y++) {
                let b = getBlock(x, y);
                if (b > 0) {
                    ctx.fillStyle = b === 2 ? '#228B22' : (b === 1 ? '#8B4513' : '#666');
                    ctx.fillRect(x * tileSize - cameraX, y * tileSize, tileSize, tileSize);
                }
            }
        }

        // 處理怪物
        enemies = enemies.filter(en => en.hp > 0);
        enemies.forEach(en => {
            en.vx = (player.x > en.x) ? 1.5 : -1.5;
            en.vy += 0.6;
            moveAndCollide(en, en.vx, en.vy);
            ctx.fillStyle = '#2d5a27';
            ctx.fillRect(en.x - cameraX, en.y, en.w, en.h);
            if (Math.abs(en.x - player.x) < 20 && Math.abs(en.y - player.y) < 20) player.hp -= 0.2;
        });

        // 畫玩家
        ctx.fillStyle = '#FF5733';
        ctx.fillRect(player.x - cameraX, player.y, player.w, player.h);

        document.getElementById('hp').innerText = Math.ceil(player.hp);
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
