<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>SUPER HUMAN 2026 - SQUAD FIX</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; user-select: none; }
        .page { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a0a0a; color: #f1c40f; text-align: center; }
        .btn { padding: 20px 50px; font-size: 30px; cursor: pointer; margin: 10px; background: #f1c40f; border: 4px solid #fff; border-radius: 20px; font-weight: bold; color: #000; box-shadow: 0 8px 0 #b8860b; }
        .in-box { padding: 20px; font-size: 28px; border: 4px solid #f1c40f; border-radius: 12px; background: #000; color: #f1c40f; text-align: center; margin-bottom: 25px; width: 400px; outline: none; }
        #hud { position: fixed; top: 15px; left: 15px; z-index: 1000; color: white; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; border: 2px solid #f1c40f; display: none; pointer-events: none; }
        #mini-map { position: fixed; top: 15px; right: 15px; width: 150px; height: 150px; border: 3px solid #fff; border-radius: 50%; z-index: 1000; display: none; background: rgba(0,0,0,0.5); overflow: hidden; }
        #esc-menu { position: fixed; inset: 0; z-index: 20000; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); }
        canvas#g { display: none; position: absolute; top: 0; left: 0; z-index: 10; }
    </style>
</head>
<body>

    <div id="p-auth" class="page">
        <h1>SUPER HUMAN 系統</h1>
        <p>請輸入金鑰 (ryan0111407)</p>
        <input type="text" id="pw" class="in-box">
        <button class="btn" onclick="auth()">登入系統</button>
    </div>

    <div id="p-mode" class="page" style="display:none;">
        <h1>選擇模式</h1>
        <button class="btn" onclick="setM(1)">👤 單人冒險</button>
        <button class="btn" onclick="document.getElementById('p-mode').style.display='none';document.getElementById('p-set').style.display='flex';">👥 小隊模式</button>
    </div>

    <div id="p-set" class="page" style="display:none;">
        <h1>設定隊友人數</h1>
        <h2 id="pv">5 人</h2>
        <input type="range" min="2" max="15" value="5" oninput="document.getElementById('pv').innerText=this.value+' 人'" id="sld" style="width:300px;">
        <button class="btn" onclick="setM(document.getElementById('sld').value)">進入世界</button>
    </div>

    <div id="esc-menu">
        <h1 style="color:#f1c40f;">遊戲暫停</h1>
        <button class="btn" onclick="location.reload()">🚪 離開遊戲</button>
        <button class="btn" onclick="toggleEsc()" style="background:#666; color:white;">⬅️ 繼續</button>
    </div>

    <div id="hud">❤️ HP: <span id="hp-u">100</span> | 🕒 <span id="tm-u">12:00</span></div>
    <div id="mini-map"><canvas id="mC" width="150" height="150"></canvas></div>
    <canvas id="g"></canvas>

<script>
    var live = false, esc = false, world = {}, keys = {}, ents = [], ticks = 600, sSize = 1;
    var p = { x: 0, y: -800, w: 22, h: 42, vx: 0, vy: 0, hp: 100, gr: false, hitBy: null, max: 100 };
    var T = 32;

    function auth() { if(document.getElementById('pw').value.trim()==='ryan0111407'){document.getElementById('p-auth').style.display='none';document.getElementById('p-mode').style.display='flex';} }
    
    function setM(n) {
        sSize = n;
        document.querySelectorAll('.page').forEach(el=>el.style.display='none');
        document.getElementById('hud').style.display='block';
        document.getElementById('mini-map').style.display='block';
        var cvs=document.getElementById('g'); cvs.style.display='block';
        cvs.width=window.innerWidth; cvs.height=window.innerHeight;
        
        // 隊友強制出生在你身邊 (多人模式)
        for(var i=0; i<sSize-1; i++) spawn('ally', p.x + (i*40 - 80));
        live=true; loop();
    }

    function spawn(t, x) { ents.push({ type: t, x: x, y: -800, w: 22, h: 42, vx: 0, vy: 0, hp: 100, max: 100, dir: 1 }); }
    function toggleEsc() { if(!live)return; esc=!esc; document.getElementById('esc-menu').style.display=esc?'flex':'none'; }
    function getB(gx, gy) { if(world[gx+'_'+gy]!==undefined) return world[gx+'_'+gy]; var x=Math.abs(gx); var h=(x%100<50?8:5); var f=Math.floor(h+Math.sin(gx*0.15)*6); return gy<f?0:(gy===f?2:1); }
    function check(x,y) { for(var i=Math.floor(x/T);i<=Math.floor((x+22)/T);i++)for(var j=Math.floor(y/T);j<=Math.floor((y+42)/T);j++)if(getB(i,j)>0)return true; return false; }
    
    window.onmousedown=function(e){
        if(!live||esc)return;
        var cvs=document.getElementById('g');
        var gx=Math.floor((e.clientX+(p.x-cvs.width/2))/T), gy=Math.floor((e.clientY+(p.y-cvs.height/2))/T);
        if(e.button===0){if(getB(gx,gy)>0)world[gx+'_'+gy]=0;}
        else if(e.button===2){if(getB(gx,gy)===0)world[gx+'_'+gy]=3;}
    };
    window.onkeydown=function(e){if(e.code==='Escape')toggleEsc(); keys[e.code]=true;};
    window.onkeyup=function(e){keys[e.code]=false;};
    window.oncontextmenu=function(e){e.preventDefault();};

    function loop() {
        if(!live||esc){requestAnimationFrame(loop);return;}
        var cvs=document.getElementById('g'), ctx=cvs.getContext('2d');
        ticks=(ticks+0.05)%1440;
        var isNight=ticks>1050||ticks<350;

        [p].concat(ents).forEach(function(e) {
            e.vy+=0.8; e.y+=e.vy;
            if(check(e.x,e.y)){if(e.vy>0){while(check(e.x,e.y))e.y-=0.5;e.gr=true;}e.vy=0;}else e.gr=false;
            if(e===p){
                var dx=(keys['KeyD']?5:0)-(keys['KeyA']?5:0);
                if(dx!==0){p.x+=dx; if(check(p.x,p.y))p.x-=dx;}
                if(keys['Space']&&p.gr)p.vy=-14;
            } else {
                if(e.type==='ally'){if(Math.abs(p.x-e.x)>150)e.x+=(p.x>e.x?2.5:-2.5);}
            }
        });

        document.getElementById('tm-u').innerText=Math.floor(ticks/60)+":"+Math.floor(ticks%60);
        render(ctx, cvs);
        requestAnimationFrame(loop);
    }

    function render(ctx, cvs) {
        ctx.fillStyle=(ticks>1050||ticks<350)?'#050510':'#87ceeb';
        ctx.fillRect(0,0,cvs.width,cvs.height);
        var cx=p.x-cvs.width/2, cy=p.y-cvs.height/2;

        for(var x=Math.floor(cx/T);x<=Math.ceil((cx+cvs.width)/T);x++){
            for(var y=Math.floor(cy/T);y<=Math.ceil((cy+cvs.height)/T);y++){
                var b=getB(x,y); if(b>0){ctx.fillStyle=b===2?"#2ecc71":b===3?"#bdc3c7":"#795548";ctx.fillRect(x*T-cx,y*T-cy,T+0.5,T+0.5);}
            }
        }
        [p].concat(ents).forEach(function(e) {
            ctx.fillStyle=e===p?'#e67e22':e.type==='ally'?'#3498db':'#2ecc71';
            ctx.fillRect(e.x-cx,e.y-cy,e.w,e.h);
            // 血條修正：背景紅，本體亮綠
            ctx.fillStyle='#ff0000'; ctx.fillRect(e.x-cx,e.y-cy-12,e.w,6);
            ctx.fillStyle='#00ff00'; ctx.fillRect(e.x-cx,e.y-cy-12,e.w*(e.hp/e.max),6);
        });

        var mC=document.getElementById('mC'), mctx=mC.getContext('2d');
        mctx.fillStyle='#000'; mctx.fillRect(0,0,150,150);
        mctx.save(); mctx.translate(75,75);
        [p].concat(ents).forEach(function(e){
            mctx.fillStyle=e===p?'#fff':'#3498db';
            var dx=(e.x-p.x)*0.1, dy=(e.y-p.y)*0.1;
            if(dx*dx+dy*dy<70*70){mctx.beginPath(); mctx.arc(dx,dy,3,0,7); mctx.fill();}
        });
        mctx.restore();
    }
</script>
</body>
</html>
