<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>未來的 Super Human</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: "Microsoft JhengHei", sans-serif; }
        canvas { display: block; }
        
        /* 選單樣式 */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; color: white; background: rgba(0,0,0,0.9);
        }
        h1 { color: #f1c40f; font-size: 50px; text-shadow: 0 0 20px #f1c40f; margin-bottom: 30px; }
        .btn {
            padding: 15px 60px; font-size: 24px; background: #f1c40f; border: none;
            border-radius: 50px; cursor: pointer; font-weight: bold; margin: 10px; transition: 0.2s;
        }
        .btn:hover { transform: scale(1.1); background: #fff; }
        
        /* UI 介面 */
        #ui { 
            position: absolute; top: 20px; left: 20px; color: #fff; 
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; 
            display: none; border: 2px solid #f1c40f; pointer-events: none;
        }
        input[type=range] { width: 250px; margin: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="main-menu" class="overlay">
        <h1>未來的 Super Human</h1>
        <button class="btn" onclick="initGame(1)">開始遊戲</button>
        <button class="btn" style="background:#3498db; color:white;" onclick="showMulti()">多人連線</button>
    </div>

    <div id="multi-menu" class="overlay" style="display:none;">
        <h1>多人連線設定</h1>
        <p style="font-size:24px;">選擇總人數: <span id="p-label" style="color:#f1c40f">5</span></p>
        <input type="range" id="p-slider" min="2" max="10" value="5" oninput="document.getElementById('p-label').innerText=this.value">
        <button class="btn" onclick="initGame(document.getElementById('p-slider').value)">開始</button>
        <p onclick="location.reload()" style="cursor:pointer; color:#777; margin-top:15px;">返回首頁</p>
    </div>

    <div id="ui">
        <b>🌍 時間：<span id="clock" style="color:#f1c40f">07:00</span></b><br>
        ❤️ 生命：<span id="hp">100</span> | 👥 人數：<span id="p-count">1</span>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let isPlaying = false;
    let cameraX = 0;
    let gameTime = 420; // 從早上 7:00 開始 (420分鐘)
    let keys = {};
    let worldData = {};

    const PHYSICS = { gravity: 0.6, jump: -11, speed: 4, tile: 32 };

    // --- 實體類別 ---
    class Entity {
        constructor(x, y, color, type = 'npc') {
            this.x = x; this.y = y; this.w = 22; this.h = 42;
            this.vx = 0; this.vy = 0; this.color = color;
            this.type = type; this.grounded = false; this.hp = 100;
        }

        update(inputX, wantJump) {
            this.vx = inputX;
            let nx = this.x + this.vx;

            // 水平碰撞 + 自動爬坡
            if (checkCol(nx, this.y, this.w, this.h)) {
                if (!checkCol(nx, this.y - 32, this.w, this.h)) {
                    this.x = nx; this.y -= 8;
                } else { this.vx = 0; }
            } else { this.x = nx; }

            // 重力與跳躍
            this.vy += PHYSICS.gravity;
            if (wantJump && this.grounded) { this.vy = PHYSICS.jump; this.grounded = false; }

            if (!checkCol(this.x, this.y + this.vy, this.w, this.h)) {
                this.y += this.vy; this.grounded = false;
            } else {
                if (this.vy > 0) this.grounded = true;
                this.vy = 0;
            }
        }

        draw() {
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x - cameraX, this.y, this.w, this.h);
        }
    }

    let player = new Entity(300, -500, '#e67e22', 'player');
    let teammates = [], villagers = [], animals = [], enemies = [];

    function showMulti() {
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('multi-menu').style.display = 'flex';
    }

    function initGame(count) {
        document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none');
        document.getElementById('ui').style.display = 'block';
        document.getElementById('p-count').innerText = count;

        // 生成隊友
        for(let i=0; i < count - 1; i++) {
            teammates.push(new Entity(350 + i*40, -500, '#f1c40f'));
        }
        // 生成動物與村民
        for(let i=0; i<5; i++) animals.push({x: 1000 + i*500, y:0, w:25, h:20, vx:1, vy:0});
        for(let i=0; i<3; i++) villagers.push(new Entity(800 + i*200, -500, '#3498db'));

        isPlaying = true;
        resize();
        loop();
    }

    function checkCol(nx, ny, w, h) {
        let x1 = Math.floor(nx / 32), x2 = Math.floor((nx + w) / 32);
        let y1 = Math.floor(ny / 32), y2 = Math.floor((ny + h) / 32);
        for (let x = x1; x <= x2; x++) for (let y = y1; y <= y2; y++) {
            let ground = Math.floor(15 + Math.sin(x * 0.1) * 3);
            if (y >= ground) return true;
        }
        return false;
    }

    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize;

    // 攻擊：左鍵打怪
    canvas.onmousedown = () => {
        enemies.forEach(en => {
            if(Math.abs(en.x - player.x) < 60) en.hp -= 50;
        });
    };

    function loop() {
        if (!isPlaying) return;

        // --- 晝夜系統 ---
        gameTime = (gameTime + 0.5) % 1440;
        let sky = "#87ceeb"; // 白天
        if (gameTime >= 1050 && gameTime < 1080) sky = "#ff7832"; // 傍晚
        else if (gameTime >= 1090 || gameTime < 390) sky = "#050510"; // 晚上
        
        ctx.fillStyle = sky; ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 晚上生怪
        if (sky === "#050510" && Math.random() < 0.01 && enemies.length < 5) {
            enemies.push(new Entity(player.x + 500, -500, '#2ecc71', 'enemy'));
        }

        // --- 玩家 ---
        let pMove = (keys['KeyA'] ? -1 : keys['KeyD'] ? 1 : 0) * PHYSICS.speed;
        player.update(pMove, keys['Space']);
        cameraX += (player.x - canvas.width / 2 - cameraX) * 0.1;
        player.draw();

        // --- 地形 ---
        let sx = Math.floor(cameraX / 32), ex = sx + Math.ceil(canvas.width / 32) + 1;
        for (let x = sx; x < ex; x++) {
            let ground = Math.floor(15 + Math.sin(x * 0.1) * 3);
            for (let y = ground; y < ground + 5; y++) {
                ctx.fillStyle = (y === ground) ? '#4caf50' : '#6d4c41';
                ctx.fillRect(x * 32 - cameraX, y * 32, 32, 32);
            }
        }

        // --- 隊友 AI (跟隨) ---
        teammates.forEach(t => {
            let dist = player.x - t.x;
            let move = Math.abs(dist) > 50 ? (dist > 0 ? 1 : -1) : 0;
            let hitting = checkCol(t.x + move * PHYSICS.speed, t.y, t.w, t.h);
            t.update(move * PHYSICS.speed, hitting);
            t.draw();
        });

        // --- 村民與怪物 ---
        villagers.forEach(v => { v.update((Math.random()-0.5)*2, Math.random()<0.01); v.draw(); });
        enemies = enemies.filter(en => en.hp > 0);
        enemies.forEach(en => {
            let edist = player.x - en.x;
            en.update((edist > 0 ? 1 : -1) * 2, checkCol(en.x+(edist>0?2:-2), en.y, en.w, en.h));
            en.draw();
            if(Math.abs(en.x - player.x) < 20) player.hp -= 0.1;
        });

        //
