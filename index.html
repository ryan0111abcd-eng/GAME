<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>SUPER HUMAN 2026 - FINAL STABLE</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        /* 選單：保證最高層級 */
        #start-layer { 
            position: fixed; inset: 0; z-index: 99999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: #111; color: #f1c40f; 
        }
        .btn { 
            padding: 30px 80px; font-size: 40px; cursor: pointer; margin: 20px; 
            background: #f1c40f; border: 6px solid #fff; border-radius: 25px; 
            font-weight: bold; color: #000; box-shadow: 0 10px 0 #b8860b;
        }
        .btn:active { transform: translateY(5px); box-shadow: 0 5px 0 #b8860b; }
        
        #hud { position: fixed; top: 15px; left: 15px; z-index: 1000; color: white; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; border: 2px solid #f1c40f; display: none; pointer-events: none; }
        #radar { position: fixed; top: 15px; right: 15px; width: 150px; height: 150px; border: 3px solid #fff; border-radius: 50%; z-index: 1000; display: none; background: rgba(0,0,0,0.5); overflow: hidden; }
        canvas#gCvs { display: none; position: absolute; top: 0; left: 0; z-index: 10; }
        #rain-fx { position: fixed; inset: 0; pointer-events: none; z-index: 50; background: rgba(40,40,80,0.2); display: none; }
    </style>
</head>
<body>

    <div id="start-layer">
        <h1 style="font-size: 60px; margin-bottom: 40px;">SUPER HUMAN 2026</h1>
        <button class="btn" onclick="boot(1)">👤 單人冒險</button>
        <button class="btn" onclick="boot(5)" style="background:#3498db; color:white;">👥 派遣小隊</button>
        <p style="color:white; margin-top:20px;">點擊上方大按鈕進入世界</p>
    </div>

    <div id="hud">❤️ HP: <span id="hp">100</span> | 📍 座標: <span id="pos">0,0</span><br>🌍 地貌: <span id="bio">平原</span> | ⏰ <span id="tm">12:00</span></div>
    <div id="radar"><canvas id="rCvs" width="150" height="150"></canvas></div>
    <div id="rain-fx"></div>
    <canvas id="gCvs"></canvas>

<script>
    const cvs = document.getElementById('gCvs'), ctx = cvs.getContext('2d');
    const rcvs = document.getElementById('rCvs'), rctx = rcvs.getContext('2d');
    let live = false, world = {}, keys = {}, entities = [], ticks = 600;
    // 初始 Y 設在 -800 確保從天而降
    let p = { x: 0, y: -800, w: 22, h: 42, vx: 0, vy: 0, hp: 100, max: 100, gr: false, hitBy: null };
    const TILE = 32;

    function boot(n) {
        document.getElementById('start-layer').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
        document.getElementById('radar').style.display = 'block';
        cvs.style.display = 'block';
        cvs.width = window.innerWidth; cvs.height = window.innerHeight;

        if(Math.random() < 0.4) document.getElementById('rain-fx').style.display = 'block';

        for(let i=0; i<n-1; i++) spawn('ally', (Math.random()-0.5)*600);
        for(let i=0; i<5; i++) spawn('npc', (Math.random()-0.5)*2000);
        for(let i=0; i<4; i++) spawn('pig', (Math.random()-0.5)*2000);

        live = true; loop();
    }

    function spawn(t, x) {
        let hp = (t==='pig')?30:100;
        entities.push({ type: t, x, y: -800, w: 22, h: 42, vx: 0, vy: 0, hp: hp, max: hp, dir: 1 });
    }

    function getBiome(gx) {
        let x = Math.abs(gx);
        let h = 35, c = "#2ecc71", name = "平原", amp = 1;
        if (x % 100 < 70) { name="丘陵"; c="#27ae60"; h=28; amp=6; } // 70% 丘陵
        if (x % 100 < 50) { name="山地"; c="#95a5a6"; h=15; amp=14; } // 50% 山地
        if (x % 100 < 20) { name="台地"; c="#e67e22"; h=32; amp=0.5; } // 20% 台地
        let ruins = (x % 100 < 65); // 65% 古蹟
        return { h, c, name, amp, ruins };
    }

    function getB(gx, gy) {
        if (world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
        let b = getBiome(gx);
        let groundH = Math.floor(b.h + Math.sin(gx * 0.15) * b.amp);
        if (b.ruins && gy > groundH && gy < groundH+4 && Math.random() < 0.1) return 3;
        return gy < groundH ? 0 : (gy === groundH ? 2 : 1);
    }

    function check(x, y) {
        for (let i = Math.floor(x/TILE); i <= Math.floor((x+22)/TILE); i++)
            for (let j = Math.floor(y/TILE); j <= Math.floor((y+42)/TILE); j++)
                if(getB(i, j) > 0) return true;
        return false;
    }

    function atk(o, t = null) {
        entities.concat(p).forEach(e => {
            if(e !== o && Math.abs(e.x - o.x) < 70) {
                if(t && e !== t) return;
                e.hp -= 20; e.vx = (e.x > o.x ? 12 : -12);
                if(e === p) p.hitBy = o; 
            }
        });
    }

    window.onkeydown = e => { 
        keys[e.code]=true; 
        if(e.code==='KeyK') atk(p); 
        if(e.code==='KeyQ') p.hp=Math.min(100, p.hp+20);
        if(e.code==='Escape') location.reload();
    };
    window.onkeyup = e => keys[e.code]=false;
    window.onmousedown = e => {
        if(!live) return;
        let gx = Math.floor((e.clientX + (p.x - cvs.width/2))/TILE), gy = Math.floor((e.clientY + (p.y - cvs.height/2))/TILE);
        world[gx+'_'+gy] = e.button === 0 ? 0 : 3;
    };

    function loop() {
        if(!live) return;
        ticks = (ticks + 0.5) % 1440;
        let night = ticks > 1050 || ticks
