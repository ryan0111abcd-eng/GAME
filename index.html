<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Super Human - 地形優化版</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; color: white; }
        .layer { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1a1a1a; z-index: 9999; }
        .title-text { color: #f1c40f; font-size: 50px; margin-bottom: 40px; text-shadow: 3px 3px 0 #000; }
        .btn { padding: 20px 60px; font-size: 28px; cursor: pointer; margin: 15px; background: #f1c40f; border: none; font-weight: bold; border-radius: 15px; color: black; box-shadow: 0 8px 0 #b8860b; }
        #hud { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 15px; border: 2px solid #f1c40f; display: none; z-index: 5000; border-radius: 10px; font-size: 18px; }
        #inv { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; gap: 10px; z-index: 5000; }
        .slot { width: 50px; height: 50px; border: 2px solid #777; background: #333; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .slot.active { border-color: #f1c40f; background: #555; transform: scale(1.1); }
        canvas#gameCanvas { display: none; position: absolute; top: 0; left: 0; z-index: 10; }
    </style>
</head>
<body>

    <div id="ui-boot" class="layer">
        <h1 class="title-text">點擊【中央方塊】開始遊戲</h1>
        <div style="width:150px; height:150px; background:#f1c40f; border-radius:20px; cursor:pointer;" onclick="toMain()"></div>
    </div>

    <div id="ui-main" class="layer" style="display:none;">
        <h1 class="title-text">未來的 SUPER HUMAN</h1>
        <button class="btn" onclick="bootGame(1)">開始遊戲</button>
        <button class="btn" onclick="showMulti()" style="background:#3498db; color:white;">多人小隊</button>
    </div>

    <div id="ui-multi" class="layer" style="display:none;">
        <h1 class="title-text">選擇人數</h1>
        <input type="range" id="p-range" min="2" max="10" value="5" oninput="document.getElementById('pv').innerText=this.value" style="width:300px;">
        <div style="font-size:32px; margin: 20px;">總人數：<span id="pv" style="color:#f1c40f;">5</span></div>
        <button class="btn" onclick="bootGame(document.getElementById('p-range').value)">確認</button>
    </div>

    <div id="hud">
        📍 座標: <span id="posX">0</span>, <span id="posY">0</span> | ❤️ HP: <span id="hp">100</span><br>
        🕒 時間: <span id="time-text">07:00</span> | 🗺️ 地形: <span id="biome-name">偵測中</span>
    </div>

    <div id="inv">
        <div class="slot active" id="sl1">1:土</div>
        <div class="slot" id="sl2">2:草</div>
        <div class="slot" id="sl3">3:石</div>
        <div class="slot" id="sl4">4:木</div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const cvs = document.getElementById('gameCanvas'), ctx = cvs.getContext('2d');
    let isRunning = false, ticks = 420, world = {}, camX = 0, camY = 0, curB = 1;
    let p = { x: 0, y: 0, w: 20, h: 40, vx: 0, vy: 0, hp: 100, ground: false, inWater: false };
    let agents = [], keys = {};
    const TILE = 32, COLORS = { 1: '#8B4513', 2: '#228B22', 3: '#666', 4: '#cd853f', 9: '#3498db' };

    function toMain() { document.getElementById('ui-boot').style.display='none'; document.getElementById('ui-main').style.display='flex'; }
    function showMulti() { document.getElementById('ui-main').style.display='none'; document.getElementById('ui-multi').style.display='flex'; }

    // --- 改進的地形引擎 ---
    function getBiomeInfo(gx) {
        let x = gx;
        // 每 500 格循環一次地形：平原(200) -> 河流兩岸平原(50) -> 河流(100) -> 河流兩岸平原(50) -> 山地(100)
        let cycle = ((x % 500) + 500) % 500;
        
        if (cycle >= 250 && cycle <= 350) return { name: "河流", h: 48, n: 0, isWater: true };
        if (cycle > 200 && cycle < 400) return { name: "濱河平原", h: 38, n: 1 }; // 河流旁邊強制平坦
        if (cycle > 400) return { name: "山地", h: 20, n: 15 };
        return { name: "平原", h: 38, n: 3 };
    }

    function getGY(gx) {
        let b = getBiomeInfo(gx);
        return Math.floor(b.h + Math.sin(gx * 0.1) * b.n);
    }

    function getB(gx, gy) {
        if (world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
        let fY = getGY(gx);
        let b = getBiomeInfo(gx);
        if (b.isWater && gy >= fY) return 9; // 河流方塊
        return gy < fY ? 0 : (gy === fY ? 2 : 1);
    }
