<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPER HUMAN 2026 - FINAL EDITION</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; user-select: none; }
        .ui-screen { position: fixed; inset: 0; z-index: 999999; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a0a0a; color: #f1c40f; text-align: center; }
        .btn { padding: 20px 60px; font-size: 30px; cursor: pointer; margin: 15px; background: #f1c40f; border: 4px solid #fff; border-radius: 20px; font-weight: bold; color: #000; box-shadow: 0 8px 0 #b8860b; }
        .btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #b8860b; }
        .in-box { padding: 18px; font-size: 30px; border: 4px solid #f1c40f; border-radius: 12px; background: #000; color: #f1c40f; text-align: center; margin-bottom: 25px; width: 450px; outline: none; }
        #hud { position: fixed; top: 15px; left: 15px; z-index: 1000; color: white; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 10px; border: 2px solid #f1c40f; display: none; pointer-events: none; line-height: 1.6; }
        canvas#gCvs { display: none; position: absolute; top: 0; left: 0; z-index: 10; }
        .rules-text { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #f1c40f; max-width: 450px; text-align: left; color: #fff; margin-bottom: 20px; line-height: 1.8; }
    </style>
</head>
<body>

    <div id="step-auth" class="ui-screen">
        <h1 style="font-size: 45px; margin-bottom: 10px;">SUPER HUMAN 系統</h1>
        <p style="font-size: 24px; color: #fff; margin-bottom: 30px;">請輸入啟動碼</p>
        <input type="text" id="pw-input" class="in-box" placeholder="在此輸入啟動碼">
        <button class="btn" onclick="checkAuth()">認證啟動</button>
        <p id="auth-err" style="color:red; display:none; margin-top:15px;">啟動碼錯誤！</p>
    </div>

    <div id="step-mode" class="ui-screen" style="display:none;">
        <h1>認證成功</h1>
        <p>選擇你的遊戲方式</p>
        <button class="btn" onclick="selectMode('single')">👤 單人模式</button>
        <button class="btn" onclick="selectMode('multi')" style="background:#3498db; color:white;">👥 多人模式</button>
    </div>

    <div id="step-setup" class="ui-screen" style="display:none;">
        <h1>小隊規模設定</h1>
        <h2 id="p-label">包含隊友共: <span style="color:#f1c40f;">5</span> 人</h2>
        <input type="range" min="2" max="15" value="5" oninput="document.getElementById('p-label').innerHTML='包含隊友共: <span style=color:#f1c40f;>'+this.value+'</span> 人'" id="p-slider" style="width:350px; height:40px;">
        <button class="btn" onclick="showRules()">下一步</button>
    </div>

    <div id="step-rules" class="ui-screen" style="display:none;">
        <div class="rules-text">
            <h2 style="text-align:center; color:#f1c40f; margin-top:0;">📜 遊戲指南</h2>
            ● <b>滑鼠左鍵</b>：挖掘方塊 / 攻擊怪物<br>
            ● <b>滑鼠右鍵</b>：放置方塊 (石磚)<br>
            ● <b>WASD</b>：移動 | <b>空白鍵</b>：跳躍<br>
            ● <b>死亡機制</b>：血量歸零將自動重啟遊戲。<br>
            ● <b>AI 守護</b>：隊友挖礦較慢，但在你受攻擊時會<b>全速救援</b>。
        </div>
        <button class="btn" onclick="startWorld()">進入世界</button>
    </div>

    <div id="hud">❤️ 血量: <span id="ui-hp">100</span> | 📍 座標: <span id="ui-pos">0,0</span><br>☀️ 狀態: <span id="ui-sun">日間</span></div>
    <canvas id="gCvs"></canvas>

<script>
    let squadSize = 1;

    // UI 邏輯
    function checkAuth() {
        const val = document.getElementById('pw-input').value.trim();
        if(val === 'ryan0111407') {
            document.getElementById('step-auth').style.display = 'none';
            document.getElementById('step-mode').style.display = 'flex';
        } else {
            document.getElementById('auth-err').style.display = 'block';
        }
    }

    function selectMode(mode) {
        document.getElementById('step-mode').style.display = 'none';
        if(mode === 'single') {
            squadSize = 1;
            showRules();
        } else {
            document.getElementById('step-setup').style.display = 'flex';
        }
    }

    function showRules() {
        if(document.getElementById('step-setup').style.display !== 'none') {
            squadSize = document.getElementById('p-slider').value;
        }
        document.getElementById('step-setup').style.display = 'none';
        document.getElementById('step-rules').style.display = 'flex';
    }

    // 遊戲核心邏輯
    let live = false, world = {}, keys = {}, ents = [], ticks = 600;
    let p = { x: 0, y: -800, w: 22, h: 42, vx: 0, vy: 0, hp: 100, gr: false, hitBy: null };
    const TILE = 32;

    function startWorld() {
        document.getElementById('step-rules').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
        const cvs = document.getElementById('gCvs');
        cvs.style.display = 'block'; cvs.width = window.innerWidth; cvs.height = window.innerHeight;

        for(let i=0; i<squadSize-1; i++) spawn('ally', (Math.random()-0.5)*800);
        for(let i=0; i<6; i++) spawn('pig', (Math.random()-0.5)*2000);
        
        live = true;
        requestAnimationFrame(loop);
    }

    function spawn(t, x) {
        ents.push({ type: t, x, y: -700, w: 22, h: 42, vx: 0, vy: 0, hp: 100, max: 100, dir: 1, mineCd: 0 });
    }

    function getB(gx, gy) {
        if(world[gx+'_'+gy]!==undefined) return world[gx+'_'+gy];
        let x = Math.abs(gx);
        let h = (x%100 < 70) ? 8 : (x%100 < 50 ? 4 : 10);
        let f = Math.floor(h + Math.sin(gx * 0.15) * 6);
        return gy < f ? 0 : (gy === f ? 2 : 1);
    }

    function check(x,y) {
        for(let i=Math.floor(x/TILE); i<=Math.floor((x+22)/TILE); i++)
            for(let j=Math.floor(y/TILE); j<=Math.floor((y+42)/TILE); j++)
                if(getB(i,j)>0) return true;
        return false;
    }

    function atk(o) {
        ents.concat(p).forEach(e=>{
            if(e!==o && Math.abs(e.x-o.x)<70 && Math.abs(e.y-o.y)<70){
                e.hp -= 25; e.vx = (e.x>o.x?12:-12);
                if(e===p) p.hitBy = o;
            }
        });
    }

    window.onmousedown = e => {
        if(!live) return;
        const cvs = document.getElementById('gCvs');
        let gx = Math.floor((e.clientX + (p.x - cvs.width/2))/TILE), gy = Math.floor((e.clientY + (p.y - cvs.height/2))/TILE);
        if(e.button === 0) { if(getB(gx, gy) > 0) world[gx+'_'+gy] = 0; else atk(p); } 
        else if(e.button === 2) { if(getB(gx, gy) === 0) world[gx+'_'+gy] = 3; }
    };
    window.oncontextmenu = e => e.preventDefault();
    window.onkeydown=e=>{keys[e.code]=true; if(e.code==='Escape') location.reload();};
    window.onkeyup=e=>keys[e.code]=false;

    function loop() {
        if(!live) return;
        const cvs = document.getElementById('gCvs'), ctx = cvs.getContext('2d');
        ticks = (ticks + 0.8) % 1440;
        let isNight = ticks > 1050 || ticks < 350;

        // 早上殭屍消失
        if(!isNight) {
            ents = ents.filter(e => e.type !== 'mob');
            document.getElementById('ui-sun').innerText = "日間 (安全)";
        } else {
            document.getElementById('ui-sun').innerText = "夜間 (危險)";
        }

        [p, ...ents].forEach(e => {
            e.vy += 0.8; e.y += e.vy;
            if(check(e.x, e.y)) {
                if(e.vy > 0) { while(check(e.x, e.y)) e.y -= 0.5; e.gr = true; }
                e.vy = 0;
            } else e.gr = false;

            if(e===p) {
                let dx = (keys['KeyD']?5:0) - (keys['KeyA']?5:0);
                if(dx!==0) { p.x += dx; if(check(p.x, p.y)) p.x -= dx; }
                if(keys['Space'] && p.gr) p.vy = -14;
            } else {
                if(e.type==='ally') {
                    if(p.hitBy && p.hitBy.hp>0) {
                        e.x += (p.hitBy.x > e.x ? 4.5 : -4.5);
                        if(Math.abs(e.x-p.hitBy.x)<60) atk(e);
                    } else {
                        if(Math.abs(p.x-e.x)>250) e.x += (p.x>e.x?2.5:-2.5);
                        e.mineCd++;
                        if(e.mineCd > 120) { // AI 挖掘限速: 約2秒一次
                            let gx = Math.floor(e.x/32), gy = Math.floor(e.y/32)+2;
                            if(getB(gx, gy)>0){ world[gx+'_'+gy]=0; e.mineCd=0; }
                        }
                    }
                } else if(e.type==='mob') {
                    e.x += (p.x>e.x?2.4:-2.4); if(Math.abs(e.x-p.x)<30) p.hp -= 0.35;
                }
            }
        });

        if(isNight && Math.random()<0.015) spawn('mob', p.x + (Math.random()>0.5?650:-650));
        ents = ents.filter(e => e.hp > 0);
        if(p.hp <= 0) { alert("GAME OVER! 點擊確定重新開始"); location.reload(); return; }

        document.getElementById('ui-hp').innerText = Math.ceil(p.hp);
        document.getElementById('ui-pos').innerText = Math.floor(p.x/TILE) + "," + Math.floor(p.y/TILE);
        
        // 渲染
        ctx.fillStyle = isNight ? '#050510' : '#87ceeb';
        ctx.fillRect(0,0,cvs.width,cvs.height);
        let cx = p.x - cvs.width/2, cy = p.y - cvs.height/2;
        for(let x=Math.floor(cx/32); x<=Math.ceil((cx+cvs.width)/32); x++){
            for(let y=Math.floor(cy/32); y<=Math.ceil((cy+cvs.height)/32); y++){
                let b = getB(x, y);
                if(b > 0) {
                    ctx.fillStyle = b===2 ? "#2ecc71" : (b===3 ? "#bdc3c7" : "#7955
