<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>未來的 Super Human - 完美修復版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: "Microsoft JhengHei", sans-serif; user-select: none; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* 選單容器：保證在最上層 */
        .overlay-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.9); color: white; z-index: 99999;
        }
        h1 { font-size: 55px; color: #f1c40f; text-shadow: 0 0 20px #f1c40f; margin-bottom: 40px; }
        .btn {
            padding: 20px 60px; margin: 15px; font-size: 28px; cursor: pointer;
            background: #f1c40f; border: none; color: #000; border-radius: 50px;
            font-weight: bold; transition: 0.2s; box-shadow: 0 4px 15px rgba(241, 196, 15, 0.4);
        }
        .btn:hover { background: #fff; transform: scale(1.1); }
        .input-box { font-size: 30px; width: 100px; text-align: center; margin: 20px; border-radius: 10px; border: none; }
        
        /* 遊戲內 UI */
        #game-hud { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.75); padding: 15px; border-radius: 10px; z-index: 100; border: 1px solid #f1c40f; display: none; pointer-events: none; }
        #hotbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; gap: 10px; background: rgba(0,0,0,0.8); padding: 10px; border: 2px solid #fff; z-index: 100; }
        .slot { width: 60px; height: 60px; border: 3px solid #555; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .slot.active { border-color: #f1c40f; box-shadow: 0 0 15px #f1c40f; }
    </style>
</head>
<body>

    <div id="main-menu" class="overlay-screen">
        <h1>未來的 Super Human</h1>
        <button class="btn" onclick="launchGame(1)">開始遊戲</button>
        <button class="btn" style="background:#3498db; color:white;" onclick="openMulti()">多人連線</button>
    </div>

    <div id="multi-menu" class="overlay-screen" style="display:none;">
        <h1>多人模式設定</h1>
        <p style="font-size: 20px;">請輸入總人數 (2-10)：</p>
        <input type="number" id="pNum" class="input-box" min="2" max="10" value="5">
        <button class="btn" onclick="launchGame(document.getElementById('pNum').value)">點此開始遊戲</button>
        <button class="btn" style="background:#666; font-size: 16px; padding: 10px 30px;" onclick="location.reload()">返回首頁</button>
    </div>

    <div id="game-hud">
        ❤️ 血量: <span id="hp-val">100</span> | 🕒 時間: <span id="time-val">07:00</span><br>
        📍 座標: <span id="pos-val">
