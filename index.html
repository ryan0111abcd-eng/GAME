<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>SUPER HUMAN 2026 - FRACTURED RUGGED</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; user-select: none; }
        .page { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #050505; color: #f1c40f; text-align: center; }
        .btn { padding: 15px 40px; font-size: 22px; cursor: pointer; margin: 10px; background: #f1c40f; border: 4px solid #fff; border-radius: 12px; font-weight: bold; color: #000; box-shadow: 0 5px 0 #b8860b; transition: 0.1s; outline: none; width: 300px; display: flex; align-items: center; justify-content: center; }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #b8860b; }
        .in-box { padding: 15px; font-size: 24px; border: 4px solid #f1c40f; border-radius: 12px; background: #222; color: #fff; text-align: center; margin-bottom: 25px; width: 320px; outline: none; }
        #hud { position: fixed; top: 15px; left: 15px; z-index: 1000; color: white; background: rgba(0,0,0,0.85); padding: 10px; border-radius: 10px; border: 2px solid #f1c40f; display: none; pointer-events: none; }
        canvas#g { display: none; position: absolute; top: 0; left: 0; }
        #esc-menu { position: fixed; inset: 0; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="p-auth" class="page" style="display:none;">
        <h1>SYSTEM ACCESS</h1>
        <input type="password" id="pw" class="in-box" placeholder="Access Key">
        <button class="btn" onclick="checkAuth()">VERIFY</button>
    </div>

    <div id="p-conn" class="page" style="display:none;">
        <h1>CONNECTION</h1>
        <button class="btn" onclick="setConn(1)">👤 單人模式</button>
        <button class="btn" onclick="setConn(0)">👥 多人模式</button>
    </div>

    <div id="p-count" class="page" style="display:none;">
        <h1>SQUAD SIZE</h1>
        <h2 id="cnt-disp" style="font-size: 40px;">5 人</h2>
        <input type="range" id="member-sld" min="2" max="15" value="5" oninput="document.getElementById('cnt-disp').innerText=this.value+' 人'" style="width:350px;">
        <button class="btn" onclick="toModeSel()">NEXT</button>
    </div>

    <div id="p-mode" class="page" style="display:none;">
        <h1>MODE SELECT</h1>
        <button class="btn" onclick="prepareBrief('ARCH')">🏗️ 荒野建築</button>
        <button class="btn" onclick="prepareBrief('SURV')">🏔️ 高山生存</button>
        <button class="btn" onclick="prepareBrief('ZOMB')">🧟 殭屍圍城</button>
    </div>

    <div id="p-brief" class="page" style="display:none;">
        <h1 id="brief-title">BRIEFING</h1>
        <div id="brief-text" style="font-size: 18px; line-height: 1.6; margin: 20px 0; color: #ccc; border-left: 4px solid #f1c40f; padding-left: 20px; text-align: left;"></div>
        <button class="btn" onclick="startGame()">INITIALIZE</button>
    </div>

    <div id="esc-menu">
        <h1 style="color:#f1c40f; font-size: 48px;">PAUSED</h1>
        <button class="btn" onclick="togglePause()">RESUME (ESC)</button>
        <button class="btn" onclick="resetWorld()" style="background:#e67e22!important;">重置建築存檔</button>
        <button class="btn" onclick="forgetKey()" style="background:#555!important;">登出帳號</button>
        <button class="btn" onclick="location.reload()" style="background:#444;">返回主選單</button>
    </div>

    <div id="hud">
        🕒 <span id="tm-v">12:00</span> | ❤️ <span id="p-hp-hud">100</span><br>
        🏗️ <span id="cur-b" style="color:#f1c40f;font-weight:bold;">石頭 (1)</span> | 📍 海拔：<span id="alt-v">0</span> m
    </div>
    <canvas id="g"></canvas>

<script>
    var live = false, paused = false, world = {}, keys = {}, ents = [], ticks = 600, sSize = 1, mType = '';
    var p = { x: 0, y: 0, w: 22, h: 42, vx: 0, vy: 0, hp: 100, max: 100, gr: false, dmgCd: 0, atkCd: 0, face: 1 };
    var T = 32, selB = 1, spawnTimer = 0, villagerTimer = 0;
    const AUTH_KEY = 'ryan0111407';

    window.onload = function() {
        if(localStorage.getItem('sh_save_v2')) world = JSON.parse(localStorage.getItem('sh_save_v2'));
        if (localStorage.getItem('super_human_auth') === AUTH_KEY) document.getElementById('p-conn').style.display='flex';
        else document.getElementById('p-auth').style.display='flex';
    };

    function checkAuth() {
        if(document.getElementById('pw').value.trim() === AUTH_KEY) {
            localStorage.setItem('super_human_auth', AUTH_KEY);
            document.getElementById('p-auth').style.display='none';
            document.getElementById('p-conn').style.display='flex';
        } else alert("ACCESS DENIED");
    }

    function forgetKey() { localStorage.removeItem('super_human_auth'); location.reload(); }
    function setConn(n) { document.getElementById('p-conn').style.display='none'; if(n===1){sSize=1;document.getElementById('p-mode').style.display='flex';}else{document.getElementById('p-count').style.display='flex';} }
    function toModeSel() { sSize=parseInt(document.getElementById('member-sld').value); document.getElementById('p-count').style.display='none'; document.getElementById('p-mode').style.display='flex'; }
    function resetWorld() { if(confirm("確定清除建築？")){world={};localStorage.setItem('sh_save_v2', "{}");location.reload();} }

    function prepareBrief(type) {
        mType = type;
        document.getElementById('p-mode').style.display='none';
        document.getElementById('p-brief').style.display='flex';
        document.getElementById('brief-text').innerHTML = "● <b>地形禁令</b>：已加載斷裂式雜湊地形引擎，嚴格杜絕平原區域。<br>● <b>地表物理</b>：草皮下必備5層泥土。每10秒村民空投。<br>● <b>警告</b>：地形極度崎嶇，請小心墜落。";
    }

    // --- 斷裂式雜湊地形引擎 (V9.3) ---
    function getB(gx, gy) {
        if(world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
        var absGx = Math.abs(gx);
        
        // 核心改動：增加一個「斷裂項」，確保鄰近格子高度產生劇烈跳動
        var wave = Math.sin(gx * 0.47) * 8 + Math.cos(gx * 0.29) * 6;
        var fracture = Math.cos(gx * 1.5) * Math.sin(gx * 2.3) * 10; // 斷裂鋸齒
        var noise = Math.abs(Math.sin(gx * 0.11)) * 12;
        
        var f = Math.floor(42 + wave + fracture + noise);
        
        // 隨海拔增加，斷裂感增強
        if(absGx > 100) f += Math.floor((absGx-100)/3.5) * (18 + Math.sin(gx*2.5)*6);
        if (f > 122) f = 122; 

        if (gy < f) return 0;
        if (gy === f) return (gy > 85) ? 7 : 2; 
        if (gy > f && gy <= f + 5) return 3; // 5層土
        return 1;
    }

    function startGame() {
        document.getElementById('p-brief').style.display='none';
        document.getElementById('hud').style.display='block';
        var cvs=document.getElementById('g'); cvs.style.display='block';
        cvs.width=window.innerWidth; cvs.height=window.innerHeight;
        let startY = 0;
        while(getB(0, Math.floor(startY/T)) === 0 && startY < 4000) startY += T;
        p.y = startY - 160;
        for(var i=0; i<sSize-1; i++) spawn('ally', p.x + (i*60)-120, p.y);
        live = true; loop();
    }

    function spawn(t, x, y) { ents.push({ type: t, x: x, y: y, w: 22, h: 42, vx: 0, vy: 0, hp: 100, max: 100, dir: 1, dmgCd: 0 }); }
    function check(x,y) { var gx=Math.floor(x/T), gy=Math.floor(y/T); return getB(gx, gy)>0 || getB(Math.floor((x+21)/T), Math.floor((y+41)/T))>0; }
    function togglePause() { paused = !paused; document.getElementById('esc-menu').style.display = paused ? 'flex' : 'none'; }

    window.onmousedown = function(e) {
        if(!live || paused) return;
        var cvs = document.getElementById('g'), cx = p.x - cvs.width/2, cy = p.y - cvs.height/2;
        var gx = Math.floor((e.clientX + cx) / T), gy = Math.floor((e.clientY + cy) / T);
        if(e.button === 0) world[gx+'_'+gy] = 0; 
        if(e.button === 2) world[gx+'_'+gy] = selB; 
        localStorage.setItem('sh_save_v2', JSON.stringify(world));
    };

    window.onkeydown = function(e) {
        if(e.code === 'Escape' && live) togglePause();
        if(!live || paused) return;
        if(e.keyCode >= 49 && e.keyCode <= 56) { selB = e.keyCode - 48; document.getElementById('cur-b').innerText = ["","石頭","草地","泥土","沙子","木頭","葉子","雪地","水"][selB] + " ("+selB+")"; }
        if(e.code === 'KeyK' && p.atkCd <= 0) {
            p.atkCd = 15;
            ents.forEach(e => {
                var dx = e.x - p.x, dy = Math.abs(e.y - p.y);
                if(dy < 40 && ((p.face === 1 && dx > 0 && dx < 60) || (p.face === -1 && dx < 0 && dx > -60))) { e.hp -= 34; e.dmgCd = 10; e.vx = p.face * 8; e.vy = -3; }
            });
        }
        keys[e.code] = true;
    };
    window.onkeyup = function(e) { keys[e.code] = false; };

    function loop() {
        if(!live) return;
        if(!paused) {
            var cvs = document.getElementById('g'), ctx = cvs.getContext('2d');
            ticks = (ticks + (mType==='ZOMB'?0.15:0.05)) % 1440; 
            villagerTimer++;
            if(villagerTimer > 600) { var sx = p.x + (Math.random() > 0.5 ? 850 : -850); spawn('villager', sx, p.y-500); villagerTimer = 0; }
            spawnTimer++;
            let limit = (mType==='ZOMB')?300:1000;
            if(spawnTimer > limit) {
                var sx = p.x + (Math.random() > 0.5 ? 850 : -850);
                var isNight = (ticks > 1050 || ticks < 350);
                if(isNight) spawn('zombie', sx, p.y-500); else spawn('animal', sx, p.y-500);
                spawnTimer = 0;
            }
            [p].concat(ents).forEach(e => {
                e.vy += 0.8; e.y += e.vy;
                if(check(e.x, e.y)) { while(check(e.x, e.y)) e.y -= 0.5; e.vy = 0; e.gr = true; } else e.gr = false;
                if(e.dmgCd > 0) e.dmgCd--;
                if(e === p) {
                    if(p.atkCd > 0) p.atkCd--;
                    var dx = (keys['KeyD']?7:0) - (keys['KeyA']?7:0);
                    if(dx !== 0) { p.x += dx; if(check(p.x, p.y)) p.x -= dx; p.face = dx > 0 ? 1 : -1; }
                    if(keys['Space'] && p.gr) p.vy = -14;
                } else {
                    if(e.type === 'zombie') { e.dir = (p.x > e.x ? 1 : -1); e.x += e.dir * 2 + (e.vx||0); if(Math.abs(p.x-e.x)<25 && Math.abs(p.y-e.y)<25 && p.dmgCd<=0) { p.hp -= 5; p.dmgCd = 40; } }
                    else { e.x += e.dir * 1.2 + (e.vx||0); if(Math.random()<0.01) e.dir*=-1; }
                    if(e.vx) e.vx *= 0.8; if(check(e.x + e.dir*10, e.y) && e.gr) e.vy = -10;
                }
            });
            ents = ents.filter(e => e.hp > 0);
            render(ctx, cvs);
        }
        requestAnimationFrame(loop);
    }

    function render(ctx, cvs) {
        document.getElementById('p-hp-hud').innerText = Math.floor(p.hp);
        document.getElementById('tm-v').innerText = Math.floor(ticks/60).toString().padStart(2,'0')+":"+Math.floor(ticks%60).toString().padStart(2,'0');
        document.getElementById('alt-v').innerText = Math.floor(Math.abs(p.y/T)*32);
        ctx.fillStyle = (ticks > 1050 || ticks < 350) ? '#050510' : '#87ceeb';
        ctx.fillRect(0, 0, cvs.width, cvs.height);
        var cx = p.x - cvs.width/2, cy = p.y - cvs.height/2;
        var clrs = ["","#7f8c8d","#2ecc71","#795548","#f1c40f","#5d4037","#27ae60","#ecf0f1","#3498db"];
        for(var x=Math.floor(cx/T); x<=Math.ceil((cx+cvs.width)/T); x++) {
            for(var y=Math.floor(cy/T); y<=Math.ceil((cy+cvs.height)/T); y++) {
                var b = getB(x, y);
                if(b > 0) { ctx.fillStyle = clrs[b]; ctx.fillRect(x*T-cx, y*T-cy, T-0.5, T-0.5); }
            }
        }
        ents.concat([p]).forEach(e => {
            ctx.fillStyle = (e.dmgCd > 0) ? '#fff' : (e===p?'#e67e22':(e.type==='zombie'?'#27ae60':(e.type==='villager'?'#9b59b6':(e.type==='animal'?'#ff9ff3':'#3498db'))));
            ctx.fillRect(e.x-cx, e.y-cy, e.w, e.h);
            var bw = 30; ctx.fillStyle="#333"; ctx.fillRect(e.x-cx+(e.w/2-bw/2), e.y-cy-12, bw, 5);
            ctx.fillStyle="#2ecc71"; ctx.fillRect(e.x-cx+(e.w/2-bw/2), e.y-cy-12, bw*(e.hp/e.max), 5);
        });
    }
</script>
</body>
</html>
