<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>SUPER HUMAN 2026</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; user-select: none; }
        .page { position: fixed; inset: 0; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #080808; color: #f1c40f; text-align: center; }
        .btn { padding: 22px 60px; font-size: 32px; cursor: pointer; margin: 15px; background: #f1c40f; border: 4px solid #fff; border-radius: 20px; font-weight: bold; color: #000; box-shadow: 0 8px 0 #b8860b; transition: 0.1s; }
        .btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #b8860b; }
        .in-box { padding: 20px; font-size: 30px; border: 4px solid #f1c40f; border-radius: 12px; background: #000; color: #f1c40f; text-align: center; margin-bottom: 30px; width: 450px; outline: none; }
        #hud { position: fixed; top: 15px; left: 15px; z-index: 1000; color: white; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 12px; border: 2px solid #f1c40f; display: none; pointer-events: none; line-height: 1.6; }
        #mini-map { position: fixed; top: 15px; right: 15px; width: 160px; height: 160px; border: 3px solid #fff; border-radius: 50%; z-index: 1000; display: none; background: rgba(0,0,0,0.6); overflow: hidden; }
        #esc-menu { position: fixed; inset: 0; z-index: 200000; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.95); }
        canvas#g { display: none; position: absolute; top: 0; left: 0; z-index: 10; }
    </style>
</head>
<body>

    <div id="p-auth" class="page">
        <h1 style="font-size: 55px; letter-spacing: 5px;">SUPER HUMAN 系統</h1>
        <p style="font-size: 22px; color: #444; margin-bottom: 40px;">系統鎖定中 - 請輸入存取金鑰</p>
        <input type="text" id="pw" class="in-box" placeholder="Access Key">
        <button class="btn" onclick="auth()">認證並啟動</button>
        <p id="err" style="color:#e74c3c; display:none; margin-top:20px; font-weight:bold;">拒絕存取：金鑰不正確</p>
    </div>

    <div id="p-mode" class="page" style="display:none;">
        <h1>授權成功</h1>
        <button class="btn" onclick="setM(1)">👤 單人模式</button>
        <button class="btn" onclick="document.getElementById('p-mode').style.display='none';document.getElementById('p-set').style.display='flex';" style="background:#3498db; color:white;">👥 多人連線</button>
    </div>

    <div id="p-set" class="page" style="display:none;">
        <h1>設定連線規模 (2-15)</h1>
        <h2 id="pv">小隊人數: 5 人</h2>
        <input type="range" min="2" max="15" value="5" oninput="document.getElementById('pv').innerText='小隊人數: '+this.value+' 人'" id="sld" style="width:380px;">
        <button class="btn" onclick="setM(document.getElementById('sld').value)">啟動世界</button>
    </div>

    <div id="esc-menu">
        <h1 style="color:#f1c40f; font-size: 60px;">暫停</h1>
        <button class="btn" onclick="location.reload()">🚪 離開遊戲 (重啟)</button>
        <button class="btn" onclick="toggleEsc()" style="background:#555; color:white;">⬅️ 繼續遊戲</button>
    </div>

    <div id="hud">❤️ HP: <span id="hp-u">100</span> | 📍 座標: <span id="pos-u">0,0</span><br>🕒 時間: <span id="tm-u">12:00</span> | ☀️ <span id="sun-u">日間</span></div>
    <div id="mini-map"><canvas id="mC" width="160" height="160"></canvas></div>
    <canvas id="g"></canvas>

<script>
    var live = false, esc = false, world = {}, keys = {}, ents = [], ticks = 600, sSize = 1;
    var p = { x: 0, y: -800, w: 22, h: 42, vx: 0, vy: 0, hp: 100, gr: false, hitBy: null };
    var T = 32;

    function auth() {
        if(document.getElementById('pw').value.trim() === 'ryan0111407') {
            document.getElementById('p-auth').style.display = 'none';
            document.getElementById('p-mode').style.display = 'flex';
        } else { 
            document.getElementById('err').style.display='block'; 
            document.getElementById('pw').value=''; 
        }
    }

    function setM(n) {
        sSize = n;
        document.querySelectorAll('.page').forEach(el => el.style.display = 'none');
        document.getElementById('hud').style.display = 'block';
        document.getElementById('mini-map').style.display = 'block';
        var cvs = document.getElementById('g');
        cvs.style.display = 'block'; cvs.width = window.innerWidth; cvs.height = window.innerHeight;
        for(var i=0; i<sSize-1; i++) spawn('ally', (Math.random()-0.5)*800);
        for(var i=0; i<6; i++) spawn('pig', (Math.random()-0.5)*2000);
        live = true; loop();
    }

    function spawn(t, x) {
        // AI 隨機初始動作計時器，避免集體暴走
        ents.push({ type: t, x: x, y: -700, w: 22, h: 42, vx: 0, vy: 0, hp: 100, max: 100, dir: 1, actionCd: Math.random()*5000 });
    }

    function toggleEsc() { if(!live) return; esc = !esc; document.getElementById('esc-menu').style.display = esc ? 'flex' : 'none'; }

    function getB(gx, gy) {
        if(world[gx+'_'+gy]!==undefined) return world[gx+'_'+gy];
        var x = Math.abs(gx);
        var h = (x%100 < 30)?10:(x%100 < 70?8:5);
        var f = Math.floor(h + Math.sin(gx * 0.15) * 6);
        return gy < f ? 0 : (gy === f ? 2 : 1);
    }

    function check(x,y) {
        for(var i=Math.floor(x/T); i<=Math.floor((x+22)/T); i++)
            for(var j=Math.floor(y/T); j<=Math.floor((y+42)/T); j++)
                if(getB(i,j)>0) return true;
        return false;
    }

    function atk(o) {
        ents.concat(p).forEach(function(e){
            if(e!==o && Math.abs(e.x-o.x)<70 && Math.abs(e.y-o.y)<70){
                e.hp -= 20; e.vx = (e.x>o.x?12:-12);
                if(e === p) p.hitBy = o;
            }
        });
    }

    window.onmousedown = function(e) {
        if(!live || esc) return;
        var cvs = document.getElementById('g');
        var gx = Math.floor((e.clientX + (p.x - cvs.width/2))/T), gy = Math.floor((e.clientY + (p.y - cvs.height/2))/T);
        if(e.button === 0) { if(getB(gx, gy) > 0) world[gx+'_'+gy] = 0; else atk(p); } 
        else if(e.button === 2) { if(getB(gx, gy) === 0) world[gx+'_'+gy] = 3; }
    };

    window.onkeydown = function(e){
        if(e.code === 'Escape') toggleEsc();
        keys[e.code] = true;
        if(e.code === 'KeyQ') p.hp = Math.min(100, p.hp + 20);
        if(e.code === 'KeyK') atk(p);
    };
    window.onkeyup = function(e){ keys[e.code] = false; };
    window.oncontextmenu = function(e){ e.preventDefault(); };

    function loop() {
        if(!live || esc) { requestAnimationFrame(loop); return; }
        var cvs = document.getElementById('g'), ctx = cvs.getContext('2d');
        ticks = (ticks + 0.5) % 1440;
        var isNight = ticks > 1050 || ticks < 350;

        if(!isNight) ents = ents.filter(function(e){ return e.type !== 'mob'; });

        [p].concat(ents).forEach(function(e) {
            e.vy += 0.8; e.y += e.vy;
            if(check(e.x, e.y)) { if(e.vy > 0) { while(check(e.x, e.y)) e.y -= 0.5; e.gr = true; } e.vy = 0; } else e.gr = false;

            if(e===p) {
                var dx = (keys['KeyD']?5:0) - (keys['KeyA']?5:0);
                if(dx!==0) { p.x += dx; if(check(p.x, p.y)) p.x -= dx; }
                if(keys['Space'] && p.gr) p.vy = -14;
            } else {
                if(e.type==='ally') {
                    if(p.hitBy && p.hitBy.hp>0) {
                        e.x += (p.hitBy.x > e.x ? 4.5 : -4.5);
                        if(Math.abs(e.x-p.hitBy.x)<60) atk(e);
                    } else {
                        if(Math.abs(p.x-e.x)>250) e.x += (p.x>e.x?2.5:-2.5);
                        
                        // *** AI 挖掘終極限速 ***
                        // 計時器拉長到 5000 幀 (約 1.5 分鐘)，且判斷時只有 1% 機率真的動手
                        e.actionCd++;
                        if(e.actionCd > 5000) { 
                            if(Math.random() < 0.01) { 
                                var gx = Math.floor(e.x/T), gy = Math.floor(e.y/T)+2;
                                if(getB(gx, gy)>0) world[gx+'_'+gy]=0; 
                                else world[gx+'_'+(gy-1)]=3;
                            }
                            e.actionCd = 0;
                        }
                    }
                } else if(e.type==='mob') {
                    e.x += (p.x>e.x?2.4:-2.4); 
                    // 觸碰傷害判定
                    if (e.x < p.x + p.w && e.x + e.w > p.x && e.y < p.y + p.h && e.y + e.h > p.y) p.hp -= 0.6;
                }
            }
        });

        if(isNight && Math.random()<0.01) spawn('mob', p.x + (Math.random()>0.5?650:-650));
        ents = ents.filter(function(e){ return e.hp > 0; });
        if(p.hp <= 0) { alert("你死亡了！重新開始。"); location.reload(); return; }

        document.getElementById('hp-u').innerText = Math.ceil(p.hp);
        document.getElementById('pos-u').innerText = Math.floor(p.x/T) + "," + Math.floor(p.y/T);
        document.getElementById('tm-u').innerText = Math.floor(ticks/60).toString().padStart(2,'0')+':'+Math.floor(ticks%60).toString().padStart(2,'0');
        document.getElementById('sun-u').innerText = isNight ? "夜間" : "日間";

        render(ctx, cvs);
        requestAnimationFrame(loop);
    }

    function render(ctx, cvs) {
        ctx.fillStyle = (ticks > 1050 || ticks < 350) ? '#050510' : '#87ceeb';
        ctx.fillRect(0,0,cvs.width,cvs.height);
        var cx = p.x - cvs.width/2, cy = p.y - cvs.height/2;

        for(var x=Math.floor(cx/T); x<=Math.ceil((cx+cvs.width)/T); x++){
            for(var y=Math.floor(cy/T); y<=Math.ceil((cy+cvs.height)/T); y++){
                var b = getB(x, y);
                if(b > 0) {
                    ctx.fillStyle = b===2 ? "#2ecc71" : (b===3 ? "#bdc3c7" : "#795548");
                    ctx.fillRect(x*T-cx, y*T-cy, T+0.5, T+0.5);
                }
            }
        }
        [p].concat(ents).forEach(function(e) {
            ctx.fillStyle = e===p?'#e67e22':(e.type==='ally'?'#3498db':(e.type==='mob'?'#2ecc71':'#f1c40f'));
            ctx.fillRect(e.x-cx, e.y-cy, e.w, e.h);
            ctx.fillStyle = 'red'; ctx.fillRect(e.x-cx, e.y-cy-12, e.w, 5);
            ctx.fillStyle = 'lime'; ctx.fillRect(e.x-cx, e.y-cy-12, e.w*(e.hp/100), 5);
        });

        var mC = document.getElementById('mC'), mctx = mC.getContext('2d');
        mctx.fillStyle='#000'; mctx.fillRect(0,0,160,160);
        mctx.save(); mctx.translate(80,80);
        [p].concat(ents).forEach(function(e){
            mctx.fillStyle = e===p?'#fff':(e.type==='ally'?'#3498db':'#e74c3c');
            var dx=(e.x-p.x)*0.1, dy=(e.y-p.y)*0.1;
            if(dx*dx+dy*dy < 75*75){ mctx.beginPath(); mctx.arc(dx, dy, 3.5, 0, 7); mctx.fill(); }
        });
        mctx.restore();
    }
</script>
</body>
</html>
