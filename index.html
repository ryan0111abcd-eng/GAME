<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Future Super Human - Final Rescue</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        
        /* 100% 點擊保證層 */
        #start-screen {
            position: fixed; inset: 0; z-index: 99999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #1a1a1a; color: #f1c40f;
        }

        .big-btn {
            width: 300px; padding: 25px; font-size: 32px; cursor: pointer; margin: 20px;
            background: #f1c40f; border: 6px solid #fff; border-radius: 20px;
            font-weight: bold; color: #000; box-shadow: 0 10px 0 #b8860b;
        }
        .big-btn:active { transform: translateY(6px); box-shadow: 0 4px 0 #b8860b; }

        #hud {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            background: rgba(0,0,0,0.8); color: white; padding: 15px;
            border: 2px solid #f1c40f; border-radius: 10px; display: none; pointer-events: none;
        }

        #radar {
            position: fixed; top: 15px; right: 15px; width: 150px; height: 150px;
            border: 3px solid #fff; border-radius: 50%; overflow: hidden;
            z-index: 1000; display: none; background: rgba(0,0,0,0.5);
        }

        #rain-fx { position: fixed; inset: 0; pointer-events: none; z-index: 10; background: rgba(50,50,100,0.15); display: none; }
        canvas#gCvs { display: none; position: absolute; top: 0; left: 0; z-index: 1; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 style="font-size: 50px; margin-bottom: 40px;">SUPER HUMAN 2026</h1>
        <div id="m-step1">
            <button class="big-btn" onclick="setMode(1)">👤 單人模式</button>
            <button class="big-btn" onclick="setMode(5)" style="background:#3498db; color:white;">👥 多人模式</button>
        </div>
        <div id="m-step2" style="display:none; text-align:center;">
            <h2 style="color:white;">小隊人數: <span id="p-val" style="color:#f1c40f;">5</span></h2>
            <input type="range" min="2" max="10" value="5" oninput="document.getElementById('p-val').innerText=this.value" id="p-slider" style="width:300px; height:30px;">
            <br><button class="big-btn" onclick="showInfo()">確認人數</button>
        </div>
        <div id="m-step3" style="display:none; text-align:left; background:#2c3e50; padding:25px; border-radius:15px; border:2px solid #f1c40f; max-width:450px;">
            <h2 style="color:#f1c40f; text-align:center;">📜 任務說明單</h2>
            <p style="color:white;">● <b>WASD</b> 移動 | <b>空白</b> 跳躍</p>
            <p style="color:white;">● <b>左鍵</b> 挖礦 | <b>右鍵</b> 放置(石頭)</p>
            <p style="color:white;">● <b>K</b> 攻擊怪物 | <b>Q</b> 回血</p>
            <p style="color:white;">● <b>ESC</b> 選單 | <b>電腦</b> 會挖礦、戰鬥與蓋房</p>
            <button class="big-btn" onclick="startNow()" style="width:100%">進入世界</button>
        </div>
    </div>

    <div id="esc-layer" style="display:none; background:rgba(0,0,0,0.85); position:fixed; inset:0; z-index:10000; flex-direction:column; align-items:center; justify-content:center;">
        <h1 style="color:white;">暫停中</h1>
        <button class="big-btn" onclick="location.reload()">🚪 離開遊戲 (重啟)</button>
        <button class="big-btn" onclick="toggleEsc()" style="background:#7f8c8d; color:white;">↩️ 返回遊戲</button>
    </div>

    <div id="hud">❤️ HP: <span id="hp">100</span> | 📍 <span id="pos">0,0</span> | 🌡️ <span id="biome">平原</span></div>
    <div id="radar"><canvas id="mCvs" width="150" height="150"></canvas></div>
    <div id="rain-fx"></div>
    <canvas id="gCvs"></canvas>

<script>
    const cvs = document.getElementById('gCvs'), ctx = cvs.getContext('2d');
    const mcvs = document.getElementById('mCvs'), mctx = mcvs.getContext('2d');
    
    let isLive = false, isEsc = false, world = {}, keys = {}, entities = [], ticks = 600;
    let p = { x: 0, y: -250, w: 22, h: 42, vx: 0, vy: 0, hp: 100, maxHp: 100, ground: false };
    let squadSize = 1, rain = false, rainTime = 0;
    const TILE = 32;

    function setMode(n) {
        squadSize = n;
        document.getElementById('m-step1').style.display = 'none';
        if(n === 1) showInfo(); else document.getElementById('m-step2').style.display = 'block';
    }
    function showInfo() {
        if(squadSize > 1) squadSize = document.getElementById('p-slider').value;
        document.getElementById('m-step2').style.display = 'none';
        document.getElementById('m-step3').style.display = 'block';
    }
    function startNow() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
        document.getElementById('radar').style.display = 'block';
        cvs.style.display = 'block';
        cvs.width = window.innerWidth; cvs.height = window.innerHeight;

        for(let i=0; i<squadSize-1; i++) spawn('ally', (Math.random()-0.5)*600);
        for(let i=0; i<5; i++) spawn('npc', (Math.random()-0.5)*2000);
        for(let i=0; i<5; i++) spawn('pig', (Math.random()-0.5)*2000);

        isLive = true; loop();
    }

    function spawn(type, x) {
        let h = (type==='pig')?30:100;
        entities.push({ type, x, y: -500, w: 22, h: 42, vx: 0, vy: 0, hp: h, maxHp: h, dir: 1 });
    }

    function toggleEsc() { if(!isLive) return; isEsc = !isEsc; document.getElementById('esc-layer').style.display = isEsc?'flex':'none'; }

    window.onkeydown = e => { 
        if(e.code==='Escape') toggleEsc(); 
        keys[e.code]=true; 
        if(e.code==='KeyK') doAtk(p);
        if(e.code==='KeyQ') p.hp = Math.min(100, p.hp + 20);
    };
    window.onkeyup = e => keys[e.code] = false;
    window.onmousedown = e => {
        if(!isLive || isEsc) return;
        let gx = Math.floor((e.clientX + (p.x - cvs.width/2))/TILE);
        let gy = Math.floor((e.clientY + (p.y - cvs.height/2))/TILE);
        if(e.button === 0) world[gx+'_'+gy] = 0; else world[gx+'_'+gy] = 3;
    };
    window.oncontextmenu = e => e.preventDefault();

    function getBiome(gx) {
        let x = Math.abs(gx);
        if (x % 5000 < 1000) return { name: "平原", h: 35, c: "#2ecc71" };
        if (x % 5000 < 2000) return { name: "丘陵", h: 28, c: "#27ae60" };
        if (x % 5000 < 3000) return { name: "山地", h: 15, c: "#95a5a6" };
        return { name: "台地", h: 32, c: "#e67e22" };
    }
    function getB(gx, gy) {
        if (world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
        let b = getBiome(gx);
        return gy < b.h ? 0 : (gy === b.h ? 2 : 1);
    }
    function check(x, y, w, h) {
        for (let i = Math.floor(x/TILE); i <= Math.floor((x+w)/TILE); i++) {
            for (let j = Math.floor(y/TILE); j <= Math.floor((y+h)/TILE); j++) {
                if(getB(i, j) > 0) return true;
            }
        }
        return false;
    }
    function doAtk(owner) {
        entities.concat(p).forEach(e => { if(e!==owner && Math.abs(e.x-owner.x)<70) { e.hp-=20; e.vx=(e.x>owner.x?12:-12); } });
    }

    function loop() {
        if(!isLive || isEsc) { requestAnimationFrame(loop); return; }
        if(p.hp <= 0) { location.reload(); return; }

        ticks = (ticks + 0.5) % 1440;
        let isNight = ticks > 1050 || ticks < 350;
        rainTime++;
        if(rainTime % 1200 === 0) { rain = Math.random()<0.2; document.getElementById('rain-fx').style.display = rain?'block':'none'; }

        // 玩家物理
        p.vy += 0.8; p.y += p.vy;
        if(check(p.x, p.y, p.w, p.h)) {
            if(p.vy > 0) { while(check(p.x, p.y, p.w, p.h)) p.y -= 0.5; p.ground = true; }
            else { while(check(p.x, p.y, p.w, p.h)) p.y += 0.5; }
            p.vy = 0;
        } else p.ground = false;

        let dx = (keys['KeyD']?5:0) - (keys['KeyA']?5:0);
        if(dx !== 0) { p.x += dx; if(check(p.x, p.y, p.w, p.h)) p.x -= dx; }
        if((keys['Space'] || keys['KeyW']) && p.ground) p.vy = -14;

        // AI 更新
        entities.forEach(e => {
            e.vy += 0.8; e.y += e.vy;
            if(check(e.x, e.y, e.w, e.h)) { if(e.vy > 0) while(check(e.x, e.y, e.w, e.h)) e.y -= 0.5; e.vy = 0; }
            if(e.type === 'ally') {
                if(Math.abs(p.x - e.x) > 200) e.x += (p.x > e.x ? 2.5 : -2.5);
                if(Math.random() < 0.005) world[Math.floor(e.x/TILE)+'_'+(Math.floor(e.y/TILE)+2)] = 0;
                if(Math.random() < 0.002) world[Math.floor(e.x/TILE)+'_'+(Math.floor(e.y/TILE)+1)] = 3;
                entities.forEach(m => { if(m.type==='mob' && Math.abs(m.x-e.x)<100) doAtk(e); });
            } else if(e.type === 'mob') {
                e.x += (p.x > e.x ? 2.8 : -2.8);
                if(Math.abs(e.x - p.x) < 30) p.hp -= 0.3;
            } else {
                if(Math.random()<0.02) e.dir *= -1; e.x += e.dir*1.2;
                if(check(e.x, e.y, e.w, e.h)) e.x -= e.dir*1.2;
            }
        });
        if(isNight && Math.random() < 0.01) spawn('mob', p.x + (Math.random()>0.5?600:-600));
        entities = entities.filter(e => e.hp > 0);

        document.getElementById('hp').innerText = Math.ceil(p.hp);
        document.getElementById('pos').innerText = Math.floor(p.x/TILE) + "," + Math.floor(p.y/TILE);
        document.getElementById('biome').innerText = getBiome(Math.floor(p.x/TILE)).name;

        draw();
        requestAnimationFrame(loop);
    }

    function draw() {
        ctx.fillStyle = (ticks > 1050 || ticks < 350) ? '#050510' : (rain ? '#4b6584' : '#87ceeb');
        ctx.fillRect(0,0,cvs.width,cvs.height);
        let cx = p.x - cvs.width/2, cy = p.y - cvs.height/2;

        for(let x=Math.floor(cx/TILE); x<=Math.ceil((cx+cvs.width)/TILE); x++) {
            let bInfo = getBiome(x);
            for(let y=Math.floor(cy/TILE); y<=Math.ceil((cy+cvs.height)/TILE); y++) {
                let b = getB(x, y);
                if(b > 0) {
                    ctx.fillStyle = b===2 ? bInfo.c : (b===1 ? '#795548' : '#bdc3c7');
                    ctx.fillRect(x*TILE-cx, y*TILE-cy, TILE+0.5, TILE+0.5);
                }
            }
        }

        entities.concat(p).forEach(e => {
            let c = e===p?'#e67e22':(e.type==='ally'?'#3498db':(e.type==='mob'?'#e74c3c':(e.type==='npc'?'#f1c40f':'#ff9ff3')));
            ctx.fillStyle = c; ctx.fillRect(e.x-cx, e.y-cy, e.w, e.h);
            ctx.fillStyle = 'red'; ctx.fillRect(e.x-cx, e.y-cy-10, e.w, 5);
            ctx.fillStyle = 'lime'; ctx.fillRect(e.x-cx, e.y-cy-10, e.w*(e.hp/e.maxHp), 5);
        });

        mctx.fillStyle='#000'; mctx.fillRect(0,0,150,150);
        mctx.save(); mctx.translate(75, 75);
        entities.concat(p).forEach(e => {
            mctx.fillStyle = e===p?'#fff':(e.type==='ally'?'#3498db':'#e74c3c');
            let dx = (e.x-p.x)*0.12, dy = (e.y-p.y)*0.12;
            if(dx*dx + dy*dy < 70*70) { mctx.beginPath(); mctx.arc(dx, dy, 3.5, 0, 7); mctx.fill(); }
        });
        mctx.restore();
    }
</script>
</body>
</html>
