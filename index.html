<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>未來的 Super Human - 自由冒險版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: "Microsoft JhengHei", sans-serif; user-select: none; }
        canvas { display: block; }
        .screen-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.95); color: white; z-index: 1000;
        }
        h1 { font-size: 50px; color: #f1c40f; text-shadow: 0 0 15px #f1c40f; }
        .btn {
            padding: 12px 40px; margin: 10px; font-size: 22px; cursor: pointer;
            background: #f1c40f; border: none; color: #000; border-radius: 30px;
            font-weight: bold; transition: 0.2s;
        }
        .btn:hover { background: #fff; transform: scale(1.1); }
        #stats-ui { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.6); padding: 12px; border-radius: 8px; z-index: 10; border: 1px solid #f1c40f; }
        #radar { position: absolute; top: 20px; right: 20px; width: 140px; height: 140px; border-radius: 50%; border: 3px solid #f1c40f; overflow: hidden; background: rgba(0,0,0,0.4); z-index: 10; }
        #hotbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; background: rgba(0,0,0,0.8); padding: 10px; border: 2px solid #fff; z-index: 10; }
        .slot { width: 45px; height: 45px; border: 2px solid #555; display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; }
        .slot.active { border-color: #f1c40f; box-shadow: 0 0 10px #f1c40f; }
    </style>
</head>
<body>

    <div id="main-menu" class="screen-overlay">
        <h1>未來的 Super Human</h1>
        <button class="btn" onclick="startGame(1)">開始遊戲</button>
        <button class="btn" style="background:#3498db; color:white;" onclick="openMultiMenu()">多人連線</button>
    </div>

    <div id="multi-menu" class="screen-overlay" style="display:none;">
        <h1>多人連線設定</h1>
        <p>隊友/玩家總數 (2-10)：<input type="number" id="p-count" min="2" max="10" value="5" style="font-size:20px; width:60px;"></p>
        <button class="btn" onclick="startGame(document.getElementById('p-count').value)">進入世界</button>
    </div>

    <div id="esc-menu" class="screen-overlay" style="display:none;">
        <h1>遊戲暫停</h1>
        <button class="btn" style="background:#e74c3c; color:white;" onclick="location.reload()">離開遊戲</button>
        <p>按 ESC 返回</p>
    </div>

    <div id="stats-ui" style="display:none;">
        ❤️ 血量: <span id="hp">100</span> | 🕒 <span id="clock">07:00</span><br>
        📍 座標: <span id="pos">0, 0</span>
    </div>
    <div id="radar" style="display:none;"><canvas id="radarCanvas"></canvas></div>
    <div id="hotbar" style="display:none;">
        <div id="slot1" class="slot active">草</div>
        <div id="slot2" class="slot">土</div>
        <div id="slot3" class="slot">石</div>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const rCanvas = document.getElementById('radarCanvas');
const rCtx = rCanvas.getContext('2d');

let isPlaying = false, isPaused = false, gameTicks = 420;
let cameraX = 0, worldData = {}, selectedBlock = 2;
const tileSize = 32;
const colors = { 1: '#8B4513', 2: '#228B22', 3: '#666' };

let player = { x: 300, y: 0, w: 24, h: 44, vx: 0, vy: 0, hp: 100, grounded: false };
let teammates = [], villagers = [], animals = [], monsters = [];

function openMultiMenu() {
    document.getElementById('main-menu').style.display = 'none';
    document.getElementById('multi-menu').style.display = 'flex';
}

function startGame(count) {
    document.querySelectorAll('.screen-overlay').forEach(s => s.style.display = 'none');
    document.getElementById('stats-ui').style.display = 'block';
    document.getElementById('hotbar').style.display = 'flex';
    document.getElementById('radar').style.display = 'block';
    
    for(let i = 0; i < count - 1; i++) {
        teammates.push({ x: 300 + (i*40), y: -50, w: 24, h: 44, vx: 0, vy: 0, grounded: false, state: 'idle', timer: 0 });
    }
    for(let i=0; i<5; i++) villagers.push({ x: 1500 + i*150, y: -50, w: 24, h: 44, vx: 0, vy: 0, grounded: false });
    for(let i=0; i<8; i++) animals.push({ x: 600 + i*300, y: -50, w: 20, h: 20, vx: 0, vy: 0, grounded: false });

    isPlaying = true; resize(); loop();
}

function getBlock(x, y) {
    const key = `${Math.floor(x)}_${Math.floor(y)}`;
    if (worldData[key] !== undefined) return worldData[key];
    let groundLevel = Math.floor(12 + Math.sin(x * 0.1) * 3);
    return y < groundLevel ? 0 : (y === groundLevel ? 2 : 1);
}

function applyPhysics(obj, jumpPower = -11) {
    obj.vy += 0.6;
    let nextX = obj.x + obj.vx;
    let gridX = (obj.vx > 0) ? Math.floor((nextX + obj.w) / tileSize) : Math.floor(nextX / tileSize);
    let topY = Math.floor(obj.y / tileSize), botY = Math.floor((obj.y + obj.h - 2) / tileSize);

    if (getBlock(gridX, topY) === 0 && getBlock(gridX, botY) === 0) {
        obj.x = nextX;
    } else {
        if (obj.grounded) obj.vy = jumpPower; // 撞牆自動跳
        obj.vx *= -1; // 撞牆回頭
    }

    obj.y += obj.vy;
    obj.grounded = false;
    let lX = Math.floor(obj.x / tileSize), rX = Math.floor((obj.x + obj.w - 1) / tileSize), fY = Math.floor((obj.y + obj.h) / tileSize);
    if (getBlock(lX, fY) !== 0 || getBlock(rX, fY) !== 0) {
        obj.y = fY * tileSize - obj.h; obj.vy = 0; obj.grounded = true;
    }
}

let keys = {};
window.onkeydown = (e) => {
    if (e.code === 'Escape' && isPlaying) {
        isPaused = !isPaused;
        document.getElementById('esc-menu').style.display = isPaused ? 'flex' : 'none';
    }
    keys[e.code] = true;
    if (e.key === '1') selectedBlock = 2;
    if (e.key === '2') selectedBlock = 1;
    if (e.key === '3') selectedBlock = 3;
};
window.onkeyup = (e) => keys[e.code] = false;

canvas.onmousedown = (e) => {
    if (!isPlaying || isPaused) return;
    const rect = canvas.getBoundingClientRect();
    const gx = Math.floor((e.clientX - rect.left + cameraX) / tileSize);
    const gy = Math.floor((e.clientY - rect.top) / tileSize);
    if (e.button === 0) worldData[`${gx}_${gy}`] = 0;
    if (e.button === 2) worldData[`${gx}_${gy}`] = selectedBlock;
};
canvas.oncontextmenu = e => e.preventDefault();

function loop() {
    if (!isPlaying) return;
    if (!isPaused) {
        gameTicks = (gameTicks + 0.5) % 1440;
        player.vx = (keys['KeyA'] ? -4.5 : keys['KeyD'] ? 4.5 : 0);
        if (keys['Space'] && player.grounded) player.vy = -12;
        applyPhysics(player);
        cameraX = player.x - canvas.width / 2;

        // 隊友自由 AI
        teammates.forEach(tm => {
            tm.timer--;
            if (tm.timer <= 0) {
                let distToPlayer = player.x - tm.x;
                if (Math.abs(distToPlayer) > 600) { // 太遠才跟隨
                    tm.state = 'follow';
                    tm.vx = distToPlayer > 0 ? 3 : -3;
                } else { // 自由遊蕩
                    tm.state = 'wander';
                    tm.vx = (Math.random() - 0.5) * 3;
                    tm.timer = 60 + Math.random() * 120;
                }
            }
            applyPhysics(tm);
        });

        // 村民與動物 AI
        [...villagers, ...animals].forEach(en => {
            if (Math.random() < 0.01 && en.grounded) en.vx = (Math.random()-0.5)*2;
            applyPhysics(en);
        });

        // 怪物 AI (僅夜晚)
        let hour = Math.floor(gameTicks / 60);
        if ((hour >= 18 || hour < 6) && Math.random() < 0.01) monsters.push({ x: player.x + 800, y: -50, w: 24, h: 44, vx: -2, vy: 0, hp: 20 });
