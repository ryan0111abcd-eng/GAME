<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>未來的 Super Human - 星球圓形版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; user-select: none; }
        canvas { display: block; }
        .screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.9); color: white; z-index: 1000;
        }
        .btn {
            padding: 15px 50px; margin: 10px; font-size: 24px; cursor: pointer;
            background: #f1c40f; border: none; color: #000; border-radius: 40px;
            font-weight: bold;
        }
        #ui-bar { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; display: none; z-index: 100; border: 1px solid #f1c40f; }
    </style>
</head>
<body>

    <div id="start-screen" class="screen">
        <h1>未來的 Super Human: Planet</h1>
        <button class="btn" onclick="preStart()">開始探索星球</button>
    </div>

    <div id="ui-bar">
        ❤️ 血量: <span id="hp-val">100</span> | 🕒 <span id="time-val">12:00</span><br>
        🌍 星球位置: <span id="pos-val">0</span>
    </div>

    <canvas id="gameCanvas"></canvas>

    isStarted = true;

    // 生成地形：gy >= 0 為地殼

    if (gy === surface) return 2; // 草地
    if (gy < surface + 5) return 1; // 土層
    return 3; // 岩石
}
