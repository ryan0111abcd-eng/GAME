<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>SUPER HUMAN 2026 - GAME</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        .ui { position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #1a1a1a, #000); color: #f1c40f; }
        .card { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; border: 1px solid #f1c40f55; text-align: center; width: 320px; }
        .btn { width: 100%; height: 55px; margin: 10px 0; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 12px; border: 2px solid #fff; transition: 0.1s; }
        .btn-main { background: #f1c40f; color: #000; box-shadow: 0 5px 0 #b8860b; }
        .btn-buy { background: #2ecc71; color: #fff; border: none; box-shadow: 0 5px 0 #27ae60; }
        .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #666; }
        .in { width: 90%; padding: 12px; font-size: 20px; margin-bottom: 15px; text-align: center; border-radius: 8px; border: 2px solid #f1c40f; background: #000; color: #fff; }
        #hud { position: fixed; top: 15px; left: 15px; z-index: 5; color: #fff; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; border: 1px solid #f1c40f; display: none; pointer-events: none; }
        canvas { display: block; visibility: hidden; }
    </style>
</head>
<body>

    <div id="p-auth" class="ui">
        <div class="card">
            <h1>SUPER HUMAN 2026</h1>
            <input type="password" id="pw" class="in" placeholder="在此貼上金鑰">
            <button class="btn btn-main" onclick="check()">驗證授權</button>
            <button class="btn btn-buy" onclick="window.open('buy.html','_blank')">🛒 前往購買金鑰</button>
        </div>
    </div>

    <div id="p-conn" class="ui" style="display:none;">
        <h1 style="color:#2ecc71;">激活成功</h1>
        <button class="btn btn-main" onclick="start(1)">👤 單人模式</button>
        <button class="btn btn-main" onclick="start(15)">👥 多人小隊 (15人)</button>
    </div>

    <div id="hud">❤️ HP: <span id="hp">100</span> | 📍 海拔: <span id="alt">0</span>m | ⚔️ [K] 攻擊</div>
    <canvas id="g"></canvas>

<script>
    const KEY = 'ryan0111407';
    var live = false, world = {}, ents = [], keys = {}, ticks = 600, T = 32;
    var p = { x: -1500, y: 0, w: 22, h: 42, vx: 0, vy: 0, hp: 100, max: 100, atkCd: 0 };

    function check() {
        if(document.getElementById('pw').value.trim() === KEY) {
            document.getElementById('p-auth').style.display='none';
            document.getElementById('p-conn').style.display='flex';
        } else alert("金鑰錯誤！");
    }

    function getB(gx, gy) {
        if(world[gx+'_'+gy]) return world[gx+'_'+gy];
        var agx = Math.abs(gx), f;
        if(agx < 65) f = Math.floor(150 - (56 * Math.exp(-Math.pow(gx/35, 2)))) + Math.floor((gx%4)/3);
        else f = Math.floor(138 + Math.sin(gx*0.2)*15 + Math.cos(gx*0.1)*10);
        return (gy < f) ? 0 : (gy === f ? (gy < 105 ? 7 : 2) : (gy <= f+5 ? 3 : 1));
    }

    function start(n) {
        document.getElementById('p-conn').style.display='none';
        document.getElementById('hud').style.display='block';
        var c = document.getElementById('g');
        c.width = window.innerWidth; c.height = window.innerHeight;
        c.style.visibility = 'visible';
        let sy = 0; while(getB(Math.floor(p.x/T), Math.floor(sy/T)) === 0) sy += T;
        p.y = sy - 160;
        for(var i=0; i<n-1; i++) ents.push({x:p.x+(i-7)*50, y:p.y, w:22, h:42, vx:0, vy:0, hp:100, max:100, dir:1});
        live = true; loop();
    }

    window.onkeydown = e => { 
        if(e.code === 'KeyK' && p.atkCd <= 0) {
            p.atkCd = 12;
            ents.forEach(e => { if(Math.hypot(e.x-p.x, e.y-p.y) < 100) { e.hp-=25; e.vx=(e.x>p.x?15:-15); e.vy=-8; }});
        }
        keys[e.code] = true; 
    };
    window.onkeyup = e => keys[e.code] = false;

    function loop() {
        if(!live) return;
        var c = document.getElementById('g'), ctx = c.getContext('2d');
        ticks = (ticks + 0.075) % 1440;
        if(p.atkCd > 0) p.atkCd--;

        [p].concat(ents).forEach(e => {
            e.vy += 0.8; e.y += e.vy; e.x += (e.vx || 0); if(e.vx) e.vx *= 0.8;
            var hit = () => getB(Math.floor(e.x/T), Math.floor(e.y/T))>0 || getB(Math.floor((e.x+21)/T), Math.floor((e.y+41)/T))>0;
            if(hit()) { while(hit()) e.y -= 0.5; e.vy = 0; e.gr = true; } else e.gr = false;
            if(e === p) {
                var dx = (keys['KeyD']?7:0) - (keys['KeyA']?7:0);
                if(dx) { p.x += dx; if(hit()) p.x -= dx; }
                if(keys['Space'] && p.gr) p.vy = -14;
            } else {
                if(Math.random()<0.02) e.dir *= -1; e.x += e.dir*2;
                if(hit()) { e.x -= e.dir*2; if(e.gr) e.vy = -10; }
            }
        });

        ctx.fillStyle = (ticks > 1050 || ticks < 350) ? '#050510' : '#87ceeb';
        ctx.fillRect(0, 0, c.width, c.height);
        var cx = p.x - c.width/2, cy = p.y - c.height/2;
        var clrs = ["","#7f8c8d","#2ecc71","#795548","#f1c40f","#5d4037","#27ae60","#ecf0f1","#3498db"];
        for(var x=Math.floor(cx/T); x<=Math.ceil((cx+c.width)/T); x++) {
            for(var y=Math.floor(cy/T); y<=Math.ceil((cy+c.height)/T); y++) {
                var b = getB(x, y); if(b) { ctx.fillStyle = clrs[b]; ctx.fillRect(x*T-cx, y*T-cy, T, T); }
            }
        }
        [p].concat(ents).forEach(e => {
            if(e.hp <= 0) return;
            ctx.fillStyle = (e===p?'#e67e22':'#3498db'); ctx.fillRect(e.x-cx, e.y-cy, e.w, e.h);
            ctx.fillStyle="#333"; ctx.fillRect(e.x-cx-4, e.y-cy-12, 30, 5);
            ctx.fillStyle="#2ecc71"; ctx.fillRect(e.x-cx-4, e.y-cy-12, 30*(e.hp/e.max), 5);
        });
        document.getElementById('hp').innerText = Math.max(0, Math.floor(p.hp));
        document.getElementById('alt').innerText = Math.floor(Math.abs(p.y/T - 150)*32);
        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
