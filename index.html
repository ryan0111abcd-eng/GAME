<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>未來的 Super Human - 互動修復版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: '微軟正黑體', sans-serif; }
        canvas { display: block; }
        
        /* 介面樣式 */
        .overlay {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; color: white;
        }
        
        h1 { color: #f1c40f; font-size: 50px; text-shadow: 0 0 20px #f1c40f; margin-bottom: 20px; }
        .btn {
            padding: 15px 50px; font-size: 22px; background: #f1c40f; color: #000;
            border: none; border-radius: 50px; cursor: pointer; font-weight: bold;
            margin: 15px; transition: 0.3s;
        }
        .btn:hover { transform: scale(1.1); background: #fff; }
        
        #ui { 
            position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.7); 
            color: #fff; padding: 15px; border-radius: 10px; display: none;
            border: 1px solid #555; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="main-menu" class="overlay">
        <h1>未來的 Super Human</h1>
        <button class="btn" onclick="initGame(1)">開始遊戲</button>
        <button class="btn" style="background:#3498db" onclick="showMultiSetup()">多人連線</button>
    </div>

    <div id="multi-setup" class="overlay" style="display:none;">
        <h1>多人連線設定</h1>
        <p style="font-size:20px;">選擇遊戲人數: <span id="p-val" style="color:#f1c40f; font-weight:bold;">5</span></p>
        <input type="range" id="p-slider" min="2" max="10" value="5" 
               oninput="document.getElementById('p-val').innerText=this.value" 
               style="width:250px; margin: 20px;">
        <button class="btn" onclick="initGame(document.getElementById('p-slider').value)">進入多人世界</button>
        <button onclick="location.reload()" style="background:none; border:none; color:#aaa; cursor:pointer;">取消返回</button>
    </div>

    <div id="ui">
        <b>🌍 時間：<span id="clock" style="color:#f1c40f">07:00</span></b><br>
        ❤️ 生命：<span id="hp">100</span> | 👥 隊友：<span id="teammate-count">0</span><br>
        <small>A/D 移動 | 空白 跳躍 | 左鍵 攻擊/挖塊</small>
    </div>
    
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let gameActive = false;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    function showMultiSetup() {
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('multi-setup').style.display = 'flex';
    }

    function initGame(numPlayers) {
        // 隱藏所有選單
        document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none');
        document.getElementById('ui').style.display = 'block';
        
        // 生成隊友 (黃色方塊)
        const teamSize = parseInt(numPlayers) - 1;
        document.getElementById('teammate-count').innerText = teamSize;
        for(let i=0; i < teamSize; i++) {
            teammates.push({ x: 350 + i*50, y: -250, w: 20, h: 40, vx: 0, vy: 0, speed: 3.5 });
        }
        
        gameActive = true;
    }

    const tileSize = 32;
    let cameraX = 0;
    let worldData = {}; 
    let gameTime = 420; // 07:00
    let atkTimer = 0;
    let keys = {};

    let player = { x: 300, y: -300, w: 22, h: 42, vx: 0, vy: 0, speed: 4, jump: -11, grounded: false, hp: 100 };
    let teammates = [], enemies = [], animals = [], villagers = [];

    // 地形生成
    function getBlock(x, y) {
        const key = `${x}_${y}`;
        if (worldData[key] !== undefined) return worldData[key];
        let ground = Math.floor(15 + Math.sin(x * 0.1) * 3);
        if (y < ground) {
            if (y === ground - 1 && x % 60 === 0) { // 小屋與村民
                for(let i=0; i<5; i++) for(let j=0; j<4; j++) if(i===0||i===4||j===3) worldData[`${x+i}_${y-j}`] = 4;
                villagers.push({ x: (x+2)*tileSize, y: (y-1)*tileSize, w: 20, h: 40, vx: 0.4 });
            }
            if (y === ground - 1 && Math.abs(Math.sin(x)) > 0.98) return 4; // 樹
            return 0;
        }
        return (y === ground) ? 2 : 1; 
    }

    // 互動
    canvas.onmousedown = (e) => {
        if (!gameActive) return;
        const gx = Math.floor((e.clientX + cameraX) / tileSize);
        const gy = Math.floor(e.clientY / tileSize);
        if (e.button === 0) { 
            atkTimer = 10;
            enemies.forEach(en => { if (Math.hypot(en.x - (gx*tileSize), en.y - (gy*tileSize)) < 60) en.hp -= 25; });
            worldData[`${gx}_${gy}`] = 0;
        } else if (e.button === 2) { worldData[`${gx}_${gy}`] = 4; }
    };
    canvas.oncontextmenu = (e) => e.preventDefault();
