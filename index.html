<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Super Human 2026 - Final Fix</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        
        /* 選單層：強制置頂 */
        .overlay { 
            position: fixed; inset: 0; z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: #111; color: #f1c40f; 
        }

        .btn { 
            padding: 20px 60px; font-size: 30px; cursor: pointer; margin: 15px; 
            background: #f1c40f; border: 4px solid #fff; border-radius: 15px; 
            font-weight: bold; color: #000; box-shadow: 0 8px 0 #b8860b; 
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #b8860b; }

        /* 遊戲介面 */
        #hud { position: fixed; top: 15px; left: 15px; z-index: 500; color: white; background: rgba(0,0,0,0.8); padding: 15px; border: 2px solid #f1c40f; border-radius: 10px; display: none; pointer-events: none; }
        #radar { position: fixed; top: 15px; right: 15px; width: 140px; height: 140px; border: 3px solid #fff; border-radius: 50%; z-index: 500; display: none; background: rgba(0,0,0,0.5); overflow: hidden; }
        
        canvas#gCvs { display: none; position: absolute; top: 0; left: 0; z-index: 10; }
        #rain-fx { position: fixed; inset: 0; pointer-events: none; z-index: 50; background: rgba(40, 40, 80, 0.25); display: none; }
    </style>
</head>
<body>

    <div id="step1" class="overlay">
        <h1 style="font-size: 50px;">SUPER HUMAN: 守護者</h1>
        <button class="btn" onclick="document.getElementById('step1').style.display='none'; window.squadSize=1; showIntro();">👤 單人冒險</button>
        <button class="btn" onclick="document.getElementById('step1').style.display='none'; document.getElementById('step2').style.display='flex';" style="background:#3498db; color:white;">👥 小隊連線</button>
    </div>

    <div id="step2" class="overlay" style="display:none;">
        <h1>選擇人數</h1>
        <h2 id="p-lab">5 人</h2>
        <input type="range" min="2" max="10" value="5" oninput="document.getElementById('p-lab').innerText=this.value+' 人'" id="p-slider" style="width:300px; height:30px;">
        <button class="btn" onclick="document.getElementById('step2').style.display='none'; window.squadSize=document.getElementById('p-slider').value; showIntro();">下一步</button>
    </div>

    <div id="step3" class="overlay" style="display:none;">
        <div style="background:#2c3e50; padding:25px; border-radius:15px; border:2px solid #f1c40f; max-width:400px; text-align:left; color:white;">
            <h2 style="color:#f1c40f; text-align:center;">📜 任務說明單</h2>
            ● <b>WASD</b> 移動 | <b>左鍵</b> 挖 | <b>右鍵</b> 放<br>
            ● <b>K</b> 攻擊 | <b>Q</b> 回血 | <b>ESC</b> 重啟<br>
            ● <b>權重</b>：丘陵70%、古蹟65%、下雨40%<br>
            ● <b>守護 AI</b>：你被打時隊友會衝過來救援！<br>
            <button class="btn" onclick="startNow()" style="width:100%; margin-top:20px;">進入世界</button>
        </div>
    </div>

    <div id="hud">❤️ HP: <span id="hp">100</span> | 📍 <span id="pos">0,0</span><br>⏰ <span id="tm">12:00</span> | ⛈️ <span id="wt">晴天</span></div>
    <div id="radar"><canvas id="rCvs" width="140" height="140"></canvas></div>
    <div id="rain-fx"></div>
    <canvas id="gCvs"></canvas>

<script>
    // 全域變數
    const cvs = document.getElementById('gCvs'), ctx = cvs.getContext('2d');
    const rcvs = document.getElementById('rCvs'), rctx = rcvs.getContext('2d');
    let isLive = false, world = {}, keys = {}, entities = [], ticks = 600;
    let p = { x: 0, y: -200, w: 22, h: 42, vx: 0, vy: 0, hp: 100, maxHp: 100, ground: false, lastHitBy: null };
    const TILE = 32;

    function showIntro() {
        document.getElementById('step3').style.display = 'flex';
    }

    function startNow() {
        document.getElementById('step3').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
        document.getElementById('radar').style.display = 'block';
        cvs.style.display = 'block';
        cvs.width = window.innerWidth; cvs.height = window.innerHeight;

        // 40% 下雨機率
        if(Math.random() < 0.4) {
            document.getElementById('rain-fx').style.display = 'block';
            document.getElementById('wt').innerText = "下雨";
        }

        // 生成 AI
        const size = window.squadSize || 1;
        for(let i=0; i<size-1; i++) spawn('ally', (Math.random()-0.5)*600);
        for(let i=0; i<5; i++) spawn('npc', (Math.random()-0.5)*2000);
        for(let i=0; i<4; i++) spawn('pig', (Math.random()-0.5)*2000);

        isLive = true; loop();
    }

    function spawn(type, x) {
        let h = (type==='pig')?30:100;
        entities.push({ type, x, y: -400, w: 22, h: 42, vx: 0, vy: 0, hp: h, maxHp: h, dir: 1 });
    }

    // 地形 (精確權重)
    function getBiome(gx) {
        let x = Math.abs(gx);
        let h = 35, c = "#2ecc71", amp = 1;
        if (x % 100 < 20) { c = "#e67e22"; h=32; amp=0.5; } // 台地 20%
        if (x % 100 < 70) { c = "#27ae60"; h=28; amp=6; }   // 丘陵 70%
        if (x % 100 < 50) { c = "#95a5a6"; h=15; amp=14; }  // 山地 50%
        let ruins = (x % 100 < 65); // 古蹟 65%
        return { h, c, amp, ruins };
    }

    function getB(gx, gy) {
        if (world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
        let b = getBiome(gx);
        let h = Math.floor(b.h + Math.sin(gx * 0.1) * b.amp);
        if (b.ruins && gy < h && gy > h-4 && Math.random() < 0.08) return 3;
        return gy < h ? 0 : (gy === h ? 2 : 1);
    }

    function check(x, y) {
        for (let i = Math.floor(x/TILE); i <= Math.floor((x+22)/TILE); i++) {
            for (let j = Math.floor(y/TILE); j <= Math.floor((y+42)/TILE); j++) {
                if(getB(i, j) > 0) return true;
            }
        }
        return false;
    }

    function doAtk(o, t = null) {
        entities.concat(p).forEach(e => {
            if(e !== o && Math.abs(e.x - o.x) < 70) {
                if(t && e !== t) return;
                e.hp -= 20; e.vx = (e.x > o.x ? 12 : -12);
                if(e === p) p.lastHitBy = o; 
            }
        });
    }

    // 事件監聽
    window.onkeydown = e => { 
        if(e.code==='Escape') location.reload();
        keys[e.code]=true; 
        if(e.code==='KeyK') doAtk(p);
        if(e.code==='KeyQ') p.hp=Math.min(100, p.hp+20);
    };
    window.onkeyup = e => keys[e.code]=false;
    window.onmousedown = e => {
        if(!isLive) return;
        let gx = Math.floor((e.clientX + (p.x - cvs.width/2))/TILE);
        let gy = Math.floor((e.clientY + (p.y - cvs.height/2))/TILE);
        if(e.button === 0) world[gx+'_'+gy] = 0; else world[gx+'_'+gy] = 3;
    };

    function loop() {
        if(!isLive) return;
        if(p.hp <= 0) { location.reload(); return; }

        ticks = (ticks + 0.4) % 1440;
        let night = ticks > 1050 || ticks < 350;

        p.vy += 0.8; p.y += p.vy;
        if(check(p.x, p.y)) {
            if(p.vy > 0) { while(check(p.x, p.y)) p.y -= 0.5; p.ground = true; }
            else { while(check(p.x, p.y)) p.y += 0.5; }
            p.vy = 0;
        } else p.ground = false;

        let dx = (keys['KeyD']?5:0) - (keys['KeyA']?5:0);
        if(dx !== 0) { p.x += dx; if(check(p.x, p.y)) p.x -= dx; }
        if(keys['Space'] && p.ground) p.vy = -14;

        entities.forEach(e => {
            e.vy += 0.8; e.y += e.vy;
            if(check(e.x, e.y)) { if(e.vy > 0) while(check(e.x, e.y)) e.y -= 0.5; e.vy = 0; }
            if(e.type === 'ally') {
                if(p.lastHitBy && p.lastHitBy.hp > 0) { // 守護模式
                    e.x += (p.lastHitBy.x > e.x ? 4 : -4);
                    if(Math.abs(e.x - p.lastHitBy.x) < 60) doAtk(e, p.lastHitBy);
                } else {
                    if(Math.abs(p.x - e.x) > 180) e.x += (p.x > e.x ? 2.5 : -2.5);
                    if(Math.random() < 0.005) world[Math.floor(e.x/TILE)+'_'+(Math.floor(e.y/TILE)+2)] = 0;
                    entities.forEach(m => { if(m.type==='mob' && Math.abs(m.x-e.x)<100) doAtk(e); });
                }
            } else if(e.type === 'mob') {
                e.x += (p.x > e.x ? 2.3 : -2.3);
                if(Math.abs(e.x - p.x) < 30) p.hp -= 0.2;
            } else {
                if(Math.random()<0.02) e.dir = (Math.random()-0.5)*3; e.x += e.dir;
            }
        });
        if(night && Math.random() < 0.015) spawn('mob', p.x + (Math.random()>0.5?600:-600));
        entities = entities.filter(e => e.hp > 0);

        // UI
        document.getElementById('hp').innerText = Math.ceil(p.hp);
        document.getElementById('pos').innerText = Math.floor(p.x/TILE) + "," + Math.floor(p.y/TILE);
        let hr = Math.floor(ticks/60).toString().padStart(2,'0'), mn = Math.floor(ticks%60).toString().padStart(2,'0');
        document.getElementById('tm').innerText = `${hr}:${mn}`;

        draw();
        requestAnimationFrame(loop);
    }

    function draw() {
        ctx.fillStyle = (ticks > 1050 || ticks < 350) ? '#0a0a20' : '#87ceeb';
        ctx.fillRect(0,0,cvs.width,cvs.height);
        let cx = p.x - cvs.width/2, cy = p.y - cvs.height/2;

        for(let x=Math.floor(cx/TILE); x<=Math.ceil((cx+cvs.width)/TILE); x++) {
            let bI = getBiome(x);
            for(let y=Math.floor(cy/TILE); y<=Math.ceil((cy+cvs.height)/TILE); y++) {
                let b = getB(x, y);
                if(b > 0) {
                    ctx.fillStyle = b===2 ? bI.c : (b===1 ? '#795548' : '#bdc3c7');
                    ctx.fillRect(x*TILE-cx, y*TILE-cy, TILE+0.5, TILE+0.5);
                }
            }
        }
        entities.concat(p).forEach(e => {
            let color = e===p?'#e67e22':(e.type==='ally'?'#3498db':(e.type==='mob'?'#2ecc71':(e.type==='npc'?'#f1c40f':'#ff9ff3')));
            ctx.fillStyle = color; ctx.fillRect(e.x-cx, e.y-cy, e.w, e.h);
            ctx.fillStyle='red'; ctx.fillRect(e.x-cx, e.y-cy-10, e.w, 4);
            ctx.fillStyle='lime'; ctx.fillRect(e.x-cx, e.y-cy-10, e.w*(e.hp/e.maxHp), 4);
        });
        rctx.fillStyle='#000'; rctx.fillRect(0,0,140,140);
        rctx.save(); rctx.translate(70, 70);
        entities.concat(p).forEach(e => {
            rctx.fillStyle = e===p?'#fff':(e.type==='ally'?'#3498db':'#e74c3c');
            let dx = (e.x-p.x)*0.1, dy = (e.y-p.y)*0.1;
            if(dx*dx+dy*dy < 65*65) { rctx.beginPath(); rctx.arc(dx, dy, 3, 0, 7); rctx.fill(); }
        });
        rctx.restore();
    }
</script>
</body>
</html>
