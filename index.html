<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Super Human - 座標觸發版</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        canvas { display: block; cursor: crosshair; }
        #info { position: fixed; top: 10px; width: 100%; text-align: center; color: #f1c40f; font-family: sans-serif; pointer-events: none; z-index: 10; font-size: 20px; }
    </style>
</head>
<body>

    <div id="info">點擊畫面中央的【黃色方塊】來開始遊戲</div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let mode = "MENU"; // MENU, SELECT, PLAY
let isRunning = false;
let ticks = 420, world = {}, camX = 0, camY = 0;
const TILE = 32, COLORS = { 1: '#8B4513', 2: '#228B22', 3: '#666', 4: '#cd853f' };
let p = { x: 500, y: 0, w: 22, h: 42, vx: 0, vy: 0, hp: 100, ground: false, atkTimer: 0 };
let agents = [], keys = {}, curBlock = 1, playerCount = 1;

// === 核心：偵測滑鼠座標來點擊 ===
canvas.addEventListener('mousedown', (e) => {
    const mx = e.clientX;
    const my = e.clientY;
    const cw = canvas.width / 2;
    const ch = canvas.height / 2;

    if (mode === "MENU") {
        // 偵測是否點擊「單人」(中間偏上)
        if (mx > cw - 100 && mx < cw + 100 && my > ch - 60 && my < ch - 10) {
            boot(1);
        }
        // 偵測是否點擊「多人」(中間偏下)
        if (mx > cw - 100 && mx < cw + 100 && my > ch + 10 && my < ch + 60) {
            mode = "SELECT";
        }
    } else if (mode === "SELECT") {
        // 選擇人數 2, 5, 10
        if (my > ch - 20 && my < ch + 20) {
            if (mx > cw - 90 && mx < cw - 40) playerCount = 2;
            if (mx > cw - 25 && mx < cw + 25) playerCount = 5;
            if (mx > cw + 40 && mx < cw + 90) playerCount = 10;
        }
        // 點擊「開始」
        if (mx > cw - 50 && mx < cw + 50 && my > ch + 50 && my < ch + 90) {
            boot(playerCount);
        }
    } else if (mode === "PLAY") {
        // 遊戲中的建築邏輯
        let gx = Math.floor((mx + camX) / TILE), gy = Math.floor((my + camY) / TILE);
        if(e.button === 0) world[gx+'_'+gy] = 0; // 左鍵挖
        if(e.button === 2) { if(getB(gx, gy) === 0) world[gx+'_'+gy] = curBlock; } // 右鍵蓋
    }
});

function boot(num) {
    document.getElementById('info').style.display = 'none';
    p.y = getGY(p.x/TILE)*TILE - 150;
    if(num > 1) {
        for(let i=0; i<num-1; i++) {
            agents.push({x:600+i*180, y:-200, w:22, h:42, vx:0, vy:0, hp:100, type:['ally','vil','ani'][i%3], dir:1, state:'idle', sTimer:50});
        }
    }
    mode = "PLAY";
    isRunning = true;
}

// 基礎功能
function getGY(gx) { return Math.floor(35 + Math.sin(gx*0.05)*12 + Math.cos(gx*0.02)*15); }
function getB(gx, gy) {
    if(world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
    let fY = getGY(gx); return gy < fY ? 0 : (gy === fY ? 2 : 1);
}

window.onkeydown = e => {
    keys[e.code] = true;
    if(e.code === 'KeyK') p.atkTimer = 10;
    if(['1','2','3','4'].includes(e.key)) curBlock = parseInt(e.key);
};
window.onkeyup = e => keys[e.code] = false;
window.oncontextmenu = (e) => e.preventDefault();

function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    if (mode === "MENU") {
        ctx.fillStyle = "#f1c40f"; ctx.fillRect(canvas.width/2-100, canvas.height/2-60, 200, 50);
        ctx.fillStyle = "#3498db"; ctx.fillRect(canvas.width/2-100, canvas.height/2+10, 200, 50);
        ctx.fillStyle = "#000"; ctx.font = "20px Arial";
        ctx.fillText("SINGLE PLAYER", canvas.width/2-75, canvas.height/2-28);
        ctx.fillStyle = "#fff"; ctx.fillText("MULTI PLAYER", canvas.width/2-70, canvas.height/2+42);
    } else if (mode === "SELECT") {
        ctx.fillStyle = "#fff"; ctx.font = "24px Arial"; ctx.fillText("Choose Players: 2  5  10", canvas.width/2-130, canvas.height/2);
        ctx.fillStyle = "#f1c40f"; ctx.fillRect(canvas.width/2-50, canvas.height/2+50, 100, 40);
        ctx.fillStyle = "#000"; ctx.fillText("START", canvas.width/2-40, canvas.height/2+78);
    } else if (mode === "PLAY") {
        update();
        render();
    }
    requestAnimationFrame(loop);
}

function update() {
    // 物理運算
    let o = p;
    o.vx = (keys['KeyA'] ? -5 : keys['KeyD'] ? 5 : 0);
    if((keys['Space'] || keys['KeyW']) && o.ground) o.vy = -12;
    if(o.atkTimer > 0) o.atkTimer--;
    o.vy += 0.7;
