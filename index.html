<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>SUPER HUMAN 2026 - ULTIMATE STABLE</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', monospace; user-select: none; }
        .page { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #050505; color: #f1c40f; text-align: center; }
        .btn { padding: 12px 30px; font-size: 18px; cursor: pointer; margin: 8px; background: #f1c40f; border: 3px solid #fff; border-radius: 8px; font-weight: bold; color: #000; box-shadow: 0 4px 0 #b8860b; transition: 0.1s; width: 280px; }
        .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #b8860b; }
        .in-box { padding: 12px; font-size: 22px; border: 3px solid #f1c40f; border-radius: 8px; background: #111; color: #fff; text-align: center; margin-bottom: 20px; width: 280px; }
        
        #esc-menu { position: fixed; inset: 0; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); }
        .menu-card { background: #111; padding: 25px; border: 2px solid #f1c40f; border-radius: 15px; display: flex; gap: 25px; align-items: flex-start; }
        .info-panel { text-align: left; color: #aaa; font-size: 14px; line-height: 1.8; width: 300px; }
        .info-panel b { color: #f1c40f; }

        #hud { position: fixed; top: 15px; left: 15px; z-index: 1000; color: white; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; border: 2px solid #f1c40f; display: none; pointer-events: none; font-size: 14px; }
        #minimap-ui { position: fixed; bottom: 20px; right: 20px; width: 160px; height: 120px; background: rgba(0,0,0,0.8); border: 2px solid #f1c40f; border-radius: 8px; z-index: 1000; display: none; overflow: hidden; }
        canvas#g { display: none; position: absolute; top: 0; left: 0; z-index: 1; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="p-auth" class="page" style="display:none;">
        <h1>ACCESS KEY REQUIRED</h1>
        <input type="password" id="pw" class="in-box" placeholder="********">
        <button class="btn" onclick="checkAuth()">VERIFY</button>
    </div>

    <div id="p-conn" class="page" style="display:none;">
        <h1>LINK ESTABLISHED</h1>
        <button class="btn" onclick="setConn(1)">👤 SINGLE-MODE</button>
        <button class="btn" onclick="setConn(0)">👥 SQUAD-MODE</button>
    </div>

    <div id="p-count" class="page" style="display:none;">
        <h1>SQUAD SIZE</h1>
        <h2 id="cnt-disp" style="font-size: 32px;">5 UNIT</h2>
        <input type="range" id="member-sld" min="2" max="15" value="5" oninput="document.getElementById('cnt-disp').innerText=this.value+' UNIT'" style="width:280px; accent-color:#f1c40f;">
        <button class="btn" onclick="toModeSel()">CONFIRM</button>
    </div>

    <div id="p-mode" class="page" style="display:none;">
        <h1>CHOOSE MISSION</h1>
        <button class="btn" onclick="prepareBrief('ARCH')">🏗️ 荒野建築</button>
        <button class="btn" onclick="prepareBrief('SURV')">🏔️ 高山生存</button>
        <button class="btn" onclick="prepareBrief('ZOMB')">🧟 殭屍圍城</button>
    </div>

    <div id="p-brief" class="page" style="display:none;">
        <h1>BRIEFING</h1>
        <div id="brief-text" style="font-size: 16px; color: #888; margin: 15px; border-left: 3px solid #f1c40f; padding-left: 15px; text-align: left;"></div>
        <button class="btn" onclick="startGame()">START</button>
    </div>

    <div id="esc-menu">
        <div class="menu-card">
            <div class="info-panel">
                <h2 style="color:#f1c40f; margin-top:0;">PAUSED</h2>
                <b>📍 COORDINATES:</b> <span id="st-pos" style="color:#fff;">0,0</span><br>
                <b>👥 ACTIVE UNIT:</b> <span id="st-squad" style="color:#fff;">0</span><br>
                <b>🏠 BUILD DATA:</b> <span id="st-build" style="color:#fff;">0 blocks</span><br>
                <b>💾 SAVE SIZE:</b> <span id="st-size" style="color:#fff;">0 KB</span><br>
                <b>⏱️ RUNTIME:</b> <span id="st-time" style="color:#fff;">0s</span><br>
                <b>🛠️ CURRENT MODE:</b> <span id="st-mode" style="color:#fff;">---</span><br>
                <hr style="border:0; border-top:1px solid #333; margin:15px 0;">
                <button class="btn" onclick="togglePause()" style="width:100%">RESUME (ESC)</button>
                <button class="btn" onclick="resetWorld()" style="width:100%; background:#d35400; color:#fff;">WIPE WORLD SAVE</button>
                <button class="btn" onclick="location.reload()" style="width:100%; background:#444; color:#fff;">EXIT SIMULATION</button>
            </div>
            <div style="text-align: center;">
                <b style="font-size: 12px; margin-bottom: 5px; display: block; color: #f1c40f;">AREA SCANNER (LARGE)</b>
                <canvas id="esc-mm-canvas" width="300" height="300" style="background:#000; border: 1px solid #333;"></canvas>
            </div>
        </div>
    </div>

    <div id="minimap-ui">
        <canvas id="mm-canvas" width="160" height="120"></canvas>
    </div>

    <div id="hud">
        🕒 TIME: <span id="tm-v">12:00</span> | ❤️ HP: <span id="p-hp-hud">100</span><br>
        🏗️ SLOT: <span id="cur-b" style="color:#f1c40f;">STONE(1)</span> | 📍 ALT: <span id="alt-v">0</span> m
    </div>
    <canvas id="g"></canvas>

<script>
    var live = false, paused = false, mapEnabled = true, world = {}, keys = {}, ents = [], ticks = 600, sSize = 1, mType = '', startTime = 0;
    var p = { x: 0, y: 0, w: 22, h: 42, vx: 0, vy: 0, hp: 100, max: 100, gr: false, dmgCd: 0, atkCd: 0, face: 1 };
    var T = 32, selB = 1, spawnTimer = 0, villagerTimer = 0;
    const AUTH_KEY = 'ryan0111407';

    window.onload = function() {
        var saved = localStorage.getItem('sh_save_v10');
        if(saved) world = JSON.parse(saved);
        if (localStorage.getItem('super_human_auth') === AUTH_KEY) document.getElementById('p-conn').style.display='flex';
        else document.getElementById('p-auth').style.display='flex';
    };

    function checkAuth() {
        if(document.getElementById('pw').value.trim() === AUTH_KEY) {
            localStorage.setItem('super_human_auth', AUTH_KEY);
            document.getElementById('p-auth').style.display='none'; document.getElementById('p-conn').style.display='flex';
        } else alert("INVALID KEY");
    }

    function setConn(n) { document.getElementById('p-conn').style.display='none'; if(n===1){sSize=1;document.getElementById('p-mode').style.display='flex';}else{document.getElementById('p-count').style.display='flex';} }
    function toModeSel() { sSize=parseInt(document.getElementById('member-sld').value); document.getElementById('p-count').style.display='none'; document.getElementById('p-mode').style.display='flex'; }
    function resetWorld() { if(confirm("DELETE EVERYTHING?")){world={};localStorage.setItem('sh_save_v10', "{}");location.reload();} }

    function prepareBrief(type) {
        mType = type;
        document.getElementById('p-mode').style.display='none'; document.getElementById('p-brief').style.display='flex';
        var d = document.getElementById('brief-text');
        var mName = (type==='ARCH'?'ARCH-BUILDER':(type==='SURV'?'PEAK-CLIMBER':'Z-SIEGE'));
        d.innerHTML = `● <b>GEOMETRY:</b> FRACTURED HASH V10. PLAINS ELIMINATED.<br>● <b>STRUCTURE:</b> 5-LAYER SOIL DEPTH.<br>● <b>PROTOCOL:</b> VILLAGER DROPS EVERY 10S.<br>● <b>MISSION:</b> ${mName}`;
    }

    // --- 地形 V10: 加入 Tan 函數產生的鋸齒波，杜絕平坦 ---
    function getB(gx, gy) {
        if(world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
        var absGx = Math.abs(gx);
        var base = Math.sin(gx * 0.45) * 10 + Math.cos(gx * 0.22) * 8;
        var sharp = Math.tan(Math.sin(gx * 0.5)) * 2; // 極度不穩定因子
        var jitter = (gx * 97 % 13) / 2; // 碎形雜湊
        var f = Math.floor(48 + base + sharp + jitter);
        
        if(absGx > 110) f += Math.floor((absGx-110)/3.2) * (18 + Math.cos(gx * 0.8)*5);
        if (f > 120) f = 120; 

        if (gy < f) return 0;
        if (gy === f) return (gy > 85) ? 7 : 2; 
        if (gy > f && gy <= f + 5) return 3; 
        return 1;
    }

    function togglePause() {
        paused = !paused;
        document.getElementById('esc-menu').style.display = paused ? 'flex' : 'none';
        if(paused) {
            document.getElementById('st-pos').innerText = `${Math.floor(p.x)}, ${Math.floor(p.y)}`;
            document.getElementById('st-squad').innerText = ents.filter(e=>e.type==='ally').length + 1;
            document.getElementById('st-build').innerText = Object.keys(world).length;
            var size = new Blob([JSON.stringify(world)]).size;
            document.getElementById('st-size').innerText = (size/1024).toFixed(2) + " KB";
            document.getElementById('st-time').innerText = Math.floor((Date.now() - startTime)/1000) + "s";
            document.getElementById('st-mode').innerText = mType;
            drawMap("esc-mm-canvas", 3);
        }
    }

    function drawMap(cid, scale) {
        var c = document.getElementById(cid), ctx = c.getContext('2d');
        if(!ctx) return;
        ctx.fillStyle = "#000"; ctx.fillRect(0,0,c.width,c.height);
        var pgx = Math.floor(p.x/T), pgy = Math.floor(p.y/T);
        var rx = Math.floor(c.width/(scale*2)), ry = Math.floor(c.height/(scale*2));
        for(var x=-rx; x<rx; x++){
            for(var y=-ry; y<ry; y++){
                var b = getB(pgx+x, pgy+y);
                if(b>0){ 
                    ctx.fillStyle = (b===7)?"#fff":(b===2)?"#2ecc71":(b===3)?"#795548":"#444";
                    ctx.fillRect((x+rx)*scale, (y+ry)*scale, scale, scale); 
                }
            }
        }
        ctx.fillStyle = "#f1c40f"; ctx.fillRect(rx*scale, ry*scale, 4, 4);
    }

    function startGame() {
        document.getElementById('p-brief').style.display='none';
        document.getElementById('hud').style.display='block';
        document.getElementById('minimap-ui').style.display='block';
        var cvs=document.getElementById('g'); cvs.style.display='block';
        cvs.width=window.innerWidth; cvs.height=window.innerHeight;
        let sy = 0; while(getB(0, Math.floor(sy/T)) === 0) sy += T;
        p.y = sy - 160;
        for(var i=0; i<sSize-1; i++) spawn('ally', p.x + (i*60)-120, p.y);
        startTime = Date.now();
        live = true;
        requestAnimationFrame(loop);
    }

    window.onkeydown = function(e) {
        if(e.code==='Escape' && live) togglePause();
        if(e.code==='KeyM' && live && !paused) { mapEnabled = !mapEnabled; document.getElementById('minimap-ui').style.display = mapEnabled ? 'block' : 'none'; }
        if(!live || paused) return;
        if(e.keyCode>=49 && e.keyCode<=56) selB = e.keyCode-48;
        keys[e.code] = true;
    };
    window.onkeyup = function(e) { keys[e.code] = false; };
    window.onmousedown = function(e) {
        if(!live || paused) return;
        var cvs = document.getElementById('g'), cx = p.x - cvs.width/2, cy = p.y - cvs.height/2;
        var gx = Math.floor((e.clientX + cx) / T), gy = Math.floor((e.clientY + cy) / T);
        if(e.button === 0) world[gx+'_'+gy] = 0; if(e.button === 2) world[gx+'_'+gy] = selB;
        localStorage.setItem('sh_save_v10', JSON.stringify(world));
    };

    function spawn(t, x, y) { ents.push({ type: t, x: x, y: y, w: 22, h: 42, vx: 0, vy: 0, hp: 100, max: 100, dir: 1, dmgCd: 0 }); }
    function check(x,y) { var gx=Math.floor(x/T), gy=Math.floor(y/T); return getB(gx, gy)>0 || getB(Math.floor((x+21)/T), Math.floor((y+41)/T))>0; }

    function loop() {
        if(live && !paused) {
            var cvs = document.getElementById('g'), ctx = cvs.getContext('2d');
            if(!ctx) return;
            ticks = (ticks + 0.05) % 1440;
            [p].concat(ents).forEach(e => {
                e.vy += 0.8; e.y += e.vy;
                if(check(e.x, e.y)) { while(check(e.x, e.y)) e.y -= 0.5; e.vy = 0; e.gr = true; } else e.gr = false;
                if(e === p) {
                    var dx = (keys['KeyD']?7:0) - (keys['KeyA']?7:0);
                    if(dx !== 0) { p.x += dx; if(check(p.x, p.y)) p.x -= dx; }
                    if(keys['Space'] && p.gr) p.vy = -14;
                }
            });
            ctx.fillStyle = (ticks > 1050 || ticks < 350) ? '#050510' : '#87ceeb';
            ctx.fillRect(0, 0, cvs.width, cvs.height);
            var cx = p.x - cvs.width/2, cy = p.y - cvs.height/2;
            var clrs = ["","#7f
