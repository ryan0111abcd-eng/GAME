<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>未來的 Super Human - 地形與圓形地圖版</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        
        /* 啟動選單 */
        #startup-ui {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #111; z-index: 999999; color: #f1c40f;
        }
        .btn { padding: 20px 60px; font-size: 28px; cursor: pointer; margin: 15px; background: #f1c40f; border: none; font-weight: bold; border-radius: 50px; }
        
        /* 遊戲內介面 */
        #hud { position: fixed; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.8); padding: 12px; border: 2px solid #f1c40f; display: none; z-index: 5000; pointer-events: none; border-radius: 10px; }
        
        /* 右上角圓形小地圖 */
        #minimap-box {
            position: fixed; top: 20px; right: 20px; width: 160px; height: 160px;
            border: 3px solid white; border-radius: 50%; overflow: hidden;
            background: rgba(0,0,0,0.6); display: none; z-index: 5000;
        }
        #minimap-canvas { width: 160px; height: 160px; }
    </style>
</head>
