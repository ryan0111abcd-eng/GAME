<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>SUPER HUMAN 2026 - MINIMAP SYSTEM</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; user-select: none; }
        .page { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #050505; color: #f1c40f; text-align: center; }
        .btn { padding: 15px 40px; font-size: 20px; cursor: pointer; margin: 8px; background: #f1c40f; border: 3px solid #fff; border-radius: 12px; font-weight: bold; color: #000; box-shadow: 0 5px 0 #b8860b; transition: 0.1s; outline: none; width: 320px; display: flex; align-items: center; justify-content: center; }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #b8860b; }
        .in-box { padding: 15px; font-size: 24px; border: 4px solid #f1c40f; border-radius: 12px; background: #222; color: #fff; text-align: center; margin-bottom: 25px; width: 320px; outline: none; }
        
        /* ESC 選單 */
        #esc-menu { position: fixed; inset: 0; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); backdrop-filter: blur(12px); }
        .menu-card { background: rgba(30, 30, 30, 0.9); padding: 30px; border-radius: 20px; border: 2px solid #f1c40f; box-shadow: 0 0 30px rgba(241, 196, 15, 0.3); display: flex; gap: 20px; }
        .stat-line { color: #aaa; font-size: 16px; margin: 5px 0; font-family: monospace; }
        
        /* 小地圖樣式 */
        #minimap-container { position: fixed; bottom: 20px; right: 20px; width: 200px; height: 150px; background: rgba(0,0,0,0.7); border: 2px solid #f1c40f; border-radius: 10px; z-index: 1000; overflow: hidden; display: none; }
        #mm-canvas { width: 100%; height: 100%; }

        #hud { position: fixed; top: 15px; left: 15px; z-index: 1000; color: white; background: rgba(0,0,0,0.85); padding: 12px; border-radius: 10px; border: 2px solid #f1c40f; display: none; pointer-events: none; }
        canvas#g { display: none; position: absolute; top: 0; left: 0; z-index: 1; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="p-auth" class="page" style="display:none;">
        <h1 style="letter-spacing: 8px;">SYSTEM ACCESS</h1>
        <input type="password" id="pw" class="in-box" placeholder="Access Key">
        <button class="btn" onclick="checkAuth()">VERIFY IDENTITY</button>
    </div>

    <div id="p-conn" class="page" style="display:none;">
        <h1>CONNECTION</h1>
        <button class="btn" onclick="setConn(1)">👤 SINGLE PLAYER</button>
        <button class="btn" onclick="setConn(0)">👥 MULTIPLAYER (CO-OP)</button>
    </div>

    <div id="p-mode" class="page" style="display:none;">
        <h1>SELECT MISSION</h1>
        <button class="btn" onclick="prepareBrief('ARCH')">🏗️ 荒野建築</button>
        <button class="btn" onclick="prepareBrief('SURV')">🏔️ 高山生存</button>
        <button class="btn" onclick="prepareBrief('ZOMB')">🧟 殭屍圍城</button>
    </div>

    <div id="p-brief" class="page" style="display:none;">
        <h1>MISSION BRIEFING</h1>
        <div id="brief-text" style="font-size: 18px; color: #ccc; margin: 20px; text-align: left; max-width: 500px;"></div>
        <button class="btn" onclick="startGame()">START SIMULATION</button>
    </div>

    <div id="esc-menu">
        <div class="menu-card">
            <div style="width: 320px;">
                <h1 style="color:#f1c40f; margin-top:0;">PAUSED</h1>
                <div id="menu-stats">
                    <div class="stat-line">📍 POS: <span id="st-pos">0, 0</span></div>
                    <div class="stat-line">👥 SQUAD: <span id="st-squad">0</span></div>
                    <div class="stat-line">🏠 BUILD: <span id="st-build">0</span></div>
                </div>
                <button class="btn" onclick="togglePause()" style="width:100%">RESUME (ESC)</button>
                <button class="btn" onclick="location.reload()" style="width:100%; background:#b33939; color:#fff;">EXIT</button>
            </div>
            <div id="esc-map-box" style="width: 300px; height: 300px; background:#000; border: 2px solid #f1c40f; border-radius: 10px; overflow: hidden;">
                <canvas id="esc-mm-canvas" width="300" height="300"></canvas>
            </div>
        </div>
    </div>

    <div id="minimap-container">
        <canvas id="mm-canvas" width="200" height="150"></canvas>
        <div style="position:absolute; top:5px; left:5px; color:#f1c40f; font-size:10px; font-weight:bold; text-shadow:1px 1px #000;">RADAR V2</div>
    </div>

    <div id="hud">
        🕒 <span id="tm-v">12:00</span> | ❤️ <span id="p-hp-hud">100</span><br>
        🏗️ <span id="cur-b" style="color:#f1c40f;">石頭 (1)</span> | 📍 ALT：<span id="alt-v">0</span> m
    </div>
    <canvas id="g"></canvas>

<script>
    var live = false, paused = false, showMap = true, world = {}, keys = {}, ents = [], ticks = 600, sSize = 1, mType = '';
    var p = { x: 0, y: 0, w: 22, h: 42, vx: 0, vy: 0, hp: 100, max: 100, gr: false, dmgCd: 0, atkCd: 0, face: 1 };
    var T = 32, selB = 1, spawnTimer = 0, villagerTimer = 0;
    const AUTH_KEY = 'ryan0111407';

    window.onload = function() {
        if(localStorage.getItem('sh_save_v2')) world = JSON.parse(localStorage.getItem('sh_save_v2'));
        if (localStorage.getItem('super_human_auth') === AUTH_KEY) document.getElementById('p-conn').style.display='flex';
        else document.getElementById('p-auth').style.display='flex';
    };

    function checkAuth() {
        if(document.getElementById('pw').value.trim() === AUTH_KEY) {
            localStorage.setItem('super_human_auth', AUTH_KEY);
            document.getElementById('p-auth').style.display='none';
            document.getElementById('p-conn').style.display='flex';
        } else alert("ACCESS DENIED");
    }

    function setConn(n) { 
        document.getElementById('p-conn').style.display='none'; 
        if(n===1){sSize=1;document.getElementById('p-mode').style.display='flex';}
    }

    function prepareBrief(type) {
        mType = type;
        document.getElementById('p-mode').style.display='none';
        document.getElementById('p-brief').style.display='flex';
        document.getElementById('brief-text').innerHTML = "● <b>地形系統</b>：V9.8 碎裂式雜湊。<br>● <b>地圖雷達</b>：新增實時小地圖，按 <b>[ M ]</b> 開啟/關閉。<br>● <b>顏色說明</b>：橙(你)、藍(隊友)、紫(村民)、綠(敵)。";
    }

    function getB(gx, gy) {
        if(world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
        var absGx = Math.abs(gx);
        var f = Math.floor(45 + Math.sin(gx*0.47)*10 + Math.cos(gx*0.23)*8 + Math.cos(gx*7.7)*5 + Math.abs(Math.sin(gx*0.13))*14);
        if(absGx > 100) f += Math.floor((absGx-100)/3.2) * (18 + Math.cos(gx * 0.8)*5);
        if (f > 120) f = 120; 
        if (gy < f) return 0;
        if (gy === f) return (gy > 85) ? 7 : 2; 
        if (gy > f && gy <= f + 5) return 3; 
        return 1;
    }

    function startGame() {
        document.getElementById('p-brief').style.display='none';
        document.getElementById('hud').style.display='block';
        document.getElementById('minimap-container').style.display='block';
        var cvs=document.getElementById('g'); cvs.style.display='block';
        cvs.width=window.innerWidth; cvs.height=window.innerHeight;
        let startY = 0; while(getB(0, Math.floor(startY/T)) === 0) startY += T;
        p.y = startY - 160;
        live = true; loop();
    }

    function togglePause() {
        paused = !paused;
        document.getElementById('esc-menu').style.display = paused ? 'flex' : 'none';
        if(paused) {
            document.getElementById('st-pos').innerText = `${Math.floor(p.x)}, ${Math.floor(p.y)}`;
            document.getElementById('st-squad').innerText = ents.filter(e=>e.type==='ally').length + 1;
            document.getElementById('st-build').innerText = Object.keys(world).length;
            drawMinimap("esc-mm-canvas", 3); // 暫停時畫大圖
        }
    }

    function drawMinimap(canvasId, scale) {
        var mCvs = document.getElementById(canvasId);
        var mCtx = mCvs.getContext('2d');
        mCtx.fillStyle = "#000"; mCtx.fillRect(0,0,mCvs.width,mCvs.height);
        
        var pgx = Math.floor(p.x/T), pgy = Math.floor(p.y/T);
        var rangeX = Math.floor(mCvs.width / (scale*2));
        var rangeY = Math.floor(mCvs.height / (scale*2));

        for(var x = -rangeX; x < rangeX; x++) {
            for(var y = -rangeY; y < rangeY; y++) {
                var b = getB(pgx + x, pgy + y);
                if(b > 0) {
                    mCtx.fillStyle = (b===7)?"#fff":(b===2)?"#2ecc71":"#555";
                    mCtx.fillRect((x+rangeX)*scale, (y+rangeY)*scale, scale, scale);
                }
            }
        }
        // 標記實體
        var centerX = rangeX*scale, centerY = rangeY*scale;
        mCtx.fillStyle = "#e67e22"; mCtx.fillRect(centerX, centerY, 4, 4); // Player
        
        ents.forEach(e => {
            var ex = (Math.floor(e.x/T) - pgx + rangeX) * scale;
            var ey = (Math.floor(e.y/T) - pgy + rangeY) * scale;
            if(ex >= 0 && ex < mCvs.width && ey >= 0 && ey < mCvs.height) {
                mCtx.fillStyle = (e.type==='zombie')?"#27ae60":(e.type==='villager')?"#9b59b6":"#3498db";
                mCtx.fillRect(ex, ey, 3, 3);
            }
        });
    }

    window.onkeydown = function(e) {
        if(e.code === 'Escape' && live) togglePause();
        if(e.code === 'KeyM' && live && !paused) { showMap = !showMap; document.getElementById('minimap-container').style.display = showMap ? 'block' : 'none'; }
        if(!live || paused) return;
        if(e.keyCode >= 49 && e.keyCode
