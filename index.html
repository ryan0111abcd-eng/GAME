<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>2D Minecraft: 生態系版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; }
        #ui { 
            position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.7); 
            color: white; padding: 12px; border-radius: 8px; pointer-events: none;
        }
        .time-info { color: #f1c40f; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">
        <b>🌳 生態生存模式</b><br>
        時間：<span id="clock" class="time-info">00:00</span><br>
        ❤️ 生命：<span id="hp">100</span> | A/D 移動 | 空白 跳躍
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    const tileSize = 32;
    let cameraX = 0;
    let worldData = JSON.parse(localStorage.getItem('mc_eco_v1')) || {};
    let keys = {};
    let gameTime = 0; // 0 ~ 2400

    let player = { x: 100, y: 100, w: 20, h: 40, vx: 0, vy: 0, speed: 4, jump: -10, grounded: false, hp: 100 };
    let animals = [];
    let enemies = [];

    // --- 地形與物件生成 ---
    function getBlock(x, y) {
        const key = `${x}_${y}`;
        if (worldData[key] !== undefined) return worldData[key];
        
        let ground = Math.floor(14 + Math.sin(x * 0.1) * 3);
        if (y < ground) {
            // 隨機生成村莊 (每隔 50 格機率出現)
            if (y === ground - 1 && x % 60 === 0) { generateHouse(x, ground - 1); }
            // 隨機生成樹
            if (y === ground - 1 && Math.abs(Math.sin(x)) > 0.92 && x % 5 !== 0) { generateTree(x, ground - 1); }
            return 0; 
        }
        return (y === ground) ? 2 : 1; // 2:草, 1:土
    }

    function generateTree(x, y) {
        worldData[`${x}_${y}`] = 4; // 木頭
        worldData[`${x}_${y-1}`] = 4;
        worldData[`${x}_${y-2}`] = 4;
        for(let i=-1; i<=1; i++) for(let j=-3; j<=-1; j++) {
            if (!worldData[`${x+i}_${y+j}`]) worldData[`${x+i}_${y+j}`] = 5; // 樹葉
        }
    }

    function generateHouse(x, y) {
        for(let i=0; i<5; i++) for(let j=0; j<4; j++) {
            if (i===0 || i===4 || j===0) worldData[`${x+i}_${y-j}`] = 4; // 木牆
        }
    }

    // 初始化動物
    for(let i=0; i<5; i++) animals.push({ x: 200 + i*300, y: 0, w: 20, h: 20, vx: 1, type: 'sheep' });

    function isColliding(nx, ny, w, h) {
        let x1 = Math.floor(nx / tileSize), x2 = Math.floor((nx + w) / tileSize);
        let y1 = Math.floor(ny / tileSize), y2 = Math.floor((ny + h) / tileSize);
        for (let x = x1; x <= x2; x++) {
            for (let y = y1; y <= y2; y++) { if (getBlock(x, y) > 0) return true; }
        }
        return false;
    }

    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;

    function loop() {
        gameTime = (gameTime + 1) % 2400;
        let dayRatio = Math.sin((gameTime / 2400) * Math.PI * 2); // -1 ~ 1

        // 1. 玩家邏輯
        player.vx = keys['KeyA'] ? -player.speed : (keys['KeyD'] ? player.speed : 0);
        let nextX = player.x + player.vx;
        if (isColliding(nextX, player.y, player.w, player.h)) {
            if (!isColliding(nextX, player.y - tileSize, player.w, player.h)) { player.x = nextX; player.y -= tileSize; }
        } else { player.x = nextX; }

        player.vy += 0.6;
        if (keys['Space'] && player.grounded) { player.vy = player.jump; player.grounded = false; }
        if (!isColliding(player.x, player.y + player.vy, player.w, player.h)) {
            player.y += player.vy; player.grounded = false;
        } else { if (player.vy > 0) player.grounded = true; player.vy = 0; }

        cameraX += (player.x - canvas.width / 2 - cameraX) * 0.1;

        // 2. 渲染背景 (日夜循環)
        let skyR = 135 + dayRatio * 100, skyG = 206 + dayRatio * 100, skyB = 235 + dayRatio * 100;
        ctx.fillStyle = `rgb(${skyR},${skyG},${skyB})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 3. 繪製方塊
        let startX = Math.floor(cameraX / tileSize);
        let endX = startX + Math.ceil(canvas.width / tileSize) + 1;
        for (let x = startX; x < endX; x++) {
            for (let y = 0; y < 25; y++) {
                let b = getBlock(x, y);
                if (b > 0) {
                    if (b === 1) ctx.fillStyle = '#8b4513'; // 土
                    if (b === 2
