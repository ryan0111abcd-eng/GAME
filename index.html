<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Super Human - Day & Night</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        .overlay { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(15, 15, 15, 0.98); color: #f1c40f; }
        .btn { padding: 18px 45px; font-size: 26px; cursor: pointer; margin: 12px; background: #f1c40f; border: none; border-radius: 12px; font-weight: bold; box-shadow: 0 6px 0 #b8860b; color: #000; }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #b8860b; }
        #hud { position: fixed; top: 20px; left: 20px; z-index: 100; color: white; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; border: 2px solid #f1c40f; pointer-events: none; display: none;}
        #minimap { position: fixed; top: 20px; right: 20px; width: 150px; height: 150px; border: 3px solid #fff; border-radius: 50%; overflow: hidden; z-index: 100; background: rgba(0,0,0,0.5); display: none;}
        canvas#gameCanvas { display: none; position: absolute; top: 0; left: 0; z-index: 10; }
    </style>
</head>
<body>

    <div id="step-1" class="overlay">
        <h1>SUPER HUMAN: 日夜生存</h1>
        <button class="btn" onclick="goStep(2, 1)">👤 單人模式</button>
        <button class="btn" onclick="goStep(2, 5)" style="background:#3498db; color:white;">👥 多人模式</button>
    </div>

    <div id="step-2" class="overlay" style="display:none;">
        <h1>設定人數</h1>
        <h2 id="p-label">5 人</h2>
        <input type="range" min="2" max="10" value="5" oninput="document.getElementById('p-label').innerText=this.value+' 人'" id="p-slider" style="width:300px;">
        <button class="btn" onclick="goStep(3)">下一步</button>
    </div>

    <div id="step-3" class="overlay" style="display:none;">
        <div style="background:#2c3e50; padding:25px; border-radius:15px; border:2px solid #f1c40f; width:380px;">
            <h2 style="color:#f1c40f; text-align:center;">⌛ 生存守則</h2>
            <p>● <b>白天</b>：安全，可以盡情挖掘與蓋房子。</p>
            <p>● <b>晚上</b>：怪物會大量出現，請躲入建築物！</p>
            <p>● <b>Q 回血</b> / <b>K 攻擊</b> / <b>左鍵挖</b> / <b>右鍵放</b></p>
            <button class="btn" onclick="startGame()" style="width:100%;">進入循環</button>
        </div>
    </div>

    <div id="hud">
        ❤️ HP: <span id="hp-txt">100</span><br>
        ⏰ 時間: <span id="time-txt">12:00</span> ( <span id="day-txt">白天</span> )
    </div>
    <div id="minimap"><canvas id="mCvs" width="150" height="150"></canvas></div>
    <canvas id="gameCanvas"></canvas>

<script>

    const mCvs = document.getElementById('mCvs'), mCtx = mCvs.getContext('2d');
    let active = false, world = {}, keys = {}, entities = [], playerCount = 1;

    let gameTime = 600; // 0-1440 分鐘，600 為早上 10 點
    const TILE = 32;

    function goStep(s, v) {
        document.querySelectorAll('.overlay').forEach(e => e.style.display = 'none');
        if (v) playerCount = v;
        document.getElementById('step-' + (playerCount === 1 && s === 2 ? 3 : s)).style.display = 'flex';
    }

        document.getElementById('hud').style.display = 'block';
