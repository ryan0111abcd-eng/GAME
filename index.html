<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPER HUMAN 2026 - ULTIMATE FIX</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; user-select: none; }
        
        /* 100% 確保按鈕文字置中且不偏移 */
        .page { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #050505; color: #f1c40f; }
        .btn { 
            display: flex; align-items: center; justify-content: center;
            width: 300px; min-height: 60px; margin: 10px; padding: 0 20px;
            font-size: 20px; font-weight: bold; color: #000; text-align: center;
            background: #f1c40f; border: 4px solid #fff; border-radius: 15px;
            box-shadow: 0 6px 0 #b8860b; cursor: pointer; transition: 0.1s;
            overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #b8860b; }
        .in-box { width: 280px; padding: 15px; font-size: 24px; border: 4px solid #f1c40f; border-radius: 12px; background: #111; color: #fff; text-align: center; margin-bottom: 20px; outline: none; }

        /* ESC 選單佈局修正 */
        #esc-menu { position: fixed; inset: 0; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); }
        .menu-card { background: #1a1a1a; padding: 30px; border: 3px solid #f1c40f; border-radius: 25px; display: flex; flex-direction: row; gap: 30px; max-width: 90%; }
        .info-panel { text-align: left; color: #eee; font-size: 16px; min-width: 260px; line-height: 1.8; }
        .info-panel b { color: #f1c40f; }

        #hud { position: fixed; top: 15px; left: 15px; z-index: 1000; color: white; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 10px; border: 2px solid #f1c40f; display: none; pointer-events: none; }
        canvas#g { display: block; position: absolute; top: 0; left: 0; z-index: 1; visibility: hidden; }
        
        #minimap-ui { position: fixed; bottom: 20px; right: 20px; width: 180px; height: 130px; background: rgba(0,0,0,0.9); border: 2px solid #f1c40f; border-radius: 10px; z-index: 1000; display: none; }
    </style>
</head>
<body>

    <div id="p-auth" class="page" style="display:none;">
        <h1>SYSTEM ACCESS</h1>
        <input type="password" id="pw" class="in-box" placeholder="Access Key">
        <button class="btn" onclick="checkAuth()">VERIFY SYSTEM</button>
    </div>

    <div id="p-conn" class="page" style="display:none;">
        <h1>CONNECTION</h1>
        <button class="btn" onclick="setConn(1)">SINGLE PLAYER</button>
        <button class="btn" onclick="setConn(0)">SQUAD CO-OP</button>
    </div>

    <div id="p-count" class="page" style="display:none;">
        <h1>SQUAD SIZE</h1>
        <h2 id="cnt-disp" style="font-size: 40px;">5</h2>
        <input type="range" id="member-sld" min="2" max="15" value="5" oninput="document.getElementById('cnt-disp').innerText=this.value" style="width:300px; accent-color:#f1c40f;">
        <button class="btn" onclick="toModeSel()">CONFIRM</button>
    </div>

    <div id="p-mode" class="page" style="display:none;">
        <h1>MODE SELECT</h1>
        <button class="btn" onclick="prepareBrief('ARCH')">荒野建築模式</button>
        <button class="btn" onclick="prepareBrief('SURV')">高山生存模式</button>
        <button class="btn" onclick="prepareBrief('ZOMB')">殭屍圍城模式</button>
    </div>

    <div id="p-brief" class="page" style="display:none;">
        <h1>MISSION BRIEFING</h1>
        <div id="brief-text" style="padding:20px; color:#aaa; text-align:left;"></div>
        <button class="btn" onclick="startGame()">DEPLOY NOW</button>
    </div>

    <div id="esc-menu">
        <div class="menu-card">
            <div class="info-panel">
                <h2 style="color:#f1c40f; margin:0 0 15px 0;">PAUSED</h2>
                <b>📍 POS:</b> <span id="st-pos">0,0</span><br>
                <b>👥 UNITS:</b> <span id="st-squad">0</span><br>
                <b>🏠 DATA:</b> <span id="st-build">0 blocks</span><br>
                <hr style="border:1px solid #333; margin:15px 0;">
                <button class="btn" onclick="togglePause()" style="width:100%; height:50px;">RESUME (ESC)</button>
                <button class="btn" onclick="resetWorld()" style="width:100%; height:50px; background:#c0392b; color:#fff;">RESET WORLD</button>
                <button class="btn" onclick="location.reload()" style="width:100%; height:50px; background:#444; color:#fff;">EXIT</button>
            </div>
            <div style="display:flex; flex-direction:column; align-items:center;">
                <b style="color:#f1c40f; margin-bottom:5px;">RADAR SCAN</b>
                <canvas id="esc-mm-canvas" width="250" height="250" style="background:#000; border:1px solid #444;"></canvas>
            </div>
        </div>
    </div>

    <div id="hud">
        🕒 <span id="tm-v">12:00</span> | ❤️ <span id="p-hp-hud">100</span> | 📍 ALT: <span id="alt-v">0</span>m
    </div>
    
    <div id="minimap-ui"><canvas id="mm-canvas" width="180" height="130"></canvas></div>

    <canvas id="g"></canvas>

<script>
    var live = false, paused = false, mapEnabled = false, world = {}, keys = {}, ents = [], ticks = 600, sSize = 1, mType = '';
    var p = { x: 0, y: 0, w: 22, h: 42, vx: 0, vy: 0, hp: 100, gr: false };
    var T = 32, selB = 1;
    const AUTH_KEY = 'ryan0111407';

    window.onload = function() {
        var saved = localStorage.getItem('sh_save_v10');
        if(saved) world = JSON.parse(saved);
        if (localStorage.getItem('super_human_auth') === AUTH_KEY) document.getElementById('p-conn').style.display='flex';
        else document.getElementById('p-auth').style.display='flex';
    };

    function checkAuth() {
        if(document.getElementById('pw').value.trim() === AUTH_KEY) {
            localStorage.setItem('super_human_auth', AUTH_KEY);
            document.getElementById('p-auth').style.display='none'; document.getElementById('p-conn').style.display='flex';
        } else alert("WRONG KEY");
    }

    function setConn(n) { document.getElementById('p-conn').style.display='none'; if(n===1){sSize=1;document.getElementById('p-mode').style.display='flex';}else{document.getElementById('p-count').style.display='flex';} }
    function toModeSel() { sSize=parseInt(document.getElementById('member-sld').value); document.getElementById('p-count').style.display='none'; document.getElementById('p-mode').style.display='flex'; }
    function resetWorld() { if(confirm("確定重置？")){world={};localStorage.setItem('sh_save_v10', "{}");location.reload();} }

    function prepareBrief(type) {
        mType = type;
        document.getElementById('p-mode').style.display='none'; document.getElementById('p-brief').style.display='flex';
        document.getElementById('brief-text').innerHTML = "● <b>地貌鎖定</b>：100% 破碎丘陵，絕無平原。<br>● <b>規則</b>：草皮下 5 層泥土。每 10 秒空降村民。<br>● <b>操作</b>：按 <b>M</b> 開啟小地圖，ESC 暫停。";
    }

    // --- 終極地貌引擎：杜絕平坦 ---
    function getB(gx, gy) {
        if(world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
        var absGx = Math.abs(gx);
        var base = Math.sin(gx * 0.45) * 10 + Math.cos(gx * 0.22) * 8;
        var jitter = (gx * 13 % 7) - 3; // 強制每一格都有垂直偏移
        var f = Math.floor(50 + base + jitter);
        
        if(absGx > 110) f += Math.floor((absGx-110)/3.2) * (18 + Math.cos(gx * 0.8)*5);
        if (f > 120) f = 120; 

        if (gy < f) return 0;
        if (gy === f) return (gy > 85) ? 7 : 2; 
        if (gy > f && gy <= f + 5) return 3; 
        return 1;
    }

    function startGame() {
        var cvs = document.getElementById('g');
        cvs.width = window.innerWidth;
        cvs.height = window.innerHeight;
        cvs.style.visibility = 'visible';
        cvs.style.display = 'block';

        let sy = 0; while(getB(0, Math.floor(sy/T)) === 0 && sy < 5000) sy += T;
        p.x = 0; p.y = sy - 160;

        document.getElementById('p-brief').style.display='none';
        document.getElementById('hud').style.display='block';
        live = true;
        loop();
    }

    function togglePause() {
        paused = !paused;
        document.getElementById('esc-menu').style.display = paused ? 'flex' : 'none';
        if(paused) {
            document.getElementById('st-pos').innerText = `${Math.floor(p.x)}, ${Math.floor(p.y)}`;
            document.getElementById('st-squad').innerText = sSize;
            document.getElementById('st-build').innerText = Object.keys(world).length;
            drawMap("esc-mm-canvas", 3);
        }
    }

    function drawMap(cid, scale) {
        var c = document.getElementById(cid), ctx = c.getContext('2d');
        if(!ctx) return;
        ctx.fillStyle = "#000"; ctx.fillRect(0,0,c.width,c.height);
        var pgx = Math.floor(p.x/T), pgy = Math.floor(p.y/T);
        var rx = Math.floor(c.width/(scale*2)), ry = Math.floor(c.height/(scale*2));
        for(var x=-rx; x<rx; x++){
            for(var y=-ry; y<ry; y++){
                var b = getB(pgx+x, pgy+y);
                if(b>0){ 
                    ctx.fillStyle = (b===7)?"#fff":(b===2)?"#2ecc71":(b===3)?"#795548":"#444";
                    ctx.fillRect((x+rx)*scale, (y+ry)*scale, scale, scale); 
                }
            }
        }
        ctx.fillStyle = "#f1c40f"; ctx.fillRect(rx*scale, ry*scale, 4, 4);
    }

    window.onkeydown = function(e) {
        if(e.code==='Escape' && live) togglePause();
        if(e.code==='KeyM' && live && !paused) { mapEnabled = !mapEnabled; document.getElementById('minimap-ui').style.display = mapEnabled ? 'block' : 'none'; }
        if(!live || paused) return;
        if(e.keyCode>=49 && e.keyCode<=56) selB = e.keyCode-48;
        keys[e.code] = true;
    };
    window.onkeyup = function(e) { keys[e.code] = false; };
    window.onmousedown = function(e) {
        if(!live || paused) return;
        var cvs = document.getElementById('g'), cx = p.x - cvs.width/2, cy = p.y - cvs.height/2;
        var gx = Math.floor((e.clientX + cx) / T), gy = Math.floor((e.clientY + cy) / T);
        if(e.button === 0) world[gx+'_'+gy] = 0; if(e.button === 2) world[gx+'_'+gy] = selB;
        localStorage.setItem('sh_save_v10', JSON.stringify(world));
    };

    function check(x,y) { var gx=Math.floor(x/T), gy=Math.floor(y/T); return getB(gx, gy)>0 || getB(Math.floor((x+21)/T), Math.floor((y+41)/T))>0; }

    function loop() {
        if(!live) return;
        if(!paused) {
            var cvs = document.getElementById('g'), ctx = cvs.getContext('2d', { alpha: false });
            if(!ctx) { requestAnimationFrame(loop); return; }

            ticks = (ticks + 0.05) % 1440;
            p.vy += 0.8; p.y += p.vy;
            if(check(p.x, p.y)) { while(check(p.x, p.y)) p.y -= 0.5; p.vy = 0; p.gr = true; } else p.gr = false;
            var dx = (keys['KeyD']?7:0) - (keys['KeyA']?7:0);
            if(dx !== 0) { p.x += dx; if(check(p.x, p.y)) p.x -= dx; }
            if(keys['Space'] && p.gr) p.vy = -14;

            ctx.fillStyle = (ticks > 1050 || ticks < 350) ? '#050510' : '#87ceeb';
            ctx.fillRect(0, 0, cvs.width, cvs.height);
            var cx = p.x - cvs.width/2, cy = p.y - cvs.height/2;
            var clrs = ["","#7f8c8d","#2ecc71","#795548","#f1c40f","#5d4037","#27ae60","#ecf0f1","#3498db"];
            for(var x=Math.floor(cx/T); x<=Math.ceil((cx+cvs.width)/T); x++) {
                for(var y=Math.floor(cy/T); y<=Math.ceil((cy+cvs.height)/T); y++) {
                    var b = getB(x, y); if(b > 0) { ctx.fillStyle = clrs[b]; ctx.fillRect(x*T-cx, y*T-cy, T-0.5, T-0.5); }
                }
            }
            ctx.fillStyle = '#e67e22'; ctx.fillRect(p.x-cx, p.y-cy, p.w, p.h);
            if(mapEnabled) drawMap("mm-canvas", 2);
            document.getElementById('alt-v').innerText = Math.floor(Math.abs(p.y/T)*32);
            document.getElementById('tm-v').innerText = Math.floor(ticks/60).toString().padStart(2,'0') + ":" + Math.floor(ticks%60).toString().padStart(2,'0');
        }
        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
