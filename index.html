<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Future Super Human - 修復版</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #1a1a1a; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; }
        
        /* 選單層級：確保 z-index 最高 */
        .layer { 
            position: fixed; inset: 0; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: #1a1a1a; color: white; z-index: 10000; 
        }
        
        /* 超醒目好點按鈕 */
        .btn { 
            padding: 20px 60px; font-size: 28px; cursor: pointer; margin: 15px; 
            background: #f1c40f; border: 4px solid #fff; font-weight: bold; border-radius: 15px; 
            color: black; box-shadow: 0 8px 0 #b8860b; 
            pointer-events: auto !important;
        }
        .btn:hover { background: #fff; transform: scale(1.05); }
        .btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #b8860b; }

        /* 遊戲 UI */
        #hud { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 15px; border: 2px solid #f1c40f; border-radius: 10px; color: white; display: none; z-index: 5000; pointer-events: none; }
        #minimap { position: fixed; top: 15px; right: 15px; width: 140px; height: 140px; border-radius: 50%; border: 3px solid #fff; background: rgba(0,0,0,0.5); display: none; z-index: 5000; overflow: hidden; }
        
        #esc-menu { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 20000; color: white; }

        /* 畫布：初始隱藏且禁止點擊 */
        canvas#gameCanvas { display: none; position: absolute; top: 0; left: 0; z-index: 100; pointer-events: none; }
        canvas#gameCanvas.active { pointer-events: auto; }
    </style>
</head>
<body>

    <div id="ui-main" class="layer">
        <h1 style="color:#f1c40f; font-size:50px; text-shadow: 3px 3px 0 #000;">未來的 SUPER HUMAN</h1>
        <button class="btn" onclick="startGame(1)">開始遊戲</button>
        <button class="btn" onclick="showMulti()" style="background:#3498db; color:white;">多人連線模式</button>
    </div>

    <div id="ui-multi" class="layer" style="display:none;">
        <h1 style="font-size:35px;">選擇隊友人數 (2-10)</h1>
        <input type="range" id="p-count" min="2" max="10" value="5" oninput="document.getElementById('pv').innerText=this.value" style="width:300px; height:30px;">
        <div style="font-size:40px; margin:20px;"><span id="pv" style="color:#f1c40f;">5</span> 人</div>
        <button class="btn" onclick="startGame(document.getElementById('p-count').value)">開始小隊遊戲</button>
    </div>

    <div id="esc-menu">
        <h1 style="color:#f1c40f; font-size:40px;">暫停暫停</h1>
        <button class="btn" onclick="location.reload()">離開遊戲 (重新開始)</button>
        <button class="btn" onclick="togglePause()" style="background:#888; color:white;">繼續遊戲</button>
    </div>

    <div id="hud">
        📍 <span id="posX">0</span>, <span id="posY">0</span> | ❤️ <span id="hp">100</span><br>
        🕒 <span id="time-text">07:00</span>
