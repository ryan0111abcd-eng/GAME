// 1. 滑鼠互動邏輯
canvas.onmousedown = (e) => {
    const rect = canvas.getBoundingClientRect();
    // 計算滑鼠在世界中的絕對座標（加上相機偏移）
    const worldMouseX = e.clientX - rect.left + cameraX;
    const worldMouseY = e.clientY - rect.top;
    
    // 轉換成格子座標
    const gridX = Math.floor(worldMouseX / tileSize);
    const gridY = Math.floor(worldMouseY / tileSize);
    
    if (e.button === 0) { // 左鍵挖掘
        worldData[`${gridX}_${gridY}`] = 0;
    } else if (e.button === 2) { // 右鍵放置 (放泥土)
        // 只有該格是空氣時才能放
        if (getBlock(gridX, gridY) === 0) {
            worldData[`${gridX}_${gridY}`] = 1; 
        }
    }
};

// 2. 繪製雲朵 (簡單的裝飾)
function drawClouds() {
    ctx.fillStyle = "white";
    for (let i = 0; i < 5; i++) {
        // 根據相機位置移動雲朵，製造一點遠近感 (Parallax)
        let cx = ((i * 400 - cameraX * 0.2) % (canvas.width + 200)) - 100;
        ctx.beginPath();
        ctx.arc(cx, 50 + i * 20, 30, 0, Math.PI * 2);
        ctx.arc(cx + 35, 50 + i * 20, 25, 0, Math.PI * 2);
        ctx.arc(cx - 35, 50 + i * 20, 25, 0, Math.PI * 2);
        ctx.fill();
    }
}

// 3. 修改 draw 函式，加入雲朵
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    drawClouds(); // 先畫雲朵（在背景）

    // ... (原本的渲染方塊與玩家邏輯) ...
}
