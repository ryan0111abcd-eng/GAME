<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Future Super Human - 終極生存版</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; }
        .layer { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(20, 20, 20, 0.95); color: #f1c40f; }
        .btn { padding: 15px 40px; font-size: 24px; cursor: pointer; margin: 10px; background: #f1c40f; border: none; border-radius: 10px; font-weight: bold; box-shadow: 0 5px 0 #b8860b; color: #000; }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #b8860b; }
        
        /* HUD 元素 */
        #hud { position: fixed; top: 15px; left: 15px; z-index: 100; color: white; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; pointer-events: none; display: none; }
        #minimap-container { position: fixed; top: 15px; right: 15px; width: 150px; height: 150px; border: 3px solid #fff; border-radius: 50%; overflow: hidden; z-index: 100; display: none; background: rgba(0,0,0,0.5); }
        
        /* 說明書 */
        #instruction { text-align: left; color: white; background: #34495e; padding: 20px; border-radius: 10px; max-width: 400px; display: none; }
        
        canvas { display: none; position: absolute; top: 0; left: 0; z-index: 10; }
    </style>
</head>
<body>

    <div id="ui-mode" class="layer">
        <h1>未來的 SUPER HUMAN</h1>
        <button class="btn" onclick="showPlayerSelect(1)">單人連線</button>
        <button class="btn" onclick="showPlayerSelect(5)" style="background:#3498db; color:white;">多人連線</button>
    </div>

    <div id="ui-players" class="layer" style="display:none;">
        <h2>選擇小隊總人數: <span id="p-val">5</span></h2>
        <input type="range" min="2" max="10" value="5" oninput="document.getElementById('p-val').innerText=this.value" id="p-slider" style="width:300px;">
        <button class="btn" onclick="showInstructions()">下一步</button>
    </div>

    <div id="ui-info" class="layer" style="display:none;">
        <div id="instruction">
            <h2 style="color:#f1c40f">📜 遊戲說明書</h2>
            <ul>
                <li><b>移動：</b> [W][A][S][D] 或 方向鍵</li>
                <li><b>跳躍：</b> [空白鍵]</li>
                <li><b>挖掘：</b> [滑鼠左鍵]</li>
                <li><b>放置：</b> [滑鼠右鍵]</li>
                <li><b>攻擊：</b> [K] 鍵</li>
                <li><b>選單：</b> [ESC] 鍵</li>
                <li><b>目標：</b> 晚上會有怪物，請與隊友生存下去！</li>
            </ul>
            <button class="btn" onclick="actuallyStart()" style="width:100%">進入世界</button>
        </div>
    </div>

    <div id="ui-esc" class="layer" style="display:none; background: rgba(0,0,0,0.7);">
        <h1>遊戲暫停</h1>
        <button class="btn" onclick="location.reload()">離開遊戲 (重新開始)</button>
        <button class="btn" onclick="toggleESC()" style="background:#7f8c8d; color:white;">返回遊戲</button>
    </div>

    <div id="hud">❤️ HP: <span id="hp">100</span> | 📍 <span id="pos">0,0</span></div>
    <div id="minimap-container"><canvas id="mcvs" width="150" height="150"></canvas></div>
    <canvas id="gcvs"></canvas>

<script>
    const cvs = document.getElementById('gcvs'), ctx = cvs.getContext('2d');
    const mcvs = document.getElementById('mcvs'), mctx = mcvs.getContext('2d');
    let isLive = false, showEsc = false, world = {}, keys = {}, entities = [];
    let p = { x: 0, y: -200, w: 22, h: 42, vx: 0, vy: 0, ground: false, hp: 100, maxHp: 100 };
    let totalP = 1;
    const TILE = 32;

    // --- 地形生成 ---
    function getH(gx) { return Math.floor(30 + Math.sin(gx * 0.1) * 5 + Math.cos(gx * 0.5) * 2); }
    function getB(gx, gy) {
        if (world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
        let h = getH(gx);
        return gy < h ? 0 : (gy === h ? 2 : 1);
    }

    // --- 碰撞檢測 ---
    function isColl(x, y, w, h) {
        for (let i = Math.floor(x/TILE); i <= Math.floor((x+w)/TILE); i++) {
            for (let j = Math.floor(y/TILE); j <= Math.floor((y+h)/TILE); j++) {
                if (getB(i, j) > 0) return true;
            }
        }
        return false;
    }

    // --- 選單切換邏輯 ---
    function showPlayerSelect(n) {
        totalP = n;
        document.getElementById('ui-mode').style.display = 'none';
        if (n === 1) showInstructions();
        else document.getElementById('ui-players').style.display = 'flex';
    }
    function showInstructions() {
        if (totalP > 1) totalP = document.getElementById('p-slider').value;
        document.getElementById('ui-players').style.display = 'none';
        document.getElementById('ui-info').style.display = 'flex';
        document.getElementById('instruction').style.display = 'block';
    }
    function actuallyStart() {
        document.getElementById('ui-info').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
        document.getElementById('minimap-container').style.display = 'block';
        cvs.style.display = 'block';
        cvs.width = window.innerWidth; cvs.height = window.innerHeight;
        
        // 生成隊友
        for(let i=0; i<totalP-1; i++) {
            entities.push({ type: 'ally', x: (Math.random()-0.5)*1000, y: -200, w:22, h:42, vx:0, vy:0, hp:100, maxHp:100, timer:0 });
        }
        isLive = true; loop();
    }

    function toggleESC() {
        if (!isLive) return;
        showEsc = !showEsc;
        document.getElementById('ui-esc').style.display = showEsc ? 'flex' : 'none';
    }

    // --- 輸入控制 ---
    window.onkeydown = e => {
        if (e.code === 'Escape') toggleESC();
        keys[e.code] = true;
        if (e.code === 'KeyK') attack(p);
    };
    window.onkeyup = e => keys[e.code] = false;
    window.onmousedown = e => {
        if (!isLive || showEsc) return;
        let gx = Math.floor((e.clientX + (p.x - cvs.width/2))/TILE);
        let gy = Math.floor((e.clientY + (p.y - cvs.height/2))/TILE);
        world[gx+'_'+gy] = (e.button === 0) ? 0 : 3; // 左鍵挖，右鍵放石
    };
    window.oncontextmenu = e => e.preventDefault();

    function attack(owner) {
        entities.forEach(e => {
            if (e !== owner && Math.abs(e.x - owner.x) < 60 && Math.abs(e.y - owner.y) < 60) {
                e.hp -= 20; e.vx = (e.x > owner.x ? 8 : -8);
            }
        });
    }

    // --- 遊戲主循環 ---
    function loop() {
        if (!isLive || showEsc) { requestAnimationFrame(loop); return; }

        // 玩家物理
        p.vy += 0.8; p.y += p.vy;
        if (isColl(p.x, p.y, p.w, p.h)) {
            if (p.vy > 0) { while(isColl(p.x, p.y, p.w, p.h)) p.y -= 1; p.ground = true; }
            else { while(isColl(p.x, p.y, p.w, p.h)) p.y += 1; }
            p.vy = 0;
        } else p.ground = false;

        let move = (keys['KeyD']?5:0) - (keys['KeyA']?5:0);
        if (move !== 0) { p.x += move; if (isColl(p.x, p.y, p.w, p.h)) p.x -= move; }
        if ((keys['Space'] || keys['KeyW']) && p.ground) p.vy = -14;

        // 怪物生成 (晚上邏輯簡單化：每隔一段時間生成)
        if (Math.random() < 0.005) {
            entities.push({ type: 'mob', x: p.x + (Math.random()>0.5?500:-500), y:-200, w:22, h:42, vx:0, vy:0, hp:50, maxHp:50, timer:0 });
        }

        // 實體 AI (隊友與怪物)
        entities = entities.filter(e => e.hp > 0);
        entities.forEach(e => {
            e.vy += 0.8; e.y += e.vy;
            if (isColl(e.x, e.y, e.w, e.h)) { if (e.vy > 0) while(isColl(e.x, e.y, e.w, e.h)) e.y -= 1; e.vy = 0; }
            
            if (e.type === 'ally') {
                if (Math.abs(e.x - p.x) > 150) e.x += (p.x > e.x ? 3 : -3); // 隊友稍微分散
                if (Math.random() < 0.01) world[Math.floor(e.x/TILE)+'_'+Math.floor((e.y+50)/TILE)] = 0; // 隊友隨機挖礦
            } else if (e.type === 'mob') {
                e.x += (p.x > e.x ? 2 : -2); // 怪物追玩家
                if (Math.abs(e.x - p.x) < 30) p.hp -= 0.1;
            }
        });

        // UI 更新
        document.getElementById('hp').innerText = Math.ceil(p.hp);
        document.getElementById('pos').innerText = Math.floor(p.x/TILE) + "," + Math.floor(p.y/TILE);

        render();
        requestAnimationFrame(loop);
    }

    function render() {
        ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0,0,cvs.width,cvs.height);
        let cx = p.x - cvs.width/2, cy = p.y - cvs.height/2;

        // 地形
        for(let x=Math.floor(cx/TILE); x<=Math.ceil((cx+cvs.width)/TILE); x++){
            for(let y=Math.floor(cy/TILE); y<=Math.ceil((cy+cvs.height)/TILE); y++){
                let b = getB(x, y);
                if(b>0) {
                    ctx.fillStyle = (b===2?'#2ecc71':(b===1?'#795548':'#7f8c8d'));
                    ctx.fillRect(x*TILE-cx, y*TILE-cy, TILE+1, TILE+1);
                }
            }
        }

        // 繪製實體
        entities.concat(p).forEach(e => {
            ctx.fillStyle = (e===p?'#e67e22':(e.type==='ally'?'#3498db':'#e74c3c'));
            ctx.fillRect(e.x-cx, e.y-cy, e.w, e.h);
            // 血量條
            ctx.fillStyle='red'; ctx.fillRect(e.x-cx, e.y-cy-10, e.w, 4);
            ctx.fillStyle='lime'; ctx.fillRect(e.x-cx, e.y-cy-10, e.w*(e.hp/e.maxHp), 4);
        });

        // 小地圖
        mctx.fillStyle = '#000'; mctx.fillRect(0,0,150,150);
        mctx.save(); mctx.translate(75, 75);
        entities.concat(p).forEach(e => {
            mctx.fillStyle = (e===p?'#fff':(e.type==='ally'?'#3498db':'#e74c3c'));
            mctx.beginPath(); mctx.arc((e.x-p.x)*0.1, (e.y-p.y)*0.1, 3, 0, Math.PI*2); mctx.fill();
        });
        mctx.restore();
    }
</script>
</body>
</html>
