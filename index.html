<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Super Human - Final Version</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        
        /* 極高優先權的選單 */
        #start-screen {
            position: fixed; inset: 0; z-index: 99999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #1a1a1a;
        }

        .big-btn {
            padding: 30px 80px; font-size: 40px; cursor: pointer;
            background: #f1c40f; border: 5px solid #fff; border-radius: 20px;
            font-weight: bold; color: #000; box-shadow: 0 10px 0 #b8860b;
        }
        .big-btn:active { transform: translateY(6px); box-shadow: 0 4px 0 #b8860b; }

        #hud {
            position: fixed; top: 10px; left: 10px; z-index: 1000;
            background: rgba(0,0,0,0.8); color: #fff; padding: 15px;
            border: 2px solid #f1c40f; border-radius: 10px; display: none; font-size: 18px;
        }

        canvas { display: none; position: absolute; top: 0; left: 0; z-index: 10; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 style="color: #f1c40f; font-size: 60px; margin-bottom: 40px;">SUPER HUMAN</h1>
        <button class="big-btn" onclick="letsGo()">開始遊戲</button>
        <p style="color: #aaa; margin-top: 20px;">(WASD 移動 | 滑鼠挖土/放土 | R 鍵脫困)</p>
    </div>

    <div id="hud">
        ❤️ HP: <span id="hp-ui">100</span> | 📍 <span id="pos-ui">0,0</span>
    </div>

    <canvas id="mainCanvas"></canvas>

<script>
    const cvs = document.getElementById('mainCanvas'), ctx = cvs.getContext('2d');
    let active = false, world = {}, keys = {}, ticks = 420;
    let p = { x: 0, y: 0, w: 24, h: 44, vx: 0, vy: 0, ground: false, hp: 100 };
    const TILE = 32;

    function letsGo() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
        cvs.style.display = 'block';
        cvs.width = window.innerWidth;
        cvs.height = window.innerHeight;
        
        // 初始高度修正：確保一開始就在地面上方
        p.x = 0;
        p.y = (Math.floor(35 + Math.sin(0) * 5) - 5) * TILE;
        
        active = true;
        gameLoop();
    }

    function getH(gx) { return Math.floor(35 + Math.sin(gx * 0.2) * 5); }

    function getB(gx, gy) {
        if (world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
        let h = getH(gx);
        return gy < h ? 0 : (gy === h ? 2 : 1);
    }

    window.onkeydown = e => {
        keys[e.code] = true;
        if(e.code === 'KeyR') p.y -= 200; // R 鍵脫困功能
    };
    window.onkeyup = e => keys[e.code] = false;
    window.onmousedown = e => {
        if(!active) return;
        let cx = p.x - cvs.width/2, cy = p.y - cvs.height/2;
        let gx = Math.floor((e.clientX + cx) / TILE), gy = Math.floor((e.clientY + cy) / TILE);
        world[gx+'_'+gy] = (e.button === 0) ? 0 : 3;
    };
    window.oncontextmenu = e => e.preventDefault();

    function gameLoop() {
        if(!active) return;

        // 1. Y 軸：重力與精確踩踏
        p.vy += 0.8;
        let nextY = p.y + p.vy;
        let pL = Math.floor((p.x + 4)/TILE), pR = Math.floor((p.x + p.w - 4)/TILE);
        let footY = Math.floor((nextY + p.h)/TILE);

        if (getB(pL, footY) > 0 || getB(pR, footY) > 0) {
            p.y = footY * TILE - p.h; // 腳底貼齊方塊頂部
            p.vy = 0;
            p.ground = true;
        } else {
            p.y = nextY;
            p.ground = false;
        }

        // 2. X 軸：行走與鋼鐵防穿牆
        let move = (keys['KeyD'] ? 5 : 0) - (keys['KeyA'] ? 5 : 0);
        if (move !== 0) {
            let nextX = p.x + move;
            let checkX = move > 0 ? Math.floor((nextX + p.w)/TILE) : Math.floor(nextX/TILE);
            let hY = Math.floor((p.y + 4)/TILE), bY = Math.floor((p.y + p.h - 4)/TILE);
            
            // 只有前方完全沒阻礙才移動
            if (getB(checkX, hY) === 0 && getB(checkX, bY) === 0) {
                p.x = nextX;
            }
        }

        if ((keys['Space'] || keys['KeyW']) && p.ground) p.vy = -13;

        // UI 更新
        document.getElementById('pos-ui').innerText = Math.floor(p.x/TILE) + "," + Math.floor(p.y/TILE);

        // 繪製
        ctx.fillStyle = '#87ceeb'; // 天空
        ctx.fillRect(0, 0, cvs.width, cvs.height);

        let camX = p.x - cvs.width/2, camY = p.y - cvs.height/2;
        for(let x = Math.floor(camX/TILE); x <= Math.ceil((camX+cvs.width)/TILE); x++) {
            for(let y = Math.floor(camY/TILE); y <= Math.ceil((camY+cvs.height)/TILE); y++) {
                let b = getB(x, y);
                if (b > 0) {
                    ctx.fillStyle = (b === 2 ? '#2ecc71' : (b === 1 ? '#795548' : '#7f8c8d'));
                    ctx.fillRect(x*TILE - camX, y*TILE - camY, TILE, TILE);
                }
            }
        }

        ctx.fillStyle = '#FF5733'; // 玩家
        ctx.fillRect(p.x - camX, p.y - camY, p.w, p.h);

        requestAnimationFrame(gameLoop);
    }
</script>
</body>
</html>
