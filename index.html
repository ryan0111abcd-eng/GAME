<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Super Human - Final Fix</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: Arial, sans-serif; touch-action: manipulation; }
        .menu-layer { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #222; z-index: 1000; }
        .btn { 
            width: 80%; max-width: 400px; padding: 25px; margin: 15px; 
            font-size: 28px; font-weight: bold; color: #000; background: #f1c40f; 
            border: none; border-radius: 20px; cursor: pointer; text-align: center;
            box-shadow: 0 8px 0 #b8860b;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #b8860b; }
        #hud { position: fixed; top: 10px; left: 10px; color: #fff; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; display: none; z-index: 500; pointer-events: none; }
        #inv { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; gap: 10px; z-index: 500; }
        .slot { width: 60px; height: 60px; background: rgba(0,0,0,0.8); border: 3px solid #555; display: flex; align-items: center; justify-content: center; border-radius: 10px; color: #fff; font-size: 12px; flex-direction: column; }
        .slot.active { border-color: #f1c40f; transform: scale(1.1); background: #444; }
        canvas { display: none; }
    </style>
</head>
<body>

    <div id="m-ui" class="menu-layer">
        <h1 style="color:#f1c40f; font-size: 40px;">SUPER HUMAN</h1>
        <div class="btn" id="start-1">單人模式</div>
        <div class="btn" id="to-multi" style="background:#3498db; box-shadow: 0 8px 0 #2980b9; color:#fff;">多人連線模式</div>
    </div>

    <div id="s-ui" class="menu-layer" style="display:none;">
        <h2 style="color:#fff;">選擇總人數 (含電腦)</h2>
        <div class="btn" id="num-2">2 人</div>
        <div class="btn" id="num-5">5 人</div>
        <div class="btn" id="num-10">10 人</div>
        <div class="btn" id="go-back" style="background:#666; box-shadow: 0 8px 0 #444; color:#fff;">返回</div>
    </div>

    <div id="hud">❤️ <span id="hp">100</span> | ⚔️ K 攻擊 | ⛏️ 左挖右蓋</div>

    <div id="inv">
        <div class="slot active" id="sl-1"><div style="width:20px;height:20px;background:#8B4513"></div>1:土</div>
        <div class="slot" id="sl-2"><div style="width:20px;height:20px;background:#228B22"></div>2:草</div>
        <div class="slot" id="sl-3"><div style="width:20px;height:20px;background:#666"></div>3:石</div>
        <div class="slot" id="sl-4"><div style="width:20px;height:20px;background:#cd853f"></div>4:木</div>
    </div>

    <canvas id="gCanvas"></canvas>

<script>
const cvs = document.getElementById('gCanvas');
const ctx = cvs.getContext('2d');
let isRunning = false, world = {}, camX = 0, camY = 0;
let p = { x: 500, y: 0, w: 22, h: 42, vx: 0, vy: 0, hp: 100, ground: false, atk: 0 };
let agents = [], keys = {}, curB = 1;
const TILE = 32, COLORS = { 1: '#8B4513', 2: '#228B22', 3: '#666', 4: '#cd853f' };

// --- 強制點擊監聽 ---
document.getElementById('start-1').addEventListener('click', () => boot(1));
document.getElementById('to-multi').addEventListener('click', () => {
    document.getElementById('m-ui').style.display = 'none';
    document.getElementById('s-ui').style.display = 'flex';
});
document.getElementById('go-back').addEventListener('click', () => {
    document.getElementById('s-ui').style.display = 'none';
    document.getElementById('m-ui').style.display = 'flex';
});
document.getElementById('num-2').addEventListener('click', () => boot(2));
document.getElementById('num-5').addEventListener('click', () => boot(5));
document.getElementById('num-10').addEventListener('click', () => boot(10));

function getGY(gx) { return Math.floor(35 + Math.sin(gx*0.05)*12 + Math.cos(gx*0.02)*15); }
function getB(gx, gy) {
    if(world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
    let fY = getGY(gx); return gy < fY ? 0 : (gy === fY ? 2 : 1);
}

function boot(num) {
    document.getElementById('m-ui').style.display = 'none';
    document.getElementById('s-ui').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    document.getElementById('inv').style.display = 'flex';
    cvs.style.display = 'block';
    cvs.width = window.innerWidth;
    cvs.height = window.innerHeight;

    p.y = getGY(p.x/TILE)*TILE - 150;
    for(let i=0; i<num-1; i++) {
        agents.push({x:600+i*150, y:-100, w:22, h:42, vx:0, vy:0, hp:100, dir:1, sTimer:50});
    }

    window.addEventListener('mousedown', (e) => {
        if(!isRunning) return;
        let gx = Math.floor((e.clientX + camX)/TILE), gy = Math.floor((e.clientY + camY)/TILE);
        if(e.button === 0) world[gx+'_'+gy] = 0; // 挖
        if(e.button === 2) { if(getB(gx, gy)===0) world[gx+'_'+gy] = curB; } // 蓋
    });
    window.oncontextmenu = (e) => e.preventDefault();
    window.onkeydown = e => {
        keys[e.code] = true;
        if(e.code === 'KeyK') p.atk = 10;
        if(['1','2','3','4'].includes(e.key)) {
            curB = parseInt(e.key);
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
            document.getElementById('sl-'+e.key).classList.add('active');
        }
    };
    window.onkeyup = e => keys[e.code] = false;
    isRunning = true;
    requestAnimationFrame(loop);
}

function phys(o, isP) {
    if(isP) {
        o.vx = (keys['KeyA'] ? -5 : keys['KeyD'] ? 5 : 0);
        if((keys['Space'] || keys['KeyW']) && o.ground) o.vy = -12;
        if(o.atk > 0) o.atk--;
    } else {
        o.sTimer--;
        if(o.sTimer <= 0) { o.dir = Math.random()>0.5?1:-1; o.sTimer = 60+Math.random()*100; }
        o.vx = o.dir * 2;
        let ahX = Math.floor((o.x + o.vx*5)/TILE), fY = Math.floor((o.y+o.h-5)/TILE);
        if(getB(ahX, fY)>0 && o.ground) o.vy = -11;
    }
    o.vy += 0.7; o.y += o.vy; o.ground = false;
    let fy = Math.floor((o.y+o.h)/TILE), lx = Math.floor((o.x+2)/TILE), rx = Math.floor((o.x+o.w-2)/TILE);
    if(getB(lx, fy)>0 || getB(rx, fy)>0) { o.y = fy*TILE-o.h; o.vy = 0; o.ground = true; }
    o.x += o.vx;
}

function loop() {
    ctx.fillStyle = '#87ceeb'; ctx.fillRect(0, 0, cvs.width, cvs.height);
    phys(p, true);
    camX += (p.x - cvs.width/2 - camX) * 0.1; camY += (p.y - cvs.height/2 - camY) * 0.1;
    let cx = Math.floor(camX), cy = Math.floor(camY);

    for(let x=Math.floor(cx/TILE); x<Math.floor((cx+cvs.width)/TILE)+1; x++) {
        for(let y=Math.floor(cy/TILE); y<Math
