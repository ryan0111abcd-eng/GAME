<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>未來的 Super Human</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; color: white; }
        .layer { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1a1a1a; z-index: 9999; }
        .btn { padding: 15px 40px; font-size: 24px; cursor: pointer; margin: 10px; background: #f1c40f; border: none; font-weight: bold; border-radius: 12px; color: black; box-shadow: 0 5px 0 #b8860b; }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #b8860b; }
        #hud { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 10px; border: 2px solid #f1c40f; display: none; z-index: 5000; border-radius: 10px; pointer-events: none; }
        #inv { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; gap: 8px; z-index: 5000; }
        .slot { width: 45px; height: 45px; border: 2px solid #fff; background: #333; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .slot.active { border-color: #f1c40f; transform: scale(1.1); background: #555; }
        input[type=range] { width: 200px; margin: 20px; }
        canvas { display: none; }
    </style>
</head>
<body>

    <div id="m-ui" class="layer">
        <h1 style="color:#f1c40f; font-size: 50px;">未來的 SUPER HUMAN</h1>
        <button class="btn" onclick="boot(1)">單人開始</button>
        <button class="btn" onclick="showMulti()" style="background:#3498db; color:white; box-shadow: 0 5px 0 #2980b9;">多人連線鍵</button>
    </div>

    <div id="s-ui" class="layer" style="display:none;">
        <h2>選擇總人數 (2 - 10人)</h2>
        <input type="range" id="p-range" min="2" max="10" value="5" oninput="document.getElementById('p-val').innerText = this.value">
        <div style="font-size: 24px; margin-bottom: 20px;">當前人數: <span id="p-val" style="color:#f1c40f;">5</span></div>
        <button class="btn" onclick="boot(document.getElementById('p-range').value)">開始遊戲</button>
        <button class="btn" onclick="location.reload()" style="background:#666; box-shadow: 0 5px 0 #444;">返回</button>
    </div>

    <div id="hud">
        ❤️ 血量: <span id="hp">100</span> | 🕒 時間: <span id="time">07:00</span><br>
        ⚔️ K 攻擊 | ⛏️ 左挖 / 右蓋 | 1-4 換磚
    </div>

    <div id="inv">
        <div class="slot active" id="sl1">1:土</div>
        <div class="slot" id="sl2">2:草</div>
        <div class="slot" id="sl3">3:石</div>
        <div class="slot" id="sl4">4:木</div>
    </div>

    <canvas id="gCvs"></canvas>

<script>
const cvs = document.getElementById('gCvs');
const ctx = cvs.getContext('2d');
let isRunning = false, world = {}, camX = 0, camY = 0;
let time = 420; // 07:00 = 420 mins
let p = { x: 500, y: 0, w: 22, h: 42, vx: 0, vy: 0, hp: 100, ground: false, atk: 0 };
let agents = [], keys = {}, curB = 1;
const TILE = 32, COLORS = { 1: '#8B4513', 2: '#228B22', 3: '#666', 4: '#cd853f' };

function showMulti() { document.getElementById('m-ui').style.display = 'none'; document.getElementById('s-ui').style.display = 'flex'; }

function getGY(gx) { return Math.floor(35 + Math.sin(gx*0.05)*10 + Math.cos(gx*0.02)*12); }
function getB(gx, gy) {
    if(world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
    let fY = getGY(gx); return gy < fY ? 0 : (gy === fY ? 2 : 1);
}

function boot(num) {
    document.querySelectorAll('.layer').forEach(l => l.style.display = 'none');
    document.getElementById('hud').style.display = 'block';
    document.getElementById('inv').style.display = 'flex';
    cvs.style.display = 'block';
    cvs.width = window.innerWidth; cvs.height = window.innerHeight;

    p.y = getGY(p.x/TILE)*TILE - 100;
    
    // 生成 AI (村民、動物、隊友)
    for(let i=0; i<num-1; i++) {
        agents.push({x: 600+i*200, y:-100, w:22, h:42, vx:0, vy:0, hp:100, type: i%2===0?'villager':'animal', dir:1, sTimer:50});
    }

    window.addEventListener('mousedown', e => {
        if(!isRunning) return;
        let gx = Math.floor((e.clientX + camX)/TILE), gy = Math.floor((e.clientY + camY)/TILE);
        if(e.button === 0) world[gx+'_'+gy] = 0;
        if(e.button === 2) if(getB(gx, gy)===0) world[gx+'_'+gy] = curB;
    });
    window.oncontextmenu = e => e.preventDefault();
    window.onkeydown = e => {
        keys[e.code] = true;
        if(e.code === 'KeyK') p.atk = 10;
        if(['1','2','3','4'].includes(e.key)) {
            curB = parseInt(e.key);
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
            document.getElementById('sl'+curB).classList.add('active');
        }
    };
    window.onkeyup = e => keys[e.code] = false;
    isRunning = true;
    requestAnimationFrame(loop);
}

function loop() {
    // 時間系統
    time = (time + 0.5) % 1440;
    let hh = Math.floor(time/60), mm = Math.floor(time%60);
    document.getElementById('time').innerText = hh.toString().padStart(2,'0')+":"+mm.toString().padStart(2,'0');

    // 天空顏色
    let sky = '#87
