<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>我的類 Minecraft 遊戲</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #333; color: #eee; margin: 0; }
        nav { background: #000; padding: 1rem; display: flex; justify-content: space-between; }
        .container { padding: 2rem; text-align: center; }
        .version-box { background: #444; padding: 20px; border-radius: 10px; margin: 20px auto; max-width: 500px; }
        .vip-tag { background: gold; color: black; padding: 2px 8px; border-radius: 3px; font-weight: bold; font-size: 0.8rem; }
        .download-btn { background: #4CAF50; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block; margin-top: 10px; }
        .disabled { background: #666; cursor: not-allowed; }
    </style>
</head>
<body>

<nav>
    <div><strong>MY CRAFT PROJECT</strong></div>
    <div id="user-info">載入中...</div>
</nav>

<div class="container">
    <h1>歡迎來到方塊世界</h1>
    
    <div class="version-box">
        <h3>穩定版 (v1.0.0)</h3>
        <p>所有玩家可用</p>
        <a href="#" class="download-btn">下載遊戲</a>
    </div>

    <div class="version-box" id="latest-version-box">
        <h3>最新測試版 (v1.1.0-Beta) <span class="vip-tag">PRO</span></h3>
        <p id="version-status">升級會員以解鎖此版本</p>
        <a href="#" id="dev-link" class="download-btn disabled">尚未解鎖</a>
    </div>

    <p>遇到卡在地面問題？<a href="#" style="color: #4CAF50;">查看脫困教學</a></p>
</div>

<script>
    // 檢查登入與會員狀態
    const username = localStorage.getItem('game_user');
    const isVip = localStorage.getItem('isVip') === 'true';

    if (!username) {
        window.location.href = 'auth.html';
    } else {
        const userInfo = document.getElementById('user-info');
        userInfo.innerHTML = `${username} ${isVip ? '<span class="vip-tag">PRO</span>' : ''} | <a href="buy.html" style="color:yellow">商店</a>`;
        
        if (isVip) {
            document.getElementById('version-status').innerText = "您已獲得測試版權限！";
            const devLink = document.getElementById('dev-link');
            devLink.innerText = "立即下載 Beta";
            devLink.classList.remove('disabled');
            devLink.href = "#download-link-for-v110";
        }
    }
</script>

</body>
</html>
