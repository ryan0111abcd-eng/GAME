<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Super Human - 建築與挖掘版</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; color: white; }
        .layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1a1a1a; z-index: 9999; }
        .btn { padding: 18px 45px; font-size: 24px; cursor: pointer; margin: 10px; background: #f1c40f; border: none; font-weight: bold; border-radius: 12px; color: black; transition: 0.2s; }
        .btn:hover { background: #fff; transform: scale(1.05); }
        #hud { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 12px; border: 2px solid #f1c40f; display: none; z-index: 5000; border-radius: 10px; }
        /* 新增：物品欄樣式 */
        #inv-ui { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 10px; border: 1px solid #fff; z-index: 5000; }
        .slot { display: inline-block; width: 40px; height: 40px; margin: 0 5px; border: 2px solid #555; text-align: center; line-height: 40px; font-weight: bold; }
        .slot.active { border-color: #f1c40f; background: rgba(241, 196, 15, 0.3); }
        select { padding: 10px; font-size: 20px; border-radius: 8px; margin: 10px; }
    </style>
</head>
<body>

    <div id="layer-main" class="layer">
        <h1 style="color:#f1c40f; font-size: 48px;">SUPER HUMAN</h1>
        <button class="btn" id="start-single">單人模式</button>
        <button class="btn" id="go-to-select" style="background:#3498db; color:white;">多人連線模式</button>
    </div>

    <div id="layer-select" class="layer" style="display:none;">
        <h2>選擇多人連線人數 (2-10人)</h2>
        <select id="p-count">
            <option value="2">2 人小隊</option>
            <option value="5" selected>5 人小隊</option>
            <option value="10">10 人大戰隊</option>
        </select>
        <button class="btn" id="start-multi">確認並開始</button>
        <button class="btn" id="back-to-main" style="background:#777;">返回</button>
    </div>

    <div id="hud">❤️ 血量: <span id="hp">100</span> | 🕒 <span id="time">07:00</span> | ⚔️ K 攻擊 | ⛏️ 左鍵挖/右鍵蓋</div>
    
    <div id="inv-ui">
        <div class="slot active" id="s1">1</div>
        <div class="slot" id="s2">2</div>
        <div class="slot" id="s3">3</div>
        <div class="slot" id="s4">4</div>
    </div>

<script>
let canvas, ctx, isRunning = false;
let ticks = 420, world = {}, camX = 0, camY = 0;
const TILE = 32;
const COLORS = { 1: '#8B4513', 2: '#228B22', 3: '#666', 4: '#cd853f', 5: '#444' };
let p = { x: 500, y: 0, w: 22, h: 42, vx: 0, vy: 0, hp: 100, maxHp: 100, ground: false, atkTimer: 0 };
let agents = [], keys = {}, curBlock = 1;

const lMain = document.getElementById('layer-main');
const lSelect = document.getElementById('layer-select');

document.getElementById('start-single').addEventListener('click', () => { initGame(1); });
document.getElementById('go-to-select').addEventListener('click', () => { lMain.style.display = 'none'; lSelect.style.display = 'flex'; });
document.getElementById('back-to-main').addEventListener('click', () => { lSelect.style.display = 'none'; lMain.style.display = 'flex'; });
document.getElementById('start-multi').addEventListener('click', () => { initGame(parseInt(document.getElementById('p-count').value)); });

function getGY(gx) { return Math.floor(35 + Math.sin(gx * 0.05) * 12 + Math.cos(gx * 0.02) * 15); }
function getB(gx, gy) {
    if(world[`${gx}_${gy}`] !== undefined) return world[`${gx}_${gy}`];
    let floorY = getGY(gx);
    return gy < floorY ? 0 : (gy === floorY ? 2 : 1);
}

function initGame(num) {
    lMain.style.display = 'none';
    lSelect.style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    document.getElementById('inv-ui').style.display = 'block';
    
    canvas = document.createElement('canvas');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    document.body.appendChild(canvas);
    ctx = canvas.getContext('2d');
    
    p.y = getGY(p.x/TILE)*TILE - 150;
    
    if(num > 1) {
        const types = ['ally', 'vil', 'ani'];
        for(let i=0; i < num - 1; i++) {
            agents.push({
                x: 600 + i * 150, y: -200, w: 22, h: 42, vx: 0, vy: 0, 
                hp: 100, maxHp: 100, type: types[i%3], dir: 1, state: 'idle', sTimer: Math.random()*100
            });
        }
    }

    // === 新增：滑鼠建築與挖掘邏輯 ===
    window.addEventListener('mousedown', (e) => {
        if(!isRunning) return;
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left + camX;
        const my = e.clientY - rect.top + camY;
        const gx = Math.floor(mx / TILE);
        const gy = Math.floor(my / TILE);

        if (e.button === 0) { // 左鍵：挖掘 (變為空氣 0)
            world[`${gx}_${gy}`] = 0;
        } else if (e.button === 2) { // 右鍵：放置 (放置當前選中的方塊)
            if (getB(gx, gy) === 0) {
                world[`${gx}_${gy}`] = curBlock;
            }
        }
    });

    // 防止點右鍵噴出選單
    window.oncontextmenu = (e) => e.preventDefault();

    isRunning = true;
    window.onkeydown = e => { 
        keys[e.code] = true; 
        if(e.code === 'KeyK') p.atkTimer = 10;
        // 切換方塊類型 1~4
        if (e.key >= '1' && e.key <= '4') {
            curBlock = parseInt(e.key);
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
            document.getElementById('s' + e.key).classList.add('active');
        }
    };

}
