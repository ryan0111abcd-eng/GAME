<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>2D Minecraft: 穩定操作版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: monospace; }
        canvas { display: block; background: #87CEEB; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">❤️ HP: <span id="hp">100</span> | A 往左, D 往右 | 空白 跳躍</div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    const tileSize = 32;
    let cameraX = 0;
    let worldData = JSON.parse(localStorage.getItem('mc_stable_save')) || {};
    let keys = {};

    let player = { 
        x: 100, y: 100, w: 22, h: 44, 
        vx: 0, vy: 0, 
        speed: 5, jump: -12, 
        grounded: false, hp: 100 
    };

    function getBlock(x, y) {
        const key = `${Math.floor(x)}_${Math.floor(y)}`;
        if (worldData[key] !== undefined) return worldData[key];
        let ground = Math.floor(12 + Math.sin(x * 0.1) * 3);
        return (y < ground) ? 0 : (y === ground ? 2 : 1);
    }

    // --- 改良版：分離軸碰撞偵測 ---
    function checkXCollision(obj) {
        let left = Math.floor(obj.x / tileSize);
        let right = Math.floor((obj.x + obj.w) / tileSize);
        let top = Math.floor(obj.y / tileSize);
        let bottom = Math.floor((obj.y + obj.h) / tileSize);

        for (let y = top; y <= bottom; y++) {
            if (getBlock(left, y) > 0 || getBlock(right, y) > 0) return true;
        }
        return false;
    }

    function checkYCollision(obj) {
        let left = Math.floor(obj.x / tileSize);
        let right = Math.floor((obj.x + obj.w) / tileSize);
        let top = Math.floor(obj.y / tileSize);
        let bottom = Math.floor((obj.y + obj.h) / tileSize);

        for (let x = left; x <= right; x++) {
            if (getBlock(x, top) > 0 || getBlock(x, bottom) > 0) return true;
        }
        return false;
    }

    // --- 鍵盤監聽 ---
    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;

    function loop() {
        // --- 1. 處理輸入 (關鍵修正處) ---
        player.vx = 0; // 每一幀先歸零，避免持續滑行
        if (keys['KeyA']) player.vx = -player.speed; // A 是負向 (左)
        if (keys['KeyD']) player.vx = player.speed;  // D 是正向 (右)

        // --- 2. 物理位移 ---
        // X 軸處理
        player.x += player.vx;
        if (checkXCollision(player)) {
            player.x -= player.vx; // 撞到就退回
            player.vx = 0;
        }

        // Y 軸處理
        player.vy += 0.7; // 重力
        player.y += player.vy;
        player.grounded = false;
        if (checkYCollision(player)) {
            if (player.vy > 0) { // 落地
                player.y = Math.floor((player.y + player.h) / tileSize) * tileSize - player.h;
                player.grounded = true;
            } else { // 撞頭
                player.y = Math.floor(player.y / tileSize) * tileSize + tileSize;
            }
            player.vy = 0;
        }

        if (keys['Space'] && player.grounded) player.vy = player.jump;

        cameraX = player.x - canvas.width / 2;

        // --- 3. 繪製 ---
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        let startX = Math.floor(cameraX / tileSize);
        let endX = startX + Math.ceil(canvas.width / tileSize) + 1;
        for (let x = startX; x < endX; x++) {
            for (let y = 0; y < 25; y++) {
                let b = getBlock(x, y);
                if (b > 0) {
                    ctx.fillStyle = b === 2 ? '#228B22' : '#8B4513';
                    ctx.fillRect(x * tileSize - cameraX, y * tileSize, tileSize, tileSize);
                }
            }
        }

        // 玩家繪製
        ctx.fillStyle = '#FF5733';
        ctx.fillRect(player.x - cameraX, player.y, player.w, player.h);

        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
