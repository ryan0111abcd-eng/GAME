<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>未來的 Super Human - 終極穩定版</title>
    <style>
        /* 基礎設定 */
        body { margin: 0; padding: 0; background: #222; font-family: sans-serif; overflow: hidden; }
        
        /* 選單容器：強制放在最高層級 */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #000; color: #f1c40f; z-index: 999999;
        }
        
        .menu-title { font-size: 48px; margin-bottom: 20px; }
        .main-btn { padding: 20px 60px; font-size: 24px; cursor: pointer; margin: 10px; background: #f1c40f; border: none; font-weight: bold; }
        .multi-btn { padding: 15px 40px; font-size: 20px; cursor: pointer; margin: 10px; background: #3498db; color: white; border: none; }
        
        /* 多人設定區 */
        #multi-config { display: none; flex-direction: column; align-items: center; }
        select { font-size: 24px; padding: 10px; margin: 20px; }

        /* 遊戲內介面 */
        #game-hud {
            position: fixed; top: 10px; left: 10px; color: white; 
            background: rgba(0,0,0,0.8); padding: 10px; border: 2px solid #f1c40f;
            display: none; z-index: 100; pointer-events: none;
        }
        canvas { display: none; background: #87ceeb; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="main-menu" style="display: flex; flex-direction: column; align-items: center;">
            <div class="menu-title">未來的 Super Human</div>
            <button class="main-btn" onclick="startGame(1)">開始遊戲</button>
            <button class="multi-btn" onclick="showMulti()">多人連線</button>
        </div>

        <div id="multi-config">
            <div class="menu-title">選擇人數 (2-10)</div>
            <select id="pSelect">
                <option value="2">2 人</option>
                <option value="3">3 人</option>
                <option value="4">4 人</option>
                <option value="5" selected>5 人</option>
                <option value="6">6 人</option>
                <option value="7">7 人</option>
                <option value="8">8 人</option>
                <option value="9">9 人</option>
                <option value="10">10 人</option>
            </select>
            <button class="main-btn" onclick="startGame(document.getElementById('pSelect').value)">點此開始遊戲</button>
            <button style="color:white; background:none; border:1px solid #666; cursor:pointer;" onclick="location.reload()">返回</button>
        </div>
    </div>

    <div id="game-hud">
        ❤️ 血量: <span id="hp">100</span> | 🕒 <span id="time">07:00</span> | ⚔️ 攻擊: [K] | 🛠️ [1,2,3]
    </div>

    <canvas id="gameCanvas"></canvas>
