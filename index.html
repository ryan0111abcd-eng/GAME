<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Future Super Human - 2D Survival</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; color: white; }
        .layer { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1a1a1a; z-index: 1000; }
        .btn { padding: 15px 40px; font-size: 24px; cursor: pointer; margin: 10px; background: #f1c40f; border: none; font-weight: bold; border-radius: 10px; color: black; box-shadow: 0 5px 0 #b8860b; }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #b8860b; }
        
        #hud { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 12px; border: 2px solid #f1c40f; border-radius: 8px; z-index: 500; display: none; font-size: 14px; }
        #minimap { position: fixed; top: 15px; right: 15px; width: 140px; height: 140px; border-radius: 50%; border: 3px solid #fff; background: rgba(0,0,0,0.5); overflow: hidden; z-index: 500; display: none; }
        #inv { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); display: none; gap: 8px; z-index: 500; }
        .slot { width: 45px; height: 45px; border: 2px solid #777; background: #333; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .slot.active { border-color: #f1c40f; background: #555; }
        
        #esc-menu { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
        canvas#gameCanvas { display: none; position: absolute; top: 0; left: 0; z-index: 10; }
    </style>
</head>
<body>

    <div id="ui-start" class="layer">
        <h1 style="color:#f1c40f; font-size:45px;">未來的 SUPER HUMAN</h1>
        <button class="btn" onclick="initGame(1)">開始遊戲</button>
        <button class="btn" onclick="showMulti()" style="background:#3498db; color:white;">多人連線模式</button>
    </div>

    <div id="ui-multi" class="layer" style="display:none;">
        <h1>選擇小隊人數 (2-10)</h1>
        <input type="range" id="p-count" min="2" max="10" value="5" oninput="document.getElementById('pv').innerText=this.value" style="width:250px;">
        <div style="font-size:30px; margin:15px;"><span id="pv" style="color:#f1c40f;">5</span> 人</div>
        <button class="btn" onclick="initGame(document.getElementById('p-count').value)">開始遊戲</button>
    </div>

    <div id="esc-menu">
        <h1 style="color:#f1c40f;">遊戲暫停</h1>
        <button class="btn" onclick="location.reload()">離開遊戲 (重新開始)</button>
        <button class="btn" onclick="togglePause()" style="background:#888; color:white;">返回</button>
    </div>

    <div id="hud">
        📍 <span id="posX">0</span>, <span id="posY">0</span> | ❤️ <span id="hp">100</span><br>
        🕒 <span id="time-text">07:00</span> <span id="day-icon">☀️</span> | 🗺️ <span id="biome-text">平原</span>
    </div>
    <div id="minimap"><canvas id="miniCanvas" width="140" height="140"></canvas></div>
    <div id="inv">
        <div class="slot active" id="sl1">1:土</div><div class="slot" id="sl2">2:草</div>
        <div class="slot" id="sl3">3:石</div><div class="slot" id="sl4">4:木</div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const cvs = document.getElementById('gameCanvas'), ctx = cvs.getContext('2d');
    const mcvs = document.getElementById('miniCanvas'), mctx = mcvs.getContext('2d');
    let isRunning = false, isPaused = false, ticks = 420; // 07:00
    let world = {}, camX = 0, camY = 0, curB = 1;
    let p = { x: 0, y: 0, w: 20, h: 40, vx: 0, vy: 0, hp: 100, ground: false, atk: 0 };
    let agents = [], keys = {};

    const TILE = 32, COLORS = { 1: '#8B4513', 2: '#228B22', 3: '#666', 4: '#cd853f', 5: '#95a5a6', 9: '#3498db' };

    function showMulti() { document.getElementById('ui-start').style.display='none'; document.getElementById('ui-multi').style.display='flex'; }

    function initGame(num) {
        document.querySelectorAll('.layer').forEach(l => l.style.display='none');
        document.getElementById('hud').style.display='block';
        document.getElementById('minimap').style.display='block';
        document.getElementById('inv').style.display='flex';
        cvs.style.display='block'; cvs.width = window.innerWidth; cvs.height = window.innerHeight;
        
        p.y = getGY(0)*TILE - 100;
        // 生成隊友
        for(let i=0; i<num-1; i++) spawnAgent('ally', (Math.random()-0.5)*1000);
        // 生成初始村民與動物
        for(let i=0; i<5; i++) spawnAgent('villager', (Math.random()-0.5)*2000);
        for(let i=0; i<5; i++) spawnAgent('animal', (Math.random()-0.5)*2000);

        isRunning = true;
        requestAnimationFrame(loop);
    }

    // 地形生成器：包含平原、台地、丘陵、山地、村莊、古蹟
    function getBiomeData(gx) {
        let x = Math.abs(gx);
        if (x % 1200 < 200) return { name: "山地", h: 25, n: 15 };
        if (x % 1200 < 500) return { name: "平原", h: 40, n: 2 };
        if (x % 1200 < 800) return { name: "台地", h: 32, n: 0 };
        if (x % 1200 < 1000) return { name: "丘陵", h: 35, n: 7 };
        return { name: "古蹟邊緣", h: 40, n: 1 };
    }

    function getGY(gx) {
        let b = getBiomeData(gx);
        let y = Math.floor(b.h + Math.sin(gx * 0.15) * b.n);
        // 村莊與古蹟邏輯：特定位置強行平坦
        if (Math.abs(gx % 400) < 10) return 38; 
        return y;
    }

    function getB(gx, gy) {
        if (world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
        let fY = getGY(gx);
        // 古蹟裝飾
        if (Math.abs(gx % 400) === 0 && gy < fY && gy > fY-5) return 5; 
        return gy < fY ? 0 : (gy === fY ? 2 : 1);
    }

    function spawnAgent(type, startX) {
        agents.push({ type, x: startX, y: getGY(Math.floor(startX/TILE))*TILE-100, w:20, h:40, hp:100, maxHp:100, dir:1, sTimer:50 });
    }

    function togglePause() {
        isPaused = !isPaused;
        document.getElementById('esc-menu').style.display = isPaused ? 'flex' : 'none';
    }

    window.onkeydown = e => {
        if(e.code === 'Escape') togglePause();
        keys[e.code] = true;
        if(e.code === 'KeyK') p.atk = 15;
        if(e.key >= '1' && e.key <= '4') {
            curB = parseInt(e.key);
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
            document.getElementById('sl'+curB).classList.add('active');
        }
    };
    window.onkeyup = e => keys[e.code] = false;
    window.onmousedown = e => {
        if(!isRunning || isPaused) return;
        let gx = Math.floor((e.clientX + camX)/TILE), gy = Math.floor((e.clientY + camY)/TILE);
        if(e.button === 0) world[gx+'_'+gy] = 0;
        if(e.button === 2) world[gx+'_'+gy] = curB;
    };
    window.oncontextmenu = e => e.preventDefault();

    function loop() {
        if(isRunning && !isPaused) {
            ticks = (ticks + 0.3) % 1440; // 一天 1440 分鐘
            let h = Math.floor(ticks/60), m = Math.floor(ticks%60);
            let isNight = (ticks > 1090 || ticks < 390); // 18:10 到 06:30

            // 晚上生成怪物
            if(isNight && Math.random() < 0.01 && agents.filter(a=>a.type==='monster').length < 8) {
                spawnAgent('monster', p.x + (Math.random()>0.5?600:-600));
            }

            // 角色移動
            p.vx = keys['KeyD'] ? 5 : (keys['KeyA'] ? -5 : 0);
            p.vy += 0.7; if((keys['KeyW'] || keys['Space']) && p.ground) p.vy = -12;
            p.y += p.vy; p.ground = false;
            let fy = Math.floor((p.y+p.h)/TILE), lx = Math.floor((p.x+2)/TILE);
            if(getB(lx, fy)>0) { p.y=fy*TILE-p.h; p.vy=0; p.ground=true; }
            p.x += p.vx;

            // AI 邏輯
            agents.forEach((a, idx) => {
                a.sTimer--; if(a.sTimer <= 0) { a.dir = Math.random()>0.5?1:-1; a.sTimer = 100; }
                if(a.type === 'monster') a.dir = p.x > a.x ? 1 : -1;
