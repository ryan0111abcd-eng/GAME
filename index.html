<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>SUPER HUMAN 2026 - ECOSYSTEM</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        .ui { position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; color: #f1c40f; }
        canvas { display: block; visibility: hidden; }
        #hud { position: fixed; top: 15px; left: 15px; z-index: 5; color: #fff; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; display: none; }
    </style>
</head>
<body>
    <div id="p-auth" class="ui">
        <h1>SUPER HUMAN 2026</h1>
        <input type="password" id="pw" placeholder="輸入激活金鑰" style="padding:10px; margin:10px;">
        <button onclick="check()" style="padding:10px 40px;">驗證</button>
        <button onclick="window.location.href='auth.html'" style="margin-top:20px; background:none; border:none; color:#666; cursor:pointer;">尚未登入購買？</button>
    </div>

    <div id="hud">
        🕒 <span id="clock-v">12:00</span> | ❤️ HP: <span id="hp-v">100</span><br>
        ⚔️ [K] 攻擊 | 🏗️ 挖/放方塊
    </div>
    <canvas id="g"></canvas>

<script>
    const KEYS = { SOLO: 'ryan0111407', FAM: 'ryan-family-2026' };
    var live = false, world = {}, ents = [], keys = {}, ticks = 600, T = 32;
    var p = { x: -500, y: 0, w: 20, h: 40, vx: 0, vy: 0, hp: 100, atkCd: 0 };

    function check() {
        let v = document.getElementById('pw').value.trim();
        if(v === KEYS.SOLO || v === KEYS.FAM) {
            document.getElementById('p-auth').style.display='none';
            start(v === KEYS.FAM ? 15 : 1);
        } else alert("金鑰無效");
    }

    function getB(gx, gy) {
        if(world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
        let f = Math.floor(130 + Math.sin(gx * 0.2) * 15);
        return (gy < f) ? 0 : (gy === f ? 2 : 1);
    }

    function start(n) {
        let c = document.getElementById('g'); c.width = window.innerWidth; c.height = window.innerHeight;
        c.style.visibility = 'visible'; document.getElementById('hud').style.display='block';
        let sy = 0; while(getB(Math.floor(p.x/T), Math.floor(sy/T)) === 0) sy += T;
        p.y = sy - 100;
        
        // 生成隊友、怪物與動物
        for(let i=0; i<n-1; i++) ents.push({type:'ally', x:p.x+50, y:p.y, hp:100, dir:1});
        for(let i=0; i<5; i++) ents.push({type:'mob', x:p.x+800+(i*200), y:p.y, hp:50, dir:1}); // 怪物
        for(let i=0; i<5; i++) ents.push({type:'animal', x:p.x-500-(i*200), y:p.y, hp:20, dir:1}); // 動物
        
        live = true; loop();
    }

    window.onkeydown = e => {
        if(e.code === 'KeyK' && p.atkCd <= 0) {
            p.atkCd = 15;
            ents.forEach(e => {
                if(Math.hypot(e.x-p.x, e.y-p.y) < 80) { e.hp -= 20; e.vx = (e.x > p.x ? 10 : -10); }
            });
        }
        keys[e.code] = true;
    };
    window.onkeyup = e => keys[e.code] = false;

    function loop() {
        if(!live) return;
        let c = document.getElementById('g'), ctx = c.getContext('2d');
        ticks = (ticks + 0.08) % 1440;
        if(p.atkCd > 0) p.atkCd--;

        [p, ...ents].forEach(e => {
            e.vy = (e.vy || 0) + 0.8; e.y += e.vy; e.x += (e.vx || 0); e.vx = (e.vx || 0) * 0.8;
            let hit = () => getB(Math.floor(e.x/T), Math.floor(e.y/T))>0;
            if(hit()) { while(hit()) e.y -= 1; e.vy = 0; e.gr = true; } else e.gr = false;

            if(e === p) {
                if(keys['KeyD']) p.x += 7; if(keys['KeyA']) p.x -= 7;
                if(keys['Space'] && p.gr) p.vy = -12;
            } else {
                // AI 行為
                if(e.type === 'mob') { // 怪物追玩家
                    e.x += (p.x > e.x ? 2.5 : -2.5);
                    if(Math.hypot(e.x-p.x, e.y-p.y) < 30) p.hp -= 0.5;
                } else if(e.type === 'animal') { // 動物逃跑
                    if(Math.hypot(e.x-p.x, e.y-p.y) < 150) e.x += (p.x > e.x ? -3 : 3);
                }
                if(hit() && e.gr) e.vy = -8;
            }
        });

        ctx.fillStyle = (ticks > 1000 || ticks < 300) ? '#050510' : '#87ceeb';
        ctx.fillRect(0,0,c.width,c.height);
        let cx = p.x-c.width/2, cy = p.y-c.height/2;
        
        // 繪製地圖
        for(let x=Math.floor(cx/T); x<Math.ceil((cx+c.width)/T); x++) {
            for(let y=Math.floor(cy/T); y<Math.ceil((cy+c.height)/T); y++) {
                let b = getB(x, y);
                if(b) { ctx.fillStyle = b===2?"#2ecc71":"#795548"; ctx.fillRect(x*T-cx, y*T-cy, T, T); }
            }
        }

        // 繪製實體
        [p, ...ents].forEach(e => {
            if(e.hp <= 0) return;
            ctx.fillStyle = e===p?'#e67e22':(e.type==='mob'?'#e74c3c':(e.type==='animal'?'#2ecc71':'#3498db'));
            ctx.fillRect(e.x-cx, e.y-cy, 20, 40);
        });

        document.getElementById('hp-v').innerText = Math.max(0, Math.floor(p.hp));
        document.getElementById('clock-v').innerText = Math.floor(ticks/60).toString().padStart(2,'0')+":"+Math.floor(ticks%60).toString().padStart(2,'0');
        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
