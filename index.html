<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>遊戲註冊</title>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #16213e; padding: 40px; border-radius: 15px; width: 300px; text-align: center; border: 2px solid #4ecca3; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: none; background: #0f3460; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #4ecca3; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>建立帳號</h2>
        <input type="text" id="username" placeholder="輸入暱稱">
        <button onclick="login()">註冊並選擇方案</button>
    </div>
    <script>
        function login() {
            const name = document.getElementById('username').value;
            if(!name) return alert("請輸入暱稱");
            localStorage.setItem('game_user', name);
            window.location.href = 'buy.html';
        }
    </script>
</body>
</html>
