<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Future Super Human - Guardian AI Edition</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        .layer { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #111; color: #f1c40f; }
        .btn { padding: 20px 60px; font-size: 28px; cursor: pointer; margin: 10px; background: #f1c40f; border: 4px solid #fff; border-radius: 15px; font-weight: bold; box-shadow: 0 8px 0 #b8860b; color: #000; }
        .btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #b8860b; }
        #hud { position: fixed; top: 15px; left: 15px; z-index: 100; background: rgba(0,0,0,0.8); color: white; padding: 12px; border: 2px solid #f1c40f; border-radius: 8px; display: none; pointer-events: none; line-height: 1.5; }
        #radar { position: fixed; top: 15px; right: 15px; width: 150px; height: 150px; border: 3px solid #fff; border-radius: 50%; overflow: hidden; z-index: 100; display: none; background: rgba(0,0,0,0.5); }
        #rain-fx { position: fixed; inset: 0; pointer-events: none; z-index: 50; background: rgba(40, 40, 80, 0.25); display: none; }
        canvas#gCvs { display: none; position: absolute; top: 0; left: 0; z-index: 1; }
    </style>
</head>
<body>

    <div id="ui-layer" class="layer">
        <h1 style="font-size: 45px;">SUPER HUMAN: 守護者聯盟</h1>
        <div id="m-1">
            <button class="btn" onclick="selMode(1)">👤 單人冒險</button>
            <button class="btn" onclick="selMode(5)" style="background:#3498db; color:white;">👥 小隊連線</button>
        </div>
        <div id="m-2" style="display:none; text-align:center;">
            <h2>招募隊友數量: <span id="p-label" style="color:#f1c40f;">5</span></h2>
            <input type="range" min="2" max="10" value="5" oninput="document.getElementById('p-label').innerText=this.value" id="p-slider" style="width:300px;">
            <br><button class="btn" onclick="selMode('go')">投送至世界</button>
        </div>
    </div>

    <div id="hud">
        ❤️ HP: <span id="hp">100</span> | 📍 座標: <span id="pos">0,0</span><br>
        🌍 地貌: <span id="biome">平原</span> | ⛈️ 天氣: <span id="weather">晴天</span><br>
        ⏰ 時間: <span id="time">12:00</span>
    </div>
    <div id="radar"><canvas id="rCvs" width="150" height="150"></canvas></div>
    <div id="rain-fx"></div>
    <canvas id="gCvs"></canvas>

<script>
    const cvs = document.getElementById('gCvs'), ctx = cvs.getContext('2d');
    const rcvs = document.getElementById('rCvs'), rctx = rcvs.getContext('2d');
    
    let isLive = false, world = {}, keys = {}, agents = [], ticks = 600; 
    let p = { x: 0, y: -250, w: 22, h: 42, vx: 0, vy: 0, hp: 100, maxHp: 100, ground: false, lastHitBy: null };
    let squadSize = 1, isRaining = false;
    const TILE = 32;

    function selMode(m) {
        if(m === 1) { squadSize = 1; start(); }
        else if(m === 5) { document.getElementById('m-1').style.display='none'; document.getElementById('m-2').style.display='block'; }
        else if(m === 'go') { squadSize = document.getElementById('p-slider').value; start(); }
    }

    function start() {
        document.getElementById('ui-layer').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
        document.getElementById('radar').style.display = 'block';
        cvs.style.display = 'block';
        cvs.width = window.innerWidth; cvs.height = window.innerHeight;

        for(let i=0; i<squadSize-1; i++) spawn('ally', (Math.random()-0.5)*800);
        for(let i=0; i<6; i++) spawn('npc', (Math.random()-0.5)*3000);
        for(let i=0; i<5; i++) spawn('pig', (Math.random()-0.5)*3000);

        isLive = true; loop();
    }

    function spawn(type, x) {
        let hp = (type==='pig')?30:100;
        agents.push({ type, x, y: -500, w: 22, h: 42, vx: 0, vy: 0, hp: hp, maxHp: hp, dir: 1, aiState: 'idle' });
    }

    function getBiome(gx) {
        let x = Math.abs(gx);
        if (x % 8000 < 1200) return { n: "平原", h: 35, c: "#2ecc71" };
        if (x % 8000 < 2400) return { n: "丘陵", h: 26, c: "#27ae60" };
        if (x % 8000 < 3600) return { n: "山地", h: 10, c: "#95a5a6" };
        if (x % 8000 < 4800) return { n: "台地", h: 32, c: "#d35400" };
        if (x % 8000 < 6000) return { n: "村莊", h: 35, c: "#f1c40f" };
        return { n: "古蹟", h: 35, c: "#7f8c8d" };
    }

    function getB(gx, gy) {
        if (world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
        let b = getBiome(gx);
        if ((b.n === "村莊" || b.n === "古蹟") && gy < b.h && gy > b.h-4 && Math.random() < 0.12) return 3;
        return gy < b.h ? 0 : (gy === b.h ? 2 : 1);
    }

    function check(x, y, w, h) {
        for (let i = Math.floor(x/TILE); i <= Math.floor((x+w)/TILE); i++) {
            for (let j = Math.floor(y/TILE); j <= Math.floor((y+h)/TILE); j++) {
                if (getB(i, j) > 0) return true;
            }
        }
        return false;
    }

    function doAtk(owner, target = null) {
        let list = agents.concat(p);
        list.forEach(e => {
            if(e !== owner && Math.abs(e.x - owner.x) < 70 && Math.abs(e.y - owner.y) < 70) {
                if(target && e !== target) return; 
                e.hp -= 20; e.vx = (e.x > owner.x ? 12 : -12);
                if(e === p) p.lastHitBy = owner; // 記錄誰打了玩家
            }
        });
    }

    window.onkeydown = e => { keys[e.code]=true; if(e.code==='KeyK') doAtk(p); if(e.code==='KeyQ') p.hp = Math.min(100, p.hp+20); };
    window.onkeyup = e => keys[e.code]=false;
    window.onmousedown = e => {
        if(!isLive) return;
        let gx = Math.floor((e.clientX + (p.x - cvs.width/2))/TILE);
        let gy = Math.floor((e.clientY + (p.y - cvs.height/2))/TILE);
        if(e.button === 0) world[gx+'_'+gy] = 0; else world[gx+'_'+gy] = 3;
    };

    function loop() {
        if(!isLive) return;
        if(p.hp <= 0) { location.reload(); return; }

        ticks = (ticks + 0.5) % 1440;
        let night = ticks > 1050 || ticks < 350;
        if(Math.floor(ticks) % 2000 === 0) {
            isRaining = Math.random() < 0.25;
            document.getElementById('rain-fx').style.display = isRaining ? 'block' : 'none';
            document.getElementById('weather').innerText = isRaining ? "下雨" : "晴天";
        }

        // 玩家
        p.vy += 0.8; p.y += p.vy;
        if(check(p.x, p.y, p.w, p.h)) {
            if(p.vy > 0) { while(check(p.x, p.y, p.w, p.h)) p.y -= 0.5; p.ground = true; }
            else { while(check(p.x, p.y, p.w, p.h)) p.y += 0.5; }
            p.vy = 0;
        } else p.ground = false;

        let dx = (keys['KeyD']?5:0) - (keys['KeyA']?5:0);
        if(dx !== 0) { p.x += dx; if(check(p.x, p.y, p.w, p.h)) p.x -= dx; }
        if(keys['Space'] && p.ground) p.vy = -14;

        // AI 實體
        agents.forEach(e => {
            e.vy += 0.8; e.y += e.vy;
            if(check(e.x, e.y, e.w, e.h)) { if(e.vy > 0) while(check(e.x, e.y, e.w, e.h)) e.y -= 0.5; e.vy = 0; }
            
            if(e.type === 'ally') {
                // 守護靈模式：如果玩家被打了，電腦立刻衝過來救援
                if (p.lastHitBy && p.lastHitBy.hp > 0) {
                    e.x += (p.lastHitBy.x > e.x ? 4 : -4);
                    if (Math.abs(e.x - p.lastHitBy.x) < 50) doAtk(e, p.lastHitBy);
                    if (p.lastHitBy.hp <= 0) p.lastHitBy = null;
                } else {
                    // 平時分散、隨機挖、隨機放
                    if(Math.abs(p.x - e.x) > 400) e.x += (p.x > e.x ? 2.5 : -2.5);
                    if(Math.random() < 0.006) world[Math.floor(e.x/TILE)+'_'+(Math.floor(e.y/TILE)+2)] = 0;
                    if(Math.random() < 0.003) world[Math.floor(e.x/TILE)+'_'+(Math.floor(e.y/TILE)+1)] = 3;
                    agents.forEach(m => { if(m.type==='zombie' && Math.abs(m.x-e.x)<100) doAtk(e); });
                }
            } else if(e.type === 'zombie') {
                e.x += (p.x > e.x ? 2.3 : -2.3);
                if(Math.abs(e.x - p.x) < 30) p.hp -= 0.2;
            } else {
                if(Math.random() < 0.02) e.dir = (Math.random()-0.5)*3;
                e.x += e.dir; if(check(e.x, e.y, e.w, e.h)) e.x -= e.dir;
            }
        });

        if(night && Math.random() < 0.015) spawn('zombie', p.x + (Math.random()>0.5?600:-600));
        agents = agents.filter(e => e.hp > 0);

        // UI
        let hr = Math.floor(ticks/60).toString().padStart(2,'0'), mn = Math.floor(ticks%60).toString().padStart(2,'0');
        document.getElementById('hp').innerText = Math.ceil(p.hp);
        document.getElementById('pos').innerText = Math.floor(p.x/TILE) + "," + Math.floor(p.y/TILE);
        document.getElementById('time').innerText = `${hr}:${mn} ${night?'(夜)':'(日)'}`;
        document.getElementById('biome').innerText = getBiome(Math.floor(p.x/TILE)).n;

        render();
        requestAnimationFrame(loop);
    }

    function render() {
        ctx.fillStyle = (ticks > 1050 || ticks < 350) ? '#050510' : (isRaining ? '#4b6584' : '#87ceeb');
        ctx.fillRect(0,0,cvs.width,cvs.height);
        let cx = p.x - cvs.width/2, cy = p.y - cvs.height/2;

        for(let x=Math.floor(cx/TILE); x<=Math.ceil((cx+cvs.width)/TILE); x++) {
            let bI = getBiome(x);
            for(let y=Math.floor(cy/TILE); y<=Math.ceil((cy+cvs.height)/TILE); y++) {
                let b = getB(x, y);
                if(b > 0) {
                    ctx.fillStyle = b===2 ? bI.c : (b===1 ? '#795548' : '#bdc3c7');
                    ctx.fillRect(x*TILE-cx, y*TILE-cy, TILE+0.5, TILE+0.5);
                }
            }
        }

        agents.concat(p).forEach(e => {
            let color = e===p?'#e67e22':(e.type==='ally'?'#3498db':(e.type==='zombie'?'#2ecc71':(e.type==='npc'?'#f1c40f':'#ff9ff3')));
            ctx.fillStyle = color; ctx.fillRect(e.x-cx, e.y-cy, e.w, e.h);
            ctx.fillStyle='red'; ctx.fillRect(e.x-cx, e.y-cy-10, e.w, 4);
            ctx.fillStyle='lime'; ctx.fillRect(e.x-cx, e.y-cy-10, e.w*(e.hp/e.maxHp), 4);
        });

        rctx.fillStyle='#000'; rctx.fillRect(0,0,150,150);
        rctx.save(); rctx.translate(75, 75);
        agents.concat(p).forEach(e => {
            rctx.fillStyle = e===p?'#fff':(e.type==='ally'?'#3498db':(e.type==='zombie'?'#2ecc71':'#f1c40f'));
            let dx = (e.x-p.x)*0.12, dy = (e.y-p.y)*0.12;
            if(dx*dx + dy*dy < 70*70) { rctx.beginPath(); rctx.arc(dx, dy, 3.5, 0, 7); mctx=rctx; mctx.fill(); }
        });
        rctx.restore();
    }
</script>
</body>
</html>
