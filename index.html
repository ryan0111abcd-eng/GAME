<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Super Human - 多人模式修正版</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; color: white; }
        #menu-layer, #select-layer, #info-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #111; z-index: 9000; }
        .btn { padding: 15px 50px; font-size: 24px; cursor: pointer; margin: 10px; background: #f1c40f; border: none; font-weight: bold; border-radius: 10px; color: black; }
        .btn:hover { background: #fff; }
        #hud { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 12px; border: 2px solid #f1c40f; display: none; z-index: 5000; pointer-events: none; }
        #minimap-container { position: fixed; top: 20px; right: 20px; width: 160px; height: 160px; border: 3px solid white; border-radius: 50%; overflow: hidden; background: #000; display: none; z-index: 5000; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="menu-layer">
        <h1 style="font-size: 48px; color: #f1c40f;">未來的 Super Human</h1>
        <button class="btn" onclick="openSelect(1)">單人冒險</button>
        <button class="btn" style="background:#3498db; color:white;" onclick="openSelect('multi')">多人連線</button>
    </div>

    <div id="select-layer" style="display:none;">
        <h1>選擇人數</h1>
        <select id="pNum" style="font-size:24px; padding:10px; margin:20px;">
            <option value="2">2 人</option>
            <option value="5" selected>5 人</option>
            <option value="10">10 人</option>
        </select>
        <button class="btn" onclick="openInfo()">確定</button>
    </div>

    <div id="info-layer" style="display:none;">
        <div style="background:#222; padding:30px; border:2px solid #f1c40f; border-radius:20px; max-width:400px; text-align:center;">
            <h2 style="color:#f1c40f;">🎮 遊戲操作</h2>
            <ul style="text-align:left; font-size:18px; line-height:1.6;">
                <li><b>A / D</b>：左右移動</li>
                <li><b>空白鍵</b>：跳躍</li>
                <li><b>左鍵</b>：挖掘 / <b>右鍵</b>：建築</li>
                <li><b>1, 2, 3</b>：切換方塊材料</li>
                <li><b>K 鍵</b>：攻擊怪物</li>
            </ul>
            <button class="btn" onclick="startGame()">正式開始遊戲</button>
        </div>
    </div>

    <div id="hud">❤️ 血量: <span id="hp">100</span> | 🕒 <span id="time">07:00</span></div>
    <div id="minimap-container"><canvas id="mini-canvas" width="160" height="160"></canvas></div>

<script>
let canvas, ctx, miniCanvas, miniCtx, isRunning = false;
let ticks = 420, world = {}, camX = 0, bType = 2, finalCount = 1;
const TILE = 32, COLORS = { 1: '#8B4513', 2: '#228B22', 3: '#666' };
let p = { x: 500, y: 0, w: 24, h: 44, vx: 0, vy: 0, hp: 100, ground: false, atk: 0 };
let allies = [], mobs = [], keys = {};

function openSelect(mode) {
    document.getElementById('menu-layer').style.display = 'none';
    if (mode === 1) {
        finalCount = 1;
        openInfo();
    } else {
        document.getElementById('select-layer').style.display = 'flex';
    }
}

function openInfo() {
    if (finalCount !== 1) finalCount = parseInt(document.getElementById('pNum').value);
    document.getElementById('select-layer').style.display = 'none';
    document.getElementById('info-layer').style.display = 'flex';
}

function startGame() {
    document.getElementById('info-layer').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    document.getElementById('minimap-container').style.display = 'block';
    
    canvas = document.createElement('canvas');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    document.body.appendChild(canvas);
    ctx = canvas
