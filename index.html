<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>我的無限 2D Minecraft - 自動爬坡版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        #ui { 
            position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); 
            color: white; padding: 12px; border-radius: 8px; border: 1px solid #fff;
            pointer-events: none; line-height: 1.6;
        }
        .key { background: #444; padding: 2px 6px; border-radius: 4px; border: 1px solid #888; }
    </style>
</head>
<body>

    <div id="ui">
        <b>遊戲控制：</b><br>
        <span class="key">A</span> <span class="key">D</span> 左右移動 (遇 1 格高會<b>自動爬坡</b>)<br>
        <span class="key">Space</span> 跳躍 | <span class="key">1</span><span class="key">2</span><span class="key">3</span> 切換方塊<br>
        左鍵：<b>挖礦</b> | 右鍵：<b>建造</b>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // 視窗自適應
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- 遊戲設定 ---
    const tileSize = 32;
    let cameraX = 0;
    let worldData = JSON.parse(localStorage.getItem('mc_final_v3')) || {};
    let keys = {};
    let selectedBlock = 2; // 預設草

    let player = { 
        x: 100, y: 100, w: 20, h: 42, 
        vx: 0, vy: 0, speed: 4.5, jump: -11, 
        grounded: false 
    };

    // --- 地形系統 ---
    function getBlock(x, y) {
        const key = `${x}_${y}`;
        if (worldData[key] !== undefined) return worldData[key];
        // 無限地形公式
        let ground = Math.floor(12 + Math.sin(x * 0.1) * 3 + Math.sin(x * 0.5) * 1);
        if (y < ground) return 0; // 空氣
        if (y === ground) return 2; // 草地
        return 1; // 泥土
    }

    // --- 核心：精準碰撞檢查 ---
    function isColliding(nx, ny) {
        let x1 = Math.floor(nx / tileSize);
        let x2 = Math.floor((nx + player.w) / tileSize);
        let y1 = Math.floor(ny / tileSize);
        let y2 = Math.floor((ny + player.h) / tileSize);

        for (let x = x1; x <= x2; x++) {
            for (let y = y1; y <= y2; y++) {
                if (getBlock(x, y) > 0) return true;
            }
        }
        return false;
    }

    // --- 輸入監聽 ---
    window.onkeydown = (e) => {
        keys[e.code] = true;
        if(e.key === '1') selectedBlock = 2;
        if(e.key === '2') selectedBlock = 1;
        if(e.key === '3') selectedBlock = 3; // 石頭
    };
    window.onkeyup = (e) => keys[e.code] = false;

    canvas.onmousedown = (e) => {
        const gx = Math.floor((e.clientX + cameraX) / tileSize);
        const gy = Math.floor(e.clientY / tileSize);
        if (e.button === 0) worldData[`${gx}_${gy}`] = 0; // 挖
        if (e.button === 2) worldData[`${gx}_${gy}`] = selectedBlock; // 蓋
        localStorage.setItem('mc_final_v3', JSON.stringify(worldData));
    };
    canvas.oncontextmenu = (e) => e.preventDefault();

    // --- 遊戲主循環 ---
    function loop() {
        // 1. 處理水平移動與自動爬坡 (Step-up)
        player.vx = 0;
        if (keys['KeyA']) player.vx = -player.speed;
        if (keys['KeyD']) player.vx = player.speed;

        if (player.vx !== 0) {
            let nextX = player.x + player.vx;
            // 撞牆檢查
            if (isColliding(nextX, player.y)) {
                // 自動爬坡：試著往上抬一格高度 (tileSize)
                if (!isColliding(nextX, player.y - tileSize)) {
                    player.x = nextX;
                    player.y -= tileSize; // 爬上去
                }
            } else {
                player.x = nextX; // 沒撞牆，正常走
            }
        }

        // 2. 處理垂直移動 (重力與跳躍)
        player.vy += 0.7; // 重力加速
        if (keys['Space'] && player.grounded) {
            player.vy = player.jump;
            player.grounded = false;
        }

        // Y 軸碰撞
        if (!isColliding(player.x, player.y + player.vy)) {
            player.y += player.vy;
            player.grounded = false;
        } else {
            if (player.vy > 0) player.grounded = true; // 往下撞到地
            player.vy = 0;
        }

        // 3. 相機平滑跟隨
        cameraX += (player.x - canvas.width / 2 - cameraX) * 0.1;

        // 4. 繪製畫面
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 繪製地形
        let startX = Math.floor(cameraX / tileSize);
        let endX = startX + Math.ceil(canvas.width / tileSize) + 1;
        for (let x = startX; x < endX; x++) {
            for (let y = 0; y < 25; y++) {
                let b = getBlock(x, y);
                if (b > 0) {
                    ctx.fillStyle = b === 2 ? '#228B22' : (b === 1 ? '#8B4513' : '#666');
                    ctx.fillRect(x * tileSize - cameraX, y * tileSize, tileSize, tileSize);
                    // 方塊邊框
                    ctx.strokeStyle = 'rgba(0,0,0,0.05)';
                    ctx.strokeRect(x * tileSize - cameraX, y * tileSize, tileSize, tileSize);
                }
            }
        }

        // 繪製角色
        ctx.fillStyle = '#FF5733';
        ctx.fillRect(player.x - cameraX, player.y, player.w, player.h);

        requestAnimationFrame(loop);
    }

    loop();
</script>
</body>
</html>
