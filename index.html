<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>未來的 Super Human - 完整版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: "Microsoft JhengHei", sans-serif; user-select: none; }
        canvas { display: block; }
        
        /* 選單層級設定 */
        .screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.9); color: white; z-index: 1000;
        }
        h1 { font-size: 55px; color: #f1c40f; text-shadow: 0 0 20px #f1c40f; margin-bottom: 30px; }
        .btn {
            padding: 15px 50px; margin: 10px; font-size: 24px; cursor: pointer;
            background: #f1c40f; border: none; color: #000; border-radius: 40px;
            font-weight: bold; transition: 0.2s;
        }
        .btn:hover { background: #fff; transform: scale(1.1); }
        input { font-size: 24px; width: 70px; text-align: center; margin: 15px; border-radius: 10px; border: none; }
        
        /* 遊戲介面 */
        #ui-bar { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; border: 1px solid #f1c40f; display: none; z-index: 100; }
        #hotbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; gap: 10px; background: rgba(0,0,0,0.8); padding: 10px; border: 2px solid #fff; z-index: 100; }
        .slot { width: 50px; height: 50px; border: 2px solid #555; display: flex; align-items: center; justify-content: center; color: white; }
        .slot.active { border-color: #f1c40f; box-shadow: 0 0 10px #f1c40f; }
    </style>
</head>
<body>

    <div id="start-screen" class="screen">
        <h1>未來的 Super Human</h1>
        <button class="btn" onclick="preStart(1)">開始遊戲</button>
        <button class="btn" style="background:#3498db; color:white;" onclick="showMulti()">多人連線</button>
    </div>

    <div id="multi-screen" class="screen" style="display:none;">
        <h1>設定總人數 (2-10)</h1>
        <input type="number" id="playerCount" min="2" max="10" value="5">
        <button class="btn" onclick="preStart(document.getElementById('playerCount').value)">點此開始遊戲</button>
        <button class="btn" style="background:#666; font-size:16px;" onclick="location.reload()">返回首頁</button>
    </div>

    <div id="ui-bar">
        ❤️ 血量: <span id="hp-val">100</span> | 🕒 <span id="time-val">07:00</span><br>
        📍 座標: <span id="pos-val">0,0</span> | ⚔️ 攻擊: [K 鍵]
    </div>

    <div id="hotbar">
        <div id="slot1" class="slot active">草</div>
        <div id="slot2" class="slot">土</div>
        <div id="slot3" class="slot">石</div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let isStarted = false, ticks = 420; // 07:00
let camX = 0, world = {}, selBlock = 2;
const tileSize = 32;
const colors = { 1: '#8B4513', 2: '#228B22', 3: '#666' };

let p = { x: 300, y: 0, w: 24, h: 44, vx: 0, vy: 0, hp: 100, grounded: false, atk: 0 };
let teams = [], vils = [], anis = [], mobs = [];

function showMulti() {
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('multi-screen').style.display = 'flex';
}

function preStart(n) {
    document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
    document.getElementById('ui-bar').style.display = 'block';
    document.getElementById('hotbar').style.display = 'flex';
    
    // 生成隊友 (黃色)
    for(let i=0; i < n-1; i++) {
        teams.push({ x: 300 + Math.random()*200, y: -50, w: 24, h: 44, vx: 0, vy: 0, grounded: false, state: 'idle', timer: 0 });
    }
    // 生成村莊 (藍色村民) 與 動物 (白色)
    for(let i=0; i<6; i++) vils.push({ x: 1500 + i*180, y: -50, w: 24, h: 44, vx: 0, vy: 0, grounded: false });
    for(let i=0; i<8; i++) anis.push({ x: 600 + i*350, y: -50, w: 20, h: 20, vx: 0, vy: 0, grounded: false });

    isStarted = true; resize(); loop();
}

function getB(x, y) {
    const key = `${Math.floor(x)}_${Math.floor(y)}`;
    if (world[key] !== undefined) return world[key];
    let g = Math.floor(12 + Math.sin(x * 0.1) * 3);
    return y < g ? 0 : (y === g ? 2 : 1);
}

// 物理與跳躍系統 (防止穿牆)
function physics(o) {
    o.vy += 0.6;
    let nX = o.x + o.vx;
    let gX = (o.vx > 0) ? Math.floor((nX + o.w) / tileSize) : Math.floor(nX / tileSize);
    let tY = Math.floor(o.y / tileSize), bY = Math.floor((o.y + o.h - 4) / tileSize);

    if (getB(gX, tY) === 0 && getB(gX, bY) === 0) {
        o.x = nX;
    } else if (o.grounded) {
        o.vy = -10; // 自動跳躍
    }

    o.y += o.vy;
    o.grounded = false;
    let lX = Math.floor(o.x / tileSize), rX = Math.floor((o.x + o.w - 1) / tileSize), fY = Math.floor((o.y + o.h) / tileSize);
    if (getB(lX, fY) !== 0 || getB(rX, fY) !== 0) {
        o.y = fY * tileSize - o.h; o.vy = 0; o.grounded = true;
    }
}

let keys = {};
window.onkeydown = (e) => {
    keys[e.code] = true;
    if (e.key === '1') { selBlock = 2; updateSlot(1); }
    if (e.key === '2') { selBlock = 1; updateSlot(2); }
    if (e.key === '3') { selBlock = 3; updateSlot(3); }
};
window.onkeyup = (e) => keys[e.code] = false;

function updateSlot(idx) {
    document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
    document.getElementById('slot'+idx).classList.add('active');
}

canvas.onmousedown = (e) => {
    if (!isStarted) return;
    const rect = canvas.getBoundingClientRect();
    const gx = Math.floor((e.clientX - rect.left + camX) / tileSize);
    const gy = Math.floor((e.clientY - rect.top) / tileSize);
    if (e.button === 0) world[`${gx}_${gy}`] = 0;
    if (e.button === 2) world[`${gx}_${gy}`] = selBlock;
};
canvas.oncontextmenu = e => e.preventDefault();

function loop() {
    if (!isStarted) return;
    ticks = (ticks + 0.4) % 1440;
    let hr = Math.floor(ticks / 60);

    // 玩家控制與攻擊
    p.vx = (keys['KeyA'] ? -4.5 : keys['KeyD'] ? 4.5 : 0);
    if (keys['Space'] && p.grounded) p.vy = -12;
    if (keys['KeyK'] && p.atk <= 0) {
        p.atk = 15;
        mobs.forEach(m => { if(Math.abs(m.x - p.x) < 70) { m.hp -= 10; m.vx = (m.x > p.x ? 10 : -10); } });
    }
    if (p.atk > 0) p.atk--;
    physics(p);
    camX = p.x - canvas.width/2;

    // 隊友 AI (自由移動)
    teams.forEach(tm => {
        if (Math.abs(p.x - tm.x) > 600) tm.vx = (p.x > tm.x) ? 3 : -3; // 離玩家太遠才跟隨
        else if (Math.random() < 0.01) tm.vx = (Math.random()-0.5)*2.5; // 平時閒晃
        physics(tm);
    });

    // 村民與動物 AI
    [...vils, ...anis].forEach(e => { if(Math.random()<0.005) e.vx = (Math.random()-0.5)*2; physics(e); });

    // 怪物生成 (18:10 ~ 06:30)
    if ((hr >= 18 || hr < 6) && Math.random() < 0.012) {
        mobs.push({ x: p.x + 800, y: -50, w: 24, h: 44, vx: -2.5, vy: 0, hp: 20 });
    }
    mobs.forEach((m, i) => {
        m.vx = (m.x < p.x) ? 2.5 : -2.5;
        physics(m);
        if (Math.abs(m.x - p.x) < 25 && Math.abs(m.y - p.y) < 30) p.hp -= 0.4;
        if (m.hp <= 0) mobs.splice(i, 1);
    });

    if (p.hp <= 0) { alert("你失敗了！"); location.reload(); }
    render();
    requestAnimationFrame(loop);
}

function render() {
    let hr = Math.floor(ticks / 60);
    // 晝夜變色邏輯
    let bg = "#87ceeb"; // 白天
    if (ticks >= 1050 && ticks < 1080) bg = "#ff7832"; // 17:30 傍晚
    else if (ticks >= 1080 || ticks < 390) bg = "#050515"; // 18:10 晚上
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    let sX = Math.floor(camX / tileSize), eX = sX + Math.ceil(canvas.width / tileSize) + 1;
    for (let x = sX; x < eX; x++) {
        for (let y = 0; y < 25; y++) {
            let b = getB(x, y);
            if (b !== 0) { ctx.fillStyle = colors[b]; ctx.fillRect(x*tileSize - camX, y*tileSize, tileSize, tileSize); }
        }
    }

    const draw = (list, col) => list.forEach(e => { ctx.fillStyle = col; ctx.fillRect(e.x - camX, e.y, e.w, e.h); });
    draw(teams, "#f1c40f"); draw(vils, "#3498db"); draw(anis, "#ffffff"); draw(mobs, "#2ecc71");
    ctx.fillStyle = "#FF5733"; ctx.fillRect(p.x - camX, p.y, p.w, p.h);
    if (p.atk > 5) { ctx.fillStyle = "white"; ctx.fillRect(p.x-camX + (p.vx>=0?25:-25), p.y+10, 25, 8); }

    document.getElementById('time-val').innerText = `${hr.toString().padStart(2,'0')}:${Math.floor(ticks%60).toString().padStart(2,'0')}`;
    document.getElementById('hp-val').innerText = Math.ceil(p.hp);
    document.getElementById('pos-val').innerText = `${Math.floor(p.x/32)}, ${Math.floor(p.y/32)}`;
}

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.onresize = resize;
</script>
</body>
</html>
