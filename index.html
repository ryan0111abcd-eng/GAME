<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>未來的 Super Human - 冒險生存版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: "Microsoft JhengHei", sans-serif; user-select: none; }
        canvas { display: block; position: absolute; top: 0; left: 0; }
        
        /* 強制置頂選單 */
        .ui-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.95); color: white; z-index: 9999;
        }
        h1 { font-size: 55px; color: #f1c40f; text-shadow: 0 0 20px #f1c40f; margin-bottom: 40px; }
        .btn {
            padding: 18px 60px; margin: 15px; font-size: 26px; cursor: pointer;
            background: #f1c40f; border: none; color: #000; border-radius: 50px;
            font-weight: bold; transition: 0.2s; pointer-events: auto;
        }
        .btn:hover { background: #fff; transform: scale(1.05); }
        input { font-size: 30px; width: 100px; text-align: center; margin: 20px; border-radius: 10px; border: none; }
        
        /* 遊戲內介面 */
        #game-stats { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; z-index: 100; border: 1px solid #f1c40f; display: none; pointer-events: none; }
        #hotbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; gap: 10px; background: rgba(0,0,0,0.8); padding: 10px; border: 2px solid #fff; z-index: 100; }
        .slot { width: 55px; height: 55px; border: 2px solid #555; display: flex; align-items: center; justify-content: center; color: white; }
        .slot.active { border-color: #f1c40f; box-shadow: 0 0 10px #f1c40f; }
    </style>
</head>
<body>

    <div id="screen-main" class="ui-screen">
        <h1>未來的 Super Human</h1>
        <button class="btn" onclick="startNow(1)">開始遊戲</button>
        <button class="btn" style="background:#3498db; color:white;" onclick="goMulti()">多人連線</button>
    </div>

    <div id="screen-multi" class="ui-screen" style="display:none;">
        <h1>設定總人數 (2-10人)</h1>
        <input type="number" id="pCount" min="2" max="10" value="5">
        <button class="btn" onclick="startNow(document.getElementById('pCount').value)">點此開始遊戲</button>
        <button class="btn" style="background:#666; font-size: 18px;" onclick="location.reload()">返回</button>
    </div>

    <div id="game-stats">
        ❤️ 血量: <span id="hp-txt">100</span> | 🕒 時間: <span id="time-txt">07:00</span><br>
        📍 座標: <span id="pos-txt">0,0</span> | ⚔️ 攻擊: [K 鍵] | 🛠️ 挖/蓋: 滑鼠
    </div>

    <div id="hotbar">
        <div id="s1" class="slot active">草</div>
        <div id="s2" class="slot">土</div>
        <div id="s3" class="slot">石</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    document.getElementById('screen-main').style.display = 'none';
    document.getElementById('screen-multi').style.display = 'flex';

    document.querySelectorAll('.ui-screen').forEach(s => s.style.display = 'none');

    document.getElementById('hotbar').style.display = 'flex';
    
    // 生成隊友 (黃色)
    for(let i=0; i < num - 1; i++) {

    resize();
    gameLoop();
}

    return (y < ground) ? 0 : (y === ground ? 2 : 1);
