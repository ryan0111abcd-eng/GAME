<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Super Human - 終極點擊修復</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        
        /* 選單容器：強制在最前層 */
        #ui-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: #222; z-index: 999999;
        }

        .box {
            background: #333; padding: 50px; border: 5px solid #f1c40f;
            border-radius: 20px; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        /* 強制提升按鈕權限 */
        .btn {
            display: block; width: 250px; padding: 20px; margin: 15px auto;
            font-size: 24px; font-weight: bold; cursor: pointer !important;
            background: #f1c40f; color: #000; border: none; border-radius: 10px;
            pointer-events: auto !important; position: relative; z-index: 1000000;
        }
        .btn:hover { background: #fff; transform: scale(1.1); }

        #hud { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 12px; border: 2px solid #f1c40f; display: none; z-index: 5000; color: white; }
        
        #inventory {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: none; gap: 10px; background: rgba(0,0,0,0.8); padding: 15px;
            border-radius: 15px; z-index: 5000; border: 2px solid #fff;
        }
        .slot { width: 60px; height: 60px; border: 2px solid #555; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; background: #222; font-size: 12px; }
        .slot.active { border-color: #f1c40f; background: #444; box-shadow: 0 0 15px #f1c40f; }
        
        select { font-size: 20px; padding: 10px; margin: 10px; width: 100%; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="main-menu" class="box">
            <h1 style="color:#f1c40f; font-size: 48px; margin-bottom: 30px;">SUPER HUMAN</h1>
            <button class="btn" onclick="start(1)">單人探險</button>
            <button class="btn" style="background:#3498db; color:#fff;" onclick="toMulti()">多人連線</button>
        </div>

        <div id="multi-menu" class="box" style="display:none;">
            <h2 style="color:white;">多人連線人數</h2>
            <select id="p-count">
                <option value="2">2 人</option>
                <option value="5" selected>5 人</option>
                <option value="10">10 人</option>
            </select>
            <button class="btn" onclick="start(document.getElementById('p-count').value)">開始遊戲</button>
            <button class="btn" style="background:#666; color:#fff;" onclick="toMain()">返回</button>
        </div>
    </div>

    <div id="hud">❤️ 血量: <span id="hp">100</span> | 🕒 <span id="time">07:00</span> | ⚔️ K 攻擊 | ⛏️ 左挖右蓋</div>

    <div id="inventory">
        <div class="slot active" id="sl-1"><div style="width:20px;height:20px;background:#8B4513"></div>1:泥土</div>
        <div class="slot" id="sl-2"><div style="width:20px;height:20px;background:#228B22"></div>2:草地</div>
        <div class="slot" id="sl-3"><div style="width:20px;height:20px;background:#666"></div>3:石頭</div>
        <div class="slot" id="sl-4"><div style="width:20px;height:20px;background:#cd853f"></div>4:木頭</div>
    </div>

<script>
let canvas, ctx, isRunning = false;
let ticks = 420, world = {}, camX = 0, camY = 0;
const TILE = 32, COLORS = { 1: '#8B4513', 2: '#228B22', 3: '#666', 4: '#cd853f' };
let p = { x: 500, y: 0, w: 2
