<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Super Human - 建築大師版</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; color: white; }
        .layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1a1a1a; z-index: 9999; }
        .btn { padding: 18px 45px; font-size: 24px; cursor: pointer; margin: 10px; background: #f1c40f; border: none; font-weight: bold; border-radius: 12px; transition: 0.2s; }
        .btn:hover { background: #fff; transform: scale(1.05); }
        #hud { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 12px; border: 2px solid #f1c40f; display: none; z-index: 5000; border-radius: 10px; pointer-events: none; }
        #inventory { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; gap: 10px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 10px; z-index: 5000; border: 1px solid #555; }
        .slot { width: 50px; height: 50px; border: 2px solid #555; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; background: #333; transition: 0.2s; }
        .slot.active { border-color: #f1c40f; background: #555; box-shadow: 0 0 10px #f1c40f; transform: translateY(-5px); }
        .block-preview { width: 20px; height: 20px; margin-bottom: 2px; }
        select { padding: 10px; font-size: 20px; margin: 10px; }
    </style>
</head>
<body>

    <div id="layer-main" class="layer">
        <h1 style="color:#f1c40f; font-size: 48px;">SUPER HUMAN</h1>
        <button class="btn" id="start-single">單人探險</button>
        <button class="btn" id="go-to-select" style="background:#3498db; color:white;">多人連線模式</button>
    </div>

    <div id="layer-select" class="layer" style="display:none;">
        <h2>選擇連線人數 (2-10人)</h2>
        <select id="p-count">
            <option value="2">2 人</option><option value="5" selected>5 人</option><option value="10">10 人</option>
        </select>
        <button class="btn" id="start-multi">開始遊戲</button>
    </div>

    <div id="hud">❤️ 血量: <span id="hp">100</span> | 🕒 <span id="time">07:00</span> | ⚔️ K 攻擊 | ⛏️ 左挖右蓋</div>

    <div id="inventory">
        <div class="slot active" id="slot-1"><div class="block-preview" style="background:#8B4513"></div>1:泥土</div>
        <div class="slot" id="slot-2"><div class="block-preview" style="background:#228B22"></div>2:草地</div>
        <div class="slot" id="slot-3"><div class="block-preview" style="background:#666"></div>3:石頭</div>
        <div class="slot" id="slot-4"><div class="block-preview" style="background:#cd853f"></div>4:木頭</div>
    </div>

let p = { x: 500, y: 0, w: 22, h: 42, vx: 0, vy: 0, hp: 100, ground: false, atkTimer: 0 };
let agents = [], keys = {}, curBlock = 1;

document.getElementById('start-single').onclick = () => initGame(1);
document.getElementById('go-to-select').onclick = () => { document.getElementById('layer-main').style.display='none'; document.getElementById('layer-select').style.display='flex'; };
document.getElementById('start-multi').onclick = () => initGame(parseInt(document.getElementById('p-count').value));

function getB(gx, gy) {
    if(world[`${gx}_${gy}`] !== undefined) return world[`${gx}_${gy}`];
    let fY = getGY(gx); return gy < fY ? 0 : (gy === fY ? 2 : 1);
}

    document.querySelectorAll('.layer').forEach(l => l.style.display='none');
    document.getElementById('hud').style.display='block';
    document.getElementById('inventory').style.display='flex';
    canvas = document.createElement('canvas');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    document.body.appendChild(canvas); ctx = canvas.getContext('2d');
    p.y = getGY(p.x/TILE)*TILE - 150;
    if(num > 1) {
        for(let i=0; i<num-1; i++) agents.push({x:600+i*150, y:-200, w:22, h:42, vx:0, vy:0, hp:100, max:100, type:['ally','vil','ani'][i%3], dir:1, state:'idle', sTimer:Math.random()*100});
    }

    // 滑鼠監聽
    window.addEventListener('mousedown', (e) => {
        if(!isRunning) return;
        const gx = Math.floor((e.clientX + camX) / TILE), gy = Math.floor((e.clientY + camY) / TILE);
        if(e.button === 0) world[`${gx}_${gy}`] = 0;
        if(e.button === 2) { if(getB(gx, gy) === 0) world[`${gx}_${gy}`] = curBlock; }
    });
    window.oncontextmenu = (e) => e.preventDefault();
