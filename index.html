<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>SUPER HUMAN 2026 - THE PEAK</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; user-select: none; }
        .page { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #050505; color: #f1c40f; text-align: center; }
        .btn { padding: 18px 45px; font-size: 26px; cursor: pointer; margin: 10px; background: #f1c40f; border: 4px solid #fff; border-radius: 15px; font-weight: bold; color: #000; box-shadow: 0 6px 0 #b8860b; transition: 0.1s; }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #b8860b; }
        .in-box { padding: 15px; font-size: 24px; border: 4px solid #f1c40f; border-radius: 12px; background: #fff; color: #000; text-align: center; margin-bottom: 25px; width: 320px; outline: none; }
        #hud { position: fixed; top: 15px; left: 15px; z-index: 1000; color: white; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 12px; border: 2px solid #f1c40f; display: none; pointer-events: none; line-height: 1.6; }
        #mini-map { position: fixed; top: 15px; right: 15px; width: 160px; height: 160px; border: 3px solid #fff; border-radius: 50%; z-index: 1000; display: none; background: rgba(0,0,0,0.5); overflow: hidden; }
        #esc-menu { position: fixed; inset: 0; z-index: 20000; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.95); }
        canvas#g { display: none; position: absolute; top: 0; left: 0; z-index: 10; }
        .sel-box { color: #f1c40f; font-weight: bold; border-bottom: 2px solid #f1c40f; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="p-auth" class="page">
        <h1 style="letter-spacing:5px;">SUPER HUMAN SYSTEM</h1>
        <input type="password" id="pw" class="in-box" placeholder="Access Key">
        <button class="btn" onclick="auth()">VERIFY</button>
    </div>

    <div id="p-mode" class="page" style="display:none;">
        <h1>認證成功</h1>
        <button class="btn" onclick="setM(1)">👤 單人模式</button>
        <button class="btn" onclick="document.getElementById('p-mode').style.display='none';document.getElementById('p-set').style.display='flex';">👥 多人連線</button>
    </div>

    <div id="p-set" class="page" style="display:none;">
        <h1>小隊規模</h1>
        <h2 id="pv">5 人</h2>
        <input type="range" min="2" max="15" value="5" oninput="document.getElementById('pv').innerText=this.value+' 人'" id="sld" style="width:300px;">
        <button class="btn" onclick="goLive(document.getElementById('sld').value)">進入世界</button>
    </div>

    <div id="esc-menu">
        <h1 style="color:#f1c40f; font-size: 50px;">暫停</h1>
        <button class="btn" onclick="toggleEsc()" style="background:#555; color:white;">⬅️ 繼續</button>
        <button class="btn" onclick="location.reload()">🚪 離開</button>
    </div>

    <div id="hud">
        ❤️ HP: <span id="hp-u">100</span> | 🕒 <span id="tm-u">12:00</span><br>
        🏗️ 建築：<span id="cur-b" class="sel-box">草地 (2)</span><br>
        📍 海拔：<span id="alt-u">0</span> m
    </div>
    <div id="mini-map"><canvas id="mC" width="160" height="160"></canvas></div>
    <canvas id="g"></canvas>

<script>
    var live = false, esc = false, world = {}, keys = {}, ents = [], ticks = 600, sSize = 1;
    // 初始位置在平原
    var p = { x: 0, y: -300, w: 22, h: 42, vx: 0, vy: 0, hp: 100, max: 100, gr: false };
    var T = 32, selB = 2;

    const B_NAMES = { 1:'石頭', 2:'草地', 3:'泥土', 4:'沙子', 5:'木頭', 6:'葉子', 7:'雪地', 8:'水' };
    const B_COLORS = { 1:'#7f8c8d', 2:'#2ecc71', 3:'#795548', 4:'#f1c40f', 5:'#5d4037', 6:'#27ae60', 7:'#ecf0f1', 8:'#3498db' };

    function auth() {
        if(document.getElementById('pw').value.trim() === 'ryan0111407') {
            document.getElementById('p-auth').style.display='none';
            document.getElementById('p-mode').style.display='flex';
        } else { alert("金鑰無效"); }
    }
    
    function goLive(n) {
        sSize = n;
        document.querySelectorAll('.page').forEach(el=>el.style.display='none');
        document.getElementById('hud').style.display='block';
        document.getElementById('mini-map').style.display='block';
        var cvs=document.getElementById('g'); cvs.style.display='block';
        cvs.width=window.innerWidth; cvs.height=window.innerHeight;
        for(var i=0; i<sSize-1; i++) spawn('ally', p.x + (Math.random()-0.5)*500, -320);
        live=true; loop();
    }

    function spawn(t, x, y) { ents.push({ type: t, x: x, y: y, w: 22, h: 42, vx: 0, vy: 0, hp: 100, max: 100, dir: 1 }); }

    // ==========================================
    // --- 核心：2500M 轉折垂直地形引擎 ---
    // ==========================================
    function getB(gx, gy) {
        if(world[gx+'_'+gy]!==undefined) return world[gx+'_'+gy];
        
        var absGx = Math.abs(gx);
        var f = 8; // 基本高度

        // 1. 基座階段 (海拔 0-2500m)
        // 隨著 Gx 增加，高度緩慢平方上升
        if (absGx < 150) {
            f = Math.floor(8 + (Math.pow(absGx * 0.05, 2) * 4));
        } else {
            // 2. 垂直階段 (海拔 > 2500m)
            // 當走得夠遠，f 直接垂直跳升
            var baseHigh = Math.floor(8 + (Math.pow(150 * 0.05, 2) * 4)); // 約 80 格 (2560m)
            f = baseHigh + (absGx - 150) * 10; // 每一格 X 就上升 10 格 Y (超級懸崖)
            
            // 限制最高點約 3200m (f=100)
            if (f > 100) f = 100 + Math.sin(gx*0.5)*2; 
        }

        if (gy < f) return 0;
        if (gy === f && gy >= 78) return 7; // 高處積雪
        if (gy === f) return 2; // 草地
        if (gy > f && gy < f + 5) return 3; // 泥土
        return 1;
    }

    function check(x,y) { for(var i=Math.floor(x/T);i<=Math.floor((x+22)/T);i++)for(var j=Math.floor(y/T);j<=Math.floor((y+42)/T);j++)if(getB(i,j)>0)return true; return false; }
    function toggleEsc() { if(!live) return; esc = !esc; document.getElementById('esc-menu').style.display = esc ? 'flex' : 'none'; }

    window.addEventListener('contextmenu', e => e.preventDefault());

    window.onmousedown=function(e){
        if(!live || esc) return;
        var cvs=document.getElementById('g');
        var gx=Math.floor((e.clientX+(p.x-cvs.width/2))/T), gy=Math.floor((e.clientY+(p.y-cvs.height/2))/T);
        if(e.button===0) world[gx+'_'+gy]=0;
        else if(e.button===2) world[gx+'_'+gy]=selB; 
    };

    window.onkeydown=function(e){
        if(e.code === 'Escape') toggleEsc();
        if(!esc && e.keyCode >= 49 && e.keyCode <= 56) {
            selB = e.keyCode - 48; 
            document.getElementById('cur-b').innerText = B_NAMES[selB] + " (" + selB + ")";
        }
        keys[e.code]=true;
    };
    window.onkeyup=function(e){keys[e.code]=false;};

    function loop() {
        if(!live || esc) { requestAnimationFrame(loop); return; }
        var cvs=document.getElementById('g'), ctx=cvs.getContext('2d');
        ticks=(ticks+0.05)%1440; 

        if(ents.filter(e=>e.type==='pig').length < 8) spawn('pig', p.x + (Math.random()>0.5?1200:-1200), p.y);

        [p].concat(ents).forEach(function(e) {
            e.vy+=0.8; e.y+=e.vy;
            if(check(e.x,e.y)){if(e.vy>0){while(check(e.x,e.y))e.y-=0.5;e.gr=true;}e.vy=0;}else e.gr=false;
            if(e===p){
                var dx=(keys['KeyD']?7:0)-(keys['KeyA']?7:0);
                if(dx!==0){p.x+=dx; if(check(p.x,p.y))p.x-=dx;}
                if(keys['Space']&&p.gr)p.vy=-14;
            } else {
                if(e.type==='ally'){
                    if(Math.abs(p.x-e.x)>150) e.x+=(p.x>e.x?2.5:-2.5);
                    if(check(e.x+(p.x>e.x?5:-5),e.y) && e.gr) e.vy=-10;
                } else if(e.type==='pig'){
                    if(Math.random()<0.01) e.dir*=-1;
                    e.x+=e.dir*1.5; if(check(e.x+e.dir*5,e.y)) e.dir*=-1;
                }
            }
        });

        document.getElementById('tm-u').innerText=Math.floor(ticks/60).toString().padStart(2,'0')+":"+Math.floor(ticks%60).toString().padStart(2,'0');
        document.getElementById('alt-u').innerText=Math.floor(Math.abs(p.y/T));
        
        render(ctx, cvs);
        requestAnimationFrame(loop);
    }

    function render(ctx, cvs) {
        ctx.fillStyle=(ticks>1050||ticks<350)?'#050510':'#87ceeb';
        ctx.fillRect(0,0,cvs.width,cvs.height);
        var cx=p.x-cvs.width/2, cy=p.y-cvs.height/2;

        for(var x=Math.floor(cx/T);x<=Math.ceil((cx+cvs.width)/T);x++){
            for(var y=Math.floor(cy/T);y<=Math.ceil((cy+cvs.height)/T);y++){
                var b=getB(x,y); 
                if(b>0){ ctx.fillStyle=B_COLORS[b]; ctx.fillRect(x*T-cx,y*T-cy,T+0.5,T+0.5); }
            }
        }
        [p].concat(ents).forEach(function(e) {
            ctx.fillStyle=e===p?'#e67e22':(e.type==='ally'?'#3498db':'#ff9ff3');
            ctx.fillRect(e.x-cx,e.y-cy,e.w,e.h);
            ctx.fillStyle='#ff0000'; ctx.fillRect(e.x-cx,e.y-cy-12,e.w,6);
            ctx.fillStyle='#00ff00'; ctx.fillRect(e.x-cx,e.y-cy-12,e.w*(e.hp/e.max),6);
        });

        var mctx=document.getElementById('mC').getContext('2d');
        mctx.fillStyle='#000'; mctx.fillRect(0,0,160,160);
        mctx.save(); mctx.translate(80,80);
        [p].concat(ents).forEach(e=>{
            mctx.fillStyle=e===p?'#fff':'#3498db';
            var dx=(e.x-p.x)*0.06, dy=(e.y-p.y)*0.06;
            if(dx*dx+dy*dy<75*75){mctx.beginPath(); mctx.arc(dx,dy,3.5,0,7); mctx.fill();}
        });
        mctx.restore();
    }
</script>
</body>
</html>
