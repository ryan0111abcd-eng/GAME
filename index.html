<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>2D Minecraft: 黃潮來襲戰鬥版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #2c3e50; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        #ui { 
            position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.8); 
            color: #f1c40f; padding: 15px; border-radius: 10px; border: 2px solid #f1c40f;
            pointer-events: none; box-shadow: 0 0 15px #f1c40f;
        }
        #hp-bar { width: 250px; height: 20px; background: #333; border: 1px solid #f1c40f; margin-top: 8px; }
        #hp-fill { width: 100%; height: 100%; background: #ff0000; }
        #music-hint { color: #fff; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="ui">
        <div style="font-size: 18px; font-weight: bold;">🦁 黃潮來襲：極限模式</div>
        ❤️ 生命值：<div id="hp-bar"><div id="hp-fill"></div></div>
        <div id="music-hint">點擊畫面開啟背景音樂 🎵</div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // --- 音效設定 ---
    const bgm = new Audio('中信兄弟應援曲黃潮來襲歌詞版.mp3');
    bgm.loop = true; // 循環播放
    let musicStarted = false;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    const tileSize = 32;
    let cameraX = 0;
    let worldData = JSON.parse(localStorage.getItem('mc_music_v1')) || {};
    let keys = {};

    let player = { 
        x: 100, y: 100, w: 22, h: 42, vx: 0, vy: 0, 
        speed: 15, jump: -18, grounded: false, hp: 100, atkTimer: 0 
    };

    let enemies = [];
    function spawnEnemy() {
        if (enemies.length < 8) {
            let dir = (Math.random() > 0.5 ? 1 : -1);
            enemies.push({ x: player.x + (dir * 800), y: 0, w: 24, h: 44, vx: 0, vy: 0, hp: 60 });
        }
    }
    setInterval(spawnEnemy, 1500);

    function getBlock(x, y) {
        const key = `${Math.floor(x)}_${Math.floor(y)}`;
        if (worldData[key] !== undefined) return worldData[key];
        let ground = Math.floor(12 + Math.sin(x * 0.1) * 4);
        return (y < ground) ? 0 : (y === ground ? 2 : 1);
    }

    function isColliding(nx, ny, objW, objH) {
        let x1 = Math.floor(nx / tileSize), x2 = Math.floor((nx + objW) / tileSize);
        let y1 = Math.floor(ny / tileSize), y2 = Math.floor((ny + objH) / tileSize);
        for (let x = x1; x <= x2; x++) {
            for (let y = y1; y <= y2; y++) { if (getBlock(x, y) > 0) return true; }
        }
        return false;
    }

    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;

    canvas.onmousedown = (e) => {
        // 點擊後啟動音樂
        if (!musicStarted) {
            bgm.play();
            musicStarted = true;
            document.getElementById('music-hint').innerText = "音樂播放中 🎶";
        }

        const gx = Math.floor((e.clientX + cameraX) / tileSize);
        const gy = Math.floor(e.clientY / tileSize);
        if (e.button === 0) { // 左鍵攻擊
            player.atkTimer = 5;
            enemies.forEach(en => {
                if (Math.hypot(en.x - player.x, en.y - player.y) < 120) {
                    en.hp -= 30; en.vx = (player.x < en.x ? 30 : -30); en.vy = -10;
                }
            });
            worldData[`${gx}_${gy}`] = 0;
        }
        if (e.button === 2) worldData[`${gx}_${gy}`] = 3;
        localStorage.setItem('mc_music_v1', JSON.stringify(worldData));
    };
    canvas.oncontextmenu = (e) => e.preventDefault();

    function loop() {
        player.vx = keys['KeyA'] ? -player.speed : (keys['KeyD'] ? player.speed : 0);
        
        let nextX = player.x + player.vx;
        if (isColliding(nextX, player.y, player.w, player.h)) {
            if (!isColliding(nextX, player.y - tileSize, player.w, player.h)) {
                player.x = nextX; player.y -= tileSize;
            } else { player.vx = 0; }
        } else { player.x = nextX; }

        player.vy += 1.0;
        if (keys['Space'] && player.grounded) { player.vy = player.jump; player.grounded = false; }

        if (!isColliding(player.x, player.y + player.vy, player.w, player.h)) {
            player.y += player.vy; player.grounded = false;
        } else {
            if (player.vy > 0) player.grounded = true;
            player.vy = 0;
        }

        cameraX += (player.x - canvas.width / 2 - cameraX) * 0.3;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        let startX = Math.floor(cameraX / tileSize);
        let endX = startX + Math.ceil(canvas.width / tileSize) + 1;
        for (let x = startX; x < endX; x++) {
            for (let y = 0; y < 25; y++) {
                let b = getBlock(x, y);
                if (b > 0) {
                    ctx.fillStyle = b === 2 ? '#f1c40f' : (b === 1 ? '#8b4513' : '#bdc3c7'); // 方塊變黃色系
                    ctx.fillRect(x * tileSize - cameraX, y * tileSize, tileSize, tileSize);
                }
            }
        }

        enemies = enemies.filter(en => en.hp > 0);
        enemies.forEach(en => {
            en.vx = (player.x > en.x) ? 5 : -5;
            en.vy += 0.8;
            if (!isColliding(en.x + en.vx, en.y, en.w, en.h)) en.x += en.vx;
            if (!isColliding(en.x, en.y + en.vy, en.w, en.h)) en.y += en.vy; else en.vy = 0;
            if (Math.abs(en.x - player.x) < 25 && Math.abs(en.y - player.y) < 25) player.hp -= 1.5;
            ctx.fillStyle = '#006400';
            ctx.fillRect(en.x - cameraX, en.y, en.w, en.h);
        });

        ctx.fillStyle = '#f1c40f'; // 玩家變黃色
        ctx.fillRect(player.x - cameraX, player.y, player.w, player.h);
        
        if (player.atkTimer > 0) {
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 6; ctx.beginPath();
            ctx.arc(player.x - cameraX + player.w/2, player.y + player.h/2, 60, 0, Math.PI*2);
            ctx.stroke(); player.atkTimer--;
        }

        document.getElementById('hp-fill').style.width = Math.max(0, player.hp) + "%";
        if (player.hp <= 0) { alert("Game Over"); location.reload(); }

        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
