<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>未來的 Super Human - 終極修復版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: "Microsoft JhengHei", sans-serif; }
        canvas { display: block; background: #000; }
        
        /* 全螢幕遮罩層 */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 999; color: white;
        }
        
        h1 { color: #f1c40f; font-size: 48px; text-shadow: 0 0 15px #f1c40f; margin-bottom: 30px; }
        .btn {
            padding: 15px 60px; font-size: 24px; background: #f1c40f; color: #000;
            border: none; border-radius: 50px; cursor: pointer; font-weight: bold;
            margin: 15px; transition: 0.2s; box-shadow: 0 4px 15px rgba(241,196,15,0.4);
        }
        .btn:hover { background: #fff; transform: scale(1.05); }
        
        #ui { 
            position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.8); 
            color: #fff; padding: 15px; border-radius: 10px; display: none;
            border: 1px solid #f1c40f; pointer-events: none; z-index: 10;
        }
        input[type=range] { width: 250px; cursor: pointer; margin: 20px; }
    </style>
</head>
<body>

    <div id="main-menu" class="overlay">
        <h1>未來的 Super Human</h1>
        <button id="btn-single" class="btn">單人遊戲</button>
        <button id="btn-show-multi" class="btn" style="background:#3498db; color:white;">多人連線</button>
    </div>

    <div id="multi-setup" class="overlay" style="display:none;">
        <h1>設定隊友數量</h1>
        <p style="font-size:24px;">遊戲總人數: <span id="p-val" style="color:#f1c40f">5</span></p>
        <input type="range" id="p-slider" min="2" max="10" value="5">
        <button id="btn-multi-start" class="btn">開始連線遊戲</button>
        <p onclick="location.reload()" style="cursor:pointer; color:#888;">返回主單</p>
    </div>

    <div id="ui">
        <b>🌍 時間：<span id="clock" style="color:#f1c40f">07:00</span></b><br>
        ❤️ 生命：<span id="hp">100</span> | 👥 人數：<span id="player-num">1</span><br>
        <small>移動: A, D | 跳躍: 空白 | 攻擊: 左鍵</small>
    </div>
    
    <canvas id="gameCanvas"></canvas>

<script>
    // --- 介面控制邏輯 ---
    const mainMenu = document.getElementById('main-menu');
    const multiSetup = document.getElementById('multi-setup');
    const ui = document.getElementById('ui');
    const pSlider = document.getElementById('p-slider');
    const pVal = document.getElementById('p-val');

    pSlider.oninput = () => pVal.innerText = pSlider.value;

    document.getElementById('btn-single').onclick = () => {
        startWorld(1);
    };

    document.getElementById('btn-show-multi').onclick = () => {
        mainMenu.style.display = 'none';
        multiSetup.style.display = 'flex';
    };

    document.getElementById('btn-multi-start').onclick = () => {
        startWorld(parseInt(pSlider.value));
    };

    // --- 遊戲核心變數 ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let gameRunning = false;
    let cameraX = 0;
    let gameTime = 420; 
    let player = { x: 100, y: -500, w: 22, h: 42, vx: 0, vy: 0, speed: 4, jump: -11, grounded: false, hp: 100 };
    let teammates = [], enemies = [], animals = [], villagers = [];
    let worldData = {}; 
    let keys = {};

    function startWorld(totalPlayers) {
        mainMenu.style.display = 'none';
        multiSetup.style.display = 'none';
        ui.style.display = 'block';
        document.getElementById('player-num').innerText = totalPlayers;
        
        // 生成電腦隊友
        for(let i=0; i < totalPlayers - 1; i++) {
            teammates.push({ x: 150 + i*40, y: -400, w: 20, h: 40, vx: 0, vy: 0, speed: 3.5 });
        }
        
        resize();
        gameRunning = true;
    }

    function resize() { 
        canvas.width = window.innerWidth; 
        canvas.height = window.innerHeight; 
    }
    window.onresize = resize;

    // --- 地形與碰撞 ---
    function getBlock(x, y) {
        const key = `${x}_${y}`;
        if (worldData[key] !== undefined) return worldData[key];
        let ground = Math.floor(15 + Math.sin(x * 0.1) * 3);
        if (y < ground) {
            if (y === ground - 1 && x % 55 === 0) { // 村莊
                for(let i=0; i<4; i++) for(let j=0; j<3; j++) if(i===0||i===3||j===2) worldData[`${x+i}_${y-j}`] = 4;
                villagers.push({ x: (x+2)*32, y: (y-1)*32, w: 20, h: 40, vx: 0.3 });
            }
            if (y === ground - 1 && Math.abs(Math.sin(x)) > 0.98) return 4;
            return 0;
        }
        return (y === ground) ? 2 : 1;
    }

    function checkWall(nx, ny, w, h) {
        let x1 = Math.floor(nx / 32), x2 = Math.floor((nx + w) / 32);
        let y1 = Math.floor(ny / 32), y2 = Math.floor((ny + h) / 32);
        for (let x = x1; x <= x2; x++) for (let y = y1; y <= y2; y++) if (getBlock(x, y) > 0) return true;
        return false;
    }

    // --- 鍵盤與滑鼠 ---
    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;
    
    canvas.onmousedown = (e) => {
        if (!gameRunning) return;
        const gx = Math.floor((e.clientX + cameraX) / 32);
        const gy = Math.floor(e.clientY / 32);
        if (e.button === 0) { // 左鍵
            enemies.forEach(en => { if (Math.hypot(en.x - (gx*32), en.y - (gy*32)) < 60) en.hp -= 30; });
            worldData[`${gx}_${gy}`] = 0;
        } else { worldData[`${gx}_${gy}`] = 4; }
    };

    // 初始化羊
    for(let i=0; i<3; i++) animals.push({x: 500+i*800, y:0, w:24, h:18, vx:0.5});

    // --- 遊戲主循環 ---
    function update() {
        if (!gameRunning) return requestAnimationFrame(update);

        // 時間控制
        gameTime = (gameTime + 0.2) % 1440;
        let h = Math.floor(gameTime / 60), m = Math.floor(gameTime % 60);
        let sky = "#000", isDark = true;
        if (gameTime >= 420 && gameTime < 1020) { sky = "#87ceeb"; isDark = false; }
        else if (gameTime >= 1050 && gameTime < 1080) { sky = "#ff7832"; isDark = false; }

        // 玩家物理
        player.vx = keys['KeyA'] ? -player.speed : (keys['KeyD'] ? player.speed : 0);
        let nx = player.x + player.vx;
        if (checkWall(nx, player.y, player.w, player.h)) {
            if (!checkWall(nx, player.y - 32, player.w, player.h)) { player.x = nx; player.y -= 32; }
        } else { player.x = nx; }
        player.vy += 0.6;
        if (keys['Space'] && player.grounded) { player.vy = player.jump; player.grounded = false; }
        if (!checkWall(player.x, player.y + player.vy, player.w, player.h)) {
            player.y += player.vy; player.grounded = false;
        } else { if (player.vy > 0) player.grounded = true; player.vy = 0; }
        
        cameraX += (player.x - canvas.width / 2 - cameraX) * 0.1;

        // 繪製
        ctx.fillStyle = sky; ctx.fillRect(0, 0, canvas.width, canvas.height);
        let sx = Math.floor(cameraX / 32), ex = sx + Math.ceil(canvas.width / 32) + 1;
        for (let x = sx; x < ex; x++) for (let y = 0; y < 25; y++) {
            let b = getBlock(x, y); if (b === 0) continue;
            ctx.fillStyle = (b===1)?'#6d4c41':(b===2)?'#4caf50':'#5d4037';
            ctx.fillRect(x * 32 - cameraX, y * 32, 32, 32);
        }

        // 隊友跟隨
        teammates.forEach(t => {
            t.vx = (player.x > t.x + 50) ? 3 : (player.x < t.x - 50) ? -3 : 0;
            t.vy += 0.6;
            if (!checkWall(t.x + t.vx, t.y, t.w, t.h)) t.x += t.vx;
            if (!checkWall(t.x, t.y + t.vy, t.w, t.h)) t.y += t.vy; else t.vy = 0;
            ctx.fillStyle = '#f1c40f'; ctx.fillRect(t.x - cameraX, t.y, t.w, t.h);
        });

        // 怪物出現 (18:10 以後)
        if ((gameTime >= 1090 || gameTime < 390) && Math.random() < 0.01 && enemies.length < 5) {
            enemies.push({ x: player.x+500, y: 0, w: 20, h: 40, hp: 50 });
        }
        enemies = enemies.filter(e => e.hp > 0);
        enemies.forEach(en => {
            en.vx = (player.x > en.x) ? 1.5 : -1.5; en.vy += 0.6;
            if (!checkWall(en.x+en.vx, en.y, en.w, en.h)) en.x += en.vx;
            if (!checkWall(en.x, en.y+en.vy, en.w, en.h)) en.y += en.vy; else en.vy = 0;
            if (Math.abs(en.x-player.x)<20 && Math.abs(en.y-player.y)<20) player.hp -= 0.3;
            ctx.fillStyle = '#2ecc71'; ctx.fillRect(en.x-cameraX, en.y, en.w, en.h);
        });

        // 村民與動物
        villagers.forEach(v => { v.vy+=0.6; if(Math.random()<0.01) v.vx*=-1; if(!checkWall(v.x+v.vx,v.y,v.w,v.h)) v.x+=v.vx; if(!checkWall(v.x,v.y+v.vy,v.w,v.h)) v.y+=v.vy; else v.vy=0; ctx.fillStyle='#3498db'; ctx.fillRect(v.x-cameraX,v.y,v.w,v.h);});
        animals.forEach(an => { an.vy+=0.5; if(!checkWall(an.x+an.vx,an.y,an.w,an.h)) an.x+=an.vx; else an.vx*=-1; if(!checkWall(an.x,an.y+an.vy,an.w,an.h)) an.y+=an.vy; else an.vy=0; ctx.fillStyle='#fff'; ctx.fillRect(an.x-cameraX,an.y,an.w,an.h);});

        // 光源
        if (isDark) {
            let grd = ctx.createRadialGradient(player.x-cameraX+10, player.y+20, 10, player.x-cameraX+10, player.y+20, 180);
            grd.addColorStop(0, "rgba(255,255,255,0.3)"); grd.addColorStop(1, "transparent");
            ctx.fillStyle = grd; ctx.fillRect(0,0,canvas.width,canvas.height);
        }
        ctx.fillStyle = '#e67e22'; ctx.fillRect(player.x-cameraX, player.y, player.w, player.h);

        document.getElementById('clock').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
        document.getElementById('hp').innerText = Math.floor(player.hp);
        requestAnimationFrame(update);
    }
    update();
</script>
</body>
</html>
