<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Future Super Human - 模式選擇版</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        
        /* 確保選單在最前面 */
        #ui-layer {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #1a1a1a; color: #f1c40f;
        }

        .btn-group { display: flex; gap: 20px; margin-top: 20px; }
        .btn {
            padding: 20px 40px; font-size: 24px; cursor: pointer;
            background: #f1c40f; border: none; border-radius: 10px;
            font-weight: bold; box-shadow: 0 6px 0 #b8860b; color: #000;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #b8860b; }

        #hud {
            position: fixed; top: 10px; left: 10px; z-index: 1000;
            background: rgba(0,0,0,0.8); color: white; padding: 10px;
            border: 2px solid #f1c40f; border-radius: 8px; display: none;
        }

        canvas { display: none; position: absolute; top: 0; left: 0; z-index: 10; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1 style="font-size: 40px;">未來的 SUPER HUMAN</h1>
        <div class="btn-group">
            <button class="btn" onclick="initGame('single')">單人遊戲</button>
            <button class="btn" onclick="initGame('multi')" style="background:#3498db; color:white; box-shadow:0 6px 0 #2980b9;">多人小隊</button>
        </div>
        <p style="color:#aaa; margin-top:20px;">[WASD] 移動 | [空白鍵] 跳躍 | [R] 脫困重置</p>
    </div>

    <div id="hud">❤️ HP: <span id="hp">100</span> | 📍 Pos: <span id="pos">0,0</span></div>
    <canvas id="gameCanvas"></canvas>

<script>
    const cvs = document.getElementById('gameCanvas'), ctx = cvs.getContext('2d');
    let isRunning = false, world = {}, keys = {}, agents = [];
    let p = { x: 0, y: 0, w: 22, h: 42, vx: 0, vy: 0, ground: false };
    const TILE = 32;

    function getH(gx) { return Math.floor(25 + Math.sin(gx * 0.1) * 5); }
    function getB(gx, gy) {
        if (world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
        let h = getH(gx);
        return gy < h ? 0 : (gy === h ? 2 : 1);
    }

    function isCollide(x, y) {
        for (let i = Math.floor(x / TILE); i <= Math.floor((x + p.w) / TILE); i++) {
            for (let j = Math.floor(y / TILE); j <= Math.floor((y + p.h) / TILE); j++) {
                if (getB(i, j) > 0) return true;
            }
        }
        return false;
    }

    function initGame(mode) {
        document.getElementById('ui-layer').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
        cvs.style.display = 'block';
        cvs.width = window.innerWidth;
        cvs.height = window.innerHeight;

        // 【關鍵修復】強制將角色放在地面附近
        p.x = 100;
        p.y = (getH(Math.floor(p.x/TILE)) - 5) * TILE;

        if (mode === 'multi') {
            for(let i=0; i<3; i++) agents.push({ x: p.x + 40*(i+1), y: p.y, w: 20, h: 40 });
        }

        isRunning = true;
        loop();
    }

    window.onkeydown = e => {
        keys[e.code] = true;
        if(e.code === 'KeyR') { p.x = 100; p.y = (getH(Math.floor(p.x/TILE)) - 5) * TILE; p.vx = 0; p.vy = 0; }
    };
    window.onkeyup = e => keys[e.code] = false;

    function loop() {
        if (!isRunning) return;

        // Y 物理
        p.vy += 0.8;
        p.y += p.vy;
        if (isCollide(p.x, p.y)) {
            if (p.vy > 0) {
                while(isCollide(p.x, p.y)) p.y -= 1;
                p.ground = true;
            } else {
                while(isCollide(p.x, p.y)) p.y += 1;
            }
            p.vy = 0;
        } else { p.ground = false; }

        // X 物理
        let dx = (keys['KeyD'] ? 5 : 0) - (keys['KeyA'] ? 5 : 0);
        if (dx !== 0) {
            p.x += dx;
            if (isCollide(p.x, p.y)) p.x -= dx;
        }

        // 跳躍
        if ((keys['Space'] || keys['KeyW']) && p.ground) { p.vy = -14; p.ground = false; }

        // UI
        document.getElementById('pos').innerText = Math.floor(p.x/TILE) + "," + Math.floor(p.y/TILE);

        // 繪圖
        ctx.fillStyle = '#87ceeb'; // 天空藍
        ctx.fillRect(0, 0, cvs.width, cvs.height);

        // 【關鍵修復】攝影機跟隨玩家
        let camX = p.x - cvs.width / 2;
        let camY = p.y - cvs.height / 2;

        for (let x = Math.floor(camX / TILE); x <= Math.ceil((camX + cvs.width) / TILE); x++) {
            for (let y = Math.floor(camY / TILE); y <= Math.ceil((camY + cvs.height) / TILE); y++) {
                let b = getB(x, y);
                if (b > 0) {
                    ctx.fillStyle = b === 2 ? '#2ecc71' : '#795548';
                    ctx.fillRect(x * TILE - camX, y * TILE - camY, TILE + 1, TILE + 1);
                }
            }
        }

        // 畫隊友 (藍色)
        agents.forEach(a => {
            ctx.fillStyle = '#3498db';
            ctx.fillRect(a.x - camX, a.y - camY, a.w, a.h);
            // 簡單跟隨
            if (a.x < p.x - 30) a.x += 2; else if (a.x > p.x + 30) a.x -= 2;
            let ay_next = a.y + 10;
