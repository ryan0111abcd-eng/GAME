<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>我的 2D Minecraft - 生存大更新</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; transition: background 2s; }
        canvas { display: block; cursor: crosshair; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); color: white; padding: 12px; border-radius: 8px; pointer-events: none; }
        #hotbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; background: rgba(0,0,0,0.5); padding: 5px; border: 2px solid #fff; }
        .slot { width: 45px; height: 45px; border: 2px solid #555; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #333; color: white; font-size: 11px; }
        .selected { border-color: #FFFF00; background: #666; }
        #hp-bar { color: #ff5252; font-weight: bold; font-size: 20px; }
    </style>
</head>
<body>

<div id="ui">
    <div id="hp-bar">❤ HP: 10</div>
    <b>生存模式</b><br>
    • 1-5 切換方塊 | A,D 移動 | Space 跳<br>
    • 晚上會有殭屍出現！
</div>

<div id="hotbar">
    <div id="slot-1" class="slot selected"><div style="width:15px;height:15px;background:#4CAF50"></div>1</div>
    <div id="slot-2" class="slot"><div style="width:15px;height:15px;background:#795548"></div>2</div>
    <div id="slot-3" class="slot"><div style="width:15px;height:15px;background:#757575"></div>3</div>
    <div id="slot-4" class="slot"><div style="width:15px;height:15px;background:#A1887F"></div>4</div>
    <div id="slot-5" class="slot"><div style="width:15px;height:15px;background:#2E7D32"></div>5</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const tileSize = 32;
    const gravity = 0.45;
    let world = [];
    const cols = Math.ceil(canvas.width / tileSize);
    const rows = Math.ceil(canvas.height / tileSize);
    const Blocks = { AIR: 0, GRASS: 1, DIRT: 2, STONE: 3, WOOD: 4, LEAF: 5 };
    const BlockColors = { 1: '#4CAF50', 2: '#795548', 3: '#757575', 4: '#A1887F', 5: '#2E7D32' };

    let player = { x: 100, y: 100, w: 22, h: 30, vx: 0, vy: 0, hp: 10, invul: 0 };
    let enemies = [];
    let gameTime = 0; // 用於日夜循環

    // 初始化地圖
    function initWorld() {
        for (let x = 0; x < cols; x++) {
            world[x] = [];
            let ground = Math.floor(rows / 2 + Math.sin(x * 0.2) * 2);
            for (let y = 0; y < rows; y++) {
                if (y > ground) world[x][y] = (y > ground + 3) ? Blocks.STONE : Blocks.DIRT;
                else if (y === ground) world[x][y] = Blocks.GRASS;
                else world[x][y] = Blocks.AIR;
            }
        }
    }

    // --- 核心：修補後的碰撞偵測 ---
    function isSolid(px, py) {
        let gx = Math.floor(px / tileSize);
        let gy = Math.floor(py / tileSize);
        if (gx < 0 || gx >= cols || gy < 0 || gy >= rows) return false;
        return world[gx][gy] !== Blocks.AIR;
    }

    function checkCollision(obj) {
        // 垂直碰撞 (上下)
        if (obj.vy > 0) { // 下落
            if (isSolid(obj.x, obj.y + obj.h) || isSolid(obj.x + obj.w, obj.y + obj.h)) {
                obj.y = Math.floor((obj.y + obj.h) / tileSize) * tileSize - obj.h;
                obj.vy = 0;
                obj.grounded = true;
            } else { obj.grounded = false; }
        } else if (obj.vy < 0) { // 上升
            if (isSolid(obj.x, obj.y) || isSolid(obj.x + obj.w, obj.y)) {
                obj.y = Math.ceil(obj.y / tileSize) * tileSize;
                obj.vy = 0;
            }
        }
        // 水平碰撞 (左右)
        if (obj.vx > 0) { // 往右
            if (isSolid(obj.x + obj.w, obj.y + 4) || isSolid(obj.x + obj.w, obj.y + obj.h - 4)) {
                obj.x = Math.floor((obj.x + obj.w) / tileSize) * tileSize - obj.w - 1;
            }
        } else if (obj.vx < 0) { // 往左
            if (isSolid(obj.x, obj.y + 4) || isSolid(obj.x, obj.y + obj.h - 4)) {
                obj.x = Math.ceil(obj.x / tileSize) * tileSize + 1;
            }
        }
    }

    // 殭屍 AI
    function updateEnemies() {
        if (Math.random() < 0.005 && (gameTime % 2000 > 1000)) { // 晚上機率生成
            enemies.push({ x: Math.random() * canvas.width, y: 0, w: 24, h: 30, vx: 1, vy: 0 });
        }
        enemies.forEach((en, index) => {
            en.vy += gravity;
            en.vx = (player.x > en.x) ? 1.5 : -1.5;
            en.x += en.vx; en.y += en.vy;
            checkCollision(en);
            // 碰玩家扣血
            let dx = player.x - en.x; let dy = player.y - en.y;
            if (Math.abs(dx) < 20 && Math.abs(dy) < 20 && player.invul <= 0) {
                player.hp--; player.invul = 60;
                document.getElementById('hp-bar').innerText = "❤ HP: " + player.hp;
            }
        });
        if (player.invul > 0) player.invul--;
    }

    function update() {
        gameTime++;
        // 天空顏色 (日夜)
        let skyBrightness = Math.sin(gameTime * 0.002) * 50 + 50;
        document.body.style.background = `hsl(200, 70%, ${skyBrightness}%)`;

        player.vx = keys['KeyA'] ? -4 : (keys['KeyD'] ? 4 : 0);
        if (keys['Space'] && player.grounded) player.vy = -9;
        
        player.vy += gravity;
        player.x += player.vx;
        player.y += player.vy;
        
        checkCollision(player);
        updateEnemies();

        if (player.hp <= 0) { alert("你被殭屍吃掉了！"); location.reload(); }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // 畫世界
        for (let x = 0; x < cols; x++) {
            for (let y = 0; y < rows; y++) {
                if (world[x][y] !== Blocks.AIR) {
                    ctx.fillStyle = BlockColors[world[x][y]];
                    ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
                }
            }
        }
        // 畫殭屍 (綠色)
        enemies.forEach(en => {
            ctx.fillStyle = "#2E7D32"; ctx.fillRect(en.x, en.y, en.w, en.h);
        });
        // 畫玩家
        ctx.fillStyle = (player.invul % 10 > 5) ? "white" : "#3AB09E";
        ctx.fillRect(player.x, player.y, player.w, player.h);
    }

    const keys = {};
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);
    canvas.addEventListener('mousedown', e => {
        const gx = Math.floor(e.clientX / tileSize);
        const gy = Math.floor(e.clientY / tileSize);
        if (e.button === 0) world[gx][gy] = Blocks.AIR;
        else world[gx][gy] = currentSelectedBlock;
    });

    let currentSelectedBlock = 1;
    window.addEventListener('keydown', e => {
        if (['1','2','3','4','5'].includes(e.key)) {
            currentSelectedBlock = parseInt(e.key);
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
            document.getElementById('slot-'+e.key).classList.add('selected');
        }
    });

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    initWorld(); loop();
</script>
</body>
</html>
