<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Future Super Human - Evolution</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        .overlay { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(15, 15, 15, 0.98); color: #f1c40f; }
        .btn { padding: 18px 45px; font-size: 26px; cursor: pointer; margin: 12px; background: #f1c40f; border: none; border-radius: 12px; font-weight: bold; box-shadow: 0 6px 0 #b8860b; color: #000; }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #b8860b; }
        #hud { position: fixed; top: 20px; left: 20px; z-index: 100; color: white; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; border: 2px solid #f1c40f; display: none; pointer-events: none; }
        #minimap { position: fixed; top: 20px; right: 20px; width: 150px; height: 150px; border: 3px solid #fff; border-radius: 50%; overflow: hidden; z-index: 100; display: none; background: rgba(0,0,0,0.5); }
        canvas#gameCanvas { display: none; position: absolute; top: 0; left: 0; z-index: 10; }
        #rain-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 15; display: none; background: rgba(50, 50, 100, 0.2); }
    </style>
</head>
<body>

    <div id="step-1" class="overlay">
        <h1>SUPER HUMAN: 生態進化</h1>
        <button class="btn" onclick="goStep(2, 1)">👤 單人模式</button>
        <button class="btn" onclick="goStep(2, 5)" style="background:#3498db; color:white;">👥 多人模式</button>
    </div>

    <div id="step-2" class="overlay" style="display:none;">
        <h1>設定小隊人數</h1>
        <h2 id="p-label">5 人</h2>
        <input type="range" min="2" max="10" value="5" oninput="document.getElementById('p-label').innerText=this.value+' 人'" id="p-slider" style="width:300px;">
        <button class="btn" onclick="goStep(3)">下一步</button>
    </div>

    <div id="step-3" class="overlay" style="display:none;">
        <div style="background:#2c3e50; padding:25px; border-radius:15px; border:2px solid #f1c40f; width:380px;">
            <h2 style="color:#f1c40f; text-align:center;">🌍 生態說明書</h2>
            <p>● <b>地形</b>：平原、台地、丘陵、山地、村莊、古蹟。</p>
            <p>● <b>電腦 AI</b>：隊友會自行散開、挖礦、放方塊、戰鬥。</p>
            <p>● <b>天氣</b>：有機率下雨，視線會變模糊。</p>
            <p>● <b>注意</b>：血量無法回復，請小心生存！</p>
            <button class="btn" onclick="startGame()" style="width:100%;">進入世界</button>
        </div>
    </div>

    <div id="hud">❤️ HP: <span id="hp-txt">100</span> | 📍 <span id="pos-txt">0,0</span> | 🗺️ <span id="biome-txt">平原</span></div>
    <div id="minimap"><canvas id="mCvs" width="150" height="150"></canvas></div>
    <div id="rain-overlay"></div>
    <canvas id="gameCanvas"></canvas>

<script>
    const cvs = document.getElementById('gameCanvas'), ctx = cvs.getContext('2d');
    const mCvs = document.getElementById('mCvs'), mCtx = mCvs.getContext('2d');
    let active = false, world = {}, keys = {}, entities = [], playerCount = 1;
    let p = { x: 0, y: -200, w: 22, h: 42, vx: 0, vy: 0, ground: false, hp: 100, maxHp: 100 };
    let isRaining = false, rainTimer = 0;
    const TILE = 32;

    function goStep(s, v) {
        document.querySelectorAll('.overlay').forEach(e => e.style.display = 'none');
        if (v) playerCount = v;
        document.getElementById('step-' + (playerCount === 1 && s === 2 ? 3 : s)).style.display = 'flex';
    }

    function startGame() {
        if(playerCount > 1) playerCount = document.getElementById('p-slider').value;
        document.querySelectorAll('.overlay').forEach(e => e.style.display = 'none');
        document.getElementById('hud').style.display = 'block';
        document.getElementById('minimap').style.display = 'block';
        cvs.style.display = 'block';
        cvs.width = window.innerWidth; cvs.height = window.innerHeight;
        
        // 生成隊友 (AI)
        for(let i=0; i<playerCount-1; i++) {
            entities.push({type:'ally', x:Math.random()*1000-500, y:-300, w:22, h:42, vx:0, vy:0, hp:100, maxHp:100, dir:1, aiState:'wander'});
        }
        // 生成村民與動物
        for(let i=0; i<8; i++) entities.push({type:'npc', x:Math.random()*2000-1000, y:-300, w:22, h:42, vx:0, vy:0, hp:50, maxHp:50});
        for(let i=0; i<5; i++) entities.push({type:'animal', x:Math.random()*2000-1000, y:-300, w:20, h:20, vx:0, vy:0, hp:20, maxHp:20});

        active = true; loop();
    }

    // 地形生成器 (平原、台地、丘陵、山地、古蹟、村莊)
    function getBiomeInfo(gx) {
        let x = Math.abs(gx);
        if (x % 3000 < 500) return { name: "平原", h: 35, c: "#2ecc71" };
        if (x % 3000 < 1000) return { name: "丘陵", h: 28, c: "#27ae60" };
        if (x % 3000 < 1500) return { name: "山地", h: 18, c: "#95a5a6" };
        if (x % 3000 < 2000) return { name: "台地", h: 32, c: "#e67e22" };
        if (x % 3000 < 2500) return { name: "古蹟", h: 35, c: "#7f8c8d" };
        return { name: "村莊", h: 35, c: "#f1c40f" };
    }

    function getB(gx, gy) {
        if (world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
        let info = getBiomeInfo(gx);
        // 如果是村莊或古蹟，有機率生成石塊建築
        if ((info.name === "村莊" || info.name === "古蹟") && gy < info.h && gy > info.h-4 && Math.random() < 0.05) return 3;
        return gy < info.h ? 0 : (gy === info.h ? 2 : 1);
    }

    function check(x, y, w, h) {
        for (let i = Math.floor(x/TILE); i <= Math.floor((x+w)/TILE); i++) {
            for (let j = Math.floor(y/TILE); j <= Math.floor((y+h)/TILE); j++) {
                if(getB(i, j) > 0) return true;
            }
        }
        return false;
    }

    window.onmousedown = e => {
        if(!active) return;
        let gx = Math.floor((e.clientX + (p.x - cvs.width/2)) / TILE);
        let gy = Math.floor((e.clientY + (p.y - cvs.height/2)) / TILE);
        if (e.button === 0) world[gx + '_' + gy] = 0;
        else if (getB(gx, gy) === 0) world[gx + '_' + gy] = 3;
    };
    window.onkeydown = e => { 
        keys[e.code] = true; 
        if(e.code === 'KeyK') doAttack(p);
    };
    window.onkeyup = e => keys[e.code] = false;

    function doAttack(owner) {
        entities.concat(p).forEach(e => {
            if(e !== owner && Math.abs(e.x - owner.x) < 60 && Math.abs(e.y - owner.y) < 60) {
                e.hp -= 15; e.vx = (e.x > owner.x ? 8 : -8);
            }
        });
    }

    function loop() {
        if(!active) return;
        if(p.hp <= 0) { location.reload(); return; }

        // 天氣系統 (下雨)
        rainTimer++;
        if (rainTimer % 1000 === 0) {
            isRaining = Math.random() < 0.3;
            document.getElementById('rain-overlay').style.display = isRaining ? 'block' : 'none';
        }

        // 玩家物理
        p.vy += 0.8; p.y += p.vy;
        if(check(p.x, p.y, p.w, p.h)) {
            if(p.vy > 0) { while(check(p.x, p.y, p.w, p.h)) p.y -= 0.5; p.ground = true; }
            else { while(check(p.x, p.y, p.w, p.h)) p.y += 0.5; }
            p.vy = 0;
        } else p.ground = false;

        let dx = (keys['KeyD']?5:0) - (keys['KeyA']?5:0);
        if(dx !== 0) { p.x += dx; if(check(p.x, p.y, p.w, p.h)) p.x -= dx; }
        if(keys['Space'] && p.ground) p.vy = -14;

        // 怪物生成 (晚上機率高)
        if(Math.random() < 0.01) entities.push({type:'mob', x:p.x+800, y:-400, w:22, h:42, vx:0, vy:0, hp:60, maxHp:60});

        // 實體 AI 更新
        entities.forEach(e => {
            e.vy += 0.8; e.y += e.vy;
            if(check(e.x, e.y, e.w, e.h)) { if(e.vy > 0) while(check(e.x, e.y, e.w, e.h)) e.y -= 0.5; e.vy = 0; }
            
            if (e.type === 'ally') {
                // 隊友自主行為：散開、挖礦、放方塊、攻擊
                if (Math.abs(p.x - e.x) > 300) e.x += (p.x > e.x ? 2 : -2); // 保持距離但不要太遠
                if (Math.random() < 0.005) { // 隨機挖掘前方
                    let gx = Math.floor(e.x/TILE) + (Math.random()>0.5?1:-1);
                    let gy = Math.floor(e.y/TILE) + 1;
                    world[gx + '_' + gy] = 0;
                }
                if (Math.random() < 0.002) { // 隨機放置方塊
                    world[Math.floor(e.x/TILE) + '_' + (Math.floor(e.y/TILE)+2)] = 3;
                }
                // 自動攻擊附近怪物
                entities.forEach(m => { if(m.type==='mob' && Math.abs(m.x-e.x)<100) doAttack(e); });
            } else if (e.type === 'mob') {
                e.x += (p.x > e.x ? 2.5 : -2.5);
                if(Math.abs(e.x-p.x)<30) p.hp -= 0.3;
            } else { // 村民與動物隨機漫步
                if(Math.random() < 0.02) e.vx = (Math.random()-0.5)*4;
                e.x += e.vx; if(check(e.x, e.y, e.w, e.h)) e.x -= e.vx;
            }
        });
        entities = entities.filter(e => e.hp > 0);

        // UI
        let currentBiome = getBiomeInfo(Math.floor(p.x/TILE));
        document.getElementById('hp-txt').innerText = Math.ceil(p.hp);
        document.getElementById('pos-txt').innerText = Math.floor(p.x/TILE) + "," + Math.floor(p.y/TILE);
        document.getElementById('biome-txt').innerText = currentBiome.name;

        draw();
        requestAnimationFrame(loop);
    }

    function draw() {
        ctx.fillStyle = isRaining ? '#4b6584' : '#87ceeb';
        ctx.fillRect(0,0,cvs.width,cvs.height);
        let cx = p.x - cvs.width/2, cy = p.y - cvs.height/2;

        for(let x=Math.floor(cx/TILE); x<=Math.ceil((cx+cvs.width)/TILE); x++) {
            let info = getBiomeInfo(x);
            for(let y=Math.floor(cy/TILE); y<=Math.ceil((cy+cvs.height)/TILE); y++) {
                let b = getB(x, y);
                if(b > 0) {
                    ctx.fillStyle = b===2 ? info.c : (b===1 ? '#795548' : '#95a5a6');
                    ctx.fillRect(x*TILE-cx, y*TILE-cy, TILE+1, TILE+1);
                }
            }
        }

        entities.concat(p).forEach(e => {
            let color = '#e67e22'; // 玩家
            if(e.type==='ally') color='#3498db';
            if(e.type==='mob') color='#e74c3c';
            if(e.type==='npc') color='#f1c40f';
            if(e.type==='animal') color='#ff9ff3';
            ctx.fillStyle = color;
            ctx.fillRect(e.x-cx, e.y-cy, e.w, e.h);
            // 血量條
            ctx.fillStyle='red'; ctx.fillRect(e.x-cx, e.y-cy-10, e.w, 4);
            ctx.fillStyle='lime'; ctx.fillRect(e.x-cx, e.y-cy-10, e.w*(e.hp/e.maxHp), 4);
        });

        // 圓形小地圖
        mCtx.fillStyle='#000'; mCtx.fillRect(0,0,150,150);
        mCtx.save(); mCtx.translate(75, 75);
        entities.concat(p).forEach(e => {
            let color = '#fff';
            if(e.type==='ally') color='#3498db';
            if(e.type==='mob') color='#e74c3c';
            mCtx.fillStyle = color;
            mCtx.beginPath(); mCtx.arc((e.x-p.x)*0.1, (e.y-p.y)*0.1, 3, 0, 7); mCtx.fill();
        });
        mCtx.restore();
    }
</script>
</body>
</html>
