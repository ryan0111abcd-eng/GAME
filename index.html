<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>未來的 Super Human - 終極同調版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: "Microsoft JhengHei", sans-serif; }
        canvas { display: block; }
        .screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; color: white; background: rgba(0,0,0,0.95);
        }
        h1 { color: #f1c40f; font-size: 60px; text-shadow: 0 0 20px #f1c40f; margin-bottom: 20px; }
        .btn {
            padding: 15px 60px; font-size: 26px; background: #f1c40f; border: none;
            border-radius: 50px; cursor: pointer; font-weight: bold; margin: 15px; transition: 0.2s;
        }
        .btn:hover { transform: scale(1.1); background: #fff; color: #000; }
        #ui { 
            position: absolute; top: 20px; left: 20px; color: #fff; 
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; 
            display: none; border: 2px solid #f1c40f; pointer-events: none; z-index: 10;
        }
        input[type=range] { width: 300px; margin: 25px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="main-menu" class="screen">
        <h1>未來的 Super Human</h1>
        <p style="font-size: 20px; color: #aaa;">點擊按鈕或按 [任意鍵] 開始</p>
        <button class="btn" onclick="initGame(1)">開始遊戲</button>
        <button class="btn" style="background:#3498db; color:white;" onclick="showMultiMenu()">多人連線</button>
    </div>

    <div id="multi-menu" class="screen" style="display:none;">
        <h1>多人連線設定</h1>
        <div style="font-size:24px;">選擇總人數 (2-10): <span id="p-label" style="color:#f1c40f">5</span></div>
        <input type="range" id="p-slider" min="2" max="10" value="5" oninput="document.getElementById('p-label').innerText=this.value">
        <button class="btn" onclick="initGame(document.getElementById('p-slider').value)">開始</button>
    </div>

    <div id="ui">
        <b>🌍 時間：<span id="clock" style="color:#f1c40f">07:00</span></b><br>
        ❤️ 生命：<span id="hp">100</span> | 👥 隊員：<span id="p-count">1</span>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let isPlaying = false, isMulti = false, cameraX = 0, gameTime = 420, keys = {};
    const PHYSICS = { gravity: 0.6, jump: -11, speed: 4 };

    class Entity {
        constructor(x, y, color, type = 'npc') {
            this.x = x; this.y = y; this.w = 22; this.h = 42;
            this.vx = 0; this.vy = 0; this.color = color;
            this.type = type; this.grounded = false; this.hp = 100;
        }
        update(inputX, wantJump) {
            this.vx = inputX;
            let nx = this.x + this.vx;
            if (checkCol(nx, this.y, this.w, this.h)) {
                if (!checkCol(nx, this.y - 32, this.w, this.h)) { this.x = nx; this.y -= 8; }
                else { this.vx = 0; }
            } else { this.x = nx; }
            this.vy += PHYSICS.gravity;
            if (wantJump && this.grounded) { this.vy = PHYSICS.jump; this.grounded = false; }
            if (!checkCol(this.x, this.y + this.vy, this.w, this.h)) { this.y += this.vy; this.grounded = false; }
            else { if (this.vy > 0) this.grounded = true; this.vy = 0; }
        }
        draw() {
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x - cameraX, this.y, this.w, this.h);
        }
    }

    let player = new Entity(300, -500, '#e67e22', 'player');
    let teammates = [], villagers = [], animals = [], enemies = [];

    function showMultiMenu() {
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('multi-menu').style.display = 'flex';
        isMulti = true;
    }

    function initGame(count) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById('ui').style.display = 'block';
        document.getElementById('p-count').innerText = count;
        for(let i=0; i < count - 1; i++) teammates.push(new Entity(350 + i*50, -500, '#f1c40f', 'teammate'));
        for(let i=0; i<4; i++) villagers.push(new Entity(1500 + i*300, -500, '#3498db', 'villager'));
        for(let i=0; i<6; i++) animals.push({x: 800 + i*700, y:-500, w:24, h:18, vx:1, vy:0});
        isPlaying = true;
        resize();
        loop();
    }

    function checkCol(nx, ny, w, h) {
        let x1 = Math.floor(nx / 32), x2 = Math.floor((nx + w) / 32);
        let y1 = Math.floor(ny / 32), y2 = Math.floor((ny + h) / 32);
        for (let x = x1; x <= x2; x++) for (let y = y1; y <= y2; y++) {
            let ground = Math.floor(15 + Math.sin(x * 0.1) * 3);
            if (y >= ground) return true;
        }
        return false;
    }

    // --- 全按鍵監聽 ---
    window.addEventListener('keydown', (e) => {
        keys[e.code] = true;
        if (!isPlaying) {
            if (!isMulti) initGame(1);
            else if (e.code === 'Enter') initGame(document.getElementById('p-slider').value);
        } else {
            // 遊戲中：除了 AD，按什麼都是攻擊
            if (e.code !== 'KeyA' && e.code !== 'KeyD' && e.code !== 'Space') attack();
        }
    });
    window.addEventListener('keyup', (e) => keys[e.code] = false);
    canvas.addEventListener('mousedown', () => attack());

    function attack() {
        enemies.forEach(en => { if(Math.hypot(en.x - player.x, en.y - player.y) < 80) en.hp -= 40; });
    }

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize;

    function loop() {
        if (!isPlaying) return;
        gameTime = (gameTime + 0.4) % 1440; 
        let sky = "#87ceeb"; 
        if (gameTime >= 1050 && gameTime < 1080) sky = "#ff7832"; 
        else if (gameTime >= 1090 || gameTime < 390) sky = "#050510"; 
        ctx.fillStyle = sky; ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (sky === "#050510" && Math.random() < 0.01 && enemies.length < 8) {
            enemies.push(new Entity(player.x + (Math.random() > 0.5 ? 600 : -600), -500, '#2ecc71', 'enemy'));
        }

        let pMove = (keys['KeyA'] ? -1 : keys['KeyD'] ? 1 : 0) * PHYSICS.speed;
        player.update(pMove, keys['Space']);
        cameraX += (player.x - canvas.width / 2 - cameraX) * 0.1;

        let sx = Math.floor(cameraX / 32), ex = sx + Math.ceil(canvas.width / 32) + 1;
        for (let x = sx; x < ex; x++) {
            let ground = Math.floor(15 + Math.sin(x * 0.1) * 3);
            for (let y = ground; y < ground + 8; y++) {
                ctx.fillStyle = (y === ground) ? '#4caf50' : '#6d4c41';
                ctx.fillRect(x * 32 - cameraX, y * 32, 32, 32
