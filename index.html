<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Future Super Human - 終極生存版</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; }
        .layer { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(20, 20, 20, 0.95); color: #f1c40f; }
        .btn { padding: 15px 40px; font-size: 24px; cursor: pointer; margin: 10px; background: #f1c40f; border: none; border-radius: 10px; font-weight: bold; box-shadow: 0 5px 0 #b8860b; color: #000; }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #b8860b; }
        
        /* HUD 元素 */
        #hud { position: fixed; top: 15px; left: 15px; z-index: 100; color: white; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; pointer-events: none; display: none; }
        #minimap-container { position: fixed; top: 15px; right: 15px; width: 150px; height: 150px; border: 3px solid #fff; border-radius: 50%; overflow: hidden; z-index: 100; display: none; background: rgba(0,0,0,0.5); }
        
        /* 說明書 */
        #instruction { text-align: left; color: white; background: #34495e; padding: 20px; border-radius: 10px; max-width: 400px; display: none; }
        
        canvas { display: none; position: absolute; top: 0; left: 0; z-index: 10; }
    </style>
</head>
<body>

    <div id="ui-mode" class="layer">
        <h1>未來的 SUPER HUMAN</h1>
        <button class="btn" onclick="showPlayerSelect(1)">單人連線</button>
        <button class="btn" onclick="showPlayerSelect(5)" style="background:#3498db; color:white;">多人連線</button>
    </div>

    <div id="ui-players" class="layer" style="display:none;">
        <h2>選擇小隊總人數: <span id="p-val">5</span></h2>
        <input type="range" min="2" max="10" value="5" oninput="document.getElementById('p-val').innerText=this.value" id="p-slider" style="width:300px;">
        <button class="btn" onclick="showInstructions()">下一步</button>
    </div>

    <div id="ui-info" class="layer" style="display:none;">
        <div id="instruction">
            <h2 style="color:#f1c40f">📜 遊戲說明書</h2>
            <ul>
                <li><b>移動：</b> [W][A][S][D] 或 方向鍵</li>
                <li><b>跳躍：</b> [空白鍵]</li>
                <li><b>挖掘：</b> [滑鼠左鍵]</li>
                <li><b>放置：</b> [滑鼠右鍵]</li>
                <li><b>攻擊：</b> [K] 鍵</li>
                <li><b>選單：</b> [ESC] 鍵</li>
                <li><b>目標：</b> 晚上會有怪物，請與隊友生存下去！</li>
            </ul>
            <button class="btn" onclick="actuallyStart()" style="width:100%">進入世界</button>
        </div>
    </div>

    <div id="ui-esc" class="layer" style="display:none; background: rgba(0,0,0,0.7);">
        <h1>遊戲暫停</h1>
        <button class="btn" onclick="location.reload()">離開遊戲 (重新開始)</button>
        <button class="btn" onclick="toggleESC()" style="background:#7f8c8d; color:white;">返回遊戲</button>
    </div>

    <div id="hud">❤️ HP: <span id="hp">100</span> | 📍 <span id="pos">0,0</span></div>
    <div id="minimap-container"><canvas id="mcvs" width="150" height="150"></canvas></div>
    <canvas id="gcvs"></canvas>

<script>
    const cvs = document.getElementById('gcvs'), ctx = cvs.getContext('2d');
    const mcvs = document.getElementById('mcvs'), mctx = mcvs.getContext('2d');
    let isLive = false, showEsc = false, world = {}, keys = {}, entities = [];
    let p = { x: 0, y: -200, w: 22, h: 42, vx: 0, vy: 0, ground: false, hp: 100, maxHp: 100 };
    let totalP = 1;
    const TILE = 32;

    // --- 地形生成 ---
    function getH(gx) { return Math.floor(30 + Math.sin(gx * 0.1) * 5 + Math.cos(gx * 0.5) * 2); }
    function getB(gx, gy) {
        if (world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
        let h = getH(gx);
        return gy < h ? 0 : (gy === h ? 2 : 1);
    }

    // ---
