<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>2D Minecraft: 黃潮來襲穩定版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #2c3e50; font-family: 'Arial', sans-serif; }
        canvas { display: block; }
        #ui { 
            position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.8); 
            color: #f1c40f; padding: 15px; border-radius: 10px; border: 2px solid #f1c40f;
            pointer-events: none; min-width: 220px;
        }
        #hp-bar { width: 100%; height: 18px; background: #333; border: 1px solid #f1c40f; margin-top: 8px; }
        #hp-fill { width: 100%; height: 100%; background: #ff4444; transition: width 0.2s; }
        #msg { color: #fff; font-size: 12px; margin-top: 8px; }
    </style>
</head>
<body>

    <div id="ui">
        <div style="font-size: 18px; font-weight: bold;">🦁 中信兄弟：黃潮來襲</div>
        ❤️ 生命值：<div id="hp-bar"><div id="hp-fill"></div></div>
        <div id="msg">🎵 點擊畫面啟動應援曲！</div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // --- 音訊處理 ---
    const bgm = new Audio('bgm.mp3'); 
    bgm.loop = true;
    let isPlaying = false;

    function startMusic() {
        if (!isPlaying) {
            bgm.play().then(() => {
                isPlaying = true;
                document.getElementById('msg').innerText = "🎶 音樂強勢播放中！";
            }).catch(err => {
                document.getElementById('msg').innerText = "❌ 找不到 bgm.mp3 檔案";
            });
        }
    }

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    const tileSize = 32;
    let cameraX = 0;
    let worldData = JSON.parse(localStorage.getItem('mc_music_save')) || {};
    let keys = {};

    // --- 穩定 1.0 節奏數值 ---
    let player = { 
        x: 100, y: 100, w: 22, h: 42, 
        vx: 0, vy: 0, 
        speed: 4,      // 穩定行走速度
        jump: -10,     // 舒適跳躍高度
        grounded: false, hp: 100, atkTimer: 0 
    };

    let enemies = [];
    function spawnEnemy() {
        if (enemies.length < 4) {
            let side = Math.random() > 0.5 ? 600 : -600;
            enemies.push({ x: player.x + side, y: 0, w: 24, h: 44, vx: 0, vy: 0, hp: 50 });
        }
    }
    setInterval(spawnEnemy, 4000);

    function getBlock(x, y) {
        const key = `${Math.floor(x)}_${Math.floor(y)}`;
        if (worldData[key] !== undefined) return worldData[key];
        let ground = Math.floor(12 + Math.sin(x * 0.1) * 3);
        return (y < ground) ? 0 : (y === ground ? 2 : 1);
    }

    function isColliding(nx, ny) {
        let x1 = Math.floor(nx / tileSize), x2 = Math.floor((nx + player.w) / tileSize);
        let y1 = Math.floor(ny / tileSize), y2 = Math.floor((ny + player.h) / tileSize);
        for (let x = x1; x <= x2; x++) {
            for (let y = y1; y <= y2; y++) { if (getBlock(x, y) > 0) return true; }
        }
        return false;
    }

    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;

    canvas.onmousedown = (e) => {
        startMusic(); // 點擊時啟動音樂
        const gx = Math.floor((e.clientX + cameraX) / tileSize);
        const gy = Math.floor(e.clientY / tileSize);
        
        if (e.button === 0) { // 左鍵：挖礦 + 攻擊
            player.atkTimer = 10;
            enemies.forEach(en => {
                if (Math.hypot(en.x - player.x, en.y - player.y) < 70) {
                    en.hp -= 25; en.vx = (player.x < en.x ? 12 : -12); en.vy = -5;
                }
            });
            worldData[`${gx}_${gy}`] = 0;
        }
        if (e.button === 2) worldData[`${gx}_${gy}`] = 3; // 右鍵：蓋石頭
        localStorage.setItem('mc_music_save', JSON.stringify(worldData));
    };

    function loop() {
        // 1. 移動與自動爬坡
        player.vx
