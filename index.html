<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Super Human 2026 - Final Rescue</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        
        /* 選單層：這是唯一能點擊的地方 */
        #start-menu {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #1a1a1a; color: #f1c40f;
        }

        .btn {
            padding: 20px 50px; font-size: 28px; cursor: pointer; margin: 15px;
            background: #f1c40f; border: 4px solid #fff; border-radius: 15px;
            font-weight: bold; color: #000; box-shadow: 0 8px 0 #b8860b;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #b8860b; }

        /* 遊戲介面 */
        #hud { position: fixed; top: 15px; left: 15px; z-index: 100; color: white; background: rgba(0,0,0,0.7); padding: 12px; border: 2px solid #f1c40f; border-radius: 10px; display: none; pointer-events: none; }
        #radar { position: fixed; top: 15px; right: 15px; width: 140px; height: 140px; border: 3px solid #fff; border-radius: 50%; z-index: 100; display: none; background: rgba(0,0,0,0.5); overflow: hidden; }
        
        #esc-menu { position: fixed; inset: 0; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); }

        canvas#gCvs { display: none; position: absolute; top: 0; left: 0; z-index: 1; }
    </style>
</head>
<body>

    <div id="start-menu">
        <h1 style="font-size: 45px;">SUPER HUMAN 終極版</h1>
        <div id="m-1">
            <button class="btn" onclick="selMode(1)">👤 單人模式</button>
            <button class="btn" onclick="selMode(5)" style="background:#3498db; color:white;">👥 多人模式</button>
        </div>
        <div id="m-2" style="display:none;">
            <h2>小隊人數: <span id="p-lab">5</span></h2>
            <input type="range" min="2" max="10" value="5" oninput="document.getElementById('p-lab').innerText=this.value" id="p-slide" style="width:300px;">
            <br><button class="btn" onclick="selMode('info')">確認人數</button>
        </div>
        <div id="m-3" style="display:none; text-align:left; background:#2c3e50; padding:25px; border-radius:15px; max-width:400px; color:white;">
            <h2 style="text-align:center; color:#f1c40f;">📜 任務說明</h2>
            ● <b>WASD</b> 移動 | <b>空白</b> 跳躍<br>
            ● <b>左鍵</b> 挖掘 | <b>右鍵</b> 放置<br>
            ● <b>K</b> 攻擊 | <b>ESC</b> 選單<br>
            ● <b>AI 隊友</b>：會自己挖礦、戰鬥與蓋房<br>
            ● <b>死亡</b>：HP 歸零會自動重新開始<br>
            <button class="btn" onclick="go()" style="width:100%; margin-top:20px;">進入世界</button>
        </div>
    </div>

    <div id="esc-menu">
        <h1 style="color:white;">暫停</h1>
        <button class="btn" onclick="location.reload()">離開遊戲 (重啟)</button>
        <button class="btn" onclick="toggleESC()" style="background:#95a5a6; color:white;">返回遊戲</button>
    </div>

    <div id="hud">❤️ HP: <span id="hp">100</span> | 📍 <span id="pos">0,0</span> | 🕒 <span id="tm">12:00</span></div>
    <div id="radar"><canvas id="rCvs" width="140" height="140"></canvas></div>

    <canvas id="gCvs"></canvas>

<script>
    const cvs = document.getElementById('gCvs'), ctx = cvs.getContext('2d');
    const rcvs = document.getElementById('rCvs'), rctx = rcvs.getContext('2d');
    
    let isLive = false, isPaused = false, world = {}, keys = {}, agents = [], ticks = 600;
    let p = { x: 0, y: -200, w: 22, h: 42, vx: 0, vy: 0, hp: 100, maxHp: 100, ground: false };
    let pSize = 1, rain = false;
    const TILE = 32;

    function selMode(m) {
        if(m === 1) { pSize = 1; document.getElementById('m-1').style.display='none'; selMode('info'); }
        else if(m === 5) { document.getElementById('m-1').style.display='none'; document.getElementById('m-2').style.display='block'; }
        else if(m === 'info') { 
            if(pSize > 1) pSize = document.getElementById('p-slide').value;
            document.getElementById('m-2').style.display='none'; 
            document.getElementById('m-3').style.display='block'; 
        }
    }

    function go() {
        document.getElementById('start-menu').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
        document.getElementById('radar').style.display = 'block';
        cvs.style.display = 'block';
        cvs.width = window.innerWidth; cvs.height = window.innerHeight;

        for(let i=0; i<pSize-1; i++) spawn('ally', (Math.random()-0.5)*500);
        for(let i=0; i<5; i++) spawn('npc', (Math.random()-0.5)*2000); // 村民
        
        isLive = true; loop();
    }

    function spawn(type, x) {
        agents.push({ type, x, y: -400, w: 22, h: 42, vx: 0, vy: 0, hp: 100, maxHp: 100 });
    }

    function toggleESC() { if(!isLive) return; isPaused = !isPaused; document.getElementById('esc-menu').style.display = isPaused?'flex':'none'; }

    window.onkeydown = e => { if(e.code==='Escape') toggleESC(); keys[e.code]=true; if(e.code==='KeyK') doAtk(p); };
    window.onkeyup = e => keys[e.code]=false;
    window.onmousedown = e => {
        if(!isLive || isPaused) return;
        let gx = Math.floor((e.clientX + (p.x - cvs.width/2))/TILE);
        let gy = Math.floor((e.clientY + (p.y - cvs.height/2))/TILE);
        if(e.button === 0) world[gx+'_'+gy] = 0; else world[gx+'_'+gy] = 3;
    };
    window.oncontextmenu = e => e.preventDefault();

    function getBiome(gx) {
        let x = Math.abs(gx);
        if (x % 4000 < 800) return { n: "平原", h: 35, c: "#2ecc71" };
        if (x % 4000 < 1600) return { n: "丘陵", h: 28, c: "#27ae60" };
        if (x % 4000 < 2400) return { n: "山地", h: 15, c: "#95a5a6" };
        if (x % 4000 < 3200) return { n: "台地", h: 32, c: "#e67e22" };
        return { n: "古蹟", h: 35, c: "#7f8c8d" };
    }

    function getB(gx, gy) {
        if (world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
        let b = getBiome(gx);
        if (b.n === "古蹟" && gy < b.h && gy > b.h-3 && Math.random()<0.1) return 3;
        return gy < b.h ? 0 : (gy === b.h ? 2 : 1);
    }

    function check(x, y, w, h) {
        for (let i = Math.floor(x/TILE); i <= Math.floor((x+w)/TILE); i++) {
            for (let j = Math.floor(y/TILE); j <= Math.floor((y+h)/TILE); j++) {
                if(getB(i, j) > 0) return true;
            }
        }
        return false;
    }

    function doAtk(o) {
        agents.concat(p).forEach(e => { if(e!==o && Math.abs(e.x-o.x)<60) { e.hp -= 20; e.vx=(e.x>o.x?10:-10); } });
    }

    function loop() {
        if(!isLive || isPaused) { requestAnimationFrame(loop); return; }
        if(p.hp <= 0) { location.reload(); return; }

        ticks = (ticks + 0.4) % 1440;
        let night = ticks > 1000 || ticks < 350;

        // 玩家物理
        p.vy += 0.8; p.y += p.vy;
        if(check(p.x, p.y, p.w, p.h)) {
            if(p.vy > 0) { while(check(p.x, p.y, p.w, p.h)) p.y -= 0.5; p.ground = true; }
            else { while(check(p.x, p.y, p.w, p.h)) p.y += 0.5; }
            p.vy = 0;
        } else p.ground = false;

        let dx = (keys['KeyD']?5:0) - (keys['KeyA']?5:0);
        if(dx !== 0) { p.x += dx; if(check(p.x, p.y, p.w, p.h)) p.x -= dx; }
        if((keys['Space'] || keys['KeyW']) && p.ground) p.vy = -14;

        // AI 邏輯
        agents.forEach(e => {
            e.vy += 0.8; e.y += e.vy;
            if(check(e.x, e.y, e.w, e.h)) { if(e.vy > 0) while(check(e.x, e.y, e.w, e.h)) e.y -= 0.5; e.vy = 0; }
            if(e.type === 'ally') {
                if(Math.abs(p.x - e.x) > 150) e.x += (p.x > e.x ? 3 : -3);
                if(Math.random() < 0.005) world[Math.floor(e.x/TILE)+'_'+(Math.floor(e.y/TILE)+2)] = 0; // AI 挖
                if(Math.random() < 0.001) world[Math.floor(e.x/TILE)+'_'+(Math.floor(e.y/TILE)+1)] = 3; // AI 放
                agents.forEach(m => { if(m.type==='mob' && Math.abs(m.x-e.x)<80) doAtk(e); });
            } else if(e.type === 'mob') {
                e.x += (p.x > e.x ? 2.5 : -2.5);
                if(Math.abs(e.x - p.x) < 30) p.hp -= 0.2;
            }
        });
        if(night && Math.random() < 0.01) spawn('mob', p.x + (Math.random()>0.5?600:-600));
        agents = agents.filter(e => e.hp > 0);

        // UI 更新
        document.getElementById('hp').innerText = Math.ceil(p.hp);
        document.getElementById('pos').innerText = Math.floor(p.x/TILE) + "," + Math.floor(p.y/TILE);
        let h = Math.floor(ticks/60).toString().padStart(2,'0'), m = Math.floor(ticks%60).toString().padStart(2,'0');
        document.getElementById('tm').innerText = `${h}:${m}`;

        render();
        requestAnimationFrame(loop);
    }

    function render() {
        ctx.fillStyle = (ticks > 1000 || ticks < 350) ? '#050510' : '#87ceeb';
        ctx.fillRect(0,0,cvs.width,cvs.height);
        let cx = p.x - cvs.width/2, cy = p.y - cvs.height/2;

        for(let x=Math.floor(cx/TILE); x<=Math.ceil((cx+cvs.width)/TILE); x++) {
            let bInfo = getBiome(x);
            for(let y=Math.floor(cy/TILE); y<=Math.ceil((cy+cvs.height)/TILE); y++) {
                let b = getB(x, y);
                if(b > 0) {
                    ctx.fillStyle = b===2 ? bInfo.c : (b===1 ? '#795548' : '#bdc3c7');
                    ctx.fillRect(x*TILE-cx, y*TILE-cy, TILE+0.5, TILE+0.5);
                }
            }
        }

        agents.concat(p).forEach(e => {
            ctx.fillStyle = e===p?'#e67e22':(e.type==='ally'?'#3498db':(e.type==='mob'?'#e74c3c':'#f1c40f'));
            ctx.fillRect(e.x-cx, e.y-cy, e.w, e.h);
            ctx.fillStyle='red'; ctx.fillRect(e.x-cx, e.y-cy-10, e.w, 4);
            ctx.fillStyle='lime'; ctx.fillRect(e.x-cx, e.y-cy-10, e.w*(e.hp/e.maxHp || 1), 4);
        });

        // 圓形雷達
        rctx.fillStyle='#000'; rctx.fillRect(0,0,140,140);
        rctx.save(); rctx.translate(70, 70);
        agents.concat(p).forEach(e => {
            rctx.fillStyle = e===p?'#fff':(e.type==='ally'?'#3498db':'#e74c3c');
            let dx = (e.x-p.x)*0.1, dy = (e.y-p.y)*0.1;
            if(dx*dx+dy*dy < 65*65) { rctx.beginPath(); rctx.arc(dx, dy, 3, 0, 7); rctx.fill(); }
        });
        rctx.restore();
    }
</script>
</body>
</html>
