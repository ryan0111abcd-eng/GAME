<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Future Super Human - Ultimate Survival</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; user-select: none; }
        canvas { display: block; }
        
        /* UI 層級 */
        .overlay { position: fixed; inset: 0; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(10, 10, 10, 0.95); color: #f1c40f; text-align: center; }
        .btn { padding: 15px 40px; font-size: 24px; cursor: pointer; margin: 10px; background: #f1c40f; border: none; border-radius: 8px; font-weight: bold; color: #000; transition: 0.2s; }
        .btn:hover { background: #fff; transform: scale(1.05); }

        /* HUD */
        #hud { position: fixed; top: 20px; left: 20px; z-index: 100; color: white; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; border-left: 5px solid #f1c40f; display: none; pointer-events: none; }
        #minimap-container { position: fixed; top: 20px; right: 20px; width: 150px; height: 150px; border: 3px solid #fff; border-radius: 50%; overflow: hidden; z-index: 100; display: none; background: rgba(0,0,0,0.4); }
        
        #instruction-card { background: #2c3e50; padding: 30px; border-radius: 15px; border: 2px solid #f1c40f; max-width: 450px; text-align: left; color: white; line-height: 1.6; }
    </style>
</head>
<body>

    <div id="menu-mode" class="overlay">
        <h1 style="font-size: 40px;">FUTURE SUPER HUMAN</h1>
        <button class="btn" onclick="selectMode(1)">👤 單人模式</button>
        <button class="btn" onclick="selectMode(5)" style="background:#3498db; color:white;">👥 多人模式</button>
    </div>

    <div id="menu-players" class="overlay" style="display:none;">
        <h1>選擇小隊成員數量</h1>
        <h2 id="p-label">5 人</h2>
        <input type="range" min="2" max="10" value="5" oninput="document.getElementById('p-label').innerText=this.value+' 人'" id="p-slider" style="width:300px;">
        <br>
        <button class="btn" onclick="showInstructions()">下一步</button>
    </div>

    <div id="menu-info" class="overlay" style="display:none;">
        <div id="instruction-card">
            <h2 style="color:#f1c40f; text-align:center; margin-top:0;">📜 遊戲說明單</h2>
            <p>● <b>移動與跳躍</b>：[W,A,S,D] 或 方向鍵</p>
            <p>● <b>挖掘 / 放置</b>：滑鼠 [左鍵 / 右鍵]</p>
            <p>● <b>攻擊</b>：按下 [K] 鍵揮劍</p>
            <p>● <b>回血</b>：按下 [Q] 鍵（消耗飽食度補血）</p>
            <p>● <b>選單</b>：按 [ESC] 離開或重新開始</p>
            <p style="color:#e74c3c;">※ 晚上會出現怪物，請與隊友一起防守！</p>
            <button class="btn" onclick="initGame()" style="width:100%; margin-top:15px;">進入世界</button>
        </div>
    </div>

    <div id="menu-esc" class="overlay" style="display:none; background: rgba(0,0,0,0.8);">
        <h1>遊戲暫停</h1>
        <button class="btn" onclick="location.reload()">🚪 離開遊戲 (重新開始)</button>
        <button class="btn" onclick="toggleESC()" style="background:#7f8c8d; color:white;">↩️ 返回遊戲</button>
    </div>

    <div id="hud">
        ❤️ HP: <span id="hp-val">100</span><br>
        📍 座標: <span id="pos-val">0, 0</span><br>
        ⏰ 時間: <span id="time-val">12:00</span>
    </div>
    <div id="minimap-container"><canvas id="mCvs" width="150" height="150"></canvas></div>
    <canvas id="gCvs"></canvas>

<script>
    const cvs = document.getElementById('gCvs'), ctx = cvs.getContext('2d');
    const mcvs = document.getElementById('mCvs'), mctx = mcvs.getContext('2d');
    
    let active = false, paused = false, world = {}, keys = {}, entities = [];
    let p = { x: 0, y: -200, w: 22, h: 42, vx: 0, vy: 0, ground: false, hp: 100, maxHp: 100 };
    let totalP = 1, gameTime = 600; 
    const TILE = 32;

    // --- UI 邏輯 ---
    function selectMode(n) {
        document.getElementById('menu-mode').style.display = 'none';
        if (n === 1) { totalP = 1; showInstructions(); }
        else { document.getElementById('menu-players').style.display = 'flex'; }
    }
    function showInstructions() {
        if (totalP > 1) totalP = document.getElementById('p-slider').value;
        document.getElementById('menu-players').style.display = 'none';
        document.getElementById('menu-info').style.display = 'flex';
    }
    function initGame() {
        document.getElementById('menu-info').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
        document.getElementById('minimap-container').style.display = 'block';
        cvs.width = window.innerWidth; cvs.height = window.innerHeight;
        
        // 生成隊友 AI
        for(let i=0; i<totalP-1; i++) {
            entities.push({ type: 'ally', x: (Math.random()-0.5)*500, y: -300, w: 22, h: 42, vx: 0, vy: 0, hp: 100, maxHp: 100, timer: 0 });
        }
        active = true; loop();
    }
    function toggleESC() {
        if (!active) return;
        paused = !paused;
        document.getElementById('menu-esc').style.display = paused ? 'flex' : 'none';
    }

    // --- 遊戲邏輯 ---
    window.onkeydown = e => { if(e.code==='Escape') toggleESC(); keys[e.code]=true; if(e.code==='KeyK') attack(p); if(e.code==='KeyQ') p.hp = Math.min(100, p.hp+20); };
    window.onkeyup = e => keys[e.code] = false;
    window.onmousedown = e => {
        if(!active || paused) return;
        let gx = Math.floor((e.clientX + (p.x - cvs.width/2))/TILE);
        let gy = Math.floor((e.clientY + (p.y - cvs.height/2))/TILE);
        if(e.button === 0) world[gx+'_'+gy] = 0; // 挖
        else if(getB(gx, gy) === 0) world[gx+'_'+gy] = 3; // 疊
    };
    window.oncontextmenu = e => e.preventDefault();

    function attack(owner) {
        entities.concat(p).forEach(e => {
            if (e !== owner && Math.abs(e.x - owner.x) < 60 && Math.abs(e.y - owner.y) < 60) {
                e.hp -= 15; e.vx = (e.x > owner.x ? 10 : -10);
            }
        });
    }

    function getB(gx, gy) {
        if (world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy
