<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Super Human - 濱河平原版</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; color: white; }
        .layer { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1a1a1a; z-index: 9999; }
        .title-text { color: #f1c40f; font-size: 50px; margin-bottom: 40px; text-shadow: 3px 3px 0 #000; }
        .btn { padding: 20px 60px; font-size: 28px; cursor: pointer; margin: 15px; background: #f1c40f; border: none; font-weight: bold; border-radius: 15px; color: black; box-shadow: 0 8px 0 #b8860b; }
        #hud { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 15px; border: 2px solid #f1c40f; display: none; z-index: 5000; border-radius: 10px; font-size: 18px; pointer-events: none; }
        #inv { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; gap: 10px; z-index: 5000; }
        .slot { width: 50px; height: 50px; border: 2px solid #777; background: #333; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .slot.active { border-color: #f1c40f; background: #555; transform: scale(1.1); }
        canvas#gameCanvas { display: none; position: absolute; top: 0; left: 0; z-index: 10; }
    </style>
</head>
<body>

    <div id="ui-boot" class="layer">
        <h1 class="title-text">點擊下方按鈕開始</h1>
        <button class="btn" onclick="toMain()">啟動遊戲</button>
    </div>

    <div id="ui-main" class="layer" style="display:none;">
        <h1 class="title-text">未來的 SUPER HUMAN</h1>
        <button class="btn" onclick="bootGame(1)">單人冒險</button>
        <button class="btn" onclick="showMulti()" style="background:#3498db; color:white;">多人小隊</button>
    </div>

    <div id="ui-multi" class="layer" style="display:none;">
        <h1 class="title-text">選擇隊友</h1>
        <input type="range" id="p-range" min="2" max="15" value="8" oninput="document.getElementById('pv').innerText=this.value" style="width:300px;">
        <div style="font-size:32px; margin: 20px;">總人數：<span id="pv" style="color:#f1c40f;">8</span></div>
        <button class="btn" onclick="bootGame(document.getElementById('p-range').value)">確認</button>
    </div>

    <div id="hud">
        📍 座標: <span id="posX">0</span>, <span id="posY">0</span> | ❤️ HP: <span id="hp">100</span><br>
        🕒 時間: <span id="time-text">07:00</span> | 🌊 狀態: <span id="status">偵測中</span>
    </div>

    <div id="inv">
        <div class="slot active" id="sl1">1:土</div>
        <div class="slot" id="sl2">2:草</div>
        <div class="slot" id="sl3">3:石</div>
        <div class="slot" id="sl4">4:木</div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const cvs = document.getElementById('gameCanvas'), ctx = cvs.getContext('2d');
    let isRunning = false, ticks = 420, world = {}, camX = 0, camY = 0, curB = 1;
    let p = { x: 0, y: 0, w: 20, h: 40, vx: 0, vy: 0, hp: 100, ground: false, inWater: false };
    let agents = [], keys = {};
    const TILE = 32, COLORS = { 1: '#8B4513', 2: '#228B22', 3: '#666', 4: '#cd853f', 9: 'rgba(52, 152, 219, 0.7)' };

    function toMain() { document.getElementById('ui-boot').style.display='none'; document.getElementById('ui-main').style.display='flex'; }
    function showMulti() { document.getElementById('ui-main').style.display='none'; document.getElementById('ui-multi').style.display='flex'; }

    // --- 優化地貌邏輯 ---
    function getBiomeInfo(gx) {
        let x = gx;
        // 每 600 格一個地形循環
        let cycle = ((x % 600) + 600) % 600;
        
        // 300~400 是河流區
        if (cycle >= 300 && cycle <= 400) return { name: "河流", h: 48, n: 0, isWater: true };
        // 河流左右 50 格範圍內強制平原地貌 (250~300, 400~450)
        if (cycle > 250 && cycle < 450) return { name: "濱河平原", h: 38, n: 1 }; 
        // 其餘地方是隨機山脈或丘陵
        if (cycle > 450 || cycle < 100) return { name: "山地", h: 20, n: 15 };
        return { name: "普通平原", h: 38, n: 3 };
    }

    function getGY(gx) {
        let b = getBiomeInfo(gx);
        return Math.floor(b.h + Math.sin(gx * 0.1) * b.n);
    }

    function getB(gx, gy) {
        if (world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
        let fY = getGY(gx);
        let b = getBiomeInfo(gx);
        if (b.isWater && gy >= fY) return 9; // 水
        return gy < fY ? 0 : (gy === fY ? 2 : 1);
    }

    function bootGame(num) {
        document.querySelectorAll('.layer').forEach(l=>l.style.display='none');
        document.getElementById('hud').style.display='block';
        document.getElementById('inv').style.display='flex';
        cvs.style.display='block'; cvs.width = window.innerWidth; cvs.height = window.innerHeight;
        
        p.x = 0; p.y = getGY(0)*TILE - 150;
        for(let i=0; i<num-1; i++) {
            agents.push({x: 100+(i*60), y: p.y, w:20, h:40, hp:100, maxHp:100, dir:1, sTimer:50});
        }
        isRunning = true;
        requestAnimationFrame(loop);
    }

    window.onkeydown = e => {
        keys[e.code] = true;
        if(e.key >= '1' && e.key <= '4') {
            curB = parseInt(e.key);
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
            document.getElementById('sl'+curB).classList.add('active');
        }
    };
    window.onkeyup = e => keys[e.code] = false;

    // --- 修改點擊判定：水不可挖 ---
    window.onmousedown = e => {
        if(!isRunning) return;
        let gx = Math.floor((e.clientX + camX)/TILE), gy = Math.floor((e.clientY + camY)/TILE);
        let blockType = getB(gx, gy);
        
        if(e.button === 0) { // 左鍵挖掘
            if(blockType !== 9 && blockType !== 0) world[gx+'_'+gy] = 0; // 不是水也不是空氣才能挖
        }
        if(e.button === 2) { // 右鍵放置
            if(blockType === 0) world[gx+'_'+gy] = curB; 
        }
    };
    window.oncontextmenu = e => e.preventDefault();

    function loop() {
        if(isRunning) {
            ticks = (ticks + 0.3) % 1440;
            p.vx = keys['KeyD'] ? 5 : (keys['KeyA'] ? -5 : 0);
            
            let px = Math.floor((p.x + p.w/2)/TILE), py = Math.floor((p.y + p.h/2)/TILE);
            p.inWater = (getB(px, py) === 9);

            if (p.inWater) {
                p.vy -= 0.8; if (p.vy < -3) p.vy = -3;
                if (keys['KeyW'] || keys['Space']) p.vy = -5;
            } else {
                p.vy += 0.7;
                if ((keys['KeyW'] || keys['Space']) && p.ground) p.vy = -12;
            }

            p.y += p.vy; p.ground = false;
            let fy = Math.floor((p.y+p.h)/TILE), lx = Math.floor((p.x+2)/TILE), rx = Math.floor((p.x+p.w-2)/TILE);
            let bBelow = getB(lx, fy);
            if(bBelow > 0 && bBelow !== 9) { p.y = fy*TILE-p.h; p.vy = 0; p.ground = true; }
            p.x += p.vx;

            agents.forEach(a => {
                a.sTimer--; if(a.sTimer <= 0) { a.dir *= -1; a.sTimer = 100; }
                a.x += a.dir * 1.5;
                let targetY = getGY(Math.floor(a.x/TILE))*TILE - a.h;
                a.y += (targetY - a.y) * 0.1;
            });
        }
        render();
        requestAnimationFrame(loop);
    }

    function render() {
        let sky = (ticks >= 1090 || ticks < 390) ? '#191970' : (ticks >= 1050 ? '#ff7f50' : '#87ceeb');
        ctx.fillStyle = sky; ctx.fillRect(0, 0, cvs.width, cvs.height);

        camX += (p.x - cvs.width/2 - camX) * 0.1;
        camY += (p.y - cvs.height/2 - camY) * 0.1;

        for(let x=Math.floor(camX/TILE); x<Math.floor((camX+cvs.width)/TILE)+1; x++) {
            for(let y=Math.floor(camY/TILE); y<Math.floor((camY+cvs.height)/TILE)+1; y++) {
                let b = getB(x, y);
                if(b!==0) { ctx.fillStyle = COLORS[b]; ctx.fillRect(x*TILE-camX, y*TILE-camY, TILE, TILE); }
            }
        }

        agents.forEach(a => {
            ctx.fillStyle = '#f1c40f'; ctx.fillRect(a.x-camX, a.y-camY, a.w, a.h);
        });

        ctx.fillStyle = "#FF5733"; ctx.fillRect(p.x-camX, p.y-camY, p.w, p.h);
        
        document.getElementById('posX').innerText = Math.floor(p.x/TILE);
        document.getElementById('hp').innerText = Math.ceil(p.hp);
        document.getElementById('status').innerText = p.inWater ? "游泳中" : "陸地";
        let h = Math.floor(ticks/60).toString().padStart(2,'0'), m = Math.floor(ticks%60).toString().padStart(2,'0');
        document.getElementById('time-text').innerText = `${h}:${m}`;
    }
</script>
</body>
</html>
