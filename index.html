<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUPER HUMAN 2026 - FORCE START</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        
        /* 介面層：確保點擊能穿透 */
        .ui-box { 
            position: absolute; inset: 0; z-index: 10000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: #111; color: #f1c40f; 
        }

        .action-btn { 
            display: block; width: 80%; max-width: 400px;
            padding: 30px; font-size: 32px; cursor: pointer; margin: 20px; 
            background: #f1c40f; border: 4px solid #fff; border-radius: 20px; 
            font-weight: bold; color: #000; text-align: center;
        }

        #game-hud { position: fixed; top: 10px; left: 10px; z-index: 500; color: white; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; display: none; pointer-events: none; }
        #radar-box { position: fixed; top: 10px; right: 10px; width: 120px; height: 120px; border: 2px solid #fff; border-radius: 50%; z-index: 500; display: none; background: rgba(0,0,0,0.5); overflow: hidden; }
        
        canvas#mainCanvas { display: none; position: absolute; top: 0; left: 0; z-index: 10; }
    </style>
</head>
<body>

    <div id="div-step1" class="ui-box">
        <h1 style="font-size: 40px; margin-bottom: 50px;">SUPER HUMAN: 守護者</h1>
        <div class="action-btn" onclick="startWith(1)">👤 單人冒險 (直接開始)</div>
        <div class="action-btn" onclick="document.getElementById('div-step1').style.display='none'; document.getElementById('div-step2').style.display='flex';" style="background:#3498db; color:white;">👥 多人連線 (選人數)</div>
    </div>

    <div id="div-step2" class="ui-box" style="display:none;">
        <h1>選擇小隊人數</h1>
        <h2 id="lab-p">5 人</h2>
        <input type="range" min="2" max="10" value="5" oninput="document.getElementById('lab-p').innerText=this.value+' 人'" id="range-p" style="width:80%; height:50px;">
        <div class="action-btn" onclick="startWith(document.getElementById('range-p').value)">確定並開始遊戲</div>
    </div>

    <div id="game-hud">❤️ HP: <span id="ui-hp">100</span> | 📍 <span id="ui-pos">0,0</span><br>⛈️ <span id="ui-wt">晴天</span> | 🕒 <span id="ui-tm">12:00</span></div>
    <div id="radar-box"><canvas id="radarCanvas" width="120" height="120"></canvas></div>
    <canvas id="mainCanvas"></canvas>

<script>
    const cvs = document.getElementById('mainCanvas'), ctx = cvs.getContext('2d');
    const rcvs = document.getElementById('radarCanvas'), rctx = rcvs.getContext('2d');
    let live = false, world = {}, keys = {}, ents = [], time = 600;
    let p = { x: 0, y: -200, w: 22, h: 42, vx: 0, vy: 0, hp: 100, maxHp: 100, gr: false, hit: null };
    const T = 32;

    // 強制啟動函數
    function startWith(num) {
        document.getElementById('div-step1').style.display = 'none';
        document.getElementById('div-step2').style.display = 'none';
        document.getElementById('game-hud').style.display = 'block';
        document.getElementById('radar-box').style.display = 'block';
        cvs.style.display = 'block';
        cvs.width = window.innerWidth; 
        cvs.height = window.innerHeight;

        // 40% 下雨
        if(Math.random() < 0.4) document.getElementById('ui-wt').innerText = "下雨";

        // 生成 AI (確保名稱統一為 ents)
        for(let i=0; i<num-1; i++) spawn('ally', (Math.random()-0.5)*600);
        for(let i=0; i<5; i++) spawn('npc', (Math.random()-0.5)*2000);
        for(let i=0; i<4; i++) spawn('pig', (Math.random()-0.5)*2000);

        live = true;
        requestAnimationFrame(loop);
    }

    function spawn(type, x) {
        let h = (type==='pig')?30:100;
        ents.push({ type, x, y: -400, w: 22, h: 42, vx: 0, vy: 0, hp: h, maxHp: h, dir: 1 });
    }

    function getB(gx, gy) {
        if (world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
        let x = Math.abs(gx);
        let h = 35, amp = 1;
        if (x % 100 < 70) { h=28; amp=6; } // 丘陵 70%
        if (x % 100 < 50) { h=15; amp=14; } // 山地 50%
        let floor = Math.floor(h + Math.sin(gx * 0.1) * amp);
        if (x % 100 < 65 && gy < floor && gy > floor-4 && Math.random()<0.08) return 3; // 古蹟 65%
        return gy < floor ? 0 : (gy === floor ? 2 : 1);
    }

    function check(x, y) {
        for (let i = Math.floor(x/T); i <= Math.floor((x+22)/T); i++) {
            for (let j = Math.floor(y/T); j <= Math.floor((y+42)/T); j++) {
                if(getB(i, j) > 0) return true;
            }
        }
        return false;
    }

    function atk(o, t = null) {
        ents.concat(p).forEach(e => {
            if(e !== o && Math.abs(e.x - o.x) < 70) {
                if(t && e !== t) return;
                e.hp -= 20; e.vx = (e.x > o.x ? 12 : -12);
                if(e === p) p.hit = o; 
            }
        });
    }

    window.onkeydown = e => { keys[e.code]=true; if(e.code==='KeyK') atk(p); if(e.code==='KeyQ') p.hp=Math.min(100, p.hp+20); if(e.code==='Escape') location.reload(); };
    window.onkeyup = e => keys[e.code]=false;
    window.onmousedown = e => {
        if(!live) return;
        let gx = Math.floor((e.clientX + (p.x - cvs.width/2))/T);
        let gy = Math.floor((e.clientY + (p.y - cvs.height/2))/T);
        if(e.button === 0) world[gx+'_'+gy] = 0; else world[gx+'_'+gy] = 3;
    };

    function loop() {
        if(!live) return;
        if(p.hp <= 0) location.reload();

        time = (time + 0.4) % 1440;
        p.vy += 0.8; p.y += p.vy;
        if(check(p.x, p.y)) {
            if(p.vy > 0) { while(check(p.x, p.y)) p.y -= 0.5; p.gr = true; }
            else { while(check(p.x, p.y)) p.y += 0.5; }
            p.vy = 0;
        } else p.gr = false;

        let dx = (keys['KeyD']?5:0) - (keys['KeyA']?5:0);
        if(dx !== 0) { p.x += dx; if(check(p.x, p.y)) p.x -= dx; }
        if(keys['Space'] && p.gr) p.vy = -14;

        ents.forEach(e => {
            e.vy += 0.8; e.y += e.vy;
            if(check(e.x, e.y)) { if(e.vy > 0) while(check(e.x, e.y)) e.y -= 0.5; e.vy = 0; }
            if(e.type === 'ally') {
                if(p.hit && p.hit.hp > 0) {
                    e.x += (p.hit.x > e.x ? 4 : -4);
                    if(Math.abs(e.x - p.hit.x) < 60) atk(e, p.hit);
                } else {
                    if(Math.abs(p.x - e.x) > 180) e.x += (p.x > e.x ? 2.5 : -2.5);
                    ents.forEach(m => { if(m.type==='mob' && Math.abs(m.x-e.x)<100) atk(e); });
                }
            } else if(e.type === 'mob') {
                e.x += (p.x > e.x ? 2.3 : -2.3);
                if(Math.abs(e.x - p.x) < 30) p.hp -= 0.2;
            }
        });
        if((time > 1050 || time < 350) && Math.random() < 0.015) spawn('mob', p.x + (Math.random()>0.5?600:-600));
        ents = ents.filter(e => e.hp > 0);

        document.getElementById('ui-hp').innerText = Math.ceil(p.hp);
        document.getElementById('ui-pos').innerText = Math.floor(p.x/T) + "," + Math.floor(p.y/T);
        let h = Math.floor(time/60).toString().padStart(2,'0'), m = Math.floor(time%60).toString().padStart(2,'0');
        document.getElementById('ui-tm').innerText = `${h}:${m}`;

        render();
        requestAnimationFrame(loop);
    }

    function render() {
        ctx.fillStyle = (time > 1050 || time < 350) ? '#0a0a20' : '#87ceeb';
        ctx.fillRect(0,0,cvs.width,cvs.height);
        let cx = p.x - cvs.width/2, cy = p.y - cvs.height/2;
        for(let x=Math.floor(cx/T); x<=Math.ceil((cx+cvs.width)/T); x++) {
            for(let y=Math.floor(cy/T); y<=Math.ceil((cy+cvs.height)/T); y++) {
                let b = getB(x, y);
                if(b > 0) {
                    ctx.fillStyle = b===2 ? '#2ecc71' : (b===1 ? '#795548' : '#bdc3c7');
                    ctx.fillRect(x*T-cx, y*T-cy, T+0.5, T+0.5);
                }
            }
        }
        ents.concat(p).forEach(e => {
            ctx.fillStyle = e===p?'#e67e22':(e.type==='ally'?'#3498db':(e.type==='mob'?'#2ecc71':'#f1c40f'));
            ctx.fillRect(e.x-cx, e.y-cy, e.w, e.h);
            ctx.fillStyle='red'; ctx.fillRect(e.x-cx, e.y-cy-10, e.w, 4);
            ctx.fillStyle='lime'; ctx.fillRect(e.x-cx, e.y-cy-10, e.w*(e.hp/e.maxHp), 4);
        });
        rctx.fillStyle='#000'; rctx.fillRect(0,0,120,120);
        rctx.save(); rctx.translate(60, 60);
        ents.concat(p).forEach(e => {
            rctx.fillStyle = e===p?'#fff':(e.type==='ally'?'#3498db':'#e74c3c');
            let dx = (e.x-p.x)*0.1, dy = (e.y-p.y)*0.1;
            if(dx*dx+dy*dy < 55*55) { rctx.beginPath(); rctx.arc(dx, dy, 3, 0, 7); rctx.fill(); }
        });
        rctx.restore();
    }
</script>
</body>
</html>
