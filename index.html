<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>未來的 Super Human - 圓形星球版</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #050515; font-family: sans-serif; overflow: hidden; }
        #ui-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; background: #000; }
        .title { font-size: 40px; color: #f1c40f; margin-bottom: 30px; text-align: center; text-shadow: 0 0 10px #f1c40f; }
        .btn { padding: 15px 40px; font-size: 22px; cursor: pointer; margin: 10px; background: #f1c40f; border: none; font-weight: bold; border-radius: 30px; }
        #hud { position: fixed; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.8); padding: 12px; border: 2px solid #f1c40f; display: none; z-index: 5000; pointer-events: none; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="ui-wrapper">
        <div id="main-entry">
            <div class="title">未來的 Super Human<br><small style="font-size:20px;">環形星球大冒險</small></div>
            <button class="btn" onclick="init(1)">單人冒險</button>
            <button class="btn" style="background:#3498db; color:white;" onclick="init(5)">多人連線 (5人)</button>
        </div>
    </div>

    <div id="hud">
        ❤️ 血量: <span id="hp">100</span> | 🕒 <span id="time">07:00</span> | 🛠️ [1,2,3] 建造 | ⚔️ [K] 攻擊
    </div>

<script>
let canvas, ctx, isRunning = false;
let ticks = 420; 
let worldSeed = Math.random() * 100;
const PLANET_RADIUS = 500; // 星球地表半徑
const TILE_SIZE = 25; // 方塊大小
const GRAVITY = 0.25;

let p = { angle: 0, r: PLANET_RADIUS + 50, vr: 0, hp: 100, atk: 0 };
let allies = [], mobs = [], worldData = {};

function init(count) {
    document.getElementById('ui-wrapper').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    canvas = document.createElement('canvas');
    document.body.appendChild(canvas);
    ctx = canvas.getContext('2d');
    
    for(let i=0; i < count - 1; i++) {
        allies.push({ angle: Math.random()*Math.PI*2, r: PLANET_RADIUS+50, vr: 0, hp: 100, atk: 0, buildT: 0 });
    }

    isRunning = true;
    window.addEventListener('resize', resize); resize();
    window.addEventListener('keydown', e => { keys[e.code] = true; });
    window.addEventListener('keyup', e => keys[e.code] = false);
    requestAnimationFrame(loop);
}

const keys = {};
// 獲取環形地圖方塊
function getBlock(angle, r) {
    let normAngle = ((angle % (Math.PI*2)) + (Math.PI*2)) % (Math.PI*2);
    let layer = Math.floor(r / TILE_SIZE);
    let segment = Math.floor(normAngle * 100); 
    let key = `${segment}_${layer}`;
    
    if (worldData[key] !== undefined) return worldData[key];
    
    // 基礎地形生成
    let surfaceLayer = Math.floor((PLANET_RADIUS + Math.sin(segment * 0.1) * 20) / TILE_SIZE);
    if (layer > surfaceLayer) return 0; // 天空
    if (layer === surfaceLayer) return 2; // 草地
    return 1; // 泥土
}

function updatePhysics(o, isPlayer) {
    // 左右移動改為旋轉角度
    let speed = isPlayer ? 0.015 : 0.008;
    if (isPlayer) {
        if (keys['KeyA']) o.angle -= speed;
        if (keys['KeyD']) o.angle += speed;
    } else {
        if (Math.random() < 0.01) o.moveDir = (Math.random() - 0.5) * 2;
        o.angle += (o.moveDir || 0) * speed;
    }

    // 重力與碰撞
    o.vr -= GRAVITY;
    let nextR = o.r + o.vr;
    if (getBlock(o.angle, nextR) !== 0) {
        o.r = (Math.floor(nextR / TILE_SIZE) + 1) * TILE_SIZE;
        o.vr = 0;
        if (isPlayer && keys['Space']) o.vr = 7;
        else if (!isPlayer && Math.random() < 0.02) o.vr = 6; // AI 自動跳躍
    } else {
        o.r = nextR;
    }
}

function loop() {
    if (!isRunning) return;
    ticks = (ticks + 0.5) % 1440;
    let hr = Math.floor(ticks / 60);

    // 1. 玩家與隊友 AI
    updatePhysics(p, true);
    allies.forEach(a => {
        updatePhysics(a, false);
        // 隊友蓋房子/挖土邏輯
        a.buildT++;
        if (a.buildT > 200) {
            let seg = Math.floor(a.angle * 100);
            let lay = Math.floor(a.r / TILE_SIZE) - 1;
            if (Math.random() > 0.5) worldData[`${seg}_${lay}`] = 0; // 挖
            else worldData[`${seg+1}_${lay+1}`] = 3; // 蓋石頭
            a.buildT = 0;
        }
    });

    // 2. 怪物系統
    let isNight = (hr >= 18 || hr < 7);
    if (isNight && Math.random() < 0.02) {
        mobs.push({ angle: p.angle + (Math.random()-0.5), r: PLANET_RADIUS + 100, vr: 0, hp: 20 });
    }
    mobs.forEach((m, i) => {
        if (!isNight) m.hp -= 0.5; // 白天自燃
        m.angle += (m.angle < p.angle ? 0.005 : -0.005);
        updatePhysics(m, false);
        if (Math.abs(m.angle - p.angle) < 0.05 && Math.abs(m.r - p.r) < 20) p.hp -= 0.5;
        if (m.hp <= 0) mobs.splice(i, 1);
    });

    // 3. 攻擊
    if (keys['KeyK'] && p.atk <= 0) {
        p.atk = 15;
        mobs.forEach(m => { if(Math.abs(m.angle-p.angle)<0.1) m.hp -= 10; });
    }
    if (p.atk > 0) p.atk--;

    draw();
    requestAnimationFrame(loop);
}

function draw() {
    ctx.clearRect(0,0,canvas.width, canvas.height);
    let cx = canvas.width/2;
    let cy = canvas.height/2;

    // 繪製背景 (晝夜顏色)
    let skyAlpha = (ticks > 420 && ticks < 1050) ? 1 : (ticks > 1050 && ticks < 1080) ? 0.5 : 0.1;
    ctx.fillStyle = `rgba(135, 206, 235, ${skyAlpha})`;
    ctx.fillRect(0,0,canvas.width, canvas.height);

    // 視角中心化：玩家永遠在星球正上方
    ctx.save();
    ctx.translate(cx, cy + 200); // 將星球中心往下移一點
    ctx.rotate(-p.angle - Math.PI/2); 

    // 繪製方塊
    for (let seg = 0; seg
