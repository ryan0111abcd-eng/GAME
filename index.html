<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Super Human - 世界擴張版</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; color: white; }
        .layer { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1a1a1a; z-index: 10001; }
        .title-text { color: #f1c40f; font-size: 50px; margin-bottom: 40px; text-shadow: 3px 3px 0 #000; }
        .btn { padding: 15px 50px; font-size: 24px; cursor: pointer; margin: 10px; background: #f1c40f; border: none; font-weight: bold; border-radius: 12px; color: black; box-shadow: 0 6px 0 #b8860b; }
        #hud { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 15px; border: 2px solid #f1c40f; display: none; z-index: 5000; border-radius: 10px; }
        #inv { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; gap: 8px; z-index: 5000; }
        .slot { width: 45px; height: 45px; border: 2px solid #777; background: #333; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .slot.active { border-color: #f1c40f; transform: scale(1.1); background: #444; }
        canvas#gameCanvas { display: none; position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>

    <div id="ui-main" class="layer">
        <h1 class="title-text">未來的 SUPER HUMAN</h1>
        <button class="btn" onclick="boot(1)">開始鍵</button>
        <button class="btn" onclick="document.getElementById('ui-main').style.display='none'; document.getElementById('ui-multi').style.display='flex';">多人連線鍵</button>
    </div>

    <div id="ui-multi" class="layer" style="display:none;">
        <h1 class="title-text">選擇人數</h1>
        <input type="range" id="p-range" min="2" max="10" value="5" oninput="document.getElementById('pv').innerText=this.value">
        <div style="font-size:32px; margin: 20px;">總人數：<span id="pv" style="color:#f1c40f;">5</span></div>
        <button class="btn" onclick="boot(document.getElementById('p-range').value)">確認並開始</button>
    </div>

    <div id="hud">
        📍 座標: <span id="posX">0</span>, <span id="posY">0</span> | ❤️ 玩家血量: <span id="hp">100</span><br>
        🕒 時間: <span id="time-text">07:00</span> | 🗺️ 地形: <span id="biome">偵測中</span>
    </div>

    <div id="inv">
        <div class="slot active" id="sl1">1:土</div>
        <div class="slot" id="sl2">2:草</div>
        <div class="slot" id="sl3">3:石</div>
        <div class="slot" id="sl4">4:木</div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const cvs = document.getElementById('gameCanvas'), ctx = cvs.getContext('2d');
let isRunning = false, ticks = 420, world = {}, camX = 0, camY = 0, curB = 1;
let p = { x: 500, y: 0, w: 20, h: 40, vx: 0, vy: 0, hp: 100, maxHp: 100, ground: false, atk: 0 };
let agents = [], keys = {};
const TILE = 32, COLORS = { 1: '#8B4513', 2: '#228B22', 3: '#666', 4: '#cd853f', 9: '#3498db' }; // 9是水

// --- 地形引擎 ---
function getBiome(gx) {
    let x = Math.abs(gx);
    if (x % 300 < 50) return { name: '河流', h: 45, noise: 0, color: 9 };
    if (x % 300 < 120) return { name: '平原', h: 38, noise: 2 };
    if (x % 300 < 180) return { name: '丘陵', h: 32, noise: 8 };
    if (x % 300 < 240) return { name: '山地', h: 15, noise: 15 };
    return { name: '台地', h: 25, noise: 1 };
}

function getGY(gx) {
    let b = getBiome(gx);
    let wave = Math.sin(gx * 0.1) * b.noise;
    return Math.floor(b.h + wave);
}

function getB(gx, gy) {
    if (world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
    let fY = getGY(gx);
    let b = getBiome(gx);
    if (b.color === 9 && gy >= fY) return 9; // 河流
    return gy < fY ? 0 : (gy === fY ? 2 : 1);
}

// 生成古蹟或村莊
function genStructure(gx) {
    let fY = getGY(gx);
    if (gx % 100 === 50) { // 古蹟 (石頭)
        for(let i=0; i<5; i++) for(let j=0; j<8; j++) world[`${gx+i}_${fY-1-j}`] = 3;
    }
    if (gx % 100 === 10) { // 村莊 (木頭)
        for(let i=0; i<4; i++) for(let j=0; j<3; j++) world[`${gx+i}_${fY-1-j}`] = 4;
    }
}

function boot(num) {
    document.querySelectorAll('.layer').forEach(l=>l.style.display='none');
    document.getElementById('hud').style.display='block';
    document.getElementById('inv').style.display='flex';
    cvs.style.display='block'; cvs.width = window.innerWidth; cvs.height = window.innerHeight;
    p.y = getGY(Math.floor(p.x/TILE))*TILE - 150;
    
    for(let i=0; i < num-1; i++) {
        agents.push({x: p.x + (i+1)*150, y:p.y, w:20, h:40, vx:0, vy:0, hp:100, maxHp:100, type:'ally', dir:1, sTimer:50});
    }
    isRunning = true;
    requestAnimationFrame(loop);
}

// 控制監聽
window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if(e.code === 'KeyK') p.atk = 10;
    if(e.key >= '1' && e.key <= '4') {
        curB = parseInt(e.key);
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
        document.getElementById('sl'+curB).classList.add('active');
    }
});
window.addEventListener('keyup', e => keys[e.code] = false);
window.addEventListener('mousedown', e => {
    let gx = Math.floor((e.clientX + camX)/TILE), gy = Math.floor((e.clientY + camY)/TILE);
    if(e.button === 0) world[gx+'_'+gy] = 0;
    if(e.button === 2) world[gx+'_'+gy] = curB;
});

function loop() {
    if(isRunning) {
        ticks = (ticks + 0.3) % 1440;
        p.vx = keys['KeyD'] ? 5 : (keys['KeyA'] ? -5 : 0);
        if((keys['KeyW'] || keys['Space']) && p.ground) p.vy = -12;
        updatePhys(p);

        agents.forEach((a, idx) => {
            a.sTimer--;
            if(a.sTimer <= 0) { a.dir = Math.random() > 0.5 ? 1 : -1; a.sTimer = 60+Math.random()*100; }
            a.vx = a.dir * (a.type==='monster'?3:1.5);
            a.x += a.vx;
            let ty = getGY(Math.floor(a.x/TILE))*TILE - a.h;
            a.y += (ty - a.y) * 0.1; // 穿牆平滑移動
            if(p.atk > 0 && Math.abs(a.x-p.x)<50 && Math.abs(a.y-p.y)<50) a.hp -= 20;
            if(a.hp <= 0) agents.splice(idx, 1);
        });

        // 晚上生怪
        if((ticks >= 1090 || ticks < 390) && Math.random() < 0.01) {
            agents.push({x: p.x + (Math.random()-0.5)*1000, y:p.y, w:20, h:40, vx:0, vy:0, hp:60, maxHp:60, type:'monster', dir:1, sTimer:30});
        }
    }
    render();
    requestAnimationFrame(loop);
}

function updatePhys(o) {
    o.vy += 0.7; o.y += o.vy; o.ground = false;
    let fy = Math.floor((o.y+o.h)/TILE), lx = Math.floor((o.x+2)/TILE), rx = Math.floor((o.x+o.w-2)/TILE);
    let b = getB(lx, fy);
    if(b > 0 && b !== 9) { o.y = fy*TILE-o.h; o.vy = 0; o.ground = true; }
    o.x += o.vx;
    // 簡單碰撞
    let sx = o.vx > 0 ? Math.floor((o.x+o.w)/TILE) : Math.floor(o.x/TILE);
    if(getB(sx, Math.floor(o.y/TILE)) > 0) o.x -= o.vx;
}

function render() {
    let sky = '#87ceeb';
    if(ticks >= 1050 && ticks < 1080) sky = '#ff7f50';
    if(ticks >= 1090 || ticks < 390) sky = '#191970';
    ctx.fillStyle = sky; ctx.fillRect(0, 0, cvs.width, cvs.height);

    camX += (p.x - cvs.width/2 - camX) * 0.1;
    camY += (p.y - cvs.height/2 - camY) * 0.1;
    let cx = Math.floor(camX), cy = Math.floor(camY);

    for(let x=Math.floor(cx/TILE); x<Math.floor((cx+cvs.width)/TILE)+1; x++) {
        genStructure(x); // 動態生成古蹟村莊
        for(let y=Math.floor(cy/TILE); y<Math.floor((cy+cvs.height)/TILE)+1; y++) {
            let b = getB(x, y);
            if(b!==0) { ctx.fillStyle = COLORS[b]; ctx.fillRect(x*TILE-cx, y*TILE-cy, TILE, TILE); }
        }
    }

    agents.forEach(a => {
        let ax = a.x-cx, ay = a.y-cy;
        ctx.fillStyle = a.type==='monster'?'#f00':'#f1c40f';
        ctx.fillRect(ax, ay, a.w, a.h);
        ctx.fillStyle='black'; ctx.fillRect(ax-5, ay-10, 30, 5);
        ctx.fillStyle='#2ecc71'; ctx.fillRect(ax-5, ay-10, 30*(a.hp/a.maxHp), 5);
    });

    ctx.fillStyle = "#FF5733"; ctx.fillRect(p.x-cx, p.y-cy, p.w, p.h);
    if(p.atk > 0) { ctx.strokeStyle="#fff"; ctx.strokeRect(p.x-cx-10, p.y-cy-10, p.w+20, p.h+20); p.atk--; }

    document.getElementById('posX').innerText = Math.floor(p.x/TILE);
    document.getElementById('biome').innerText = getBiome(Math.floor(p.x/TILE)).name;
    document.getElementById('hp').innerText = Math.ceil(p.hp);
    let h = Math.floor(ticks/60).toString().padStart(2,'0'), m = Math.floor(ticks%60).toString().padStart(2,'0');
    document.getElementById('time-text').innerText = `${h}:${m}`;
}
</script>
</body>
</html>
