<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>SUPER HUMAN 2026 - REBORN</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Segoe UI', '微軟正黑體', sans-serif; user-select: none; }
        .page { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #050505; color: #f1c40f; text-align: center; }
        
        /* 修正按鈕布局：確保文字永不偏移 */
        .btn { 
            padding: 15px; 
            font-size: 18px; 
            cursor: pointer; 
            margin: 10px; 
            background: #f1c40f; 
            border: 3px solid #fff; 
            border-radius: 12px; 
            font-weight: bold; 
            color: #000; 
            box-shadow: 0 5px 0 #b8860b; 
            transition: 0.1s; 
            width: 320px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            text-align: center;
            line-height: 1.2;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #b8860b; }
        .in-box { padding: 15px; font-size: 24px; border: 4px solid #f1c40f; border-radius: 12px; background: #111; color: #fff; text-align: center; margin-bottom: 25px; width: 300px; outline: none; }
        
        /* ESC 選單強化 */
        #esc-menu { position: fixed; inset: 0; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); }
        .menu-card { background: #1a1a1a; padding: 30px; border: 2px solid #f1c40f; border-radius: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; max-width: 800px; }
        .info-panel { text-align: left; color: #ccc; font-size: 14px; min-width: 250px; }
        .info-panel b { color: #f1c40f; }

        #hud { position: fixed; top: 15px; left: 15px; z-index: 1000; color: white; background: rgba(0,0,0,0.85); padding: 12px; border-radius: 10px; border: 2px solid #f1c40f; display: none; pointer-events: none; }
        #minimap-ui { position: fixed; bottom: 20px; right: 20px; width: 180px; height: 130px; background: rgba(0,0,0,0.9); border: 2px solid #f1c40f; border-radius: 8px; z-index: 1000; display: none; overflow: hidden; }
        
        /* Canvas 渲染層 */
        canvas#g { display: none; position: absolute; top: 0; left: 0; z-index: 1; image-rendering: pixelated; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="p-auth" class="page" style="display:none;">
        <h1 style="letter-spacing: 5px;">SYSTEM ACCESS</h1>
        <input type="password" id="pw" class="in-box" placeholder="啟動碼">
        <button class="btn" onclick="checkAuth()">進入系統</button>
    </div>

    <div id="p-conn" class="page" style="display:none;">
        <h1>連線模式</h1>
        <button class="btn" onclick="setConn(1)">👤 單人本機連線</button>
        <button class="btn" onclick="setConn(0)">👥 多人小隊連線</button>
    </div>

    <div id="p-count" class="page" style="display:none;">
        <h1>小隊規模</h1>
        <h2 id="cnt-disp" style="font-size: 40px; color:#fff;">5 人</h2>
        <input type="range" id="member-sld" min="2" max="15" value="5" oninput="document.getElementById('cnt-disp').innerText=this.value+' 人'" style="width:320px; accent-color:#f1c40f;">
        <button class="btn" onclick="toModeSel()">下一步</button>
    </div>

    <div id="p-mode" class="page" style="display:none;">
        <h1>選擇任務模式</h1>
        <button class="btn" onclick="prepareBrief('ARCH')">🏗️ 荒野建築模式</button>
        <button class="btn" onclick="prepareBrief('SURV')">🏔️ 高山生存模式</button>
        <button class="btn" onclick="prepareBrief('ZOMB')">🧟 殭屍圍城模式</button>
    </div>

    <div id="p-brief" class="page" style="display:none;">
        <h1>任務簡報</h1>
        <div id="brief-text" style="font-size: 16px; color: #aaa; margin: 20px; border-left: 4px solid #f1c40f; padding-left: 20px; text-align: left; line-height: 1.8;"></div>
        <button class="btn" onclick="startGame()">部署並開始</button>
    </div>

    <div id="esc-menu">
        <div class="menu-card">
            <div class="info-panel">
                <h2 style="color:#f1c40f; margin-top:0;">系統暫停</h2>
                <b>📍 座標：</b> <span id="st-pos">---</span><br>
                <b>👥 小隊單位：</b> <span id="st-squad">0</span><br>
                <b>🏗️ 建築數據：</b> <span id="st-build">0 blocks</span><br>
                <b>💾 緩存：</b> <span id="st-size">0 KB</span><br>
                <b>⚙️ 核心溫度：</b> <span style="color:#2ecc71;">正常</span><br>
                <hr style="border:0; border-top:1px solid #444; margin:15px 0;">
                <button class="btn" onclick="togglePause()" style="width:100%">恢復模擬 (ESC)</button>
                <button class="btn" onclick="resetWorld()" style="background:#c0392b !important; color:#fff; width:100%">重置存檔</button>
                <button class="btn" onclick="location.reload()" style="background:#444 !important; color:#fff; width:100%">退出至主頁</button>
            </div>
            <div style="text-align: center;">
                <b style="color: #f1c40f; display: block; margin-bottom: 10px;">地形雷達掃描</b>
                <canvas id="esc-mm-canvas" width="280" height="280" style="background:#000; border: 2px solid #333;"></canvas>
            </div>
        </div>
    </div>

    <div id="minimap-ui"><canvas id="mm-canvas" width="180" height="130"></canvas></div>

    <div id="hud">
        🕒 時間: <span id="tm-v">12:00</span> | ❤️ 血量: <span id="p-hp-hud">100</span><br>
        🏗️ 材料: <span id="cur-b" style="color:#f1c40f;">石頭</span> | 📍 海拔: <span id="alt-v">0</span> m
    </div>
    <canvas id="g"></canvas>

<script>
    var live = false, paused = false, mapEnabled = true, world = {}, keys = {}, ents = [], ticks = 600, sSize = 1, mType = '';
    var p = { x: 0, y: 0, w: 22, h: 42, vx: 0, vy: 0, hp: 100, gr: false, atkCd: 0, face: 1 };
    var T = 32, selB = 1;
    const AUTH_KEY = 'ryan0111407';

    window.onload = function() {
        var saved = localStorage.getItem('sh_save_v10');
        if(saved) world = JSON.parse(saved);
        if (localStorage.getItem('super_human_auth') === AUTH_KEY) document.getElementById('p-conn').style.display='flex';
        else document.getElementById('p-auth').style.display='flex';
    };

    function checkAuth() {
        if(document.getElementById('pw').value.trim() === AUTH_KEY) {
            localStorage.setItem('super_human_auth', AUTH_KEY);
            document.getElementById('p-auth').style.display='none'; document.getElementById('p-conn').style.display='flex';
        } else { alert("權限拒絕"); }
    }

    function setConn(n) { document.getElementById('p-conn').style.display='none'; if(n===1){sSize=1;document.getElementById('p-mode').style.display='flex';}else{document.getElementById('p-count').style.display='flex';} }
    function toModeSel() { sSize=parseInt(document.getElementById('member-sld').value); document.getElementById('p-count').style.display='none'; document.getElementById('p-mode').style.display='flex'; }
    function resetWorld() { if(confirm("確定要刪除所有建築存檔嗎？")){world={};localStorage.setItem('sh_save_v10', "{}");location.reload();} }

    function prepareBrief(type) {
        mType = type;
        document.getElementById('p-mode').style.display='none'; document.getElementById('p-brief').style.display='flex';
        document.getElementById('brief-text').innerHTML = "● <b>地形禁令</b>：絕對破碎丘陵（100% 崎嶇）。<br>● <b>地表物理</b>：草皮下必有 5 層泥土。<br>● <b>村民規則</b>：每 10 秒空降一位村民。<br>● <b>存檔提示</b>：本機自動存檔，ESC 可重置世界。";
    }

    // --- 地形引擎 V10.2：絕對崎嶇鎖定 ---

        if(world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
        var absGx = Math.abs(gx);
        var base = Math.sin(gx * 0.45) * 10 + Math.cos(gx * 0.22) * 8;
        var sharp = Math.sin(gx * gx * 0.007) * 4;
        var jitter = (gx * 17 % 11) / 2; // 碎形雜湊位移

        if (gy === f) return (gy > 85) ? 7 : 2; 
        if (gy > f && gy <= f + 5) return 3; 
        return 1;
    }

    function togglePause() {
        paused = !paused;
        document.getElementById('esc-menu').style.display = paused ? 'flex' : 'none';
        if(paused) {
            document.getElementById('st-pos').innerText = `${Math.floor(p.x)}, ${Math.floor(p.y)}`;
            document.getElementById('st-squad').innerText = sSize;
            document.getElementById('st-build').innerText = Object.keys(world).length;
            var size = new Blob([JSON.stringify(world)]).size;
            document.getElementById('st-size').innerText = (size/1024).toFixed(1) + " KB";
            drawMap("esc-mm-canvas", 3);
        }
    }

        if(!ctx) return;
        ctx.fillStyle = "#000"; ctx.fillRect(0,0,c.width,c.height);

        for(var x=-rx; x<rx; x++){
