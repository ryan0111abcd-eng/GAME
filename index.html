<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>未來的 Super Human - 穩定進入版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: "Microsoft JhengHei", sans-serif; }
        canvas { display: block; }
        
        /* 核心遮罩層 */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; color: white; background: rgba(0,0,0,0.9);
        }
        
        h1 { color: #f1c40f; font-size: 50px; text-shadow: 0 0 20px #f1c40f; margin-bottom: 40px; }
        .btn {
            padding: 18px 60px; font-size: 26px; background: #f1c40f; color: #000;
            border: none; border-radius: 50px; cursor: pointer; font-weight: bold;
            margin: 15px; transition: 0.2s; box-shadow: 0 5px 15px rgba(241,196,15,0.4);
        }
        .btn:hover { background: #fff; transform: scale(1.05); }
        
        #ui { 
            position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.85); 
            color: #fff; padding: 15px; border-radius: 10px; display: none;
            border: 2px solid #f1c40f; pointer-events: none; z-index: 100;
        }

        /* 圓形雷達 */
        #radar {
            position: absolute; top: 20px; right: 20px; width: 150px; height: 150px;
            background: rgba(0,20,0,0.6); border: 3px solid #fff; border-radius: 50%;
            display: none; z-index: 100; overflow: hidden;
        }
        #radar-canvas { width: 100%; height: 100%; }

        input[type=range] { width: 300px; height: 20px; cursor: pointer; margin: 25px; }
    </style>
</head>
<body>

    <div id="main-menu" class="overlay">
        <h1>未來的 Super Human</h1>
        <button id="btn-single" class="btn">開始遊戲</button>
        <button id="btn-multi-setup" class="btn" style="background:#3498db; color:white;">多人連線</button>
    </div>

    <div id="multi-menu" class="overlay" style="display:none;">
        <h1>多人連線設定</h1>
        <p style="font-size:24px;">世界總人數: <span id="num-label" style="color:#f1c40f">5</span></p>
        <input type="range" id="p-slider" min="2" max="10" value="5">
        <button id="btn-start-game" class="btn">進入世界</button>
        <p id="btn-back" style="cursor:pointer; color:#777; margin-top:20px;">返回首頁</p>
    </div>

    <div id="ui">
        <b>🌍 時間：<span id="clock" style="color:#f1c40f">07:00</span></b><br>
        ❤️ 生命：<span id="hp">100</span> | 👥 線上：<span id="p-count">1</span>
    </div>

    <div id="radar"><canvas id="radar-canvas"></canvas></div>
    <canvas id="gameCanvas"></canvas>

<script>
    // --- 確保 DOM 載入後才執行監聽 ---
    window.onload = () => {
        const mainMenu = document.getElementById('main-menu');
        const multiMenu = document.getElementById('multi-menu');
        const slider = document.getElementById('p-slider');
        const numLabel = document.getElementById('num-label');

        // 按鈕事件綁定
        document.getElementById('btn-single').addEventListener('click', () => initGame(1));
        
        document.getElementById('btn-multi-setup').addEventListener('click', () => {
            mainMenu.style.display = 'none';
            multiMenu.style.display = 'flex';
        });

        slider.oninput = () => numLabel.innerText = slider.value;

        document.getElementById('btn-start-game').addEventListener('click', () => {
            initGame(parseInt(slider.value));
        });

        document.getElementById('btn-back').addEventListener('click', () => location.reload());
    };

    const canvas = document.getElementById('gameCanvas');
