<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>未來的 Super Human</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; color: white; }
        .layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1a1a1a; z-index: 9999; }
        .btn { padding: 18px 45px; font-size: 24px; cursor: pointer; margin: 10px; background: #f1c40f; border: none; font-weight: bold; border-radius: 12px; color: black; transition: 0.2s; box-shadow: 0 4px #b8860b; }
        .btn:hover { background: #fff; transform: scale(1.05); }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px #b8860b; }
        #hud { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 12px; border: 2px solid #f1c40f; display: none; z-index: 5000; border-radius: 10px; pointer-events: none; }
        #inv { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; gap: 8px; z-index: 5000; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; }
        .slot { width: 45px; height: 45px; border: 2px solid #777; display: flex; align-items: center; justify-content: center; font-size: 12px; background: #333; }
        .slot.active { border-color: #f1c40f; background: #555; transform: scale(1.1); }
        select { padding: 10px; font-size: 20px; border-radius: 8px; margin: 10px; }
    </style>
</head>
<body>

    <div id="layer-main" class="layer">
        <h1 style="color:#f1c40f; font-size: 48px; margin-bottom: 5px;">未來的 SUPER HUMAN</h1>
        <p style="margin-bottom: 30px; color: #aaa;">與電腦隊友一起探索世界</p>
        <button class="btn" id="start-single">開始鍵 (單人)</button>
        <button class="btn" id="go-to-select" style="background:#3498db; color:white;">多人連線鍵</button>
    </div>

    <div id="layer-select" class="layer" style="display:none;">
        <h2>選擇多人連線人數 (2-10人)</h2>
        <select id="p-count">
            <option value="2">2 人</option>
            <option value="5" selected>5 人</option>
            <option value="10">10 人</option>
        </select>
        <button class="btn" id="start-multi">開始</button>
        <button class="btn" id="back-to-main" style="background:#777;">返回</button>
    </div>

    <div id="hud">
        ❤️ 血量: <span id="hp">100</span> | 🕒 時間: <span id="time-text">07:00</span><br>
        ⚔️ K 攻擊 | ⛏️ 左鍵挖掘 / 右鍵放置 | 1-5 選磚
    </div>

    <div id="inv">
        <div class="slot active" id="s1">1:泥</div>
        <div class="slot" id="s2">2:草</div>
        <div class="slot" id="s3">3:石</div>
        <div class="slot" id="s4">4:木</div>
        <div class="slot" id="s5">5:磚</div>
    </div>

<script>
let canvas, ctx, isRunning = false;
let ticks = 420; // 07:00
let world = {}, camX = 0, camY = 0, curBlock = 1;
const TILE = 32;
const COLORS = { 1: '#8B4513', 2: '#228B22', 3: '#666', 4: '#cd853f', 5: '#a52a2a' };
let p = { x: 500, y: 0, w: 22, h: 42, vx: 0, vy: 0, hp: 100, maxHp: 100, ground: false, atkTimer: 0 };
let agents = [], keys = {};

const lMain = document.getElementById('layer-main');
const lSelect = document.getElementById('layer-select');

document.getElementById('start-single').addEventListener('click', () => initGame(1));
document.getElementById('go-to-select').addEventListener('click', () => { lMain.style.display='none'; lSelect.style.display='flex'; });
document.getElementById('back-to-main').addEventListener('click', () => { lSelect.style.display='none'; lMain.style.display='flex'; });
document.getElementById('start-multi').addEventListener('click', () => initGame(parseInt(document.getElementById('p-count').value)));

function getGY(gx) { return Math.floor(35 + Math.sin(gx * 0.05) * 12 + Math.cos(gx * 0.02) * 15); }
function getB(gx, gy) {
    if(world[`${gx}_${gy}`] !== undefined) return world[`${gx}_${gy}`];
    let floorY = getGY(gx);
    return gy < floorY ? 0 : (gy === floorY ? 2 : 1);
}

function initGame(num) {
    lMain.style.display = 'none'; lSelect.style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    document.getElementById('inv').style.display = 'flex';
    canvas = document.createElement('canvas');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    document.body.appendChild(canvas);
    ctx = canvas.getContext('2d');
    p.y = getGY(p.x/TILE)*TILE - 150;

    // 生成 AI (隊友、村民、動物)
    const types = ['ally', 'vil', 'ani'];
    for(let i=0; i < num - 1; i++) {
        agents.push({
            x: 600 + i * 150, y: -200, w: 22, h: 42, vx: 0, vy: 0, hp: 100, maxHp: 100,
            type: types[i%3], dir: 1, sTimer: Math.random()*100
        });
    }

    // 滑鼠監聽
    window.addEventListener('mousedown', e => {
        if(!isRunning) return;
        let gx = Math.floor((e.clientX + camX)/TILE), gy = Math.floor((e.clientY + camY)/TILE);
        if(e.button === 0) world[`${gx}_${gy}`] = 0; // 左鍵挖掘
        if(e.button === 2) if(getB(gx, gy)===0) world[`${gx}_${gy}`] = curBlock; // 右鍵建築
    });
    window.oncontextmenu = e => e.preventDefault();

    window.onkeydown = e => { 
        keys[e.code] = true; 
        if(e.code === 'KeyK') p.atkTimer = 10;
        if(e.key >= '1' && e.key <= '5') {
            curBlock = parseInt(e.key);
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
            document.getElementById('s'+e.key).classList.add('active');
        }
    };

}
