<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Future Super Human - Epic Evolution</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        
        /* UI 啟動層 */
        #ui-layer {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #111; color: #f1c40f;
        }

        .btn {
            padding: 20px 60px; font-size: 28px; cursor: pointer; margin: 10px;
            background: #f1c40f; border: 4px solid #fff; border-radius: 15px;
            font-weight: bold; color: #000; box-shadow: 0 8px 0 #b8860b;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #b8860b; }

        /* 遊戲介面 */
        #hud {
            position: fixed; top: 15px; left: 15px; z-index: 100;
            background: rgba(0,0,0,0.8); color: white; padding: 12px;
            border: 2px solid #f1c40f; border-radius: 8px; display: none; pointer-events: none;
        }

        #radar-box {
            position: fixed; top: 15px; right: 15px; width: 150px; height: 150px;
            border: 3px solid #fff; border-radius: 50%; overflow: hidden;
            z-index: 100; display: none; background: rgba(0,0,0,0.5);
        }

        #rain-overlay {
            position: fixed; inset: 0; pointer-events: none; z-index: 50;
            background: rgba(50, 50, 100, 0.2); display: none;
        }

        canvas#gCvs { display: none; position: absolute; top: 0; left: 0; z-index: 1; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1 style="font-size: 45px;">SUPER HUMAN: 萬物進化</h1>
        <div id="m-1">
            <button class="btn" onclick="selMode(1)">👤 單人模式</button>
            <button class="btn" onclick="selMode(5)" style="background:#3498db; color:white;">👥 多人模式</button>
        </div>
        <div id="m-2" style="display:none; text-align:center;">
            <h2>小隊人數: <span id="p-label" style="color:#f1c40f;">5</span></h2>
            <input type="range" min="2" max="10" value="5" oninput="document.getElementById('p-label').innerText=this.value" id="p-slider" style="width:300px;">
            <br><button class="btn" onclick="selMode('go')">進入世界</button>
        </div>
    </div>

    <div id="hud">
        ❤️ HP: <span id="hp">100</span> | 📍 <span id="pos">0,0</span> | 🗺️ <span id="biome">平原</span><br>
        ⛈️ 天氣: <span id="weather">晴天</span>
    </div>
    <div id="radar-box"><canvas id="rCvs" width="150" height="150"></canvas></div>
    <div id="rain-overlay"></div>
    <canvas id="gCvs"></canvas>

<script>
    const cvs = document.getElementById('gCvs'), ctx = cvs.getContext('2d');
    const rcvs = document.getElementById('rCvs'), rctx = rcvs.getContext('2d');
    
    let isLive = false, world = {}, keys = {}, agents = [], ticks = 0;
    let p = { x: 0, y: -200, w: 22, h: 42, vx: 0, vy: 0, hp: 100, maxHp: 100, ground: false };
    let squad = 1, isRaining = false;
    const TILE = 32;

    function selMode(m) {
        if(m === 1) { squad = 1; actuallyStart(); }
        else if(m === 5) { document.getElementById('m-1').style.display='none'; document.getElementById('m-2').style.display='block'; }
        else if(m === 'go') { squad = document.getElementById('p-slider').value; actuallyStart(); }
    }

    function actuallyStart() {
        document.getElementById('ui-layer').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
        document.getElementById('radar-box').style.display = 'block';
        cvs.style.display = 'block';
        cvs.width = window.innerWidth; cvs.height = window.innerHeight;

        // 生成 AI 小隊
        for(let i=0; i<squad-1; i++) spawn('ally', (Math.random()-0.5)*1000);
        // 生成村民與動物
        for(let i=0; i<10; i++) spawn('npc', (Math.random()-0.5)*3000);
        for(let i=0; i<8; i++) spawn('pig', (Math.random()-0.5)*3000);

        isLive = true; loop();
    }

    function spawn(type, x) {
        let hp = (type==='pig')?30:100;
        agents.push({ type, x, y: -500, w: 22, h: 42, vx: 0, vy: 0, hp: hp, maxHp: hp, dir: 1, aiTimer: 0 });
    }

    // 地形生成：平原、台地、丘陵、山地、村莊、古蹟
    function getBiome(gx) {
        let x = Math.abs(gx);
        if (x % 6000 < 1000) return { n: "平原", h: 35, c: "#2ecc71" };
        if (x % 6000 < 2000) return { n: "丘陵", h: 28, c: "#27ae60" };
        if (x % 6000 < 3000) return { n: "山地", h: 15, c: "#95a5a6" };
        if (x % 6000 < 4000) return { n: "台地", h: 32, c: "#e67e22" };
        if (x % 6000 < 5000) return { n: "村莊", h: 35, c: "#f1c40f" };
        return { n: "古蹟", h: 35, c: "#7f8c8d" };
    }

    function getB(gx, gy) {
        if (world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
        let b = getBiome(gx);
        // 村莊與古蹟的特殊建築生成
        if ((b.n === "村莊" || b.n === "古蹟") && gy < b.h && gy > b.h-4 && Math.random() < 0.08) return 3;
        return gy < b.h ? 0 : (gy === b.h ? 2 : 1);
    }

    function check(x, y, w, h) {
        for (let i = Math.floor(x/TILE); i <= Math.floor((x+w)/TILE); i++) {
            for (let j = Math.floor(y/TILE); j <= Math.floor((y+h)/TILE); j++) {
                if (getB(i, j) > 0) return true;
            }
        }
        return false;
    }

    function doAtk(owner) {
        agents.concat(p).forEach(e => {
            if(e !== owner && Math.abs(e.x - owner.x) < 70 && Math.abs(e.y - owner.y) < 70) {
                e.hp -= 15; e.vx = (e.x > owner.x ? 10 : -10);
            }
        });
    }

    window.onkeydown = e => { keys[e.code]=true; if(e.code==='KeyK') doAtk(p); if(e.code==='KeyQ') p.hp = Math.min(100, p.hp+20); };
    window.onkeyup = e => keys[e.code]=false;
    window.onmousedown = e => {
        if(!isLive) return;
        let gx = Math.floor((e.clientX + (p.x - cvs.width/2))/TILE);
        let gy = Math.floor((e.clientY + (p.y - cvs.height/2))/TILE);
        if(e.button === 0) world[gx+'_'+gy] = 0; else world[gx+'_'+gy] = 3;
    };

    function loop() {
        if(!isLive) return;
        if(p.hp <= 0) { location.reload(); return; }

        ticks++;
        if(ticks % 1500 === 0) {
            isRaining = Math.random() < 0.3;
            document.getElementById('rain-overlay').style.display = isRaining ? 'block' : 'none';
            document.getElementById('weather').innerText = isRaining ? "下雨" : "晴天";
        }

        // 玩家物理
        p.vy += 0.8; p.y += p.vy;
        if(check(p.x, p.y, p.w, p.h)) {
            if(p.vy > 0) { while(check(p.x, p.y, p.w, p.h)) p.y -= 0.5; p.ground = true; }
            else { while(check(p.x, p.y, p.w, p.h)) p.y += 0.5; }
            p.vy = 0;
        } else p.ground = false;

        let dx = (keys['KeyD']?5:0) - (keys['KeyA']?5:0);
        if(dx !== 0) { p.x += dx; if(check(p.x, p.y, p.w, p.h)) p.x -= dx; }
        if(keys['Space'] && p.ground) p.vy = -14;

        // AI 邏輯
        agents.forEach(e => {
            e.vy += 0.8; e.y += e.vy;
            if(check(e.x, e.y, e.w, e.h)) { if(e.vy > 0) while(check(e.x, e.y, e.w, e.h)) e.y -= 0.5; e.vy = 0; }
            
            e.aiTimer++;
            if(e.type === 'ally') {
                // 自主行為：分散、挖礦、放方塊、攻擊
                if(Math.abs(p.x - e.x) > 300) e.x += (p.x > e.x ? 2 : -2);
                if(Math.random() < 0.005) world[Math.floor(e.x/TILE)+'_'+(Math.floor(e.y/TILE)+2)] = 0; // 挖掘
                if(Math.random() < 0.002) world[Math.floor(e.x/TILE)+'_'+(Math.floor(e.y/TILE)+1)] = 3; // 放置
                agents.forEach(m => { if(m.type==='mob' && Math.abs(m.x-e.x)<100) doAtk(e); });
            } else if(e.type === 'mob') {
                e.x += (p.x > e.x ? 2.5 : -2.5);
                if(Math.abs(e.x - p.x) < 30) p.hp -= 0.2;
            } else {
                if(e.aiTimer % 100 === 0) e.dir = Math.random() > 0.5 ? 1 : -1;
                e.x += e.dir * 1.5; if(check(e.x, e.y, e.w, e.h)) e.x -= e.dir * 1.5;
            }
        });
        if(Math.random() < 0.01) spawn('mob', p.x + (Math.random()>0.5?600:-600));
        agents = agents.filter(e => e.hp > 0);

        // UI
        document.getElementById('hp').innerText = Math.ceil(p.hp);
        document.getElementById('pos').innerText = Math.floor(p.x/TILE) + "," + Math.floor(p.y/TILE);
        document.getElementById('biome').innerText = getBiome(Math.floor(p.x/TILE)).n;

        render();
        requestAnimationFrame(loop);
    }

    function render() {
        ctx.fillStyle = isRaining ? '#4b6584' : '#87ceeb';
        ctx.fillRect(0,0,cvs.width,cvs.height);
        let cx = p.x - cvs.width/2, cy = p.y - cvs.height/2;

        for(let x=Math.floor(cx/TILE); x<=Math.ceil((cx+cvs.width)/TILE); x++) {
            let bI = getBiome(x);
            for(let y=Math.floor(cy/TILE); y<=Math.ceil((cy+cvs.height)/TILE); y++) {
                let b = getB(x, y);
                if(b > 0) {
                    ctx.fillStyle = b===2 ? bI.c : (b===1 ? '#795548' : '#bdc3c7');
                    ctx.fillRect(x*TILE-cx, y*TILE-cy, TILE+0.5, TILE+0.5);
                }
            }
        }

        agents.concat(p).forEach(e => {
            let color = e===p?'#e67e22':(e.type==='ally'?'#3498db':(e.type==='mob'?'#e74c3c':(e.type==='npc'?'#f1c40f':'#ff9ff3')));
            ctx.fillStyle = color; ctx.fillRect(e.x-cx, e.y-cy, e.w, e.h);
            // 血量
            ctx.fillStyle='red'; ctx.fillRect(e.x-cx, e.y-cy-10, e.w, 4);
            ctx.fillStyle='lime'; ctx.fillRect(e.x-cx, e.y-cy-10, e.w*(e.hp/e.maxHp), 4);
        });

        // 圓形小地圖
        rctx.fillStyle='#000'; rctx.fillRect(0,0,150,150);
        rctx.save(); rctx.translate(75, 75);
        agents.concat(p).forEach(e => {
            rctx.fillStyle = e===p?'#fff':(e.type==='ally'?'#3498db':'#e74c3c');
            let dx = (e.x-p.x)*0.12, dy = (e.y-p.y)*0.12;
            if(dx*dx + dy*dy < 70*70) { rctx.beginPath(); rctx.arc(dx, dy, 3.5, 0, 7); rctx.fill(); }
        });
        rctx.restore();
    }
</script>
</body>
</html>
