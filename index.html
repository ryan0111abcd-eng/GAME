<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>未來的 Super Human - 物理修正版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; user-select: none; }
        canvas { display: block; }
        
        /* UI 樣式 */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.85); color: white; z-index: 100;
        }
        .menu-btn { padding: 15px 40px; margin: 10px; font-size: 20px; cursor: pointer; background: #4caf50; border: none; color: white; border-radius: 5px; }
        
        #game-ui { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.5); padding: 10px; pointer-events: none; z-index: 10; }
        #minimap-box { position: absolute; top: 20px; right: 20px; width: 140px; height: 140px; border-radius: 50%; border: 3px solid #fff; overflow: hidden; background: rgba(0,0,0,0.3); z-index: 10; }
        
        #hotbar {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 5px; background: rgba(0,0,0,0.8); padding: 8px; border: 2px solid #fff; z-index: 10;
        }
        .slot { width: 45px; height: 45px; border: 2px solid #777; display: flex; align-items: center; justify-content: center; font-size: 12px; color: white; }
        .slot.active { border-color: #ff0; box-shadow: 0 0 10px #ff0; }
    </style>
</head>
<body>

<div id="start-screen" class="overlay">
    <h1>未來的 Super Human</h1>
    <button class="menu-btn" onclick="initGame(1)">開始遊戲</button>
    <button class="menu-btn" onclick="showMultiMenu()">多人連線</button>
</div>

<div id="multi-menu" class="overlay" style="display:none;">
    <h2>多人連線模式</h2>
    <p>設定人數 (2-10人)：<input type="number" id="player-count" min="2" max="10" value="5" style="font-size: 20px; width: 60px;"></p>
    <button class="menu-btn" onclick="initGame(document.getElementById('player-count').value)">開始遊戲</button>
</div>

<div id="esc-menu" class="overlay" style="display:none;">
    <h1>遊戲暫停</h1>
    <button class="menu-btn" onclick="location.reload()">離開並重啟</button>
    <p>按 ESC 返回</p>
</div>

<div id="game-ui">
    時間: <span id="clock">07:00</span> | ❤️ 血量: <span id="hp">100</span><br>
    📍 座標: <span id="pos">0,0</span>
</div>

<div id="minimap-box"><canvas id="minimapCanvas"></canvas></div>

<div id="hotbar">
    <div id="slot1" class="slot active">草</div>
    <div id="slot2" class="slot">土</div>
    <div id="slot3" class="slot">石</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const mCanvas = document.getElementById('minimapCanvas');
const mCtx = mCanvas.getContext('2d');

const tileSize = 32;
let cameraX = 0;
let worldData = {};
const blocks = { AIR: 0, DIRT: 1, GRASS: 2, STONE: 3 };
const colors = { 1: '#8B4513', 2: '#228B22', 3: '#666' };
let selectedBlock = blocks.GRASS;
let gameActive = false;
let isPaused = false;
let gameTicks = 420;

let player = { x: 100, y: 0, w: 24, h: 44, vx: 0, vy: 0, hp: 100, grounded: false };
let teammates = [];
let entities = [];

function showMultiMenu() {
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('multi-menu').style.display = 'flex';
}

function initGame(count) {
    document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none');
    gameActive = true;
    
    // 初始化隊友：賦予他們獨立的偏移量
    for(let i = 0; i < count - 1; i++) {
        teammates.push({
            x: 100 + (Math.random() * 100), y: -100, w: 24, h: 44, 
            vx: 0, vy: 0, hp: 100, color: '#ffeb3b', 
            offset: (Math.random() - 0.5) * 160, grounded: false
        });
    }
    resize(); loop();
}

function getBlock(x, y) {
    const key = `${Math.floor(x)}_${Math.floor(y)}`;
    if (worldData[key] !== undefined) return worldData[key];
    let groundLevel = Math.floor(12 + Math.sin(x * 0.1) * 3);
    return y < groundLevel ? blocks.AIR : (y === groundLevel ? blocks.GRASS : blocks.DIRT);
}

// 核心：修正後的物理碰撞（防止穿牆）
function applyPhysics(obj) {
    obj.vy += 0.6; // 重力
    
    // 先處理 X 軸移動與碰撞
    let nextX = obj.x + obj.vx;
    let gridX = (obj.vx > 0) ? Math.floor((nextX + obj.w) / tileSize) : Math.floor(nextX / tileSize);
    let gridYTop = Math.floor(obj.y / tileSize);
    let gridYBottom = Math.floor((obj.y + obj.h - 1) / tileSize);

    if (getBlock(gridX, gridYTop) === blocks.AIR && getBlock(gridX, gridYBottom) === blocks.AIR) {
        obj.x = nextX;
    } else {
        obj.vx = 0; // 撞牆停止
    }

    // 再處理 Y 軸移動與碰撞
    obj.y += obj.vy;
    obj.grounded = false;
    let left = Math.floor(obj.x / tileSize);
    let right = Math.floor((obj.x + obj.w - 1) / tileSize);
    let footY = Math.floor((obj.y + obj.h) / tileSize);

    if (getBlock(left, footY) !== blocks.AIR || getBlock(right, footY) !== blocks.AIR) {
        obj.y = footY * tileSize - obj.h;
        obj.vy = 0;
        obj.grounded = true;
    }
}

let keys = {};
window.onkeydown = (e) => {
    if(e.code === 'Escape' && gameActive) {
        isPaused = !isPaused;
        document.getElementById('esc-menu').style.display = isPaused ? 'flex' : 'none';
    }
    keys[e.code] = true;
    if (e.key === '1') { selectedBlock = blocks.GRASS; updateUI(1); }
    if (e.key === '2') { selectedBlock = blocks.DIRT; updateUI(2); }
    if (e.key === '3') { selectedBlock = blocks.STONE; updateUI(3); }
};
window.onkeyup = (e) => keys[e.code] = false;

function updateUI(n) {
    document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
    document.getElementById('slot' + n).classList.add('active');
}

canvas.onmousedown = (e) => {
    if (!gameActive || isPaused) return;
    const rect = canvas.getBoundingClientRect();
    const gx = Math.floor((e.clientX - rect.left + cameraX) / tileSize);
    const gy = Math.floor((e.clientY - rect.top) / tileSize);
    if (e.button === 0) worldData[`${gx}_${gy}`] = blocks.AIR;
    if (e.button === 2) worldData[`${gx}_${gy}`] = selectedBlock;
};
canvas.oncontextmenu = (e) => e.preventDefault();

function loop() {
    if (!gameActive) return;
    if (!isPaused) {
        updateGame();
    }
    render();
    requestAnimationFrame(loop);
}

function updateGame() {
    gameTicks = (gameTicks + 0.5) % 1440;
    
    // 玩家控制
    player.vx = (keys['KeyA'] ? -4.5 : keys['KeyD'] ? 4.5 : 0);
    if (keys['Space'] && player.grounded) player.vy = -12;
    applyPhysics(player);
    cameraX = player.x - canvas.width / 2;

    // 隊友 AI：現在使用 applyPhysics，所以不會穿牆
    teammates.forEach(tm => {
        let targetX = player.x + tm.offset;
        if (tm.x < targetX - 20) tm.vx = 3.5;
        else if (tm.x > targetX + 20) tm.vx = -3.5;
        else tm.vx = 0;

        // 如果前方有牆壁且在地面，嘗試跳躍
        let checkX = (tm.vx > 0) ? Math.floor((tm.x + tm.w + 10) / tileSize) : Math.floor((tm.x - 10) / tileSize);
        let checkY = Math.floor((tm.y + tm.h - 10) / tileSize);
        if (getBlock(checkX, checkY) !== blocks.AIR && tm.grounded) tm.vy = -10;

        applyPhysics(tm);
    });

    // 怪物 AI 與傷害
    if ((Math.floor(gameTicks/60) >= 18 || Math.floor(gameTicks/60) < 6) && Math.random() < 0.01) {
        entities.push({ x: player.x
