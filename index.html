<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUPER HUMAN 2026 - ULTIMATE EDITION</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        
        /* 驗證與登入層 */
        .ui-layer { position: fixed; inset: 0; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); color: #f1c40f; }
        .card { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 24px; border: 1px solid #f1c40f55; text-align: center; width: 380px; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .btn { width: 100%; height: 55px; margin: 10px 0; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 12px; border: 2px solid #fff; transition: 0.1s; display: flex; align-items: center; justify-content: center; text-decoration: none; }
        .btn-main { background: #f1c40f; color: #000; box-shadow: 0 5px 0 #b8860b; }
        .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #666; }
        .in { width: 90%; padding: 12px; font-size: 20px; margin-bottom: 15px; text-align: center; border-radius: 8px; border: 2px solid #f1c40f; background: #000; color: #fff; outline: none; }

        /* 遊戲內 HUD */
        #hud { position: fixed; top: 15px; left: 15px; z-index: 5000; color: #fff; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 12px; border: 2px solid #f1c40f; display: none; pointer-events: none; min-width: 220px; line-height: 1.6; }
        .xp-bar { width: 100%; height: 8px; background: #333; border-radius: 4px; margin-top: 8px; overflow: hidden; border: 1px solid #555; }
        .xp-fill { height: 100%; background: #3498db; width: 0%; transition: 0.4s; }
        
        #msg-log { position: fixed; bottom: 20px; left: 20px; z-index: 5000; color: #2ecc71; font-weight: bold; text-shadow: 0 0 5px #000; }
        canvas#g { display: block; position: absolute; top: 0; left: 0; z-index: 1; visibility: hidden; }
    </style>
</head>
<body oncontextmenu="event.preventDefault();">

    <div id="p-auth" class="ui-layer">
        <div class="card">
            <h1>SUPER HUMAN <span style="color:#fff;">2026</span></h1>
            <p style="font-size:12px; color:#888;">授權方案激活系統 V18.5</p>
            <input type="password" id="pw" class="in" placeholder="請輸入產品金鑰">
            <button class="btn btn-main" onclick="checkAuth()">激活授權並進入</button>
            <button onclick="window.location.href='auth.html'" style="margin-top:15px; background:none; border:none; color:#666; cursor:pointer; text-decoration: underline;">尚未登入 / 購買方案？</button>
        </div>
    </div>

    <div id="hud">
        🕒 時間: <span id="tm" style="color:#f1c40f;">12:00</span> | ⭐ 等級: <span id="lv">1</span><br>
        ❤️ 血量: <span id="hp">100</span> / <span id="mhp">100</span><br>
        📍 海拔: <span id="alt">0</span>m | ⚔️ [K] 攻擊
        <div class="xp-bar"><div id="xp-f" class="xp-fill"></div></div>
    </div>

    <div id="msg-log"></div>
    <canvas id="g"></canvas>

<script>
    // 6 大方案金鑰對接表
    const KEYS = {
        STUDENT: 'STUDENT-2026',        // 學生方案 (1人, Lv1)
        PRO: 'ryan0111407',            // 個人專業版 (5人, Lv1)
        FAMILY: 'ryan-family-2026',    // 家庭分享版 (20人, Lv5)
        CREATOR: 'CREATOR-RYAN-2026',  // 創作者版 (30人, Lv10)
        CORP: 'CORP-RYAN-2026',        // 企業版 (50人, Lv20)
        ULTIMATE: 'ULTIMATE-RYAN-2026' // 至尊神選版 (50人, Lv100, 黃金體)
    };

    var live = false, world = {}, ents = [], keys = {}, ticks = 600, T = 32;
    var p = { x: -1500, y: 0, w: 22, h: 42, vx: 0, vy: 0, hp: 100, max: 100, xp: 0, lv: 1, atkCd: 0, color: '#e67e22' };
    var clouds = [];

    // 驗證邏輯
    function checkAuth() {
        let v = document.getElementById('pw').value.trim();
        if(v === KEYS.STUDENT) setupGame(1, 1);
        else if(v === KEYS.PRO) setupGame(5, 1);
        else if(v === KEYS.FAMILY) setupGame(20, 5);
        else if(v === KEYS.CREATOR) setupGame(30, 10);
        else if(v === KEYS.CORP) setupGame(50, 20);
        else if(v === KEYS.ULTIMATE) { setupGame(50, 100); p.color = "#f1c40f"; }
        else alert("授權碼無效，請確認購買方案。");
    }

    function setupGame(n, lv) {
        p.lv = lv;
        p.max = 100 + (lv - 1) * 20;
        p.hp = p.max;
        document.getElementById('p-auth').style.display = 'none';
        initGame(n);
    }

    // 地形引擎 (3000m 聖山 + 丘陵)
    function getB(gx, gy) {
        if(world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
        var agx = Math.abs(gx), f;
        if (agx < 65) f = Math.floor(150 - (56 * Math.exp(-Math.pow(gx / 35, 2)))) + Math.floor((gx % 4)/3);
        else f = Math.floor(138 + Math.sin(gx * 0.2) * 15 + Math.cos(gx * 0.1) * 10);
        return (gy < f) ? 0 : (gy === f ? 2 : (gy <= f+5 ? 3 : 1));
    }

    function initGame(n) {
        let c = document.getElementById('g'); c.width = window.innerWidth; c.height = window.innerHeight;
        c.style.visibility = 'visible'; document.getElementById('hud').style.display='block';
        
        let sy = 0; while(getB(Math.floor(p.x/T), Math.floor(sy/T)) === 0) sy += T;
        p.y = sy - 160;

        // 雲朵背景
        for(let i=0; i<15; i++) clouds.push({x: Math.random()*c.width, y: Math.random()*300, s: Math.random()*1.5+0.5});
        
        // 生成隊友 (Ally)
        for(let i=0; i<n-1; i++) ents.push({type:'ally', x:p.x+50+(i*35), y:p.y, hp:100, max:100, vx:0, vy:0});
        
        // 生成初始生物 (Mob / Animal)
        for(let i=0; i<12; i++) spawnLife();
        
        live = true; loop();
    }

    function spawnLife() {
        let side = Math.random() > 0.5 ? 1 : -1;
        let tx = p.x + (side * 800) + (Math.random() * 500);
        ents.push({
            type: Math.random() > 0.6 ? 'mob' : 'animal', 
            x: tx, y: p.y - 200, hp: 40, max: 40, vx: 0, vy: 0, dir: 1 
        });
    }

    function log(m) {
        let el = document.getElementById('msg-log'); el.innerText = m;
        setTimeout(() => { if(el.innerText === m) el.innerText = ""; }, 2500);
    }

    // 鍵盤與滑鼠事件
    window.onkeydown = e => {
        if(e.code === 'KeyK' && p.atkCd <= 0) {
            p.atkCd = 12;
            ents.forEach(e => {
                if(Math.hypot(e.x - p.x, e.y - p.y) < 100) {
                    e.hp -= 20; e.vx = (e.x > p.x ? 12 : -12);
                    if(e.hp <= 0) { 
                        let gain = e.type === 'mob' ? 40 : 15;
                        p.xp += gain; log("擊殺獲得 " + gain + " XP"); checkLv(); 
                    }
                }
            });
        }
        keys[e.code] = true;
    };
    window.onkeyup = e => keys[e.code] = false;

    window.onmousedown = e => {
        if(!live) return;
        let c = document.getElementById('g'), cx = p.x - c.width/2, cy = p.y - c.height/2;
        let gx = Math.floor((e.clientX + cx) / T), gy = Math.floor((e.clientY + cy) / T);
        if(e.button === 0) { world[gx+'_'+gy] = 0; log("挖掘方塊"); }
        if(e.button === 2) { world[gx+'_'+gy] = 1; log("建造建築"); }
    };

    function checkLv() {
        let target = p.lv * 100;
        if(p.xp >= target) {
            p.xp -= target; p.lv++; p.max += 25; p.hp = p.max;
            log("⭐ 等級提升至 Lv." + p.lv + "！");
        }
    }

    function loop() {
        if(!live) return;
        let c = document.getElementById('g'), ctx = c.getContext('2d');
        ticks = (ticks + 0.1) % 1440; // 1.5x 加速模擬
        if(p.atkCd > 0) p.atkCd--;

        // 生物 AI 與物理運算
        [p, ...ents].forEach(e => {
            if(e.hp <= 0 && e !== p) return;
            e.vy += 0.8; e.y += e.vy; e.x += (e.vx || 0); e.vx = (e.vx || 0) * 0.8;
            
            let hit = () => getB(Math.floor(e.x/T), Math.floor(e.y/T)) > 0;
            if(hit()) { while(hit()) e.y -= 1; e.vy = 0; e.gr = true; } else e.gr = false;

            if(e === p) {
                if(keys['KeyD']) p.x += 7; if(keys['KeyA']) p.x -= 7;
                if(keys['Space'] && p.gr) p.vy = -13;
            } else {
                if(e.type === 'mob') {
                    if(Math.hypot(e.x - p.x, e.y - p.y) < 400) {
                        e.x += (p.x > e.x ? 2.8 : -2.8);
                        if(Math.hypot(e.x-p.x, e.y-p.y) < 30) p.hp -= 0.3;
                    }
                } else if(e.type === 'animal') {
                    if(Math.hypot(e.x - p.x, e.y - p.y) < 150) e.x += (p.x > e.x ? -4 : 4);
                    else { if(Math.random()<0.01) e.dir *= -1; e.x += e.dir * 1; }
                }
                if(hit() && e.gr) e.vy = -9; // AI 跳躍避障
            }
        });

        // 渲染背景
        let night = (ticks > 1050 || ticks < 350);
        ctx.fillStyle = night ? '#050510' : '#87ceeb';
        ctx.fillRect(0, 0, c.width, c.height);
        
        // 雲朵
        ctx.fillStyle = night ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.8)';
        clouds.forEach(cl => {
            ctx.fillRect(cl.x, cl.y, 60, 20); cl.x = (cl.x + cl.s) % c.width;
        });

        let cx = p.x - c.width/2, cy = p.y - c.height/2;
        
        // 繪製方塊
        for(let x=Math.floor(cx/T); x<Math.ceil((cx+c.width)/T); x++) {
            for(let y=Math.floor(cy/T); y<Math.ceil((cy+c.height)/T); y++) {
                let b = getB(x, y);
                if(b) {
                    ctx.fillStyle = b===2?"#2ecc71":(b===3?"#795548":"#7f8c8d");
                    ctx.fillRect(x*T-cx, y*T-cy, T-0.4, T-0.4);
                }
            }
        }

        // 繪製實體
        [p, ...ents].forEach(e => {
            if(e.hp <= 0 && e !== p) return;
            ctx.fillStyle = e===p ? p.color : (e.type==='mob'?'#e74c3c':(e.type==='animal'?'#2ecc71':'#3498db'));
            ctx.fillRect(e.x-cx, e.y-cy, 22, 42);
            
            // 血條繪製
            ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(e.x-cx, e.y-cy-10, 22, 4);
            ctx.fillStyle = "#2ecc71"; ctx.fillRect(e.x-cx, e.y-cy-10, 22*(e.hp/e.max), 4);
        });

        // HUD 更新
        document.getElementById('hp').innerText = Math.max(0, Math.floor(p.hp));
        document.getElementById('mhp').innerText = p.max;
        document.getElementById('lv').innerText = p.lv;
        document.getElementById('xp-f').style.width = (p.xp / (p.lv*100) * 100) + "%";
        document.getElementById('alt').innerText = Math.floor(Math.abs(p.y/T - 150)*32);
        
        let hrs = Math.floor(ticks/60).toString().padStart(2,'0');
        let mins = Math.floor(ticks%60).toString().padStart(2,'0');
        document.getElementById('tm').innerText = hrs + ":" + mins;

        if(p.hp <= 0) { alert("模擬結束！玩家生命歸零。"); location.reload(); }
        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
