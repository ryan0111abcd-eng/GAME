<!DOCTYPE html>
<html lang="zh-TW">
<head>

        .btn { padding: 25px 60px; font-size: 32px; cursor: pointer; margin: 15px; background: #f1c40f; border: 4px solid #fff; border-radius: 20px; font-weight: bold; color: #000; box-shadow: 0 8px 0 #b8860b; }
        .btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #b8860b; }
        .in-box { padding: 18px; font-size: 30px; border: 4px solid #f1c40f; border-radius: 12px; background: #000; color: #f1c40f; text-align: center; margin-bottom: 25px; width: 450px; outline: none; }
        #hud { position: fixed; top: 15px; left: 15px; z-index: 1000; color: white; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 10px; border: 2px solid #f1c40f; display: none; pointer-events: none; line-height: 1.6; }
        canvas#gCanvas { display: none; position: absolute; top: 0; left: 0; z-index: 10; }
    </style>
</head>
<body>

    <div id="step-auth" class="ui-layer">
        <h1 style="font-size: 45px; margin-bottom: 10px;">SUPER HUMAN 系統</h1>
        <p style="font-size: 24px; color: #fff; margin-bottom: 20px;">請輸入啟動碼</p>
        <input type="text" id="pw-input" class="in-box" placeholder="Security Key">
        <button class="btn" onclick="checkAuth()">認證啟動</button>
    </div>

    <div id="step-mode" class="ui-layer" style="display:none;">

        <p>請選擇遊戲模式</p>
        <button class="btn" onclick="setMode('single')">👤 單人模式</button>
        <button class="btn" onclick="setMode('multi')" style="background:#3498db; color:white;">👥 多人模式</button>
    </div>

    <div id="step-setup" class="ui-layer" style="display:none;">
        <h1>小隊設定</h1>
        <h2 id="p-label">人數: <span style="color:#f1c40f;">5</span></h2>
        <input type="range" min="2" max="15" value="5" oninput="document.getElementById('p-label').innerHTML='人數: <span style=color:#f1c40f;>'+this.value+'</span>'" id="p-slider" style="width:350px; height:40px;">
        <button class="btn" onclick="startGame()">進入世界</button>
    </div>

    <div id="hud">❤️ HP: <span id="hp-v">100</span> | 📍 POS: <span id="pos-v">0,0</span><br>☀️ 狀態: <span id="sun-v">日間</span></div>
    <canvas id="gCanvas"></canvas>

        const val = document.getElementById('pw-input').value.trim();

            document.getElementById('step-mode').style.display = 'flex';
        } else {
            alert("啟動碼錯誤！請重新輸入");
        }
    }

        document.getElementById('step-mode').style.display = 'none';

            startGame();
        } else {

        }
