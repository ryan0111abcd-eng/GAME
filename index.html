<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>3000公尺大山遠征</title>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: white; margin: 0; text-align: center; }
        nav { background: #1a1a1a; padding: 15px 30px; display: flex; justify-content: space-between; border-bottom: 2px solid #2ecc71; }
        #game-box { width: 800px; height: 450px; background: linear-gradient(to bottom, #1e3c72, #2a5298); margin: 20px auto; border: 4px solid #333; border-radius: 15px; position: relative; overflow: hidden; }
        .vip-glow { border-color: gold !important; box-shadow: 0 0 30px gold; }
        .mountain { position: absolute; bottom: 0; width: 100%; height: 150px; background: #444; clip-path: polygon(0% 100%, 20% 40%, 40% 80%, 60% 20%, 80% 60%, 100% 100%); }
        .badge { background: gold; color: black; padding: 2px 8px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <div id="user-info"></div>
    <div id="ver-info">地圖：3000m 聖山 (v1.0)</div>
</nav>

<div id="game-box">
    <div class="mountain"></div>
    <canvas id="gameCanvas" style="position:relative; z-index:10;"></canvas>
</div>

<p id="price-tag" style="font-size:20px;">建築方塊價格：$100</p>

<script>
    const user = localStorage.getItem('game_user');
    const isVip = localStorage.getItem('isVip') === 'true';

    if (!user) window.location.href = 'auth.html';

    // 顯示規則
    document.getElementById('user-info').innerHTML = `玩家：${user} ${isVip ? '<span class="badge">PRO</span>' : ''}`;
    if (isVip) {
        document.getElementById('game-box').classList.add('vip-glow');
        document.getElementById('price-tag').innerHTML = "建築方塊：$100 -> <strong style='color:gold'>會員 75 折：$75</strong>";
        document.getElementById('ver-info').innerText = "地圖：3000m 聖山 (PRO Beta)";
    }

    // 遊戲物理 (WASD)
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 800; canvas.height = 450;
    
    let p = { x: 100, y: 350, dy: 0, g: false };
    let keys = {};
    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    function loop() {
        if(keys['KeyA']) p.x -= 5;
        if(keys['KeyD']) p.x += 5;
        if(keys['Space'] && p.g) { p.dy = -12; p.g = false; }
        
        p.dy += 0.6; p.y += p.dy;
        if(p.y > 380) { p.y = 380; p.dy = 0; p.g = true; } // 防止卡地表

        ctx.clearRect(0,0,800,450);
        // 畫小人
        if (isVip) { ctx.shadowBlur = 15; ctx.shadowColor = "gold"; }
        ctx.fillStyle = isVip ? "gold" : "#2ecc71";
        ctx.fillRect(p.x, p.y, 30, 30);
        ctx.shadowBlur = 0;

        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
