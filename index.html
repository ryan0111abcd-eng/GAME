<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>SUPER HUMAN 2026 - STABLE</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; user-select: none; }
        .page { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #050505; color: #f1c40f; text-align: center; }
        .btn { padding: 18px 45px; font-size: 26px; cursor: pointer; margin: 10px; background: #f1c40f; border: 4px solid #fff; border-radius: 15px; font-weight: bold; color: #000; box-shadow: 0 6px 0 #b8860b; transition: 0.1s; }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #b8860b; }
        .in-box { padding: 15px; font-size: 24px; border: 4px solid #f1c40f; border-radius: 12px; background: #fff; color: #000; text-align: center; margin-bottom: 25px; width: 320px; outline: none; }
        #hud { position: fixed; top: 15px; left: 15px; z-index: 1000; color: white; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 12px; border: 2px solid #f1c40f; display: none; pointer-events: none; }
        canvas#g { display: none; position: absolute; top: 0; left: 0; z-index: 10; }
        .sel-box { color: #f1c40f; font-weight: bold; border-bottom: 2px solid #f1c40f; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="p-auth" class="page">
        <h1>SUPER HUMAN SYSTEM</h1>
        <input type="password" id="pw" class="in-box" placeholder="Access Key">
        <button class="btn" onclick="auth()">VERIFY</button>
    </div>

    <div id="p-mode" class="page" style="display:none;">
        <h1>ACCESS GRANTED</h1>
        <button class="btn" onclick="goLive(1)">👤 單人模式</button>
        <button class="btn" onclick="goLive(5)">👥 5人小隊</button>
    </div>

    <div id="hud">
        ❤️ HP: 100 | 🕒 <span id="tm-u">12:00</span><br>
        🏗️ 建築：<span id="cur-b" class="sel-box">石頭 (1)</span><br>
        📍 海拔：<span id="alt-u">0</span> m
    </div>
    <canvas id="g"></canvas>

<script>
    var live = false, world = {}, keys = {}, ents = [], ticks = 600, sSize = 1;
    var p = { x: 0, y: -400, w: 22, h: 42, vx: 0, vy: 0, hp: 100, max: 100, gr: false };
    var T = 32, selB = 1, spawnTimer = 0;

    const B_NAMES = { 1:'石頭', 2:'草地', 3:'古蹟磚', 4:'沙子', 5:'木頭', 6:'葉子', 7:'雪地', 8:'水' };
    const B_COLORS = { 1:'#7f8c8d', 2:'#2ecc71', 3:'#bdc3c7', 4:'#f1c40f', 5:'#5d4037', 6:'#27ae60', 7:'#ecf0f1', 8:'#3498db' };

    function auth() { if(document.getElementById('pw').value.trim()==='ryan0111407'){document.getElementById('p-auth').style.display='none';document.getElementById('p-mode').style.display='flex';} }
    
    function goLive(n) {
        sSize = n;
        document.querySelectorAll('.page').forEach(el=>el.style.display='none');
        document.getElementById('hud').style.display='block';
        var cvs=document.getElementById('g'); cvs.style.display='block';
        cvs.width=window.innerWidth; cvs.height=window.innerHeight;
        for(var i=0; i<sSize-1; i++) spawn('ally', p.x + (i*60) - 120, -400);
        live=true; loop();
    }
    
    function spawn(t, x, y) { ents.push({ type: t, x: x, y: y, w: 22, h: 42, vx: 0, vy: 0, hp: 100, max: 100, dir: 1 }); }

    // --- 穩定版：地形引擎 ---
    function getB(gx, gy) {
        if(world[gx+'_'+gy]!==undefined) return world[gx+'_'+gy];
        var absGx = Math.abs(gx);
        var f = 12; // 地表基準線

        // 3000公尺大山階梯邏輯 (從 X=80 開始)
        if(absGx > 80) {
            f = 12 + Math.floor((absGx - 80) / 5) * 12; 
        }
        if (f > 100) f = 100; // 封頂海拔 (約3200m)

        if (gy < f) return 0;
        
        if (gy === f) {
            // 隨機生成建築：只在特定點觸發，避免重複計算
            if(absGx > 40 && absGx < 200 && gx % 55 === 0) {
                if((gx/55)%2===0) generateVillage(gx, gy-1);
                else generateRuins(gx, gy-1);
            }
            if (gy >= 75) return 7; // 雪頂
            if (absGx < 150) return 2; // 出生點草皮
            return 1;
        }
        return 1;
    }

    function generateVillage(gx, gy) {
        for(var i=-1; i<=1; i++) for(var j=0; j>-3; j--) world[(gx+i)+'_'+(gy+j)] = 5;
        world[gx+'_'+(gy-3)] = 6;
    }

    function generateRuins(gx, gy) {
        for(var j=0; j<5; j++) world[gx+'_'+(gy-j)] = 3;
    }

    function check(x,y) { 
        var gx=Math.floor(x/T), gy=Math.floor(y/T);
        if(getB(gx, gy)>0 || getB(Math.floor((x+21)/T), Math.floor((y+41)/T))>0) return true;
        return false;
    }

    window.onmousedown=function(e){
        if(!live) return;
        var cvs=document.getElementById('g');
        var gx=Math.floor((e.clientX+(p.x-cvs.width/2))/T), gy=Math.floor((e.clientY+(p.y-cvs.height/2))/T);
        if(e.button===0) world[gx+'_'+gy]=0;
        else if(e.button===2) world[gx+'_'+gy]=selB; 
    };

    window.onkeydown=function(e){
        if(e.keyCode >= 49 && e.keyCode <= 56) { selB = e.keyCode - 48; document.getElementById('cur-b').innerText = B_NAMES[selB]; }
        keys[e.code]=true;
    };
    window.onkeyup=function(e){keys[e.code]=false;};

    function loop() {
        if(!live) return;
        var cvs=document.getElementById('g'), ctx=cvs.getContext('2d');
        ticks=(ticks+0.05)%1440; 
        
        // --- 10 秒新村民生成 ---
        spawnTimer++;
        if(spawnTimer > 600) { 
            var sx = p.x + (Math.random() > 0.5 ? 600 : -600);
            var gx = Math.floor(sx/T);
            spawn('villager', sx, (12-2)*T);
            spawnTimer = 0;
        }

        [p].concat(ents).forEach(function(e) {
            e.vy+=0.8; e.y+=e.vy;
            if(check(e.x,e.y)){if(e.vy>0){while(check(e.x,e.y))e.y-=0.5;e.gr=true;}e.vy=0;}else e.gr=false;
            if(e===p){
                var dx=(keys['KeyD']?7:0)-(keys['KeyA']?7:0);
                if(dx!==0){p.x+=dx; if(check(p.x,p.y))p.x-=dx;}
                if(keys['Space']&&p.gr)p.vy=-14;
            } else {
                if(Math.random()<0.02) e.dir = (p.x > e.x ? 1 : -1); // AI 朝玩家靠攏
                e.x+=e.dir*1.2; if(check(e.x+e.dir*5,e.y)) e.dir*=-1;
            }
        });

        document.getElementById('alt-u').innerText=Math.floor(Math.abs(p.y/T)*32);
        render(ctx, cvs);
        requestAnimationFrame(loop);
    }

    function render(ctx, cvs) {
        ctx.fillStyle=(ticks>1050||ticks<350)?'#050510':'#87ceeb';
        ctx.fillRect(0,0,cvs.width,cvs.height);
        var cx=p.x-cvs.width/2, cy=p.y-cvs.height/2;
        for(var x=Math.floor(cx/T);x<=Math.ceil((cx+cvs.width)/T);x++){
            for(var y=Math.floor(cy/T);y<=Math.ceil((cy+cvs.height)/T);y++){
                var b=getB(x,y); if(b>0){ ctx.fillStyle=B_COLORS[b]; ctx.fillRect(x*T-cx,y*T-cy,T+0.5,T+0.5); }
            }
        }
        [p].concat(ents).forEach(function(e) {
            ctx.fillStyle=e===p?'#e67e22':(e.type==='villager'?'#9b59b6':'#3498db');
            ctx.fillRect(e.x-cx,e.y-cy,e.w,e.h);
        });
    }
</script>
</body>
</html>
