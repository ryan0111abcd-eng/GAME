<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let isStarted = false, ticks = 420; 
let world = {}, selBlock = 2;
const tileSize = 32;
const WORLD_COLS = 100; // 球體一圈的格數
const WORLD_PX = WORLD_COLS * tileSize;
const colors = { 1: '#8B4513', 2: '#228B22', 3: '#666' };

// 星球中心點與半徑
let centerX, centerY;
const planetRadius = 250; // 地核半徑

let p = { x: 300, y: 0, w: 20, h: 35, vx: 0, vy: 0, hp: 100, grounded: false, atk: 0 };
let teams = [], vils = [], anis = [], mobs = [];

function showMulti() {
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('multi-screen').style.display = 'flex';
}

function preStart(n) {
    document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
    document.getElementById('ui-bar').style.display = 'block';
    document.getElementById('hotbar').style.display = 'flex';
    
    // 初始化位置
    p.y = 0;
    for(let i=0; i < n-1; i++) teams.push({ x: 300 + Math.random()*200, y: 0, w: 20, h: 35, vx: 0, vy: 0 });
    isStarted = true; resize(); loop();
}

function getB(gx, gy) {
    let wrapX = ((gx % WORLD_COLS) + WORLD_COLS) % WORLD_COLS;
    const key = `${wrapX}_${gy}`;
    if (world[key] !== undefined) return world[key];
    // 星球表面起伏
    let g = Math.floor(5 + Math.sin(wrapX * 0.2) * 2); 
    return gy < g ? 0 : (gy === g ? 2 : 1);
}

function physics(o) {
    o.vy += 0.5; // 重力指向球心
    o.x = ((o.x + o.vx) % WORLD_PX + WORLD_PX) % WORLD_PX;
    o.y += o.vy;
    
    o.grounded = false;
    let gx = Math.floor((o.x + o.w/2) / tileSize);
    let gy = Math.floor((o.y + o.h) / tileSize);

    if (getB(gx, gy) !== 0) {
        o.y = gy * tileSize - o.h;
        o.vy = 0;
        o.grounded = true;
    }
    // 防止掉進地核太深
    if (o.y > 400) o.y = 400;
}

let keys = {};
window.onkeydown = e => { 
    keys[e.code] = true; 
    if (e.key >= '1' && e.key <= '3') { selBlock = [0, 2, 1, 3][e.key]; updateSlot(e.key); }
};
window.onkeyup = e => keys[e.code] = false;

function updateSlot(idx) {
    document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
    document.getElementById('slot'+idx).classList.add('active');
}

function loop() {
    if (!isStarted) return;
    ticks = (ticks + 0.2) % 1440;
    
    p.vx = (keys['KeyA'] ? -4 : keys['KeyD'] ? 4 : 0);
    if (keys['Space'] && p.grounded) p.vy = -10;
    
    physics(p);
    [...teams, ...vils, ...anis, ...mobs].forEach(e => physics(e));

    render();
    requestAnimationFrame(loop);
}

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    centerX = canvas.width / 2;
    centerY = canvas.height / 2;

    // 繪製背景 (外太空)
    let hr = Math.floor(ticks / 60);
    ctx.fillStyle = (hr >= 18 || hr < 6) ? "#020210" : "#87ceeb";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // --- 星球繪製核心邏輯 ---
    // 我們以玩家為中心旋轉整個世界
    ctx.save();
    ctx.translate(centerX, centerY);
    // 計算玩家的角度：玩家的 X 座標決定了星球旋轉的角度
    let playerAngle = (p.x / WORLD_PX) * Math.PI * 2;
    ctx.rotate(-playerAngle + Math.PI); // 讓玩家永遠在正上方

    // 繪製方塊
    for (let gx = 0; gx < WORLD_COLS; gx++) {
        for (let gy = 0; gy < 15; gy++) {
            let b = getB(gx, gy);
            if (b !== 0) {
                let angle = (gx / WORLD_COLS) * Math.PI * 2;
                let dist = planetRadius + gy * tileSize;
                
                ctx.save();
                ctx.rotate(angle);
                ctx.fillStyle = colors[b];
                // 將方塊畫在對應的角度和半徑上
                ctx.fillRect(-tileSize/2, dist, tileSize + 1, tileSize + 1);
                ctx.restore();
            }
        }
    }

    // 繪製玩家與實體 (他們現在都相對於世界座標旋轉)
    const drawOnPlanet = (e, col) => {
        let angle = (e.x / WORLD_PX) * Math.PI * 2;
        let dist = planetRadius + e.y;
        ctx.save();
        ctx.rotate(angle);
        ctx.fillStyle = col;
        ctx.fillRect(-e.w/2, dist, e.w, e.h);
        ctx.restore();
    };

    teams.forEach(t => drawOnPlanet(t, "#f1c40f"));
    drawOnPlanet(p, "#FF5733");

    ctx.restore();

    // UI 更新
    document.getElementById('hp-val').innerText = Math.ceil(p.hp);
    document.getElementById('pos-val').innerText = `星球座標: ${Math.floor(p.x/tileSize)}`;
}

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.onresize = resize;
resize();
</script>
