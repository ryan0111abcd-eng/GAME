<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Minecraft 遠征世界</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: white; }
        nav { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.8); padding: 10px 20px; display: flex; justify-content: space-between; z-index: 10; box-sizing: border-box; }
        canvas { display: block; background: #87CEEB; }
        #pause { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .btn { padding: 15px 40px; margin: 10px; background: #333; border: 2px solid #555; cursor: pointer; color: white; }
    </style>
</head>
<body>

<nav>
    <div id="u-info"></div>
    <div>按 ESC 暫停 | 地圖：無限延伸</div>
</nav>

<div id="pause">
    <h1>遊戲暫停</h1>
    <div class="btn" onclick="togglePause()">返回遊戲 (ESC)</div>
    <div class="btn" onclick="window.location.href='auth.html'">登出</div>
</div>

<canvas id="game"></canvas>

<script>
    const user = localStorage.getItem('mc_user');
    const rank = localStorage.getItem('member_rank');
    if(!user) window.location.href = 'auth.html';
    document.getElementById('u-info').innerText = `玩家: ${user} [${rank}]`;

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    const blockSize = 40;
    let world = {}; 
    let player = { x: 400, y: -400, w: 26, h: 36, vx: 0, vy: 0, g: false };
    let camera = { x: 0, y: 0 };
    let keys = {};
    let isPaused = false;

    // 地形生成：起始大山區，之後轉丘陵
    function generateColumn(x) {
        if (world[x]) return;
        let groundY = (x < 1500) ? Math.floor(5 + Math.sin(x * 0.01) * 12) : Math.floor(10 + Math.sin(x * 0.05) * 4);
        world[x] = [];
        for(let y = groundY; y < groundY + 25; y++) {
            let type = (y === groundY) ? 'grass' : (y > groundY + 5 ? 'stone' : 'dirt');
            world[x].push({ y: y * blockSize, type: type });
        }
    }

    window.onkeydown = e => { if(e.code === 'Escape') togglePause(); keys[e.code] = true; };
    window.onkeyup = e => keys[e.code] = false;
    function togglePause() { isPaused = !isPaused; document.getElementById('pause').style.display = isPaused ? 'flex' : 'none'; }

    // 碰撞檢測函式
    function checkColl(tx, ty) {
        const gx = Math.floor(tx / blockSize) * blockSize;
        const cols = [gx - blockSize, gx, gx + blockSize];
        for (let cx of cols) {
            if (world[cx]) {
                for (let b of world[cx]) {
                    if (tx < cx + blockSize && tx + player.w > cx && ty < b.y + blockSize && ty + player.h > b.y) return b;
                }
            }
        }
        return null;
    }

    canvas.onmousedown = e => {
        if (isPaused) return;
        const mx = e.clientX + camera.x; const my = e.clientY + camera.y;
        const gx = Math.floor(mx / blockSize) * blockSize;
        const gy = Math.floor(my / blockSize) * blockSize;
        if(e.button === 0 && world[gx]) world[gx] = world[gx].filter(b => b.y !== gy);
        else if(e.button === 2) { if(!world[gx]) world[gx] = []; world[gx].push({ y: gy, type: 'wood' }); }
    };
    canvas.oncontextmenu = e => e.preventDefault();

    function update() {
        if (isPaused) return;
        player.vx = 0;
        if(keys['KeyA']) player.vx = -5;
        if(keys['KeyD']) player.vx = 5;

        // X 移動與防卡死
        player.x += player.vx;
        let hX = checkColl(player.x, player.y);
        if (hX) {
            if (player.vx > 0) player.x = hX.x - player.w - 0.1;
            else if (player.vx < 0) player.x = hX.x + blockSize + 0.1;
        }

        // Y 重力與跳躍
        if(keys['Space'] && player.g) { player.vy = -12; player.g = false; }
        player.vy += 0.6;
        player.y += player.vy;
        let hY = checkColl(player.x, player.y);
        if (hY) {
            if (player.vy > 0) { player.y = hY.y - player.h - 0.1; player.g = true; }
            else { player.y = hY.y + blockSize + 0.1; }
            player.vy = 0;
        } else { player.g = false; }

        // 無限生成
        const startX = Math.floor((player.x - 1200) / blockSize) * blockSize;
        const endX = Math.floor((player.x + 1200) / blockSize) * blockSize;
        for(let x = startX; x <= endX; x += blockSize) { generateColumn(x); }

        // 鏡頭鎖定
        camera.x += (player.x - canvas.width / 2 - camera.x) * 0.1;
        camera.y += (player.y - canvas.height / 2 - camera.y) * 0.1;
    }

    function draw() {
        ctx.fillStyle = "#87CEEB"; ctx.fillRect(0,0,canvas.width, canvas.height);
        ctx.save();
        ctx.translate(-camera.x, -camera.y);
        const vS = Math.floor(camera.x / blockSize) * blockSize;
        const vE = Math.floor((camera.x + canvas.width) / blockSize) * blockSize;
        for(let x = vS; x <= vE; x += blockSize) {
            if(world[x]) world[x].forEach(b => {
                ctx.fillStyle = b.type === 'grass' ? '#5da346' : (b.type==='dirt'?'#855c33':'#777');
                if(b.type === 'wood') ctx.fillStyle = '#ab7d4f';
                ctx.fillRect(x, b.y, blockSize-1, blockSize-1);
            });
        }
        ctx.fillStyle = (rank === 'VIP') ? 'gold' : 'white';
        if(rank === 'VIP') { ctx.shadowBlur = 20; ctx.shadowColor = 'gold'; }
        ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.restore();
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    loop();
</script>
</body>
</html>
