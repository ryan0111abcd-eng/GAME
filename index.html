<!DOCTYPE html>
<html>
<head>
    <title>My 2D Minecraft</title>
    <style>
        canvas { border: 2px solid #333; background: #87CEEB; } /* 天空藍背景 */
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const tileSize = 20; // 每個方塊的大小 (像素)
        const cols = 40;     // 地圖寬度
        const rows = 20;     // 地圖高度
        
        // 1. 初始化地圖陣列 (0: 空氣, 1: 泥土, 2: 草地)
        let world = [];

        function generateWorld() {
            for (let x = 0; x < cols; x++) {
                world[x] = [];
                // 簡單的地形高度：在地圖中間以下填充
                let groundLevel = 12 + Math.floor(Math.random() * 2); 
                
                for (let y = 0; y < rows; y++) {
                    if (y < groundLevel) {
                        world[x][y] = 0; // 空氣
                    } else if (y === groundLevel) {
                        world[x][y] = 2; // 草地
                    } else {
                        world[x][y] = 1; // 泥土
                    }
                }
            }
        }

        // 2. 渲染函式：將數字變成顏色方塊
        function drawWorld() {
            for (let x = 0; x < cols; x++) {
                for (let y = 0; y < rows; y++) {
                    if (world[x][y] === 1) {
                        ctx.fillStyle = "#8B4513"; // 泥土棕
                    } else if (world[x][y] === 2) {
                        ctx.fillStyle = "#228B22"; // 草地綠
                    } else {
                        continue; // 空氣不畫
                    }
                    // 繪製方塊：(x座標, y座標, 寬, 高)
                    ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
                }
            }
        }

        generateWorld();
        drawWorld();
    </script>
</body>
</html>
