<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUPER HUMAN 2026 - COMMERCIAL EDITION</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; user-select: none; }
        .page { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); color: #f1c40f; }
        
        /* 啟動碼頁面專業化 */
        .auth-card { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; border: 1px solid #f1c40f55; box-shadow: 0 0 30px rgba(0,0,0,0.5); text-align: center; }
        .btn { display: flex; align-items: center; justify-content: center; width: 300px; height: 55px; margin: 10px; font-size: 18px; font-weight: bold; color: #000; background: #f1c40f; border: 2px solid #fff; border-radius: 12px; box-shadow: 0 5px 0 #b8860b; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #b8860b; }
        
        /* 購買按鈕樣式 */
        .btn-buy { background: #2ecc71; color: #fff; box-shadow: 0 5px 0 #27ae60; border: none; margin-top: 20px; }
        .btn-buy:hover { background: #27ae60; }
        
        .in-box { width: 280px; padding: 15px; font-size: 24px; border: 2px solid #f1c40f; border-radius: 10px; background: #111; color: #fff; text-align: center; margin-bottom: 20px; outline: none; letter-spacing: 3px; }
        
        #esc-menu { position: fixed; inset: 0; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.96); backdrop-filter: blur(15px); }
        .menu-card { background: #1a1a1a; padding: 25px; border: 3px solid #f1c40f; border-radius: 20px; display: flex; flex-direction: row; gap: 25px; align-items: center; }
        
        #hud { position: fixed; top: 15px; left: 15px; z-index: 1000; color: white; background: rgba(0,0,0,0.85); padding: 12px; border-radius: 10px; border: 2px solid #f1c40f; display: none; pointer-events: none; }
        canvas#g { display: block; position: absolute; top: 0; left: 0; z-index: 1; visibility: hidden; }
    </style>
</head>
<body oncontextmenu="event.preventDefault();">

    <div id="p-auth" class="page">
        <div class="auth-card">
            <h1 style="margin-top:0; letter-spacing: 2px;">SUPER HUMAN <span style="color:#fff;">2026</span></h1>
            <p style="color:#aaa; font-size: 14px;">請輸入授權金鑰以解鎖無限地形模擬</p>
            <input type="password" id="pw" class="in-box" placeholder="••••••••">
            <button class="btn" onclick="checkAuth()">驗證授權</button>
            <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
            <p style="color:#888; font-size: 12px;">尚未擁有金鑰？</p>
            <button class="btn btn-buy" onclick="purchaseKey()">🛒 立即購買啟動碼 (NTD $299)</button>
        </div>
    </div>

    <div id="p-conn" class="page" style="display:none;">
        <h1>伺服器連線成功</h1>
        <button class="btn" onclick="nextPage('p-mode')">開始單人遠征</button>
        <button class="btn" onclick="alert('多人模式正在維護中，請先體驗單人遠征。')">多人連線模式</button>
    </div>

    <div id="p-mode" class="page" style="display:none;">
        <h1>任務目標</h1>
        <button class="btn" onclick="startGame()">🏔️ 聖山與丘陵遠征 (3000m)</button>
    </div>

    <div id="esc-menu">
        <div class="menu-card">
            <div style="display:flex; flex-direction:column;">
                <h2 style="color:#f1c40f; text-align: center;">系統設置</h2>
                <button class="btn" onclick="togglePause()">繼續遊戲 (ESC)</button>
                <button class="btn" onclick="clearBlocks()" style="background:#d35400; color:white; border:none;">清除自建方塊</button>
                <button class="btn" onclick="logout()" style="background:#7f8c8d; color:white; border:none;">登出授權</button>
                <button class="btn" onclick="exitGame()" style="background:#000; color:#f00; border:2px solid #f00;">⚠️ 終止程式</button>
            </div>
            <div style="text-align:center;">
                <b style="color:#f1c40f; display:block; margin-bottom:10px;">地形即時掃描</b>
                <canvas id="esc-mm-canvas" width="250" height="250" style="background:#000; border:2px solid #333; border-radius:15px;"></canvas>
            </div>
        </div>
    </div>

    <div id="hud">
        🕒 模擬時間: <span id="tm-v">12:00</span> | ❤️ 生命: <span id="p-hp-hud">100</span> | 📍 海拔: <span id="alt-v">0</span>m
    </div>
    <canvas id="g"></canvas>

<script>
    const AUTH_KEY = 'ryan0111407';
    // 真實購買頁面 URL (可以改為你指定的綠界、Paypal 或其他頁面)
    const PURCHASE_URL = 'https://www.google.com/search?q=buy+access+key'; 

    var live = false, paused = false, world = {}, keys = {}, ticks = 600, T = 32;
    var p = { x: 0, y: 0, w: 22, h: 42, vx: 0, vy: 0, hp: 100, gr: false };

    window.onload = function() {
        if(localStorage.getItem('sh_save_v10')) world = JSON.parse(localStorage.getItem('sh_save_v10'));
        // 檢查是否已登入
        if (localStorage.getItem('super_human_auth') === AUTH_KEY) {
            document.getElementById('p-auth').style.display = 'none';
            document.getElementById('p-conn').style.display = 'flex';
        }
    };

    function checkAuth() {
        if(document.getElementById('pw').value.trim() === AUTH_KEY) {
            localStorage.setItem('super_human_auth', AUTH_KEY);
            nextPage('p-conn');
        } else {
            alert("授權失敗：無效的金鑰代碼。請確認輸入或購買新金鑰。");
        }
    }

    function purchaseKey() {
        if(confirm("即將跳轉至安全支付頁面購買啟動碼，確定嗎？")) {
            window.open(PURCHASE_URL, '_blank');
        }
    }

    function nextPage(id) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
    }

    function logout() { localStorage.removeItem('super_human_auth'); location.reload(); }
    function clearBlocks() { if(confirm("確定清除？")){ world = {}; localStorage.setItem('sh_save_v10', "{}"); } }
    function exitGame() { if(confirm("關閉模擬？")){ window.location.href="about:blank"; } }

    // --- 地形引擎 V11.4 (防卡死丘陵) ---
    function getB(gx, gy) {
        if(world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
        var absGx = Math.abs(gx);
        var f;
        if (absGx < 60) {
            // 3000m 聖山
            var mountainShape = Math.exp(-Math.pow(gx / 30, 2)); 
            f = Math.floor(150 - (56 * mountainShape) + (gx % 2));
        } else {
            // 無盡丘陵 (平滑坡度防卡死)
            var hillBase = Math.sin(gx * 0.2) * 15 + Math.cos(gx * 0.08) * 10;
            f = Math.floor(135 + hillBase);
        }
        if(gy < f) return 0;
        if(gy === f) return (gy < 105) ? 7 : 2; 
        if(gy > f && gy <= f + 5) return 3;
        return 1;
    }

    function startGame() {
        var cvs = document.getElementById('g');
        cvs.width = window.innerWidth; cvs.height = window.innerHeight;
        cvs.style.visibility = 'visible'; cvs.style.display = 'block';
        p.x = -1200; 
        let sy = 0; while(getB(Math.floor(p.x/T), Math.floor(sy/T)) === 0) sy += T;
        p.y = sy - 160;
        nextPage('none');
        document.getElementById('hud').style.display='block';
        live = true; loop();
    }

    function togglePause() {
        paused = !paused;
        document.getElementById('esc-menu').style.display = paused ? 'flex' : 'none';
        if(paused) drawEscMap();
    }

        var mCtx = document.getElementById('esc-mm-canvas').getContext('2d');
        mCtx.fillStyle = "#000"; mCtx.fillRect(0,0,250,250);
        var pgx = Math.floor(p.x/T), scale = 4;

            for(var y=-30; y<30; y++) {
                var b =
