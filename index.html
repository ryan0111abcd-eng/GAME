<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Future Super Human - 絕對進得去版</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        
        /* 選單：啟動前唯一看得見的東西 */
        #menu-layer {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #2c3e50; color: #f1c40f;
        }

        .btn {
            padding: 25px 60px; font-size: 30px; cursor: pointer; margin: 15px;
            background: #f1c40f; border: none; border-radius: 15px;
            font-weight: bold; box-shadow: 0 8px 0 #b8860b; color: #000;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #b8860b; }

        #hud {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            background: rgba(0,0,0,0.8); color: white; padding: 10px;
            border: 2px solid #f1c40f; border-radius: 5px; display: none;
        }

        canvas { display: none; position: absolute; top: 0; left: 0; z-index: 10; }
    </style>
</head>
<body>

    <div id="menu-layer">
        <h1 style="font-size: 50px; margin-bottom: 30px;">SUPER HUMAN</h1>
        <button class="btn" onclick="initGame('single')">🙋 單人模式</button>
        <button class="btn" onclick="initGame('multi')" style="background:#3498db; color:white; box-shadow:0 8px 0 #2980b9;">👬 多人小隊</button>
        <p style="color: white; margin-top: 20px;">[WASD] 移動 | [空白鍵] 跳躍 | [R] 卡住救命鍵</p>
    </div>

    <div id="hud">❤️ HP: <span id="hp-val">100</span> | 📍 座標: <span id="pos-val">0,0</span></div>
    <canvas id="gameCanvas"></canvas>

<script>
    const cvs = document.getElementById('gameCanvas'), ctx = cvs.getContext('2d');
    let isRunning = false, world = {}, keys = {}, agents = [];
    let p = { x: 0, y: 0, w: 22, h: 42, vx: 0, vy: 0, ground: false };
    const TILE = 32;

    // 地形高度：數值越小代表地勢越高
    function getH(gx) { return Math.floor(25 + Math.sin(gx * 0.1) * 5); }

    function getB(gx, gy) {
        if (world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
        let h = getH(gx);
        if (gy < h) return 0;
        if (gy === h) return 2; // 草
        return 1; // 土
    }

    function isCollide(x, y) {
        for (let i = Math.floor(x / TILE); i <= Math.floor((x + p.w) / TILE); i++) {
            for (let j = Math.floor(y / TILE); j <= Math.floor((y + p.h) / TILE); j++) {
                if (getB(i, j) > 0) return true;
            }
        }
        return false;
    }

    function initGame(mode) {
        document.getElementById('menu-layer').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
        cvs.style.display = 'block';
        cvs.width = window.innerWidth;
        cvs.height = window.innerHeight;

        // 【核心修復】強制生成在天空中，避免卡死
        p.x = 100;
        p.y = -200; 

        if (mode === 'multi') {
            for(let i=0; i<3; i++) agents.push({ x: p.x + 50*(i+1), y: p.y, w: 20, h: 40 });
        }

        isRunning = true;
        loop();
    }

    window.onkeydown = e => {
        keys[e.code] = true;
        // R 鍵救命：按了立刻彈回天空
        if(e.code === 'KeyR') { p.y = -500; p.vx = 0; p.vy = 0; }
    };
    window.onkeyup = e => keys[e.code] = false;

    // 滑鼠挖掘
    window.onmousedown = e => {
        if(!isRunning) return;
        let camX = p.x - cvs.width/2, camY = p.y - cvs.height/2;
        let gx = Math.floor((e.clientX + camX) / TILE);
        let gy = Math.floor((e.clientY + camY) / TILE);
        world[gx+'_'+gy] = (e.button === 0) ? 0 : 3;
    };
    window.oncontextmenu = e => e.preventDefault();

    function loop() {
        if (!isRunning) return;

        // Y 軸物理：重力
        p.vy += 0.8;
        p.y += p.vy;
        if (isCollide(p.x, p.y)) {
            if (p.vy > 0) {
                while(isCollide(p.x, p.y)) p.y -= 1;
                p.ground = true;
            } else {
                while(isCollide(p.x, p.y)) p.y += 1;
            }
            p.vy = 0;
        } else { p.ground = false; }

        // X 軸物理：行走
        let dx = (keys['KeyD'] ? 5 : 0) - (keys['KeyA'] ? 5 : 0);
        if (dx !== 0) {
            p.x += dx;
            if (isCollide(p.x, p.y)) p.x -= dx;
        }

        // 跳躍
        if ((keys['Space'] || keys['KeyW']) && p.ground) { p.vy = -14; p.ground = false; }

        // UI 座標更新
        document.getElementById('pos-val').innerText = Math.floor(p.x/TILE) + "," + Math.floor(p.y/TILE);

        // 渲染
        ctx.fillStyle = '#87ceeb'; // 天空藍
        ctx.fillRect(0, 0, cvs.width, cvs.height);

        // 攝影機隨玩家移動
        let camX = p.x - cvs.width / 2;
        let camY = p.y - cvs.height / 2;

        // 畫地圖
        for (let x = Math.floor(camX / TILE); x <= Math.ceil((camX + cvs.width) / TILE); x++) {
            for (let y = Math.floor(camY / TILE); y <= Math.ceil((camY + cvs.height) / TILE); y++) {
                let b = getB(x, y);
                if (b > 0) {
                    ctx.fillStyle = b === 2 ? '#2ecc71' : (b === 1 ? '#795548' : '#95a5a6');
                    ctx.fillRect(x * TILE - camX, y * TILE - camY, TILE + 1, TILE + 1);
                }
            }
        }

        // 畫隊友
        agents.forEach(a => {
            ctx.fillStyle = '#3498db';
            ctx.fillRect(a.x - camX, a.y - camY, a.w, a.h);
            // 隊友重力
            let ay_next = a.y + 10;
            if (getB(Math.floor(a.x/TILE), Math.floor((ay_next+a.h)/TILE)) === 0) a.y = ay_next;
            else a.y = Math.floor((ay_next+a.h)/TILE) * TILE - a.h;
        });

        // 畫玩家
        ctx.fillStyle = '#e67e22';
        ctx.fillRect(p.x - camX, p.y - camY, p.w, p.h);

        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
