<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPER HUMAN 最終救援版</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        .ui-box { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #111; color: #f1c40f; }
        .big-btn { padding: 30px 60px; font-size: 35px; cursor: pointer; margin: 20px; background: #f1c40f; border: 5px solid #fff; border-radius: 20px; font-weight: bold; color: #000; box-shadow: 0 10px 0 #b8860b; }
        .big-btn:active { transform: translateY(5px); box-shadow: 0 5px 0 #b8860b; }
        #hud { position: fixed; top: 15px; left: 15px; z-index: 100; color: white; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; display: none; pointer-events: none; border: 2px solid #f1c40f; }
        #radar { position: fixed; top: 15px; right: 15px; width: 150px; height: 150px; border: 3px solid #fff; border-radius: 50%; z-index: 100; display: none; background: rgba(0,0,0,0.5); overflow: hidden; }
        canvas#gCvs { display: none; position: absolute; top: 0; left: 0; z-index: 10; }
    </style>
</head>
<body>

    <div id="start-screen" class="ui-box">
        <h1 style="font-size: 50px; margin-bottom: 50px;">SUPER HUMAN 最終救援版</h1>
        <button class="big-btn" onclick="startApp(1)">👤 單人開始</button>
        <button class="big-btn" onclick="startApp(5)" style="background:#3498db; color:white;">👥 多人開始</button>
    </div>

    <div id="hud">❤️ <span id="hp-val">100</span> | 📍 <span id="pos-val">0,0</span></div>
    <div id="radar"><canvas id="rCanvas" width="150" height="150"></canvas></div>
    <canvas id="gCvs"></canvas>

    <script>
        const cvs = document.getElementById('gCvs'), ctx = cvs.getContext('2d');
        const rcvs = document.getElementById('rCanvas'), rctx = rcvs.getContext('2d');
        let live = false, ents = [], ticks = 600, p = {x:0, y:-200, w:22, h:42, vx:0, vy:0, hp:100, gr:false};

        function startApp(n) {
            console.log("遊戲啟動中...");
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('radar').style.display = 'block';
            cvs.style.display = 'block';
            cvs.width = window.innerWidth;
            cvs.height = window.innerHeight;

            for(let i=0; i<n-1; i++) ents.push({type:'ally', x:(Math.random()-0.5)*400, y:-400, w:22, h:42, vx:0, vy:0, hp:100});
            live = true;
            loop();
        }

        function loop() {
            if(!live) return;
            if(p.hp <= 0) location.reload();

            p.vy += 0.8; p.y += p.vy;
            if(p.y > 300) { p.y = 300; p.vy = 0; p.gr = true; } // 簡易地面測試

            document.getElementById('hp-val').innerText = Math.ceil(p.hp);
            document.getElementById('pos-val').innerText = Math.floor(p.x/32) + "," + Math.floor(p.y/32);

            // 繪圖
            ctx.fillStyle = "#87ceeb"; ctx.fillRect(0,0,cvs.width,cvs.height);
            ctx.fillStyle = "#e67e22"; ctx.fillRect(p.x + cvs.width/2, p.y + cvs.height/2, p.w, p.h);
            
            ents.forEach(e => {
                ctx.fillStyle = "#3498db";
                ctx.fillRect(e.x + cvs.width/2, e.y + cvs.height/2, e.w, e.h);
            });

            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
