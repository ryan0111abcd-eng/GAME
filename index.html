<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Super Human - 進化小隊版</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; color: white; }
        .layer { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1a1a1a; z-index: 9999; }
        .title-text { color: #f1c40f; font-size: 50px; margin-bottom: 40px; text-shadow: 3px 3px 0 #000; }
        .btn { padding: 20px 60px; font-size: 28px; cursor: pointer; margin: 15px; background: #f1c40f; border: none; font-weight: bold; border-radius: 15px; color: black; box-shadow: 0 8px 0 #b8860b; }
        
        /* 圓形小地圖 */
        #minimap-wrapper { position: fixed; top: 20px; right: 20px; width: 150px; height: 150px; border-radius: 50%; border: 3px solid #fff; background: rgba(0,0,0,0.5); overflow: hidden; display: none; z-index: 5000; }
        
        /* ESC 選單 */
        #esc-menu { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }

        #hud { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 15px; border: 2px solid #f1c40f; display: none; z-index: 5000; border-radius: 10px; }
        #inv { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; gap: 10px; z-index: 5000; }
        .slot { width: 50px; height: 50px; border: 2px solid #777; background: #333; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .slot.active { border-color: #f1c40f; transform: scale(1.1); background: #444; }
        canvas#gameCanvas { display: none; position: absolute; top: 0; left: 0; z-index: 10; }
    </style>
</head>
<body>

    <div id="ui-main" class="layer">
        <h1 class="title-text">未來的 SUPER HUMAN</h1>
        <button class="btn" onclick="bootGame(8)">開始遊戲</button>
    </div>

    <div id="esc-menu">
        <h1 class="title-text">遊戲暫停</h1>
        <button class="btn" onclick="location.reload()">離開遊戲 (重新開始)</button>
        <p style="font-size: 20px;">按 ESC 返回遊戲</p>
    </div>

    <div id="hud">
        📍 座標: <span id="posX">0</span>, <span id="posY">0</span> | ❤️ HP: <span id="hp">100</span><br>
        🕒 時間: <span id="time-text">07:00</span>
    </div>

    <div id="minimap-wrapper">
        <canvas id="miniCanvas" width="150" height="150"></canvas>
    </div>

    <div id="inv">
        <div class="slot active" id="sl1">1:土</div>
        <div class="slot" id="sl2">2:草</div>
        <div class="slot" id="sl3">3:石</div>
        <div class="slot" id="sl4">4:木</div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const cvs = document.getElementById('gameCanvas'), ctx = cvs.getContext('2d');
    const mcvs = document.getElementById('miniCanvas'), mctx = mcvs.getContext('2d');
    let isRunning = false, isPaused = false, ticks = 420, world = {}, camX = 0, camY = 0, curB = 1;
    let p = { x: 0, y: 0, w: 20, h: 40, vx: 0, vy: 0, hp: 100, maxHp: 100, ground: false, atk: 0 };
    let agents = [], keys = {};
    const TILE = 32, COLORS = { 1: '#8B4513', 2: '#228B22', 3: '#666', 4: '#cd853f', 9: '#3498db' };

    function getBiome(gx) {
        let x = Math.abs(gx);
        let cycle = x % 600;
        if (cycle > 250 && cycle < 350) return { h: 48, n: 0, isWater: true };
        if (cycle > 200 && cycle < 400) return { h: 38, n: 1 };
        return { h: 30, n: 8 };
    }

    function getGY(gx) {
        let b = getBiome(gx);
        return Math.floor(b.h + Math.sin(gx * 0.1) * b.n);
    }

    function getB(gx, gy) {
        if (world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
        let fY = getGY(gx), b = getBiome(gx);
        if (b.isWater && gy >= fY) return 9;
        return gy < fY ? 0 : (gy === fY ? 2 : 1);
    }

    function bootGame(num) {
        document.getElementById('ui-main').style.display='none';
        document.getElementById('hud').style.display='block';
        document.getElementById('minimap-wrapper').style.display='block';
        document.getElementById('inv').style.display='flex';
        cvs.style.display='block'; cvs.width = window.innerWidth; cvs.height = window.innerHeight;
        
        p.y = getGY(0)*TILE - 150;
        for(let i=0; i<num; i++) {
            agents.push({
                x: (Math.random()-0.5)*2000, y: 0, w: 20, h: 40, 
                hp: 100, maxHp: 100, dir: Math.random()>0.5?1:-1, sTimer: 50
            });
            agents[i].y = getGY(Math.floor(agents[i].x/TILE))*TILE - 100;
        }
        isRunning = true;
        requestAnimationFrame(loop);
    }

    window.onkeydown = e => {
        if(e.code === 'Escape') {
            isPaused = !isPaused;
            document.getElementById('esc-menu').style.display = isPaused ? 'flex' : 'none';
        }
        keys[e.code] = true;
        if(e.code === 'KeyK') p.atk = 15;
        if(e.key >= '1' && e.key <= '4') {
            curB = parseInt(e.key);
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
            document.getElementById('sl'+curB).classList.add('active');
        }
    };
    window.onkeyup = e => keys[e.code] = false;

    window.onmousedown = e => {
        if(!isRunning || isPaused) return;
        let gx = Math.floor((e.clientX + camX)/TILE), gy = Math.floor((e.clientY + camY)/TILE);
        if(e.button === 0 && getB(gx, gy) !== 9) world[gx+'_'+gy] = 0;
        if(e.button === 2) world[gx+'_'+gy] = curB;
    };
    window.oncontextmenu = e => e.preventDefault();

    function loop() {
        if(isRunning && !isPaused) {
            ticks = (ticks + 0.3) % 1440;
            p.vx = keys['KeyD'] ? 5 : (keys['KeyA'] ? -5 : 0);
            
            // 玩家物理
            let inWater = getB(Math.floor((p.x+10)/TILE), Math.floor((p.y+20)/TILE)) === 9;
            if(inWater) { p.vy -= 0.8; if(p.vy<-3) p.vy=-3; if(keys['KeyW']) p.vy=-5; }
            else { p.vy += 0.7; if(keys['KeyW'] && p.ground) p.vy = -12; }
            
            p.y += p.vy; p.ground = false;
            let fy = Math.floor((p.y+p.h)/TILE), lx = Math.floor((p.x+2)/TILE), rx = Math.floor((p.x+p.w-2)/TILE);
            if(getB(lx, fy)>0 && getB(lx, fy)!==9) { p.y=fy*TILE-p.h; p.vy=0; p.ground=true; }
            p.x += p.vx;

            // AI 邏輯 (挖掘與放置)
            agents.forEach(a => {
                a.sTimer--;
                if(a.sTimer <= 0) { a.dir = Math.random()>0.5?1:-1; a.sTimer = 100+Math.random()*100; }
                
                let nextX = a.x + a.dir*2;
                let gx = Math.floor((a.dir>0?nextX+a.w:nextX)/TILE), gy = Math.floor((a.y+a.h-5)/TILE);
                
                // AI 挖掘阻礙
                if(getB(gx, gy)>0 && getB(gx, gy)!==9) world[gx+'_'+gy] = 0;
                // AI 隨機放置
                if(Math.random()<0.005) world[gx+'_'+(gy+1)] = 3;

                a.x = nextX;
                let ty = getGY(Math.floor(a.x/TILE))*TILE - a.h;
                a.y += (ty - a.y) * 0.1;

                // 被玩家攻擊
                if(p.atk > 0 && Math.abs(a.x-p.x)<50 && Math.abs(a.y-p.y)<50) a.hp -= 5;
            });
            if(p.atk > 0) p.atk--;
        }
        render();
        requestAnimationFrame(loop);
    }

    function render() {
        ctx.fillStyle = (ticks > 1050 || ticks < 400) ? '#121244' : '#87ceeb';
        ctx.fillRect(0,0,cvs.width, cvs.height);
        camX += (p.x - cvs.width/2 - camX) * 0.1;
        camY += (p.y - cvs.height/2 - camY) * 0.1;

        // 繪製方塊
        for(let x=Math.floor(camX/TILE); x<Math.floor((camX+cvs.width)/TILE)+1; x++) {
            for(let y=Math.floor(camY/TILE); y<Math.floor((camY+cvs.height)/TILE)+1; y++) {
                let b = getB(x, y);
                if(b!==0) { ctx.fillStyle = COLORS[b]; ctx.fillRect(x*TILE-camX, y*TILE-camY, TILE, TILE); }
            }
        }

        // 繪製 AI 與血量
        agents.forEach(a => {
            ctx.fillStyle = '#f1c40f'; ctx.fillRect(a.x-camX, a.y-camY, a.w, a.h);
            ctx.fillStyle = 'black'; ctx.fillRect(a.x-camX-5, a.y-camY-12, 30, 5);
            ctx.fillStyle = 'lime'; ctx.fillRect(a.x-camX-5, a.y-camY-12, 30*(a.hp/a.maxHp), 5);
        });

        // 繪製玩家
        ctx.fillStyle = '#FF5733'; ctx.fillRect(p.x-camX, p.y-camY, p.w, p.h);
        if(p.atk > 0) { ctx.strokeStyle='white'; ctx.strokeRect(p.x-camX-10, p.y-camY-10, p.w+20, p.h+20); }

        // 小地圖
        mctx.fillStyle = 'black'; mctx.fillRect(0,0,150,150);
        for(let i=0; i<30; i++) {
            let gx = Math.floor(p.x/TILE) - 15 + i;
            let gy = getGY(gx);
            mctx.fillStyle = '#555'; mctx.fillRect(i*5, 75 + (gy - getGY(Math.floor(p.x/TILE)))*2, 5, 50);
        }
        mctx.fillStyle = '#FF5733'; mctx.fillRect(75, 75, 5, 5); // 自己
        agents.forEach(a => {
            let dx = (a.x - p.x)/TILE;
            if(Math.abs(dx) < 15) {
                mctx.fillStyle = 'yellow'; mctx.fillRect(75 + dx*5, 75 + (a.y-p.y)/TILE*5, 4, 4);
            }
        });

        document.getElementById('posX').innerText = Math.floor(p.x/TILE);
        document.getElementById('posY').innerText = Math.floor(p.y/TILE);
        document.getElementById('hp').innerText = Math.ceil(p.hp);
    }
</script>
</body>
</html>
