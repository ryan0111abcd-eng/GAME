<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>SUPER HUMAN 2026 - ULTIMATE</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; user-select: none; }
        .page { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a0a0a; color: #f1c40f; text-align: center; }
        .btn { padding: 20px 50px; font-size: 28px; cursor: pointer; margin: 10px; background: #f1c40f; border: 4px solid #fff; border-radius: 15px; font-weight: bold; color: #000; box-shadow: 0 6px 0 #b8860b; }
        .btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #b8860b; }
        .in-box { padding: 15px; font-size: 26px; border: 3px solid #f1c40f; border-radius: 10px; background: #000; color: #f1c40f; text-align: center; margin-bottom: 20px; width: 350px; outline: none; }
        #hud { position: fixed; top: 15px; left: 15px; z-index: 100; color: white; background: rgba(0,0,0,0.7); padding: 12px; border-radius: 10px; border: 2px solid #f1c40f; display: none; pointer-events: none; }
        #mini-map { position: fixed; top: 15px; right: 15px; width: 150px; height: 150px; border: 3px solid #fff; border-radius: 50%; overflow: hidden; z-index: 100; display: none; background: rgba(0,0,0,0.5); }
        #esc-menu { position: fixed; inset: 0; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); }
        #rain-fx { position: fixed; inset: 0; pointer-events: none; z-index: 50; background: rgba(40,40,80,0.25); display: none; }
        canvas#g { display: none; position: absolute; top: 0; left: 0; z-index: 10; }
    </style>
</head>
<body>

    <div id="p-auth" class="page">
        <h1>SUPER HUMAN 系統</h1>
        <p>請輸入啟動碼</p>
        <input type="text" id="pw" class="in-box">
        <button class="btn" onclick="auth()">認證啟動</button>
    </div>

    <div id="p-mode" class="page" style="display:none;">
        <h1>選擇模式</h1>
        <button class="btn" onclick="setM(1)">👤 單人模式</button>
        <button class="btn" onclick="document.getElementById('p-mode').style.display='none';document.getElementById('p-set').style.display='flex';">👥 多人模式</button>
    </div>

    <div id="p-set" class="page" style="display:none;">
        <h1>多人連線人數</h1>
        <h2 id="pv">5 人</h2>
        <input type="range" min="2" max="15" value="5" oninput="document.getElementById('pv').innerText=this.value+' 人'" id="sld" style="width:300px;">
        <button class="btn" onclick="setM(document.getElementById('sld').value)">下一步</button>
    </div>

    <div id="p-rules" class="page" style="display:none;">
        <div style="background:#222; padding:30px; border:2px solid #f1c40f; border-radius:20px; text-align:left; max-width:500px;">
            <h2 style="text-align:center;color:#f1c40f;">📜 遊戲說明單</h2>
            ● <b>WASD</b> 移動 | <b>空白鍵</b> 跳躍 | <b>K</b> 攻擊 | <b>Q</b> 回血<br>
            ● <b>左鍵</b> 挖礦/攻擊 | <b>右鍵</b> 放置石磚<br>
            ● <b>ESC</b> 開啟/關閉選單，選單內可重啟遊戲<br>
            ● <b>隊友 AI</b>：會分散活動、挖礦、蓋房子。如果你被咬，他們會集結衝過來救你！
        </div>
        <button class="btn" onclick="goLive()">進入世界</button>
    </div>

    <div id="esc-menu">
        <h1 style="color:#f1c40f;">遊戲暫停</h1>
        <button class="btn" onclick="location.reload()">🚪 離開遊戲 (重新開始)</button>
        <p style="color:white;">按 ESC 回到遊戲</p>
    </div>

    <div id="hud">❤️ HP: <span id="hp-u">100</span> | 📍 <span id="pos-u">0,0</span><br>⛈️ <span id="wt-u">晴天</span> | 🕒 <span id="tm-u">12:00</span></div>
    <div id="mini-map"><canvas id="mCvs" width="150" height="150"></canvas></div>
    <div id="rain-fx"></div>
    <canvas id="g"></canvas>

<script>
    var live = false, esc = false, world = {}, keys = {}, ents = [], ticks = 600, sSize = 1;
    var p = { x: 0, y: -800, w: 22, h: 42, vx: 0, vy: 0, hp: 100, gr: false, hitBy: null };
    var T = 32;

    function auth() {
        if(document.getElementById('pw').value === 'ryan0111407') {
            document.getElementById('p-auth').style.display = 'none';
            document.getElementById('p-mode').style.display = 'flex';
        } else { alert("錯誤！"); }
    }

    function setM(n) {
        sSize = n;
        document.getElementById('p-mode').style.display = 'none';
        document.getElementById('p-set').style.display = 'none';
        document.getElementById('p-rules').style.display = 'flex';
    }

    function goLive() {
        document.getElementById('p-rules').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
        document.getElementById('mini-map').style.display = 'block';
        var cvs = document.getElementById('g');
        cvs.style.display = 'block'; cvs.width = window.innerWidth; cvs.height = window.innerHeight;

        if(Math.random() < 0.4) { document.getElementById('rain-fx').style.display = 'block'; document.getElementById('wt-u').innerText = "下雨"; }
        for(var i=0; i<sSize-1; i++) spawn('ally', (Math.random()-0.5)*800);
        for(var i=0; i<6; i++) spawn('npc', (Math.random()-0.5)*2000);
        for(var i=0; i<5; i++) spawn('pig', (Math.random()-0.5)*2000);
        
        live = true; loop();
    }

    function spawn(t, x) {
        ents.push({ type: t, x: x, y: -700, w: 22, h: 42, vx: 0, vy: 0, hp: 100, max: 100, dir: 1, mineCd: 0 });
    }

    function getB(gx, gy) {
        if(world[gx+'_'+gy]!==undefined) return world[gx+'_'+gy];
        var x = Math.abs(gx);
        var h = (x%100 < 30)?10:(x%100 < 70?8:(x%100 < 50?4:11));
        var amp = (x%100 < 70)?6:(x%100 < 50?14:1);
        var f = Math.floor(h + Math.sin(gx * 0.15) * amp);
        if(x%100 < 65 && gy > f && gy < f+4 && Math.random() < 0.1) return 3; // 古蹟
        return gy < f ? 0 : (gy === f ? 2 : 1);
    }

    function check(x,y) {
        for(var i=Math.floor(x/T); i<=Math.floor((x+22)/T); i++)
            for(var j=Math.floor(y/T); j<=Math.floor((y+42)/T); j++)
                if(getB(i,j)>0) return true;
        return false;
    }

    function atk(o) {
        ents.concat(p).forEach(function(e){
            if(e!==o && Math.abs(e.x-o.x)<70 && Math.abs(e.y-o.y)<70){
                e.hp -= 20; e.vx = (e.x>o.x?12:-12);
                if(e===p) p.hitBy = o;
            }
        });
    }

    window.onmousedown = function(e) {
        if(!live || esc) return;
        var cvs = document.getElementById('g');
        var gx = Math.floor((e.clientX + (p.x - cvs.width/2))/T), gy = Math.floor((e.clientY + (p.y - cvs.height/2))/T);
        if(e.button === 0) { if(getB(gx, gy) > 0) world[gx+'_'+gy] = 0; else atk(p); } 
        else if(e.button === 2) { if(getB(gx, gy) === 0) world[gx+'_'+gy] = 3; }
    };

    window.onkeydown = function(e){
        if(e.code === 'Escape' && live) {
            esc = !esc;
            document.getElementById('esc-menu').style.display = esc ? 'flex' : 'none';
        }
        keys[e.code] = true;
        if(e.code === 'KeyQ') p.hp = Math.min(100, p.hp + 20);
        if(e.code === 'KeyK') atk(p);
    };
    window.onkeyup = function(e){ keys[e.code] = false; };
    window.oncontextmenu = function(e){ e.preventDefault(); };

    function loop() {
        if(!live || esc) { requestAnimationFrame(loop); return; }
        var cvs = document.getElementById('g'), ctx = cvs.getContext('2d');
        ticks = (ticks + 0.5) % 1440;
        var isNight = ticks > 1050 || ticks < 350;

        if(!isNight) ents = ents.filter(function(e){ return e.type !== 'mob'; });

        [p].concat(ents).forEach(function(e) {
            e.vy += 0.8; e.y += e.vy;
            if(check(e.x, e.y)) {
                if(e.vy > 0) { while(check(e.x, e.y)) e.y -= 0.5; e.gr = true; }
                e.vy = 0;
            } else e.gr = false;

            if(e===p) {
                var dx = (keys['KeyD']?5:0) - (keys['KeyA']?5:0);
                if(dx!==0) { p.x += dx; if(check(p.x, p.y)) p.x -= dx; }
                if(keys['Space'] && p.gr) p.vy = -14;
            } else {
                if(e.type==='ally') {
                    if(p.hitBy && p.hitBy.hp>0) {
                        e.x += (p.hitBy.x > e.x ? 4 : -4);
                        if(Math.abs(e.x-p.hitBy.x)<60) atk(e);
                    } else {
                        if(Math.abs(p.x-e.x)>250) e.x += (p.x>e.x?2.5:-2.5);
                        e.mineCd++;
                        if(e.mineCd > 150) {
                            var gx = Math.floor(e.x/T), gy = Math.floor(e.y/T)+2;
                            if(getB(gx, gy)>0){ world[gx+'_'+gy]=0; e.mineCd=0; }
                            else { world[gx+'_'+(gy-1)]=3; e.mineCd=0; } // AI 放置
                        }
                        ents.forEach(function(m){if(m.type==='mob' && Math.abs(m.x-e.x)<100) atk(e);});
                    }
                } else if(e.type==='mob') {
                    e.x += (p.x>e.x?2.4:-2.4); if(Math.abs(e.x-p.x)<30) p.hp -= 0.3;
                }
            }
        });

        if(isNight && Math.random()<0.01) spawn('mob', p.x + (Math.random()>0.5?600:-600));
        ents = ents.filter(function(e){ return e.hp > 0; });
        if(p.hp <= 0) { alert("你死亡了！"); location.reload(); return; }

        document.getElementById('hp-u').innerText = Math.ceil(p.hp);
        document.getElementById('pos-u').innerText = Math.floor(p.x/T) + "," + Math.floor(p.y/T);
        document.getElementById('tm-u').innerText = Math.floor(ticks/60).toString().padStart(2,'0')+':'+Math.floor(ticks%60).toString().padStart(2,'0');

        render(ctx, cvs);
        requestAnimationFrame(loop);
    }

    function render(ctx, cvs) {
        ctx.fillStyle = (ticks > 1050 || ticks < 350) ? '#050510' : '#87ceeb';
        ctx.fillRect(0,0,cvs.width,cvs.height);
        var cx = p.x - cvs.width/2, cy = p.y - cvs.height/2;

        for(var x=Math.floor(cx/T); x<=Math.ceil((cx+cvs.width)/T); x++){
            for(var y=Math.floor(cy/T); y<=Math.ceil((cy+cvs.height)/T); y++){
                var b = getB(x, y);
                if(b > 0) {
                    ctx.fillStyle = b===2 ? "#2ecc71" : (b===3 ? "#bdc3c7" : "#795548");
                    ctx.fillRect(x*T-cx, y*T-cy, T+0.5, T+0.5);
                }
            }
        }

        [p].concat(ents).forEach(function(e) {
            ctx.fillStyle = e===p?'#e67e22':(e.type==='ally'?'#3498db':(e.type==='mob'?'#2ecc71':(e.type==='npc'?'#f1c40f':'#ff9ff3')));
            ctx.fillRect(e.x-cx, e.y-cy, e.w, e.h);
            // AI/隊友頭頂血量
            ctx.fillStyle = 'red'; ctx.fillRect(e.x-cx, e.y-cy-12, e.w, 5);
            ctx.fillStyle = 'lime'; ctx.fillRect(e.x-cx, e.y-cy-12, e.w*(e.hp/100), 5);
        });

        // 圓形小地圖
        var mC = document.getElementById('mCvs'), mctx = mC.getContext('2d');
        mctx.fillStyle='#000'; mctx.fillRect(0,0,150,150);
        mctx.save(); mctx.translate(75,75);
        [p].concat(ents).forEach(function(e){
            mctx.fillStyle = e===p?'#fff':(e.type==='ally'?'#3498db':'#e74c3c');
            var dx=(e.x-p.x)*0.1, dy=(e.y-p.y)*0.1;
            if(dx*dx+dy*dy < 70*70){ mctx.beginPath(); mctx.arc(dx, dy, 3, 0, 7); mctx.fill(); }
        });
        mctx.restore();
    }
</script>
</body>
</html>
