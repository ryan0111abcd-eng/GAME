<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Future Super Human - 史詩生存版</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        #menu-layer { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #2c3e50; color: #f1c40f; }
        .btn { padding: 25px 60px; font-size: 30px; cursor: pointer; margin: 15px; background: #f1c40f; border: none; border-radius: 15px; font-weight: bold; box-shadow: 0 8px 0 #b8860b; color: #000; }
        .btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #b8860b; }
        #hud { position: fixed; top: 15px; left: 15px; z-index: 1000; background: rgba(0,0,0,0.8); color: white; padding: 10px; border: 2px solid #f1c40f; border-radius: 5px; display: none; }
        canvas { display: none; position: absolute; top: 0; left: 0; z-index: 10; }
    </style>
</head>
<body>

    <div id="menu-layer">
        <h1 style="font-size: 50px; margin-bottom: 20px;">SUPER HUMAN: 史詩世界</h1>
        <button class="btn" onclick="initGame('single')">🙋 單人連線</button>
        <button class="btn" onclick="initGame('multi')" style="background:#3498db; color:white; box-shadow:0 8px 0 #2980b9;">👬 多人連線 (小隊)</button>
        <p style="color: white;">[WASD]移動 [空白]跳躍 [滑鼠]挖掘 [K]攻擊</p>
    </div>

    <div id="hud">❤️ HP: <span id="hp-val">100</span> | 📍 區域: <span id="biome-val">平原</span></div>
    <canvas id="gameCanvas"></canvas>

<script>
    const cvs = document.getElementById('gameCanvas'), ctx = cvs.getContext('2d');
    let isRunning = false, world = {}, keys = {}, entities = [];
    let p = { x: 100, y: -200, w: 22, h: 42, vx: 0, vy: 0, ground: false, hp: 100 };
    const TILE = 32;

    // 地形定義
    function getBiome(gx) {
        let x = Math.abs(gx);
        if (x % 2000 < 500) return { name: "平原", h: 35, amp: 2, color: "#2ecc71" };
        if (x % 2000 < 900) return { name: "丘陵", h: 30, amp: 8, color: "#27ae60" };
        if (x % 2000 < 1300) return { name: "山地", h: 20, amp: 15, color: "#95a5a6" };
        return { name: "台地", h: 28, amp: 1, color: "#d35400" };
    }

    function getH(gx) {
        let b = getBiome(gx);
        return Math.floor(b.h + Math.sin(gx * 0.15) * b.amp);
    }

    function getB(gx, gy) {
        if (world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
        let h = getH(gx);
        if (gy < h) return 0;
        if (gy === h) return 2; // 草
        return 1; // 土
    }

    function isCollide(x, y, w, h) {
        for (let i = Math.floor(x / TILE); i <= Math.floor((x + w) / TILE); i++) {
            for (let j = Math.floor(y / TILE); j <= Math.floor((y + h) / TILE); j++) {
                if (getB(i, j) > 0) return true;
            }
        }
        return false;
    }

    function spawn(type, x, hp) {
        entities.push({ type, x, y: -200, w: 22, h: 42, vx: 0, vy: 0, hp, maxHp: hp, dir: 1, timer: 0 });
    }

    function initGame(mode) {
        document.getElementById('menu-layer').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
        cvs.style.display = 'block';
        cvs.width = window.innerWidth;
        cvs.height = window.innerHeight;

        // 生成村民、隊友、動物與古蹟
        if (mode === 'multi') for(let i=0; i<3; i++) spawn('ally', 150 + i*40, 100);
        for(let i=0; i<5; i++) spawn('villager', 500 + i*100, 50);
        for(let i=0; i<5; i++) spawn('pig', -500 - i*150, 30);
        
        // 生成簡單古蹟 (石塊堆)
        for(let i=0; i<5; i++) world[`${20+i}_${getH(20)-1}`] = 3; 

        isRunning = true;
        loop();
    }

    window.onkeydown = e => {
        keys[e.code] = true;
        if(e.code === 'KeyK') attack(p);
    };
    window.onkeyup = e => keys[e.code] = false;

    function attack(owner) {
        entities.forEach(e => {
            if (e !== owner && Math.abs(e.x - owner.x) < 50 && Math.abs(e.y - owner.y) < 50) {
                e.hp -= 10;
                e.vx = (e.x > owner.x ? 10 : -10); // 擊退效果
            }
        });
    }

    function loop() {
        if (!isRunning) return;

        // 玩家物理
        p.vy += 0.8; p.y += p.vy;
        if (isCollide(p.x, p.y, p.w, p.h)) {
            if (p.vy > 0) { while(isCollide(p.x, p.y, p.w, p.h)) p.y -= 1; p.ground = true; }
            else { while(isCollide(p.x, p.y, p.w, p.h)) p.y += 1; }
            p.vy = 0;
        } else p.ground = false;

        let dx = (keys['KeyD'] ? 5 : 0) - (keys['KeyA'] ? 5 : 0);
        if (dx !== 0) { p.x += dx; if (isCollide(p.x, p.y, p.w, p.h)) p.x -= dx; }
        if ((keys['Space'] || keys['KeyW']) && p.ground) p.vy = -14;

        // 生物 AI 與物理
        entities = entities.filter(e => e.hp > 0);
        entities.forEach(e => {
            e.vy += 0.8; e.y += e.vy;
            if (isCollide(e.x, e.y, e.w, e.h)) {
                if (e.vy > 0) { while(isCollide(e.x, e.y, e.w, e.h)) e.y -= 1; }
                e.vy = 0;
            }
            
            // AI 行為
            e.timer++;
            if (e.type === 'ally') { // 隊友跟隨並攻擊
                if (Math.abs(e.x - p.x) > 60) e.x += (p.x > e.x ? 3 : -3);
                if (e.timer % 60 === 0) attack(e); // 隊友每秒自動攻擊附近生物
            } else { // 村民與動物隨機走動
                if (e.timer % 100 === 0) e.dir = Math.random() > 0.5 ? 1 : -1;
                e.x += e.dir * 1;
                if (isCollide(e.x, e.y, e.w, e.h)) e.x -= e.dir * 1;
            }
        });

        // UI
        document.getElementById('biome-val').innerText = getBiome(Math.floor(p.x/TILE)).name;

        draw();
        requestAnimationFrame(loop);
    }

    function draw() {
        ctx.fillStyle = '#87ceeb'; ctx.fillRect(0, 0, cvs.width, cvs.height);
        let camX = p.x - cvs.width / 2, camY = p.y - cvs.height / 2;

        // 畫地形
        for (let x = Math.floor(camX / TILE); x <= Math.ceil((camX + cvs.width) / TILE); x++) {
            let bInfo = getBiome(x);
            for (let y = Math.floor(camY / TILE); y <= Math.ceil((camY + cvs.height) / TILE); y++) {
                let b = getB(x, y);
                if (b > 0) {
                    ctx.fillStyle = b === 2 ? bInfo.color : (b === 1 ? '#795548' : '#7f8c8d');
                    ctx.fillRect(x * TILE - camX, y * TILE - camY, TILE + 1, TILE + 1);
                }
            }
        }

        // 畫生物與血量
        entities.concat(p).forEach(e => {
            let color = (e === p) ? '#e67e22' : (e.type === 'ally' ? '#3498db' : (e.type === 'pig' ? '#ff9999' : '#f1c40f'));
            ctx.fillStyle = color;
            ctx.fillRect(e.x - camX, e.y - camY, e.w, e.h);
            
            // 畫血量條
            ctx.fillStyle = 'red'; ctx.fillRect(e.x - camX, e.y - camY - 10, e.w, 5);
            ctx.fillStyle = 'lime'; ctx.fillRect(e.x - camX, e.y - camY - 10, e.w * (e.hp / e.maxHp || 1), 5);
        });

        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
