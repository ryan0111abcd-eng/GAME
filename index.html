<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPER HUMAN - 萬能終極版</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; user-select: none; }
        
        /* 全螢幕 UI 層 */
        .overlay { position: fixed; inset: 0; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #111; color: #f1c40f; text-align: center; padding: 20px; }
        
        /* 通用按鈕樣式 */
        .btn { padding: 15px 40px; font-size: 24px; cursor: pointer; margin: 10px; background: #f1c40f; border: 4px solid #fff; border-radius: 10px; font-weight: bold; color: #000; box-shadow: 0 5px 0 #b8860b; transition: all 0.1s; }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #b8860b; }
        .btn:disabled { background: #95a5a6; border-color: #7f8c8d; box-shadow: none; cursor: not-allowed; }

        /* 輸入框樣式 */
        .input-code { padding: 15px; font-size: 24px; border: 4px solid #f1c40f; border-radius: 10px; background: #000; color: #f1c40f; text-align: center; margin-bottom: 20px; outline: none; }

        /* 滑塊樣式 */
        .slider-container { margin: 20px 0; color: white; }
        input[type=range] { width: 300px; height: 15px; cursor: pointer; }

        /* 規則介紹樣式 */
        .rules-box { background: #2c3e50; padding: 20px; border-radius: 10px; border: 2px solid #f1c40f; max-width: 500px; text-align: left; color: white; margin-bottom: 20px; line-height: 1.6; }
        .rules-box h2 { color: #f1c40f; text-align: center; margin-top: 0; }
        .rules-box b { color: #3498db; }

        /* 遊戲介面 */
        #hud { position: fixed; top: 10px; left: 10px; z-index: 1000; background: rgba(0,0,0,0.8); color: white; padding: 10px; border: 2px solid #f1c40f; border-radius: 8px; display: none; pointer-events: none; }
        #radar { position: fixed; top: 10px; right: 10px; width: 120px; height: 120px; border: 2px solid #fff; border-radius: 50%; z-index: 1000; display: none; background: rgba(0,0,0,0.5); overflow: hidden; }
        canvas#gCanvas { display: none; position: absolute; top: 0; left: 0; z-index: 10; }
        #rain-fx { position: fixed; inset: 0; pointer-events: none; z-index: 50; background: rgba(40,40,80,0.2); display: none; }
    </style>
</head>
<body>

    <div id="step-code" class="overlay">
        <h1 style="font-size: 40px;">SUPER HUMAN 啟動程式</h1>
        <p>請輸入 11 位數啟動碼以繼續</p>
        <input type="text" id="code-input" class="input-code" maxlength="11" placeholder="填寫啟動碼">
        <button class="btn" onclick="checkCode()">認證啟動碼</button>
        <p id="code-error" style="color: #e74c3c; display: none;">❌ 啟動碼錯誤，請重新輸入</p>
    </div>

    <div id="step-mode" class="overlay" style="display:none;">
        <h1>認證成功！</h1>
        <p>請選擇遊戲模式</p>
        <button class="btn" onclick="selectMode('single')">👤 單人模式</button>
        <button class="btn" onclick="selectMode('multi')" style="background:#3498db; color:white;">👥 多人模式</button>
    </div>

    <div id="step-players" class="overlay" style="display:none;">
        <h1>多人模式設定</h1>
        <div class="slider-container">
            <label>小隊人數 (包含自己): <b id="p-val" style="color:#f1c40f; font-size:24px;">5</b> 人</label><br>
            <input type="range" min="2" max="15" value="5" oninput="document.getElementById('p-val').innerText=this.value" id="p-slider">
        </div>
        <button class="btn" onclick="confirmPlayers()">確認人數</button>
    </div>

    <div id="step-rules" class="overlay"
