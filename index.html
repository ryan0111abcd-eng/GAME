<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Super Human - 完整生存指南版</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; color: white; }
        .layer { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1a1a1a; z-index: 9999; text-align: center; }
        .title-text { color: #f1c40f; font-size: 50px; margin-bottom: 20px; text-shadow: 3px 3px 0 #000; }
        .btn { padding: 15px 50px; font-size: 24px; cursor: pointer; margin: 10px; background: #f1c40f; border: none; font-weight: bold; border-radius: 12px; color: black; box-shadow: 0 6px 0 #b8860b; transition: 0.2s; }
        .btn:hover { background: #fff; transform: scale(1.05); }

        /* 說明書樣式 */
        #ui-guide { background: rgba(30, 30, 30, 0.95); border: 4px solid #f1c40f; padding: 30px; border-radius: 20px; max-width: 500px; text-align: left; }
        .guide-key { color: #f1c40f; font-weight: bold; }

        /* ESC 選單 */
        #esc-menu { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }

        /* 遊戲 UI */
        #hud { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 15px; border: 2px solid #f1c40f; display: none; z-index: 5000; border-radius: 10px; }
        #minimap-wrapper { position: fixed; top: 20px; right: 20px; width: 150px; height: 150px; border-radius: 50%; border: 3px solid #fff; background: rgba(0,0,0,0.6); overflow: hidden; display: none; z-index: 5000; }
        #inv { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; gap: 8px; z-index: 5000; }
        .slot { width: 45px; height: 45px; border: 2px solid #777; background: #333; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .slot.active { border-color: #f1c40f; background: #555; }
        
        canvas#gameCanvas { display: none; position: absolute; top: 0; left: 0; z-index: 10; }
    </style>
</head>
<body>

    <div id="ui-mode" class="layer">
        <h1 class="title-text">SUPER HUMAN</h1>
        <button class="btn" onclick="selectMode('single')">單人模式 (獨自生存)</button>
        <button class="btn" onclick="selectMode('multi')" style="background:#3498db; color:white;">多人連線 (隊友協助)</button>
    </div>

    <div id="ui-count" class="layer" style="display:none;">
        <h1 class="title-text">設置小隊人數</h1>
        <input type="range" id="p-range" min="2" max="10" value="5" oninput="document.getElementById('pv').innerText=this.value" style="width:300px;">
        <div style="font-size:32px; margin: 20px;">總人數：<span id="pv" style="color:#f1c40f;">5</span></div>
        <button class="btn" onclick="showGuide()">下一步</button>
    </div>

    <div id="ui-guide" class="layer" style="display:none;">
        <div style="background:#222; padding:30px; border-radius:15px; border:2px solid #f1c40f;">
            <h2 style="color:#f1c40f; text-align:center; margin-top:0;">📜 生存指南</h2>
            <ul style="list-style:none; padding:0; line-height:1.8;">
                <li><span class="guide-key">[W, A, S, D]</span> 控制移動與跳躍</li>
                <li><span class="guide-key">[滑鼠左鍵]</span> 挖掘方塊 (水不可挖)</li>
                <li><span class="guide-key">[滑鼠右鍵]</span> 放置方塊</li>
                <li><span class="guide-key">[1, 2, 3, 4]</span> 切換建築材料</li>
                <li><span class="guide-key">[K]</span> 揮拳攻擊 (驅趕怪物/隊友)</li>
                <li><span class="guide-key">[ESC]</span> 暫停遊戲或退出</li>
                <li style="margin-top:10px; color:#e74c3c;">⚠️ 晚上 19:00 後會有怪物出沒！</li>
            </ul>
            <button class="btn" onclick="startGame()" style="width:100%;">進入世界</button>
        </div>
    </div>

    <div id="esc-menu">
        <h1 class="title-text">暫停中</h1>
        <button class="btn" onclick="location.reload()">離開遊戲</button>
        <button class="btn" onclick="togglePause()" style="background:#888; color:white;">回到遊戲</button>
    </div>

    <div id="hud">
        📍 <span id="posX">0</span>, <span id="posY">0</span> | ❤️ <span id="hp">100</span><br>
        🕒 <span id="time-text">07:00</span> <span id="day-night">☀️</span>
    </div>
    <div id="minimap-wrapper"><canvas id="miniCanvas" width="150" height="150"></canvas></div>
    <div id="inv">
        <div class="slot active" id="sl1">1:土</div>
