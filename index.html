<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Future Super Human - 終極生存版</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; }
        
        /* 全螢幕 UI 層 */
        .layer { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(20, 20, 20, 0.95); color: #f1c40f; text-align: center; }
        .btn { padding: 15px 40px; font-size: 24px; cursor: pointer; margin: 10px; background: #f1c40f; border: none; border-radius: 10px; font-weight: bold; box-shadow: 0 5px 0 #b8860b; color: #000; }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #b8860b; }
        
        /* HUD 資訊 */
        #hud { position: fixed; top: 20px; left: 20px; z-index: 100; color: white; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; border: 2px solid #f1c40f; display: none; }
        #minimap-container { position: fixed; top: 20px; right: 20px; width: 160px; height: 160px; border: 3px solid #fff; border-radius: 50%; overflow: hidden; z-index: 100; display: none; background: rgba(0,0,0,0.5); box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        
        /* 說明書樣式 */
        #instruction-box { background: #34495e; padding: 30px; border-radius: 15px; max-width: 500px; color: white; line-height: 1.6; border: 2px solid #f1c40f; }
        
        canvas#gameCanvas { display: none; position: absolute; top: 0; left: 0; z-index: 10; }
    </style>
</head>
<body>

    <div id="ui-mode" class="layer">
        <h1 style="font-size: 50px;">未來的 SUPER HUMAN</h1>
        <button class="btn" onclick="goPlayerSelect(1)">👤 單人連線</button>
        <button class="btn" onclick="goPlayerSelect(5)" style="background:#3498db; color:white; box-shadow: 0 5px 0 #2980b9;">👥 多人連線</button>
    </div>

    <div id="ui-players" class="layer" style="display:none;">
        <h1>選擇小隊人數</h1>
        <h2 style="color:white;">總共: <span id="p-val" style="color:#f1c40f;">5</span> 人</h2>
        <input type="range" min="2" max="10" value="5" oninput="document.getElementById('p-val').innerText=this.value" id="p-slider" style="width:300px; height:20px; cursor:pointer;">
        <br>
        <button class="btn" onclick="goInstruction()">確定並查看說明</button>
    </div>

    <div id="ui-info" class="layer" style="display:none;">
        <div id="instruction-box">
            <h2 style="color:#f1c40f; margin-top:0;">📜 任務說明單</h2>
            <div style="text-align: left;">
                <p>● <b>WASD</b>：移動角色</p>
                <p>● <b>空白鍵</b>：跳躍</p>
                <p>● <b>滑鼠左鍵</b>：挖掘方塊 / <b>右鍵</b>：放置方塊</p>
                <p>● <b>[K] 鍵</b>：手動攻擊（隊友會自動攻擊）</p>
                <p>● <b>[ESC]</b>：暫停選單 / 離開遊戲</p>
                <p>● <b>小地圖</b>：白(你) 藍(隊友) 紅(敵人)</p>
            </div>
            <button class="btn" onclick="startGame()" style="width:100%; margin-top:20px;">進入遊戲世界</button>
        </div>
    </div>

    <div id="ui-esc" class="layer" style="display:none; background: rgba(0,0,0,0.85);">
        <h1 style="font-size: 60px;">暫停中</h1>
        <button class="btn" onclick="location.reload()">🚪 離開遊戲 (重新開始)</button>
        <button class="btn" onclick="toggleEscMenu()" style="background:#7f8c8d; color:white; box-shadow: 0 5px 0 #5f6a6a;">↩️ 返回遊戲</button>
    </div>

    <div id="hud">
        ❤️ 血量: <span id="hp-ui">100</span><br>
        📍 座標: <span id="pos-ui">0,0</span><br>
        ⏰ 時間: <span id="time-ui">12:00</span>
    </div>

    <div id="minimap-container">
        <canvas id="minimapCanvas" width="160" height="160"></canvas>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const cvs = document.getElementById('gameCanvas'), ctx = cvs.getContext('2d');
    const mcvs = document.getElementById('minimapCanvas'), mctx = mcvs.getContext('2d');
    
    let isLive = false, isEsc = false, world = {}, keys = {}, entities = [];
    let p = { x: 0, y: -200, w: 22, h: 42, vx: 0, vy: 0, ground: false, hp: 100, maxHp: 100 };
    let totalPlayers = 1, gameTicks = 720; // 720 是中午
    const TILE = 32;

    // --- 地形生成 ---
    function getH(gx) { return Math.floor(30 + Math.sin(gx * 0.1) * 6 + Math.cos(gx * 0.4) * 2); }
    function getB(gx, gy) {
        if (world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
        let h = getH(gx);
        return gy < h ? 0 : (gy === h ? 2 : 1);
    }

    // --- 碰撞檢測 ---
    function checkColl(x, y, w, h) {
        for (let i = Math.floor(x/TILE); i <= Math.floor((x+w)/TILE); i++) {
            for (let j = Math.floor(y/TILE); j <= Math.floor((y+h)/TILE); j++) {
                if (getB(i, j) > 0) return true;
            }
        }
        return false;
    }

    // --- UI 切換邏輯 ---
    function goPlayerSelect(n) {
        totalPlayers = n;
        document.getElementById('ui-mode').style.display = 'none';
        if (n === 1) goInstruction();
        else document.getElementById('ui-players').style.display = 'flex';
    }
    function goInstruction() {
        if (totalPlayers > 1) totalPlayers = document.getElementById('p-slider').value;
        document.getElementById('ui-players').style.display = 'none';
        document.getElementById('ui-info').style.display = 'flex';
    }
    function startGame() {
        document.getElementById('ui-info').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
        document.getElementById('minimap-container').style.display = 'block';
        cvs.style.display = 'block';
        cvs.width = window.innerWidth; cvs.height = window.innerHeight;
        
        // 生成隊友
        for(let i=0; i<totalPlayers-1; i++) {
            entities.push({ type: 'ally', x: (Math.random()-0.5)*400, y: -300, w:22, h:42, vx:0, vy:0, hp:100, maxHp:100, aiTimer:0 });
        }
        isLive = true; loop();
    }
    function toggleEscMenu() {
        if (!isLive) return;
        isEsc = !isEsc;
        document.getElementById('ui-esc').style.display = isEsc ? 'flex' : 'none';
    }

    // --- 控制與戰鬥 ---
    window.onkeydown = e => { if (e.code === 'Escape') toggleEscMenu(); keys[e.code] = true; if (e.code === 'KeyK') attack(p); };
    window.onkeyup = e => keys[e.code] = false;
    window.onmousedown = e => {
        if (!isLive || isEsc) return;
        let gx = Math.floor((e.clientX + (p.x - cvs.width/2))/TILE);
        let gy = Math.floor((e.clientY + (p.y - cvs.height/2))/TILE);
        world[gx+'_'+gy] = (e.button === 0) ? 0 : 3;
    };
    window.oncontextmenu = e => e.preventDefault();

    function attack(owner) {
        entities.concat(p).forEach(e => {
            if (e !== owner && Math.abs(e.x - owner.x) < 70 && Math.abs(e.y - owner.y) < 70) {
                e.hp -= 15; e.vx = (e.x > owner.x ? 12 : -12);
            }
        });
    }

    // --- 核心循環 ---
    function loop() {
        if (!isLive || isEsc) { requestAnimationFrame(loop); return; }

        // 時間與環境
        gameTicks = (gameTicks + 0.5) % 1440;
        let isNight = gameTicks > 1000 || gameTicks < 300;

        // 玩家物理
        p.vy += 0.8; p.y += p.vy;
        if (checkColl(p.x, p.y, p.w, p.h)) {
            if (p.vy > 0) { while(checkColl(p.x, p.y, p.w, p.h)) p.y -= 1; p.ground = true; }
            else { while(checkColl(p.x, p.y, p.w, p.h)) p.y += 1; }
            p.vy = 0;
        } else p.ground = false;

        let move = (keys['KeyD']?5:0) - (keys['KeyA']?5:0);
        if (move !== 0) { p.x += move; if (checkColl(p.x, p.y, p.w, p.h)) p.x -= move; }
        if ((keys['Space'] || keys['KeyW']) && p.ground) p.vy = -14;

        // 晚上生成怪物
        if (isNight && Math.random() < 0.01) {
            entities.push({ type: 'mob', x: p.x + (Math.random()>0.5?600:-600), y:-400, w:22, h:42, vx:0, vy:0, hp:60, maxHp:60 });
        }

        // 實體 AI (隊友與怪物)
        entities = entities.filter(e => e.hp > 0);
        entities.forEach(e => {
            e.vy += 0.8; e.y += e.vy;
            if (checkColl(e.x, e.y, e.w, e.h)) { if (e.vy > 0) while(checkColl(e.x, e.y, e.w, e.h)) e.y -= 1; e.vy = 0; }
            
            if (e.type === 'ally') {
                // 隊友分散跟隨
                let dist = p.x - e.x;
                if (Math.abs(dist) > 100) e.x += Math.sign(dist) * 3;
                if (Math.random() < 0.005) attack(e); // 自動攻擊
                if (Math.random() < 0.002) world[Math.floor(e.x/TILE)+'_'+Math.floor(e.y/TILE+2)] = 0; // 自動挖地
            } else {
                e.x += (p.x > e.x ? 2.5 : -2.5); // 怪物追人
                if (Math.abs(e.x-p.x)<40 && Math.abs(e.y-p.y)<40) p.hp -= 0.1;
            }
        });

        // HUD 更新
        document.getElementById('hp-ui').innerText = Math.ceil(p.hp);
        document.getElementById('pos-ui').innerText = Math.floor(p.x/TILE) + "," + Math.floor(p.y/TILE);
        let h = Math.floor(gameTicks/60).toString().padStart(2,'0'), m = Math.floor(gameTicks%60).toString().padStart(2,'0');
        document.getElementById('time-ui').innerText = `${h}:${m}`;

        render();
        requestAnimationFrame(loop);
    }

    function render() {
        // 背景隨時間變化
        ctx.fillStyle = (gameTicks > 1000 || gameTicks < 300) ? '#0a0a1a' : '#87ceeb';
        ctx.fillRect(0,0,cvs.width,cvs.height);
        
        let cx = p.x - cvs.width/2, cy = p.y - cvs.height/2;

        // 畫方塊
        for(let x=Math.floor(cx/TILE); x<=Math.ceil((cx+cvs.width)/TILE); x++){
            for(let y=Math.floor(cy/TILE); y<=Math.ceil((cy+cvs.height)/TILE); y++){
                let b = getB(x, y);
                if(b>0) {
                    ctx.fillStyle = (b===2?'#2ecc71':(b===1?'#795548':'#95a5a6'));
                    ctx.fillRect(x*TILE-cx, y*TILE-cy, TILE+0.5, TILE+0.5);
                }
            }
        }

        // 畫人物
        entities.concat(p).forEach(e => {
            ctx.fillStyle = (e===p?'#e67e22':(e.type==='ally'?'#3498db':'#e74c3c'));
            ctx.fillRect(e.x-cx, e.y-cy, e.w, e.h);
            // 血量
            ctx.fillStyle='red'; ctx.fillRect(e.x-cx, e.y-cy-10, e.w, 5);
            ctx.fillStyle='lime'; ctx.fillRect(e.x-cx, e.y-cy-10, e.w*(e.hp/e.maxHp), 5);
        });

        // 圓形小地圖雷達
        mctx.fillStyle = '#111'; mctx.fillRect(0,0,160,160);
        mctx.strokeStyle = '#555'; mctx.strokeRect(0,0,160,160);
        mctx.save(); mctx.translate(80, 80);
        entities.concat(p).forEach(e => {
            mctx.fillStyle = (e===p?'#fff':(e.type==='ally'?'#3498db':'#e74c3c'));
            let dx = (e.x - p.x) * 0.15;
            let dy = (e.y - p.y) * 0.15;
            if(dx*dx + dy*dy < 75*75) {
                mctx.beginPath(); mctx.arc(dx, dy, 3.5, 0, Math.PI*2); mctx.fill();
            }
        });
        mctx.restore();
    }
</script>
</body>
</html>
