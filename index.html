<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Super Human - Keyboard Boot</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #f1c40f; overflow: hidden; font-family: sans-serif; }
        #boot-msg {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center; z-index: 10000;
        }
        .blink { animation: blinker 1.5s linear infinite; font-size: 32px; color: white; }
        @keyframes blinker { 50% { opacity: 0; } }
        
        #hud { position: fixed; top: 10px; left: 10px; color: #fff; background: rgba(0,0,0,0.7); padding: 10px; display: none; z-index: 1000; }
        #inv { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; gap: 8px; z-index: 1000; }
        .slot { width: 50px; height: 50px; background: #333; border: 2px solid #777; display: flex; align-items: center; justify-content: center; font-size: 10px; }
        .slot.active { border-color: #f1c40f; transform: scale(1.1); }
        canvas { display: none; }
    </style>
</head>
<body>

    <div id="boot-msg">
        <h1 style="font-size: 50px;">SUPER HUMAN</h1>
        <p class="blink">請按下鍵盤上的 【Enter】 開始遊戲</p>
        <p style="color: #666; margin-top: 20px;">(或是點擊畫面任何地方嘗試啟動)</p>
    </div>

    <div id="hud">❤️ <span id="hp">100</span> | ⚔️ K 攻擊 | ⛏️ 左挖 / 右蓋</div>

    <div id="inv">
        <div class="slot active" id="s1">1:土</div>
        <div class="slot" id="s2">2:草</div>
        <div class="slot" id="s3">3:石</div>
        <div class="slot" id="s4">4:木</div>
    </div>

    <canvas id="gCanvas"></canvas>

<script>
let cvs, ctx, isRunning = false;
let world = {}, camX = 0, camY = 0, curB = 1;
let p = { x: 500, y: 0, w: 22, h: 42, vx: 0, vy: 0, hp: 100, ground: false, atk: 0 };
let agents = [], keys = {};
const TILE = 32, COLORS = { 1: '#8B4513', 2: '#228B22', 3: '#666', 4: '#cd853f' };

// === 啟動邏輯：偵測 Enter 鍵 ===
window.addEventListener('keydown', (e) => {
    if(!isRunning && e.code === 'Enter') {
        boot();
    }
    if(isRunning) {
        keys[e.code] = true;
        if(e.code === 'KeyK') p.atk = 10;
        if(['Digit1','Digit2','Digit3','Digit4'].includes(e.code)) {
            curB = parseInt(e.key);
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
            document.getElementById('s'+curB).classList.add('active');
        }
    }
});

// 也保留點擊啟動作為備案
window.addEventListener('mousedown', () => { if(!isRunning) boot(); });

function boot() {
    isRunning = true;
    document.getElementById('boot-msg').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    document.getElementById('inv').style.display = 'flex';
    
    cvs = document.getElementById('gCanvas');
    cvs.style.display = 'block';
    cvs.width = window.innerWidth;
    cvs.height = window.innerHeight;
    ctx = cvs.getContext('2d');

    p.y = getGY(p.x/TILE)*TILE - 150;
    for(let i=0; i<4; i++) agents.push({x:600+i*150, y:-100, w:22, h:42, vx:0, vy:0, hp:100, dir:1, sTimer:30});

    cvs.addEventListener('mousedown', (e) => {
        let gx = Math.floor((e.clientX + camX)/TILE), gy = Math.floor((e.clientY + camY)/TILE);
        if(e.button === 0) world[gx+'_'+gy] = 0; // 左挖
        if(e.button === 2) { if(getB(gx, gy)===0) world[gx+'_'+gy] = curB; } // 右蓋
    });
    window.oncontextmenu = (e) => e.preventDefault();
    window.onkeyup = e => keys[e.code] = false;
    requestAnimationFrame(loop);
}

function getGY(gx) { return Math.floor(35 + Math.sin(gx*0.05)*12 + Math.cos(gx*0.02)*15); }
function getB(gx, gy) {
    if(world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
    let fY = getGY(gx); return gy < fY ? 0 : (gy === fY ? 2 : 1);
}

function phys(o, isP) {
    if(isP) {
        o.vx = (keys['KeyA'] ? -5 : keys['KeyD'] ? 5 : 0);
        if((keys['Space'] || keys['KeyW']) && o.ground) o.vy = -12;
        if(o.atk > 0) o.atk--;
    } else {
        o.sTimer--;
        if(o.sTimer <= 0) { o.dir = Math.random()>0.5?1:-1; o.sTimer = 60+Math.random()*100; }
        o.vx = o.dir * 2;
        let ahX = Math.floor((o.x + o.vx*5)/TILE), fY = Math.floor((o.y+o.h-5)/TILE);
        if(getB(ahX, fY)>0 && o.ground) o.vy = -11;
    }
    o.vy += 0.7; o.y += o.vy; o.ground = false;
    let fy = Math.floor((o.y+o.h)/TILE), lx = Math.floor((o.x+2)/TILE), rx = Math.floor((o.x+o.w-2)/TILE);
    if(getB(lx, fy)>0 || getB(rx, fy)>0) { o.y = fy*TILE-o.h; o.vy = 0; o.ground = true; }
    o.x += o.vx;
}

function loop() {
    ctx.fillStyle = '#87ceeb'; ctx.fillRect(0, 0, cvs.width, cvs.height);
    phys(p, true);
    camX += (p.x - cvs.width/2 - camX) * 0.1; camY += (p.y - cvs.height/2 - camY) * 0.1;
    let cx = Math.floor(camX), cy = Math.floor(camY);

    for(let x=Math.floor(cx/TILE); x<Math.floor((cx+cvs.width)/TILE)+1; x++) {
        for(let y=Math.floor(cy/TILE); y<Math.floor((cy+cvs.height)/TILE)+1; y++) {
            let b = getB(x, y);
            if(b!==0) { ctx.fillStyle = COLORS[b]; ctx.fillRect(x*TILE-cx, y*TILE-cy, TILE, TILE); }
        }
    }
    agents.forEach((a, i) => {
        phys(a, false);
        ctx.fillStyle = "#fff"; ctx.fillRect(a.x-cx, a.y-cy, a.w, a.h);
        if(p.atk > 0 && Math.abs(a.x-p.x)<50 && Math.abs(a.y-p.y)<50) {
            a.hp -= 5; a.x += (a.x>p.x?20:-20); if(a.hp <= 0) agents.splice(i, 1);
        }
    });
    ctx.fillStyle = "#FF5733"; ctx.fillRect(p.x-cx, p.y-cy, p.w, p.h);
    if(p.atk > 0) { ctx.strokeStyle = "#fff"; ctx.lineWidth = 3; ctx.strokeRect(p.x-cx-10, p.y-cy-10, p.w+20, p.h+20); }
    requestAnimationFrame(loop);
}
</script>
</body>
</html>
