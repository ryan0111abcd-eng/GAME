<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>遊戲主廳</title>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: white; margin: 0; text-align: center; }
        nav { background: #16213e; padding: 15px; display: flex; justify-content: space-between; border-bottom: 2px solid #4ecca3; }
        #game-screen { width: 800px; height: 400px; background: #000; margin: 20px auto; border: 5px solid #333; border-radius: 15px; overflow: hidden; }
        .vip-glow { border-color: gold !important; box-shadow: 0 0 25px gold; }
        .badge { background: gold; color: black; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <div id="p-info">載入中...</div>
    <div id="v-info">穩定版 v1.0.0</div>
</nav>

<div id="game-screen">
    <canvas id="stage"></canvas>
</div>

<p id="shop-text">方塊售價：$100</p>

<script>
    const user = localStorage.getItem('game_user');
    const isVip = localStorage.getItem('isVip') === 'true';

    if (!user) window.location.href = 'auth.html';

    document.getElementById('p-info').innerHTML = `玩家：${user} ${isVip ? '<span class="badge">PRO</span>' : ''}`;
    
    if (isVip) {
        document.getElementById('v-info').innerText = "最新版 v1.1.0-Beta";
        document.getElementById('game-screen').classList.add('vip-glow');
        document.getElementById('shop-text').innerHTML = "方塊售價：$100 -> <b style='color:gold'>會員價 $75 (75折)</b>";
    }

    // 遊戲物理引擎
    const canvas = document.getElementById('stage');
    const ctx = canvas.getContext('2d');
    canvas.width = 800; canvas.height = 400;
    let p = { x: 100, y: 300, dy: 0, onG: false };
    let k = {};

    window.onkeydown = e => k[e.code] = true;
    window.onkeyup = e => k[e.code] = false;

    function run() {
        if(k['KeyA']) p.x -= 5;
        if(k['KeyD']) p.x += 5;
        if(k['Space'] && p.onG) { p.dy = -12; p.onG = false; }
        
        p.dy += 0.6; p.y += p.dy;
        if(p.y > 330) { p.y = 330; p.dy = 0; p.onG = true; } // 防卡地面

        ctx.fillStyle = "#1a1a2e"; ctx.fillRect(0,0,800,400);
        ctx.fillStyle = "#333"; ctx.fillRect(0,360,800,40); // 地板
        
        if (isVip) { ctx.shadowBlur = 15; ctx.shadowColor = "gold"; }
        ctx.fillStyle = isVip ? "gold" : "#4ecca3";
        ctx.fillRect(p.x, p.y, 30, 30);
        
        requestAnimationFrame(run);
    }
    run();
</script>
</body>
</html>
