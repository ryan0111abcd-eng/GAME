<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Future Super Human - 2D Infinite World</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: "Microsoft JhengHei", sans-serif; overflow: hidden; }
        
        /* 初始選單：完全獨立，不重疊 */
        #main-ui {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 99999; /* 極高層級 */
        }

        .game-title { color: #f1c40f; font-size: 60px; margin-bottom: 40px; text-shadow: 4px 4px 0 #000; }
        
        .btn {
            padding: 25px 80px; font-size: 32px; cursor: pointer; margin: 20px;
            background: #f1c40f; border: 6px solid #fff; border-radius: 20px;
            color: black; font-weight: bold; box-shadow: 0 10px 0 #b8860b;
            transition: 0.1s;
        }
        .btn:hover { background: #fff; transform: scale(1.05); }
        .btn:active { transform: translateY(5px); box-shadow: 0 5px 0 #b8860b; }

        /* 人數拉桿樣式 */
        #multi-setup { display: none; text-align: center; color: white; }
        input[type=range] { width: 300px; height: 20px; cursor: pointer; }

        /* 遊戲介面 (初始全部隱藏) */
        #game-interface { display: none; }
        #hud { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 15px; border: 2px solid #f1c40f; color: white; border-radius: 10px; z-index: 1000; }
        #minimap-box { position: fixed; top: 20px; right: 20px; width: 150px; height: 150px; border-radius: 50%; border: 3px solid #fff; background: rgba(0,0,0,0.6); overflow: hidden; z-index: 1000; }
        #esc-menu { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100000; color: white; }
        
        canvas#gameCanvas { position: absolute; top: 0; left: 0; z-index: 10; }
    </style>
</head>
<body>

    <div id="main-ui">
        <h1 class="game-title">未來的 SUPER HUMAN</h1>
        
        <div id="start-options">
            <button class="btn" onclick="startGame(1)">開始遊戲</button><br>
            <button class="btn" onclick="openMulti()" style="background:#3498db; color:white;">多人連線模式</button>
        </div>

        <div id="multi-setup">
            <h1 style="font-size:40px;">選擇隊員人數</h1>
            <input type="range" id="p-count" min="2" max="10" value="5" oninput="document.getElementById('pv').innerText=this.value">
            <div style="font-size:40px; margin:20px;"><span id="pv" style="color:#f1c40f;">5</span> 人</div>
            <button class="btn" onclick="startGame(document.getElementById('p-count').value)">開始小隊遊戲</button>
        </div>
    </div>

    <div id="esc-menu">
        <h1 style="font-size:50px; color:#f1c40f;">遊戲暫停</h1>
        <button class="btn" onclick="location.reload()">離開遊戲 (重新開始)</button>
        <button class="btn" onclick="togglePause()" style="background:#888; color:white;">回到遊戲</button>
    </div>

    <div id="game-interface">
        <div id="hud">
            📍 <span id="posX">0</span>, <span id="posY">0</span> | ❤️ <span id="hp">100</span><br>
            🕒 <span id="time-text">07:00</span> <span id="day-icon">☀️
