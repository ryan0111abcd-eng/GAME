<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Future Super Human - Final Edition</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; }
        .overlay { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(15, 15, 15, 0.95); color: #f1c40f; text-align: center; }
        .btn { padding: 15px 40px; font-size: 24px; cursor: pointer; margin: 10px; background: #f1c40f; border: none; border-radius: 10px; font-weight: bold; box-shadow: 0 5px 0 #b8860b; color: #000; }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #b8860b; }
        
        /* HUD & UI */
        #hud { position: fixed; top: 20px; left: 20px; z-index: 100; color: white; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; border: 2px solid #f1c40f; display: none; }
        #minimap-box { position: fixed; top: 20px; right: 20px; width: 150px; height: 150px; border: 3px solid #fff; border-radius: 50%; overflow: hidden; z-index: 100; display: none; background: rgba(0,0,0,0.5); }
        #instruction { background: #2c3e50; padding: 25px; border-radius: 15px; border: 2px solid #f1c40f; max-width: 400px; text-align: left; color: white; }
        
        canvas#gameCanvas { display: none; position: absolute; top: 0; left: 0; z-index: 10; }
    </style>
</head>
<body>

    <div id="ui-mode" class="overlay">
        <h1>SUPER HUMAN 終極版</h1>
        <button class="btn" onclick="setMode(1)">👤 單人連線</button>
        <button class="btn" onclick="setMode(2)" style="background:#3498db; color:white;">👥 多人連線</button>
    </div>

    <div id="ui-players" class="overlay" style="display:none;">
        <h1>選擇小隊人數</h1>
        <h2 id="p-label">5 人</h2>
        <input type="range" min="2" max="10" value="5" oninput="document.getElementById('p-label').innerText=this.value+' 人'" id="p-slider" style="width:300px;">
        <button class="btn" onclick="showIntro()">下一步</button>
    </div>

    <div id="ui-intro" class="overlay" style="display:none;">
        <div id="instruction">
            <h2 style="color:#f1c40f; text-align:center;">📜 任務說明單</h2>
            <p>● <b>移動</b>: WASD | <b>跳躍</b>: 空白鍵</p>
            <p>● <b>挖礦/放置</b>: 滑鼠左鍵 / 右鍵</p>
            <p>● <b style="color:#ff4757;">[K] 攻擊</b>: 對怪物造成傷害</p>
            <p>● <b style="color:#2ed573;">[Q] 回血</b>: 快速恢復生命值</p>
            <p>● <b>[ESC]</b>: 開啟選單 (可離開遊戲)</p>
            <button class="btn" onclick="startGame()" style="width:100%; margin-top:10px;">進入世界</button>
        </div>
    </div>

    <div id="ui-esc" class="overlay" style="display:none; background: rgba(0,0,0,0.85);">
        <h1>暫停中</h1>
        <button class="btn" onclick="location.reload()">🚪 離開遊戲 (重新開始)</button>
        <button class="btn" onclick="toggleESC()" style="background:#7f8c8d; color:white;">↩️ 返回遊戲</button>
    </div>

    <div id="hud">
        ❤️ HP: <span id="hp-ui">100</span><br>
        📍 座標: <span id="pos-ui">0,0</span><br>
        ⏰ 時間: <span id="time-ui">12:00</span>
    </div>

    <div id="minimap-box"><canvas id="mCvs" width="150" height="150"></canvas></div>
    <canvas id="gameCanvas"></canvas>
