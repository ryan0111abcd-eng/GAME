<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPER HUMAN 2026 - MODE SELECT</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; user-select: none; }
        .ui-screen { position: fixed; inset: 0; z-index: 999999; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a0a0a; color: #f1c40f; text-align: center; }
        .btn { padding: 22px 55px; font-size: 30px; cursor: pointer; margin: 12px; background: #f1c40f; border: 4px solid #fff; border-radius: 18px; font-weight: bold; color: #000; box-shadow: 0 8px 0 #b8860b; transition: 0.1s; }
        .btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #b8860b; }
        .in-box { padding: 18px; font-size: 28px; border: 4px solid #f1c40f; border-radius: 12px; background: #000; color: #f1c40f; text-align: center; margin-bottom: 25px; width: 400px; outline: none; }
        #hud { position: fixed; top: 15px; left: 15px; z-index: 1000; color: white; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; border: 2px solid #f1c40f; display: none; pointer-events: none; line-height: 1.6; }
        canvas#gCvs { display: none; position: absolute; top: 0; left: 0; z-index: 10; }
    </style>
</head>
<body>

    <div id="screen-auth" class="ui-screen">
        <h1 style="font-size: 45px; margin-bottom: 10px;">SUPER HUMAN 系統</h1>
        <p style="font-size: 20px; color: #fff;">請輸入啟動碼</p>
        <input type="text" id="pw-field" class="in-box" placeholder="Security Key">
        <button class="btn" onclick="checkAuth()">認證啟動</button>
        <p id="err-msg" style="color:red; display:none;">密鑰錯誤，請重新輸入</p>
    </div>

    <div id="screen-mode" class="ui-screen" style="display:none;">
        <h1>認證成功</h1>
        <p>請選擇遊戲模式</p>
        <button class="btn" onclick="selectMode('single')">👤 單人冒險</button>
        <button class="btn" onclick="selectMode('multi')" style="background:#3498db; color:white;">👥 多人模式</button>
    </div>

    <div id="screen-setup" class="ui-screen" style="display:none;">
        <h1>多人小隊設定</h1>
        <h2 id="p-label">小隊人數: 5 人</h2>
        <input type="range" min="2" max="15" value="5" oninput="document.getElementById('p-label').innerText='小隊人數: '+this.value+' 人'" id="p-slider" style="width:350px;">
        <button class="btn" onclick="initializeGame()">進入世界</button>
    </div>

    <div id="hud">❤️ HP: <span id="ui-hp">100</span> | 📍 POS: <span id="ui-pos">0,0</span><br>☀️ 狀態: <span id="ui-sun">日間</span></div>
    <canvas id="gCvs"></canvas>

<script>
    // --- UI 流程控制 ---
    let squadSize = 1;

    function checkAuth() {
        const val = document.getElementById('pw-field').value.trim();
        if(val === 'ryan0111407') {
            document.getElementById('screen-auth').style.display = 'none';
            document.getElementById('screen-mode').style.display = 'flex';
        } else {
            document.getElementById('err-msg').style.display = 'block';
        }
    }

    function selectMode(mode) {
        document.getElementById('screen-mode').style.display = 'none';
        if(mode === 'single') {
            squadSize = 1;
            initializeGame();
        } else {
            document.getElementById('screen-setup').style.display = 'flex';
        }
    }

    // --- 遊戲核心 ---
    let live = false, world = {}, keys = {}, ents = [], ticks = 600;
    let p = { x: 0, y: -800, w: 22, h: 42, vx: 0, vy: 0, hp: 100, gr: false, hitBy: null };
    const TILE = 32;

    function initializeGame() {
        if(document.getElementById('screen-setup').style.display !== 'none') {
            squadSize = document.getElementById('p-slider').value;
        }
        document.getElementById('screen-setup').style.display = 'none';
        document.getElementById('screen-mode').style.display = 'none';
        document.getElementById('hud').style.display = 'block';

        cvs.style.display = 'block';
