<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Super Human - Epic Evolution Final</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; user-select: none; }
        
        /* 選單層 */
        .layer { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(10, 10, 10, 0.95); color: #f1c40f; text-align: center; }
        .btn { padding: 15px 40px; font-size: 24px; cursor: pointer; margin: 10px; background: #f1c40f; border: none; border-radius: 10px; font-weight: bold; box-shadow: 0 5px 0 #b8860b; color: #000; }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #b8860b; }
        
        /* HUD & UI */
        #hud { position: fixed; top: 15px; left: 15px; z-index: 100; color: white; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 8px; border: 2px solid #f1c40f; pointer-events: none; display: none;}
        #minimap-container { position: fixed; top: 15px; right: 15px; width: 150px; height: 150px; border: 3px solid #fff; border-radius: 50%; overflow: hidden; z-index: 100; display: none; background: rgba(0,0,0,0.5); }
        
        #instruction { text-align: left; color: white; background: #34495e; padding: 20px; border-radius: 10px; max-width: 400px; display: none; border: 2px solid #f1c40f; }
        
        canvas { display: none; position: absolute; top: 0; left: 0; z-index: 10; }
    </style>
</head>
<body>

    <div id="ui-mode" class="layer">
        <h1 style="font-size: 45px;">未來的 SUPER HUMAN</h1>
        <button class="btn" onclick="goSetup(1)">單人冒險</button>
        <button class="btn" onclick="goSetup(5)" style="background:#3498db; color:white;">多人連線</button>
    </div>

    <div id="ui-players" class="layer" style="display:none;">
        <h2>選擇小隊總人數: <span id="p-val">5</span></h2>
        <input type="range" min="2" max="10" value="5" oninput="document.getElementById('p-val').innerText=this.value" id="p-slider" style="width:300px;">
        <br><button class="btn" onclick="goInstruction()">下一步</button>
    </div>

    <div id="ui-info" class="layer" style="display:none;">
        <div id="instruction">
            <h2 style="color:#f1c40f; text-align:center;">📜 任務說明單</h2>
            <p>● <b>移動與跳躍：</b> [WASD] 與 [空白鍵]</p>
            <p>● <b>挖掘 / 放置：</b> 滑鼠 [左鍵 / 右鍵]</p>
            <p>● <b>地形：</b> 平原、台地、丘陵、山地、村莊、古蹟。</p>
            <p>● <b>天氣：</b> 機率性下雨，畫面會變模糊。</p>
            <p>● <b>電腦 AI：</b> 隊友會分散、挖掘、放置與戰鬥。如果你受攻擊，他們會主動來幫忙！</p>
            <button class="btn" onclick="actuallyStart()" style="width:100%">進入世界</button>
        </div>
    </div>

    <div id="hud">❤️ HP: <span id="hp">100</span> | 📍 <span id="pos">0,0</span><br>🗺️ <span id="biome">平原</span> | ⛈️ <span id="weather">晴天</span></div>
    <div id="minimap-container"><canvas id="mCvs" width="150" height="150"></canvas></div>
    <canvas id="gameCanvas"></canvas>

<script>
    const cvs = document.getElementById('gameCanvas'), ctx = cvs.getContext('2d');
    const mcvs = document.getElementById('mCvs'), mctx = mcvs.getContext('2d');
    
    let isLive = false, world = {}, keys = {}, entities = [], ticks = 0;
    let p = { x: 0, y: -200, w: 22, h: 42, vx: 0, vy: 0, ground: false, hp: 100, maxHp: 100, lastHitBy: null };
    let squadSize = 1, isRaining = false;
    const TILE = 32;

    // --- UI 邏輯 ---
    function goSetup(n) {
        squadSize = n;
        document.getElementById('ui-mode').style.display = 'none';
        if (n === 1) goInstruction(); else document.getElementById('ui-players').style.display = 'flex';
    }
    function goInstruction() {
        if (squadSize > 1) squadSize = document.getElementById('p-slider').value;
        document.getElementById('ui-players').style.display = 'none';
        document.getElementById('ui-info').style.display = 'flex';
        document.getElementById('instruction').style.display = 'block';
    }
    function actuallyStart() {
        document.getElementById('ui-info').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
        document.getElementById('minimap-container').style.display = 'block';
        cvs.style.display = 'block';
        cvs.width = window.innerWidth; cvs.height = window.innerHeight;
        
        // 生成隊友與生物
        for(let i=0; i<squadSize-1; i++) spawn('ally', (Math.random()-0.5)*800);
        for(let i=0; i<6; i++) spawn('npc', (Math.random()-0.5)*3000); // 村民
        for(let i=0; i<5; i++) spawn('pig', (Math.random()-0.5)*3000); // 動物
        
        isLive = true; loop();
    }
