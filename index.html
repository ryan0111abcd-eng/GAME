<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUPER HUMAN 2026 - SQUAD RESTORED</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; user-select: none; }
        .page { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #050505; color: #f1c40f; }
        .btn { 
            display: flex; align-items: center; justify-content: center; width: 320px; height: 65px; margin: 12px;
            font-size: 20px; font-weight: bold; color: #000; background: #f1c40f; border: 4px solid #fff; border-radius: 15px;
            box-shadow: 0 6px 0 #b8860b; cursor: pointer; transition: 0.1s;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #b8860b; }
        .in-box { width: 300px; padding: 15px; font-size: 24px; border: 4px solid #f1c40f; border-radius: 12px; background: #111; color: #fff; text-align: center; margin-bottom: 25px; outline: none; }
        #esc-menu { position: fixed; inset: 0; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); }
        .menu-card { background: #1a1a1a; padding: 35px; border: 3px solid #f1c40f; border-radius: 25px; display: flex; flex-direction: row; gap: 35px; align-items: center; }
        .info-panel { text-align: left; color: #eee; min-width: 280px; line-height: 2; }
        #hud { position: fixed; top: 15px; left: 15px; z-index: 1000; color: white; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 12px; border: 2px solid #f1c40f; display: none; pointer-events: none; }
        canvas#g { display: block; position: absolute; top: 0; left: 0; z-index: 1; visibility: hidden; }
    </style>
</head>
<body>

    <div id="p-auth" class="page" style="display:none;">
        <h1>SYSTEM ACCESS</h1>
        <input type="password" id="pw" class="in-box" placeholder="Access Key">
        <button class="btn" onclick="checkAuth()">驗證身份</button>
    </div>

    <div id="p-conn" class="page" style="display:none;">
        <h1>CONNECTION</h1>
        <button class="btn" onclick="setConn(1)">👤 單人模式</button>
        <button class="btn" onclick="setConn(0)">👥 多人小隊模式</button>
    </div>

    <div id="p-count" class="page" style="display:none;">
        <h1>SQUAD SIZE</h1>
        <h2 id="cnt-disp" style="font-size: 40px; color:#fff;">5</h2>
        <input type="range" id="member-sld" min="2" max="15" value="5" oninput="document.getElementById('cnt-disp').innerText=this.value" style="width:300px;">
        <button class="btn" onclick="toModeSel()">下一步</button>
    </div>

    <div id="p-mode" class="page" style="display:none;">
        <h1>MISSION MODE</h1>
        <button class="btn" onclick="prepareBrief('ARCH')">🏗️ 荒野建築</button>
        <button class="btn" onclick="prepareBrief('SURV')">🏔️ 高山生存</button>
        <button class="btn" onclick="prepareBrief('ZOMB')">🧟 殭屍圍城</button>
    </div>

    <div id="p-brief" class="page" style="display:none;">
        <h1>DEPLOYMENT BRIEF</h1>
        <div id="brief-text" style="padding:20px; color:#aaa; line-height:1.6;"></div>
        <button class="btn" onclick="startGame()">開始部署</button>
    </div>

    <div id="esc-menu">
        <div class="menu-card">
            <div class="info-panel">
                <h2 style="color:#f1c40f; margin:0;">模擬暫停</h2>
                <b>📍 座標：</b> <span id="st-pos">---</span><br>
                <b>👥 電腦隊友：</b> <span id="st-squad">0</span><br>
                <hr style="border:1px solid #333; margin:15px 0;">
                <button class="btn" onclick="togglePause()" style="width:100%">繼續 (ESC)</button>
                <button class="btn" onclick="location.reload()" style="background:#444; color:#fff; width:100%">回到選單</button>
            </div>
            <canvas id="esc-mm-canvas" width="250" height="250" style="border:2px solid #333; border-radius:15px;"></canvas>
        </div>
    </div>

    <div id="hud">
        🕒 時間: <span id="tm-v">12:00</span> | ❤️ HP: <span id="p-hp-hud">100</span><br>
        🏗️ SLOT: <span id="cur-b" style="color:#f1c40f;">石頭</span> | 📍 海拔: <span id="alt-v">0</span>m
    </div>
    <canvas id="g"></canvas>

<script>
    // --- 禁止右鍵選單的終極手段 ---
    document.addEventListener('contextmenu', e => e.preventDefault());

    var live = false, paused = false, world = {}, keys = {}, ents = [], ticks = 600, sSize = 1;
    var p = { x: 0, y: 0, w: 22, h: 42, vx: 0, vy: 0, hp: 100, gr: false };
    var T = 32, selB = 1, villagerTimer = 0;
    const AUTH_KEY = 'ryan0111407';

    window.onload = function() {
        if(localStorage.getItem('sh_save_v10')) world = JSON.parse(localStorage.getItem('sh_save_v10'));
        if (localStorage.getItem('super_human_auth') === AUTH_KEY) document.getElementById('p-conn').style.display='flex';
        else document.getElementById('p-auth').style.display='flex';
    };

    function checkAuth() {
        if(document.getElementById('pw').value.trim() === AUTH_KEY) {
            localStorage.setItem('super_human_auth', AUTH_KEY);
            document.getElementById('p-auth').style.display='none'; document.getElementById('p-conn').style.display='flex';
        } else alert("Key Error");
    }

    function setConn(n) { document.getElementById('p-conn').style.display='none'; if(n===1){sSize=1;document.getElementById('p-mode').style.display='flex';}else{document.getElementById('p-count').style.display='flex';} }
    function toModeSel() { sSize=parseInt(document.getElementById('member-sld').value); document.getElementById('p-count').style.display='none'; document.getElementById('p-mode').style.display='flex'; }

    function prepareBrief(type) {
        document.getElementById('p-mode').style.display='none'; document.getElementById('p-brief').style.display='flex';
        document.getElementById('brief-text').innerHTML = `● <b>右鍵鎖定</b>：已禁用圖片存檔選單。<br>● <b>隊友召喚</b>：將部署 ${sSize-1} 位電腦隊友協助。<br>● <b>地貌</b>：V10.5 碎裂雜湊 (無平原)。`;
    }

    function getB(gx, gy) {
        if(world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
        var f = Math.floor(52 + Math.sin(gx*0.45)*10 + Math.cos(gx*0.22)*8 + (gx*13%7)-3.5);
        if(Math.abs(gx)>110) f += Math.floor((Math.abs(gx)-110)/3.2)*18;
        if(gy<f) return 0; if(gy===f) return (gy>85)?7:2; if(gy>f && gy<=f+5) return 3; return 1;
    }

    function startGame() {
        var cvs = document.getElementById('g');
        cvs.width = window.innerWidth; cvs.height = window.innerHeight;
        cvs.style.visibility = 'visible'; cvs.style.display = 'block';

        let sy = 0; while(getB(0, Math.floor(sy/T)) === 0) sy += T;
        p.x = 0; p.y = sy - 160;

        // --- 生成電腦隊友邏輯 ---
        ents = [];
        for(var i=0; i < sSize-1; i++) {
            ents.push({ type: 'ally', x: (i+1)*40, y: p.y, w: 22, h: 42, vx: 0, vy: 0, hp: 100, gr: false });
        }

        document.getElementById('p-brief').style.display='none';
        document.getElementById('hud').style.display='block';
        live = true;
        loop();
    }

    function togglePause() {
        paused = !paused;
        document.getElementById('esc-menu').style.display = paused ? 'flex' : 'none';
        if(paused) {
            document.getElementById('st-pos').innerText = `${Math.floor(p.x/T)}, ${Math.floor(p.y/T)}`;
            document.getElementById('st-squad').innerText = sSize-1 + " Units";
        }
    }

    window.onkeydown = e => {
        if(e.code==='Escape' && live) togglePause();
        if(!live || paused) return;
        if(e.keyCode>=49 && e.keyCode<=56) selB = e.keyCode-48;
        keys[e.code] = true;
    };
    window.onkeyup = e => { keys[e.code] = false; };
    
    window.onmousedown = e => {
        if(!live || paused) return;
        var cvs = document.getElementById('g'), cx = p.x - cvs.width/2, cy = p.y - cvs.height/2;
        var gx = Math.floor((e.clientX + cx) / T), gy = Math.floor((e.clientY + cy) / T);
        if(e.button === 0) world[gx+'_'+gy] = 0; 
        if(e.button === 2) world[gx+'_'+gy] = selB; // 右鍵蓋房子，且選單已被 preventDefault 攔截
        localStorage.setItem('sh_save_v10', JSON.stringify(world));
    };

    function check(x,y) { var gx=Math.floor(x/T), gy=Math.floor(y/T); return getB(gx, gy)>0 || getB(Math.floor((x+21)/T), Math.floor((y+41)/T))>0; }

    function loop() {
        if(!live) return;
        if(!paused) {
            var cvs = document.getElementById('g'), ctx = cvs.getContext('2d');
            ticks = (ticks + 0.05) % 1440;

            // 村民生成
            villagerTimer++;
            if(villagerTimer > 600) {
                var sx = p.x + (Math.random()>0.5?800:-800);
                ents.push({ type:'villager', x: sx, y: p.y-400, w:22, h:42, vx:0, vy:0, hp:100 });
                villagerTimer = 0;
            }

            // 所有實體物理邏輯
            [p].concat(ents).forEach(e => {
                e.vy += 0.8; e.y += e.vy;
                if(check(e.x, e.y)) { while(check(e.x, e.y)) e.y -= 0.5; e.vy = 0; e.gr = true; } else e.gr = false;
                if(e === p) {
                    var dx = (keys['KeyD']?7:0) - (keys['KeyA']?7:0);
                    if(dx !== 0) { p.x += dx; if(check(p.x, p.y)) p.x -= dx; }
                    if(keys['Space'] && p.gr) p.vy = -14;
                } else {
                    // 電腦隊友跟隨邏輯
                    if(e.type === 'ally') {
                        var targetX = p.x - 40;
                        if(Math.abs(e.x - targetX) > 60) {
                            e.x += (p.x > e.x ? 3 : -3);
                            if(check(e.x, e.y)) e.x -= (p.x > e.x ? 3 : -3);
                        }
                        if(check(e.x + (p.x > e.x ? 10 : -10), e.y) && e.gr) e.vy = -10;
                    }
                }
            });

            // 渲染畫面
            ctx.fillStyle = (ticks > 1050 || ticks < 350) ? '#050510' : '#87ceeb';
            ctx.fillRect(0, 0, cvs.width, cvs.height);
            var cx = p.x - cvs.width/2, cy = p.y - cvs.height/2;
            var clrs = ["","#7f8c8d","#2ecc71","#795548","#f1c40f","#5d4037","#27ae60","#ecf0f1","#3498db"];
            for(var x=Math.floor(cx/T); x<=Math.ceil((cx+cvs.width)/T); x++) {
                for(var y=Math.floor(cy/T); y<=Math.ceil((cy+cvs.height)/T); y++) {
                    var b = getB(x, y); if(b > 0) { ctx.fillStyle = clrs[b]; ctx.fillRect(x*T-cx, y*T-cy, T-0.5, T-0.5); }
                }
            }
            ents.concat([p]).forEach(e => {
                ctx.fillStyle = (e===p?'#e67e22':(e.type==='ally'?'#3498db':'#9b59b6'));
                ctx.fillRect(e.x-cx, e.y-cy, e.w, e.h);
            });

            document.getElementById('alt-v').innerText = Math.floor(Math.abs(p.y/T)*32);
            document.getElementById('tm-v').innerText = Math.floor(ticks/60).toString().padStart(2,'0') + ":" + Math.floor(ticks%60).toString().padStart(2,'0');
        }
        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
