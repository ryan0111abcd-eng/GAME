<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>未來的 Super Human</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; color: white; }
        .layer { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1a1a1a; z-index: 9999; }
        .btn { padding: 15px 40px; font-size: 24px; cursor: pointer; margin: 10px; background: #f1c40f; border: none; font-weight: bold; border-radius: 12px; color: black; box-shadow: 0 5px 0 #b8860b; }
        .btn:hover { background: #fff; }
        
        /* HUD & 小地圖 */
        #hud { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; display: none; z-index: 5000; }
        #minimap { position: fixed; top: 10px; right: 10px; width: 150px; height: 150px; border-radius: 50%; border: 3px solid #fff; background: rgba(0,0,0,0.5); overflow: hidden; display: none; z-index: 5000; }
        
        /* ESC 選單 */
        #esc-menu { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        
        #inv { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; gap: 8px; z-index: 5000; }
        .slot { width: 40px; height: 40px; border: 2px solid #777; background: #333; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .slot.active { border-color: #f1c40f; transform: scale(1.1); }
        
        canvas { display: none; }
    </style>
</head>
<body>

    <div id="ui-main" class="layer">
        <h1 style="color:#f1c40f; font-size: 50px;">未來的 SUPER HUMAN</h1>
        <button class="btn" onclick="boot(1)">開始鍵</button>
        <button class="btn" onclick="showMulti()" style="background:#3498db; color:white;">多人連線鍵</button>
    </div>

    <div id="ui-multi" class="layer" style="display:none;">
        <h2>選擇人數 (2-10人)</h2>
        <input type="range" id="p-range" min="2" max="10" value="5" oninput="document.getElementById('pv').innerText=this.value">
        <p style="font-size:24px;">當前選擇: <span id="pv" style="color:#f1c40f;">5</span></p>
        <button class="btn" onclick="boot(document.getElementById('p-range').value)">開始</button>
    </div>

    <div id="esc-menu">
        <h1 style="font-size: 40px;">遊戲暫停</h1>
        <button class="btn" onclick="location.reload()">離開遊戲 (重新開始)</button>
        <p>按 ESC 回到遊戲</p>
    </div>

    <div id="hud">
        📍 X: <span id="posX">0</span> Y: <span id="posY">0</span><br>
        ❤️ HP: <span id="hp">100</span> | 🕒 <span id="time">07:00</span>
    </div>
    <canvas id="minimap-canvas" id="minimap"></canvas>
    <div id="minimap"><canvas id="m-cvs" width="150" height="150"></canvas></div>

    <div id="inv">
        <div class="slot active" id="sl1">1:土</div>
        <div class="slot" id="sl2">2:草</div>
        <div class="slot" id="sl3">3:石</div>
        <div class="slot" id="sl4">4:木</div>
    </div>

    <canvas id="gCvs"></canvas>

    if(world[gx+'_'+gy] !== undefined) return world[gx+'_'+gy];
    let fY = getGY(gx); return gy < fY ? 0 : (gy === fY ? 2 : 1);
}
