<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>未來的 Super Human - 絕對點擊版</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #111; font-family: sans-serif; overflow: hidden; }
        
        /* 初始選單介面：這是在畫布產生前唯一的東西 */
        #ui-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10000; background: #000;
        }
        
        .title { font-size: 40px; color: #f1c40f; margin-bottom: 30px; text-align: center; }
        .btn { 
            padding: 20px 50px; font-size: 24px; cursor: pointer; margin: 10px; 
            background: #f1c40f; border: none; font-weight: bold; border-radius: 8px;
        }
        .btn-blue { background: #3498db; color: white; }
        
        /* 多人設定 */
        #setup-area { display: none; flex-direction: column; align-items: center; }
        select { font-size: 24px; padding: 10px; margin: 20px; border-radius: 5px; }

        /* 遊戲內 HUD */
        #hud {
            position: fixed; top: 10px; left: 10px; color: white; 
            background: rgba(0,0,0,0.8); padding: 12px; border: 2px solid #f1c40f;
            display: none; z-index: 5000; pointer-events: none; border-radius: 10px;
        }
    </style>
</head>
<body>

    <div id="ui-wrapper">
        <div id="main-entry">
            <div class="title">未來的 Super Human</div>
            <button class="btn" onclick="init(1)">開始遊戲</button><br>
            <button class="btn btn-blue" onclick="showMulti()">多人連線</button>
        </div>

        <div id="setup-area">
            <div class="title">選擇遊戲人數</div>
            <select id="playerNum">
                <option value="2">2 人</option>
                <option value="3">3 人</option>
                <option value="4">4 人</option>
                <option value="5" selected>5 人</option>
                <option value="8">8 人</option>
                <option value="10">10 人</option>
            </select>
            <button class="btn" onclick="init(document.getElementById('playerNum').value)">點此開始遊戲</button>
            <button style="background:none; color:#777; border:none; cursor:pointer;" onclick="location.reload()">返回</button>
        </div>
    </div>

    <div id="hud">
        ❤️ 血量: <span id="hp">100</span> | 🕒 <span id="time">07:00</span> | ⚔️ [K] 攻擊 | 🛠️ [1,2,3] 切換
    </div>

<script>
let canvas, ctx, isRunning = false;
let ticks = 420; // 07:00
let camX = 0, world = {}, blockType = 2;
const TILE = 32;
const COLORS = { 1: '#8B4513', 2: '#228B22', 3: '#666' };

let p = { x: 400, y: 0, w: 24, h: 44, vx: 0, vy: 0, hp: 100, ground: false, atk: 0 };
let allies = [], vils = [], anis = [], mobs = [];

function showMulti() {
    document.getElementById('main-entry').style.display = 'none';
    document.getElementById('setup-area').style.display = 'flex';
}

function init(count) {
    // 1. 移除選單
    document.getElementById('ui-wrapper').style.removeProperty('display');
    document.getElementById('ui-wrapper').style.display = 'none';
    document.getElementById('hud').style.display = 'block';

    // 2. 動態生成 Canvas
    canvas = document.createElement('canvas');
    canvas.id = 'gameCanvas';
    document.body.appendChild(canvas);
    ctx = canvas.getContext('2d');
    
    // 3. 設定角色
    for(let i=0; i < count - 1; i++) allies.push({ x: 400 + Math.random()*500, y: -50, w: 24, h: 44, vx: 0, vy: 0, ground: false });
    for(let i=0; i<6; i++) vils.push({ x: 1600+i*200, y: -50, w: 24, h: 44, vx: 0, vy: 0, ground: false });
    for(let i=0; i<8; i++) anis.push({ x: 800+i*400, y: -50, w: 20, h: 20, vx: 0, vy: 0, ground: false });

    // 4. 啟動
    isRunning = true;
    window.addEventListener('resize', resize);
    resize();
    
    // 事件監聽
    window.addEventListener('keydown', (e) => {
        keys[e.code] = true;
        if (e.key === '1') blockType = 2;
        if (e.key === '2') blockType = 1;
        if (e.key === '3') blockType = 3;
    });
    window.addEventListener('keyup', (e) => keys[e.code] = false);
    canvas.addEventListener('mousedown', (e) => {
        const rect = canvas.getBoundingClientRect();
        const gx = Math.floor((e.clientX - rect.left + camX) / TILE);
        const gy = Math.floor((e.clientY - rect.top) / TILE);
        if (e.button === 0) world[`${gx}_${gy}`] = 0;
        if (e.button === 2) world[`${gx}_${gy}`] = blockType;
    });
    canvas.addEventListener('contextmenu', e => e.preventDefault());

    requestAnimationFrame(loop);
}

const keys = {};
function getB(x, y) {
    const k = `${Math.floor(x)}_${Math.floor(y)}`;
    if (world[k] !== undefined) return world[k];
    let g = Math.floor(12 + Math.sin(x * 0.1) * 3);
    return y < g ? 0 : (y === g ? 2 : 1);
}

function physics(o) {
    o.vy += 0.6;
    let nx = o.x + o.vx;
    let gx = (o.vx > 0) ? Math.floor((nx + o.w) / TILE) : Math.floor(nx / TILE);
    let ty = Math.floor(o.y / TILE), by = Math.floor((o.y + o.h - 5) / TILE);
    if (getB(gx, ty) === 0 && getB(gx, by) === 0) o.x = nx;
    else if (o.ground) o.vy = -10;
    o.y += o.vy;
    o.ground = false;
    let lx = Math.floor(o.x/TILE), rx = Math.floor((o.x+o.w-1)/TILE), fy = Math.floor((o.y+o.h)/TILE);
    if (getB(lx, fy) !== 0 || getB(rx, fy) !== 0) { o.y = fy*TILE-o.h; o.vy = 0; o.ground = true; }
}

function loop() {
    if (!isRunning) return;
    ticks = (ticks + 0.4) % 1440;
    let hr = Math.floor(ticks / 60);

    p.vx = (keys['KeyA'] ? -5 : keys['KeyD'] ? 5 : 0);
    if (keys['Space'] && p.ground) p.vy = -12;
    if (keys['KeyK'] && p.atk <= 0) {
        p.atk = 20;
        mobs.forEach(m => { if(Math.abs(m.x-p.x)<70) { m.hp-=10; m.vx=(m.x>p.x?12:-12); } });
    }
    if (p.atk > 0) p.atk--;
    physics(p);
    camX = p.x - canvas.width / 2;

    const runAI = (list) => {
        list.forEach(e => {
            if (Math.abs(p.x - e.x) > 600) e.vx = (p.x > e.x ? 3 : -3);
            else if (Math.random() < 0.01) e.vx = (Math.random() - 0.5) * 3;
            physics(e);
        });
    };
    runAI(allies); runAI(vils); runAI(anis);

    if ((hr >= 18 || hr < 6) && Math.random() < 0.015) mobs.push({ x: p.x + (Math.random()>0.5?800:-800), y: -50, w: 24, h: 44, vx: 0, vy: 0, hp: 20 });
    mobs.forEach((m, idx) => {
        m.vx = (m.x < p.x) ? 2.5 : -2.5;
        physics(m);
        if (Math.abs(m.x - p.x) < 25 && Math.abs(m.y - p.y) < 30) p.hp -= 0.5;
        if (m.hp <= 0) mobs.splice(idx, 1);
    });

    if (p.hp <= 0) { alert("你失敗了！"); location.reload(); }
    draw();
    requestAnimationFrame(loop);
}

function draw() {
    let sky = "#87ceeb"; 
    if (ticks >= 1050 && ticks < 1080) sky = "#ff7832"; // 17:30
    else if (ticks >= 1080 || ticks < 390) sky = "#050515"; // 18:10
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    let sx = Math.floor(camX / TILE), ex = sx + Math.ceil(canvas.width / TILE) + 1;
    for (let x = sx; x < ex; x++) {
        for (let y = 0; y < 25; y++) {
            let b = getB(x, y);
            if (b !== 0) { ctx.fillStyle = COLORS[b]; ctx.fillRect(x*TILE-camX, y*TILE, TILE, TILE); }
        }
    }

    const d = (l, c) => l.forEach(e => { ctx.fillStyle = c; ctx.fillRect(e.x-camX, e.y, e.w, e.h); });
    d(allies, "#f1c40f"); d(vils, "#3498db"); d(anis, "#fff"); d(mobs, "#2ecc71");
    ctx.fillStyle = "#FF5733"; ctx.fillRect(p.x-camX, p.y, p.w, p.h);
    if (p.atk > 10) { ctx.fillStyle = "white"; ctx.fillRect(p.x-camX+(p.vx>=0?25:-25), p.y+10, 25, 10); }

    document.getElementById('time').innerText = `${Math.floor(ticks/60).toString().padStart(2,'0')}:${Math.floor(ticks%60).toString().padStart(2,'0')}`;
    document.getElementById('hp').innerText = Math.ceil(p.hp);
}

function resize() { if(canvas) { canvas.width = window.innerWidth; canvas.height = window.innerHeight; } }
</script>
</body>
</html>
