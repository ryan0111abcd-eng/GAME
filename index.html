<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Minecraft 遠征世界</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: white; }
        nav { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.8); padding: 10px 20px; display: flex; justify-content: space-between; z-index: 10; box-sizing: border-box; }
        canvas { display: block; background: #87CEEB; }
        .hud { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 12px; font-size: 14px; border: 1px solid #555; }
    </style>
</head>
<body>

<nav>
    <div id="p-info">載入中...</div>
    <div id="m-info"></div>
</nav>

<canvas id="game"></canvas>

<div class="hud">A/D 移動 | 空白跳躍 | 左鍵挖掘 | 右鍵蓋塊</div>

<script>
    const user = localStorage.getItem('mc_user');
    const plan = localStorage.getItem('sel_plan');
    const rank = localStorage.getItem('member_rank');
    const disc = parseFloat(localStorage.getItem('discount') || 1);

    if(!user) window.location.href = 'auth.html';
    document.getElementById('p-info').innerHTML = `玩家: ${user} [${rank}]`;
    document.getElementById('m-info').innerText = `地圖: ${plan} | 折扣價: $${Math.round(100*disc)}`;

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const blockSize = 40;
    let world = {}; 
    let player = { x: 200, y: -200, w: 30, h: 38, vx: 0, vy: 0, g: false };
    let camera = { x: 0, y: 0 };
    let keys = {};

    // 地形生成：0-1000px 是大山，之後是丘陵
    function generateColumn(x) {
        if (world[x]) return;
        let groundY;
        if (x < 1200) {
            // 大山區 (波動大)
            groundY = Math.floor(6 + Math.sin(x * 0.01) * 8); 
        } else {
            // 丘陵區 (波動小)
            groundY = Math.floor(10 + Math.sin(x * 0.05) * 3);
        }
        
        world[x] = [];
        for(let y = groundY; y < groundY + 25; y++) {
            let type = 'dirt';
            if (y === groundY) type = 'grass';
            else if (y > groundY + 5) type = 'stone';
            world[x].push({ y: y * blockSize, type: type });
        }
    }

    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    canvas.onmousedown = e => {
        const mx = e.clientX + camera.x;
        const my = e.clientY + camera.y;
        const gx = Math.floor(mx / blockSize) * blockSize;
        const gy = Math.floor(my / blockSize) * blockSize;
        if(e.button === 0) {
            if(world[gx]) world[gx] = world[gx].filter(b => b.y !== gy);
        } else if(e.button === 2) {
            if(!world[gx]) world[gx] = [];
            world[gx].push({ y: gy, type: 'wood' });
        }
    };
    canvas.oncontextmenu = e => e.preventDefault();

    function checkCollision(targetX, targetY) {
        const gx = Math.floor(targetX / blockSize) * blockSize;
        const checkCols = [gx - blockSize, gx, gx + blockSize];
        for (let colX of checkCols) {
            if (world[colX]) {
                for (let b of world[colX]) {
                    if (targetX < colX + blockSize && targetX + player.w > colX &&
                        targetY < b.y + blockSize && targetY + player.h > b.y) {
                        return b; // 撞到了
                    }
                }
            }
        }
        return null;
    }

    function update() {
        // 水平移動處理
        player.vx = 0;
        if(keys['KeyA']) player.vx = -5;
        if(keys['KeyD']) player.vx = 5;

        // X 軸碰撞檢查
        player.x += player.vx;
        let hitX = checkCollision(player.x, player.y);
        if (hitX) {
            player.x -= player.vx; // 彈回
        }

        // 跳躍與重力
        if(keys['Space'] && player.g) { player.vy = -12; player.g = false; }
        player.vy += 0.6;
        
        // Y 軸碰撞檢查
        player.y += player.vy;
        let hitY = checkCollision(player.x, player.y);
        if (hitY) {
            if (player.vy > 0) { // 下落撞地
                player.y = hitY.y - player.h;
                player.g = true;
            } else { // 往上撞頭
                player.y = hitY.y + blockSize;
            }
            player.vy = 0;
        } else {
            player.g = false;
        }

        // 無限地圖生成
        const viewDist = 1200;
        const startX = Math.floor((player.x - viewDist) / blockSize) * blockSize;
        const endX = Math.floor((player.x + viewDist) / blockSize) * blockSize;
        for(let x = startX; x <= endX; x += blockSize) { generateColumn(x); }

        // 鏡頭隨動 (平滑)
        camera.x += (player.x - canvas.width / 2 - camera.x) * 0.1;
        camera.y += (player.y - canvas.height / 2 - camera.y) * 0.1;
    }

    function draw() {
        ctx.fillStyle = "#87CEEB"; ctx.fillRect(0,0,canvas.width, canvas.height);
        ctx.save();
        ctx.translate(-camera.x, -camera.y);

        const vStart = Math.floor(camera.x / blockSize) * blockSize;
        const vEnd = Math.floor((camera.x + canvas.width) / blockSize) * blockSize;

        for(let x = vStart; x <= vEnd; x += blockSize) {
            if(world[x]) {
                world[x].forEach(b => {
                    if(b.type === 'grass') ctx.fillStyle = '#5da346';
                    else if(b.type === 'dirt') ctx.fillStyle = '#855c33';
                    else if(b.type === 'stone') ctx.fillStyle = '#777';
                    else ctx.fillStyle = '#ab7d4f';
                    ctx.fillRect(x, b.y, blockSize-1, blockSize-1);
                });
            }
        }

        // 畫玩家
        ctx.fillStyle = (rank === 'VIP') ? 'gold' : 'white';
        if(rank === 'VIP') { ctx.shadowBlur = 20; ctx.shadowColor = 'gold'; }
        ctx.fillRect(player.x, player.y, player.w, player.h);

        ctx.restore();
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    loop();
</script>
</body>
</html>
