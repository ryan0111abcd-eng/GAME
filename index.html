<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Super Human - 模式選擇</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; color: white; }
        .layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #222 0%, #000 100%); z-index: 9999; }
        h1 { font-size: 42px; color: #f1c40f; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .btn-group { display: flex; gap: 20px; margin-top: 30px; }
        .btn { padding: 20px 40px; font-size: 24px; cursor: pointer; background: #444; border: 3px solid #f1c40f; color: #f1c40f; font-weight: bold; border-radius: 15px; transition: 0.3s; }
        .btn:hover { background: #f1c40f; color: #000; transform: translateY(-5px); box-shadow: 0 5px 20px rgba(241, 196, 15, 0.4); }
        #hud { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 12px; border: 2px solid #f1c40f; z-index: 5000; border-radius: 10px; display: none; pointer-events: none; }
    </style>
</head>
<body>

    <div id="layer-menu" class="layer">
        <h1>SUPER HUMAN</h1>
        <p style="font-size: 20px; color: #ccc;">請選擇你的探險模式</p>
        <div class="btn-group">
            <button class="btn" onclick="startGame('single')">單人模式</button>
            <button class="btn" onclick="startGame('multi')">多人模式 (AI 隊友)</button>
        </div>
    </div>

    <div id="hud">❤️ 血量: <span id="hp">100</span> | 🕒 <span id="time">07:00</span> <span id="wea">☀️</span></div>

<script>
let canvas, ctx, isRunning = false;
let ticks = 420, world = {}, camX = 0, camY = 0;
const TILE = 32;
const COLORS = { 1: '#8B4513', 2: '#228B22', 3: '#666', 4: '#cd853f', 5: '#444' };
let p = { x: 500, y: 0, w: 22, h: 42, vx: 0, vy: 0, hp: 100, maxHp: 100, ground: false };
let agents = [], keys = {}, gameMode = 'single';

function startGame(mode) {
    gameMode = mode;
    document.getElementById('layer-menu').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    launch();
}

function getGY(gx) { return Math.floor(35 + Math.sin(gx * 0.05) * 12 + Math.cos(gx * 0.02) * 15); }
function getB(gx, gy) {
    if(world[`${gx}_${gy}`] !== undefined) return world[`${gx}_${gy}`];
    let floorY = getGY(gx);
    return gy < floorY ? 0 : (gy === floorY ? 2 : 1);
}

function launch() {
    canvas = document.createElement('canvas');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    document.body.appendChild(canvas);
    ctx = canvas.getContext('2d');
    p.y = getGY(p.x/TILE)*TILE - 150;
    
    // 如果是多人模式，才生成電腦 AI
    if (gameMode === 'multi') {
        const types = ['ally', 'vil', 'ani'];
        for(let i=0; i<8; i++) {
            agents.push({
                x: 600 + i * 200, y: -200, w: 22, h: 42, vx: 0, vy: 0, 
                hp: 100, maxHp: 100, type: types[i%3], dir: 1, state: 'idle', sTimer: Math.random()*100
            });
        }
    }
    
    isRunning = true;
    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;
    requestAnimationFrame(loop);
}

function phys(o, isP) {
    if(isP) {
        o.vx = (keys['KeyA'] ? -5 : keys['KeyD'] ? 5 : 0);
        if((keys['Space'] || keys['KeyW']) && o.ground) o.vy = -12;
    } else {
        o.sTimer--;
        if(o.sTimer <= 0) {
            o.state = Math.random() < 0.5 ? 'walk' : 'idle';
            o.dir = Math.random() > 0.5 ? 1 : -1;
            o.sTimer = 60 + Math.random()*150;
        }
        if(o.state === 'walk') o.vx = o.dir * 2; else o.vx = 0;
        let aheadX = Math.floor((o.x + (o.vx >= 0 ? o.w + 5 : -5)) / TILE);
        let footY = Math.floor((o.y + o.h - 8) / TILE);
        if(getB(aheadX, footY) > 0 && o.ground) o.vy = -11;
    }
    o.vy += 0.7;
    let nx = o.x + o.vx, sideX = o.vx > 0 ? Math.floor((nx + o.w)/TILE) : Math.floor(nx/TILE);
    let topY = Math.floor((o.y + 5)/TILE), botY = Math.floor((o.y + o.h - 5)/TILE);
    if(getB(sideX, topY) === 0 && getB(sideX, botY) === 0) o.x = nx;
    o.y += o.vy; o.ground = false;
    let feetY = Math.floor((o.y + o.h)/TILE), lX = Math.floor((o.x + 2)/TILE), rX = Math.floor((o.x + o.w - 2)/TILE);
    if(getB(lX, feetY) > 0 || getB(rX, feetY) > 0) { o.y = feetY * TILE - o.h; o.vy = 0; o.ground = true; }
}

function loop() {
    if(!isRunning) return;
    ticks = (ticks + 0.2) % 1440;
    phys(p, true);
    camX += (p.x - canvas.width/2 - camX) * 0.1;
    camY += (p.y - canvas.height/2 - camY) * 0.1;
    agents.forEach(a => phys(a, false));
    render();
    requestAnimationFrame(loop);
}

function render() {
    ctx.fillStyle = '#87ceeb';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    let cx = Math.floor(camX), cy = Math.floor(camY);
    let sx = Math.floor(cx/TILE), ex = sx + Math.ceil(canvas.width/TILE)+1;
    let sy = Math.floor(cy/TILE), ey = sy + Math.ceil(canvas.height/TILE)+1;

    for(let x=sx; x<ex; x++) {
        for(let y=sy; y<ey; y++) {
            let b = getB(x, y);
            if(b !== 0) { ctx.fillStyle = COLORS[b]; ctx.fillRect(x*TILE - cx, y*TILE - cy, TILE, TILE); }
        }
    }

    agents.forEach(a => {
        let rx = Math.floor(a.
