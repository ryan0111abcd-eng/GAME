<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>2D Minecraft: 物理修正完成版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: monospace; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.5); color: white; padding: 10px; border-radius: 5px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">❤️ HP: <span id="hp">100</span> | A/D 移動 | 空白 跳躍 | 左鍵 挖 | 右鍵 蓋</div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    const tileSize = 32;
    let cameraX = 0;
    let worldData = JSON.parse(localStorage.getItem('mc_final_save')) || {};
    let keys = {};
    let selectedBlock = 2;

    let player = { 
        x: 100, y: 100, w: 20, h: 40, 
        vx: 0, vy: 0, speed: 4, jump: -12, 
        grounded: false, hp: 100 
    };

    function getBlock(x, y) {
        const key = `${Math.floor(x)}_${Math.floor(y)}`;
        if (worldData[key] !== undefined) return worldData[key];
        let ground = Math.floor(12 + Math.sin(x * 0.1) * 3);
        return (y < ground) ? 0 : (y === ground ? 2 : 1);
    }

    // --- 核心：精準碰撞檢查 ---
    function isColliding(nx, ny) {
        let x1 = Math.floor(nx / tileSize);
        let x2 = Math.floor((nx + player.w) / tileSize);
        let y1 = Math.floor(ny / tileSize);
        let y2 = Math.floor((ny + player.h) / tileSize);

        for (let x = x1; x <= x2; x++) {
            for (let y = y1; y <= y2; y++) {
                if (getBlock(x, y) > 0) return true;
            }
        }
        return false;
    }

    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;

    canvas.onmousedown = (e) => {
        const gx = Math.floor((e.clientX + cameraX) / tileSize);
        const gy = Math.floor(e.clientY / tileSize);
        if (e.button === 0) worldData[`${gx}_${gy}`] = 0;
        if (e.button === 2) worldData[`${gx}_${gy}`] = selectedBlock;
        localStorage.setItem('mc_final_save', JSON.stringify(worldData));
    };
    canvas.oncontextmenu = (e) => e.preventDefault();

    function loop() {
        // 1. 處理水平移動
        player.vx = 0;
        if (keys['KeyA']) player.vx = -player.speed;
        if (keys['KeyD']) player.vx = player.speed;

        // X 軸碰撞：先試著走，撞到就退回
        if (!isColliding(player.x + player.vx, player.y)) {
            player.x += player.vx;
        }

        // 2. 處理垂直移動 (重力與跳躍)
        player.vy += 0.8; // 重力
        if (keys['Space'] && player.grounded) {
            player.vy = player.jump;
            player.grounded = false;
        }

        // Y 軸碰撞
        if (!isColliding(player.x, player.y + player.vy)) {
            player.y += player.vy;
            player.grounded = false;
        } else {
            if (player.vy > 0) player.grounded = true; // 往下撞到地了
            player.vy = 0;
        }

        // 3. 相機跟隨
        cameraX = player.x - canvas.width / 2;

        // 4. 繪製
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        let startX = Math.floor(cameraX / tileSize);
        let endX = startX + Math.ceil(canvas.width / tileSize) + 1;
        for (let x = startX; x < endX; x++) {
            for (let y = 0; y < 25; y++) {
                let b = getBlock(x, y);
                if (b > 0) {
                    ctx.fillStyle = b === 2 ? '#228B22' : '#8B4513';
                    ctx.fillRect(x * tileSize - cameraX, y * tileSize, tileSize, tileSize);
                }
            }
        }

        // 畫玩家
        ctx.fillStyle = '#FF5733';
        ctx.fillRect(player.x - cameraX, player.y, player.w, player.h);

        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
