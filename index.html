<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Super Human - 終極世界版</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; color: white; }
        .layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #111; z-index: 9999; }
        .btn { padding: 18px 60px; font-size: 26px; cursor: pointer; margin: 15px; background: #f1c40f; border: none; font-weight: bold; border-radius: 12px; color: black; transition: 0.2s; }
        .btn:hover { background: #fff; transform: scale(1.05); }
        #hud { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 12px; border: 2px solid #f1c40f; display: none; z-index: 5000; border-radius: 10px; }
        #minimap-container { position: fixed; top: 20px; right: 20px; width: 160px; height: 160px; border: 3px solid white; border-radius: 50%; overflow: hidden; background: #000; display: none; z-index: 5000; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="layer-home" class="layer">
        <h1 style="font-size: 48px; color: #f1c40f; margin-bottom: 30px;">未來的 Super Human</h1>
        <button class="btn" onclick="fnMode('single')">單人探險</button>
        <button class="btn" style="background:#3498db; color:white;" onclick="fnMode('multi')">多人連線 (AI 全能)</button>
    </div>

    <div id="layer-select" class="layer" style="display:none;">
        <h1>選擇小隊人數</h1>
        <select id="pNumInput" style="font-size:30px; padding:15px; margin:25px; border-radius:10px;">
            <option value="2">2 人</option>
            <option value="5" selected>5 人</option>
            <option value="10">10 人</option>
        </select>
        <button class="btn" onclick="fnRules()">確定</button>
    </div>

    <div id="layer-info" class="layer" style="display:none;">
        <div style="background:#222; padding:40px; border:3px solid #f1c40f; border-radius:25px; text-align:center;">
            <h2 id="modeTitle" style="color:#f1c40f;">模式確認</h2>
            <p>包含：村莊、村民、動物、下雨與古蹟</p>
            <button class="btn" onclick="fnStart()">正式進入遊戲</button>
        </div>
    </div>

    <div id="hud">❤️ 血量: <span id="hp">100</span> | 🕒 <span id="time">07:00</span> <span id="wea">☀️</span></div>
    <div id="minimap-container"><canvas id="mini-canvas" width="160" height="160"></canvas></div>

<script>
let canvas, ctx, miniCtx, isRunning = false;
let ticks = 420, world = {}, camX = 0, camY = 0, bType = 2, fCount = 1;
const TILE = 32, COLORS = { 1: '#8B4513', 2: '#228B22', 3: '#666', 4: '#cd853f', 5: '#444' };
let p = { x: 500, y: 0, w: 24, h: 44, vx: 0, vy: 0, hp: 100, ground: false, atk: 0 };
let allies = [], vils = [], anis = [], mobs = [], keys = {}, isRain = false, rTimer = 0;

function fnMode(m) {
    document.getElementById('layer-home').style.display = 'none';
    if(m === 'single') { fCount = 1; fnRules(); } else { document.getElementById('layer-select').style.display = 'flex'; }
}
function fnRules() {
    if(document.getElementById('layer-select').style.display !== 'none') fCount = parseInt(document.getElementById('pNumInput').value);
    document.getElementById('layer-select').style.display = 'none';
    document.getElementById('layer-info').style.display = 'flex';
    document.getElementById('modeTitle').innerText = fCount + " 人探險模式";
}
function fnStart() {
    document.getElementById('layer-info').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    document.getElementById('minimap-container').style.display = 'block';
    canvas = document.createElement('canvas');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    document.body.appendChild(canvas);
    ctx = canvas
