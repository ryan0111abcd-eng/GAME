<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>2D Minecraft: 日夜生存版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; }
        #ui { 
            position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.8); 
            color: white; padding: 12px; border-radius: 8px; pointer-events: none; border: 1px solid #555;
        }
        .night-alert { color: #ff4444; font-weight: bold; display: none; }
    </style>
</head>
<body>
    <div id="ui">
        <b>🌑 生存模式</b><br>
        時間：<span id="clock">12:00</span> <span id="alert" class="night-alert">⚠️ 怪物出現！</span><br>
        ❤️ 生命：<span id="hp">100</span><br>
        <small>左鍵：挖礦/攻擊 | 右鍵：建造 | 1, 2 切換方塊</small>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    const tileSize = 32;
    let cameraX = 0;
    let worldData = JSON.parse(localStorage.getItem('mc_survival_save')) || {};
    let keys = {};
    let gameTime = 1200; // 0~2400 (1200是中午)
    let selectedBlock = 4; // 預設木頭

    let player = { x: 300, y: -100, w: 20, h: 40, vx: 0, vy: 0, speed: 4, jump: -10, grounded: false, hp: 100 };
    let animals = [];
    let enemies = [];

    // --- 核心：地圖讀取與生成 ---
    function getBlock(x, y) {
        const key = `${x}_${y}`;
        if (worldData[key] !== undefined) return worldData[key];
        let groundLevel = Math.floor(14 + Math.sin(x * 0.1) * 3);
        if (y < groundLevel) return 0;
        return (y === groundLevel) ? 2 : 1; // 2:草, 1:土
    }

    // --- 滑鼠互動：挖掘與建造 ---
    canvas.onmousedown = (e) => {
        const gx = Math.floor((e.clientX + cameraX) / tileSize);
        const gy = Math.floor(e.clientY / tileSize);
        const key = `${gx}_${gy}`;

        if (e.button === 0) { // 左鍵：挖掘或攻擊
            let hitEnemy = false;
            enemies.forEach(en => {
                if (Math.hypot(en.x - (gx*tileSize), en.y - (gy*tileSize)) < 50) {
                    en.hp -= 20; hitEnemy = true;
                }
            });
            if (!hitEnemy) worldData[key] = 0; // 沒打到怪就挖地
        } else if (e.button === 2) { // 右鍵：建築
            if (getBlock(gx, gy) === 0) worldData[key] = selectedBlock;
        }
        localStorage.setItem('mc_survival_save', JSON.stringify(worldData));
    };
    canvas.oncontextmenu = (e) => e.preventDefault();

    // 碰撞偵測
    function isColliding(nx, ny, w, h) {
        let x1 = Math.floor(nx / tileSize), x2 = Math.floor((nx + w) / tileSize);
        let y1 = Math.floor(ny / tileSize), y2 = Math.floor((ny + h) / tileSize);
        for (let x = x1; x <= x2; x++) {
            for (let y = y1; y <= y2; y++) { if (getBlock(x, y) > 0) return true; }
        }
        return false;
    }

    window.onkeydown = (e) => {
        keys[e.code] = true;
        if (e.key === '1') selectedBlock = 4; // 木頭
        if (e.key === '2') selectedBlock = 3; // 石頭
    };
    window.onkeyup = (e) => keys[e.code] = false;

    function loop() {
        // 時間流速：2400 幀一個循環 (原本更快，現在調慢)
        gameTime = (gameTime + 0.5) % 2400; 
        let isNight = (gameTime < 600 || gameTime > 1800);
        document.getElementById('alert').style.display = isNight ? 'inline' : 'none';

        // 1. 玩家物理 (速度 1.0 節奏)
        player.vx = keys['KeyA'] ? -player.speed : (keys['KeyD'] ? player.speed : 0);
        let nextX = player.x + player.vx;
        if (isColliding(nextX, player.y, player.w, player.h)) {
            if (!isColliding(nextX, player.y - tileSize, player.w, player.h)) {
                player.x = nextX; player.y -= tileSize;
            }
        } else { player.x = nextX; }

        player.vy += 0.6;
        if (keys['Space'] && player.grounded) { player.vy = player.jump; player.grounded = false; }
        if (!isColliding(player.x, player.y + player.vy, player.w, player.h)) {
            player.y += player.vy; player.grounded = false;
        } else { if (player.vy > 0) player.grounded = true; player.vy = 0; }

        cameraX += (player.x - canvas.width / 2 - cameraX) * 0.1;

        // 2. 怪物生成 (夜晚機率生成)
        if (isNight && Math.random() < 0.01 && enemies.length < 5) {
            enemies.push({ x: player.x + (Math.random() > 0.5 ? 400 : -400), y: 0, w: 20, h: 40, hp: 40 });
        }

        // 3. 背景 (日夜顏色轉換)
        let dayRatio = Math.cos((gameTime / 2400) * Math.PI * 2);
        let r = 10 + (dayRatio + 1) * 50, g = 15 + (dayRatio + 1) * 80, b = 40 + (dayRatio + 1) * 100;
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 4. 繪製方塊
        let startX = Math.floor(cameraX / tileSize);
        let endX = startX + Math.ceil(canvas.width / tileSize) + 1;
        for (let x = startX; x < endX; x++) {
            for (let y = 0; y < 25; y++) {
                let b = getBlock(x, y);
                if (b === 0) continue;
                ctx.fillStyle = (b===1)?'#6d4c41' : (b===2)?'#4caf50' : (b===3)?'#7f8c8d':'#5d4037';
                ctx.fillRect(x * tileSize - cameraX, y * tileSize, tileSize, tileSize);
            }
        }

        // 5. 怪物 AI
        enemies = enemies.filter(en => en.hp > 0);
        enemies.forEach(en => {
            en.vx = (player.x > en.x) ? 1.5 : -1.5;
            en.vy += 0.6;
            if (!isColliding(en.x + en.vx, en.y, en.w, en.h)) en.x += en.vx;
            if (!isColliding(en.x, en.y + en.vy, en.w, en.h)) en.y += en.vy; else en.vy = 0;
            if (Math.abs(en.x - player.x) < 20 && Math.abs(en.y - player.y) < 20) player.hp -= 0.5;
            ctx.fillStyle = '#1b5e20'; // 綠色殭屍
            ctx.fillRect(en.x - cameraX, en.y, en.w, en.h);
        });

        // 6. 玩家
        ctx.fillStyle = '#ff5722';
        ctx.fillRect(player.x - cameraX, player.y, player.w, player.h);

        // UI 更新
        document.getElementById('clock').innerText = `${Math.floor(gameTime/100).toString().padStart(2,'0')}:00`;
        document.getElementById('hp').innerText = Math.floor(player.hp);
        if (player.hp <= 0) { alert("你被殭屍吃掉了！"); location.reload(); }

        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
