<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>未來的 Super Human - 最終修正版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: "Microsoft JhengHei", sans-serif; user-select: none; }
        canvas { display: block; }
        
        /* 強制按鈕在最上層 */
        .menu-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.85); color: white; z-index: 9999;
        }
        h1 { font-size: 50px; color: #f1c40f; text-shadow: 0 0 15px #f1c40f; margin-bottom: 30px; }
        .btn {
            padding: 15px 50px; margin: 10px; font-size: 24px; cursor: pointer;
            background: #f1c40f; border: none; color: #000; border-radius: 40px;
            font-weight: bold; transition: 0.2s; pointer-events: auto;
        }
        .btn:hover { background: #fff; transform: scale(1.1); }
        input { font-size: 24px; width: 80px; text-align: center; border-radius: 10px; border: none; margin: 10px; }
        
        /* 遊戲內 UI */
        #game-ui { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; z-index: 100; border: 1px solid #f1c40f; display: none; }
        #hotbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; gap: 10px; background: rgba(0,0,0,0.8); padding: 10px; border: 2px solid #fff; z-index: 100; }
        .slot { width: 50px; height: 50px; border: 2px solid #555; display: flex; align-items: center; justify-content: center; color: white; }
        .slot.active { border-color: #f1c40f; box-shadow: 0 0 10px #f1c40f; }
    </style>
</head>
<body>

    <div id="main-menu" class="menu-layer">
        <h1>未來的 Super Human</h1>
        <button class="btn" onclick="startGame(1)">開始遊戲</button>
        <button class="btn" style="background:#3498db; color:white;" onclick="showMulti()">多人連線</button>
    </div>

    <div id="multi-menu" class="menu-layer" style="display:none;">
        <h1>設定人數 (2-10)</h1>
        <input type="number" id="p-count" min="2" max="10" value="5">
        <button class="btn" onclick="startGame(document.getElementById('p-count').value)">點此開始遊戲</button>
        <button class="btn" style="background:#666; font-size:16px;" onclick="location.reload()">返回</button>
    </div>

    <div id="game-ui">
        ❤️ 血量: <span id="hp-txt">100</span> | 🕒 時間: <span id="time-txt">07:00</span><br>
        📍 座標: <span id="pos-txt">0,0</span> | ⚔️ 攻擊: 按 K
    </div>

    <div id="hotbar">
        <div id="s1" class="slot active">草</div>
        <div id="s2" class="slot">土</div>
        <div id="s3" class="slot">石</div>
    </div>

    <canvas id="gameCanvas"></canvas>

function showMulti() {
    document.getElementById('main-menu').style.display = 'none';
    document.getElementById('multi-menu').style.display = 'flex';
}

function startGame(count) {
    document.querySelectorAll('.menu-layer').forEach(m => m.style.display = 'none');
    document.getElementById('game-ui').style.display = 'block';
    document.getElementById('hotbar').style.display = 'flex';
    
    // 初始化隊友 (黃色)
    for(let i=0; i < count-1; i++) {
        tms.push({ x: 400 + Math.random()*200, y: -50, w: 24, h: 44, vx: 0, vy: 0, grounded: false, timer: 0 });
    }
    // 初始化村莊 (藍色村民)
    for(let i=0; i<5; i++) vils.push({ x: 1500 + i*200, y: -50, w: 24, h: 44, vx: 0, vy: 0, grounded: false });
    // 初始化動物 (白色)
    for(let i=0; i<6; i++) anis.push({ x: 800 + i*400, y: -50, w: 20, h: 20, vx: 0, vy: 0, grounded: false });

    isRunning = true; resize(); loop();
}
