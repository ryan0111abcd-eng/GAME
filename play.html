<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>SUPER HUMAN 2026 - FINAL STABLE</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        /* 增加強制點擊層級 */
        #force-ui { 
            position: fixed; inset: 0; z-index: 999999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: #0a0a0a; color: #f1c40f; 
        }
        .big-btn { 
            padding: 30px 80px; font-size: 40px; cursor: pointer; margin: 20px; 
            background: #f1c40f; border: 6px solid #fff; border-radius: 30px; 
            font-weight: bold; color: #000; box-shadow: 0 10px 0 #b8860b;
            pointer-events: auto !important;
        }
        .big-btn:active { transform: translateY(5px); box-shadow: 0 5px 0 #b8860b; }
        #game-hud { position: fixed; top: 10px; left: 10px; z-index: 100; color: white; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; display: none; pointer-events: none; }
        canvas#gCanvas { display: none; position: absolute; top: 0; left: 0; z-index: 1; }
    </style>
</head>
<body>

    <div id="force-ui">
        <h1 style="font-size: 50px;">SUPER HUMAN 2026</h1>
        <button class="big-btn" onclick="this.parentElement.style.display='none'; start(1);">👤 進入世界</button>
        <p style="color: #666;">如果點不動，請重新整理網頁</p>
    </div>

    <div id="game-hud">❤️ HP: <span id="hp">100</span> | 📍 <span id="pos">0,0</span></div>
    <canvas id="gCanvas"></canvas>

<script>
    const cvs = document.getElementById('gCanvas'), ctx = cvs.getContext('2d');
    let live = false, ents = [], p = { x: 0, y: -500, w: 22, h: 42, vx: 0, vy: 0, hp: 100, gr: false };

    function start(n) {
        document.getElementById('game-hud').style.display = 'block';
        cvs.style.display = 'block';
        cvs.width = window.innerWidth; cvs.height = window.innerHeight;
        // 簡單地形
        live = true;
        loop();
    }

    function loop() {
        if(!live) return;
        p.vy += 0.8; p.y += p.vy;
        if(p.y > 100) { p.y = 100; p.vy = 0; p.gr = true; }
        
        ctx.fillStyle = "#87ceeb"; ctx.fillRect(0,0,cvs.width,cvs.height);
        ctx.fillStyle = "#2ecc71"; ctx.fillRect(0, cvs.height/2 + 100, cvs.width, 500);
        ctx.fillStyle = "#e67e22"; ctx.fillRect(cvs.width/2 + p.x, cvs.height/2 + p.y, p.w, p.h);
        
        document.getElementById('hp').innerText = Math.ceil(p.hp);
        document.getElementById('pos').innerText = Math.floor(p.x/32) + "," + Math.floor(p.y/32);
        
        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
