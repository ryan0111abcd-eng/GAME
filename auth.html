<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Minecraft 遠征隊 - 登入</title>
    <style>
        body { font-family: 'Minecraft', sans-serif; background: #1e1e1e; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #3c3c3c; padding: 40px; border: 4px solid #000; box-shadow: inset -4px -4px #1e1e1e, inset 4px 4px #767676; width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 20px 0; background: #000; border: 2px solid #767676; color: #32CD32; font-family: monospace; }
        button { width: 100%; padding: 12px; background: #5da346; color: white; border: 2px solid #000; cursor: pointer; font-weight: bold; }
        button:hover { background: #76c35d; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="text-shadow: 2px 2px #000;">MINECRAFT 遠征隊</h2>
        <input type="text" id="user" placeholder="輸入玩家 ID">
        <button onclick="login()">登入並選擇方案</button>
    </div>
    <script>
        function login() {
            const n = document.getElementById('user').value;
            if(!n) return alert("請輸入 ID");
            localStorage.setItem('game_user', n);
            window.location.href = 'buy.html';
        }
    </script>
</body>
</html>
