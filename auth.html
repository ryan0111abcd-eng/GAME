<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>遠征隊登入</title>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1a1a1a; padding: 40px; border-radius: 20px; text-align: center; width: 320px; border: 1px solid #2ecc71; }
        input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 8px; border: 1px solid #444; background: #000; color: #2ecc71; }
        button { width: 100%; padding: 12px; background: #2ecc71; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>遠征隊入口</h2>
        <input type="text" id="pName" placeholder="輸入玩家 ID">
        <button onclick="login()">下一步：選擇遠征方案</button>
    </div>
    <script>
        function login() {
            const n = document.getElementById('pName').value;
            if(!n) return alert("請輸入 ID");
            localStorage.setItem('game_user', n);
            window.location.href = 'buy.html';
        }
    </script>
</body>
</html>
