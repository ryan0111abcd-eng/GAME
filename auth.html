<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>遊戲登入 - Web Version</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #1e1e1e; padding: 40px; border-radius: 15px; width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #4CAF50; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #333; background: #2a2a2a; color: white; outline: none; }
        button { width: 100%; padding: 12px; background: #4CAF50; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #45a049; transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>我的 Web 遊戲</h2>
        <input type="text" id="playerName" placeholder="請輸入玩家名稱">
        <button onclick="saveAndGo()">進入遊戲大廳</button>
    </div>
    <script>
        function saveAndGo() {
            const name = document.getElementById('playerName').value;
            if(!name) return alert("請輸入名稱！");
            localStorage.setItem('game_user', name);
            if(localStorage.getItem('isVip') === null) localStorage.setItem('isVip', 'false');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
