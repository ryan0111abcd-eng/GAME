<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>遊戲開發者 - 登入/註冊</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #1a1a1a; color: white; }
        .auth-card { background: #2a2a2a; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 300px; }
        input { width: 100%; margin: 10px 0; padding: 10px; border-radius: 4px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #45a049; }
        .toggle { font-size: 0.8rem; text-align: center; margin-top: 10px; cursor: pointer; color: #aaa; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2 id="auth-title">會員登入</h2>
        <input type="text" id="username" placeholder="使用者名稱">
        <input type="password" id="password" placeholder="密碼">
        <button onclick="handleAuth()">進入遊戲世界</button>
        <p class="toggle" onclick="toggleAuth()">沒有帳號？點此註冊</p>
    </div>

    <script>
        function handleAuth() {
            const user = document.getElementById('username').value;
            if(user) {
                // 模擬存儲登入狀態
                localStorage.setItem('game_user', user);
                // 預設給一個測試狀態（之後由購買頁面改變）
                if(!localStorage.getItem('isVip')) localStorage.setItem('isVip', 'false');
                alert('登入成功！');
                window.location.href = 'index.html';
            }
        }
        function toggleAuth() {
            const title = document.getElementById('auth-title');
            title.innerText = title.innerText === '會員登入' ? '註冊帳號' : '會員登入';
        }
    </script>
</body>
</html>
