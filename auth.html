<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>遊戲開發 - 登入</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 12px; width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 4px; border: none; background: #333; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #4CAF50; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>玩家登入</h2>
        <input type="text" id="username" placeholder="使用者名稱">
        <button onclick="login()">進入大廳</button>
    </div>
    <script>
        function login() {
            const user = document.getElementById('username').value;
            if (!user) return alert("請輸入名稱");
            localStorage.setItem('game_user', user);
            if (localStorage.getItem('isVip') === null) localStorage.setItem('isVip', 'false');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
