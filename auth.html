<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>遊戲登入 - Web Version</title>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #16213e; padding: 40px; border-radius: 15px; width: 300px; text-align: center; border: 1px solid #4ecca3; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: none; background: #0f3460; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #4ecca3; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>登入遊戲</h2>
        <input type="text" id="pName" placeholder="輸入玩家暱稱">
        <button onclick="doLogin()">開始冒險</button>
    </div>
    <script>
        function doLogin() {
            const name = document.getElementById('pName').value || "冒險者";
            localStorage.setItem('game_user', name);
            if (localStorage.getItem('isVip') === null) localStorage.setItem('isVip', 'false');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
