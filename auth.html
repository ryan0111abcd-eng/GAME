<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>遠征隊註冊</title>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #161b22; padding: 40px; border-radius: 20px; text-align: center; width: 300px; border: 1px solid #30363d; }
        input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: #58a6ff; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #238636; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>遠征隊 ID 註冊</h2>
        <input type="text" id="pID" placeholder="輸入玩家 ID">
        <button onclick="login()">開始選擇方案</button>
    </div>
    <script>
        function login() {
            const name = document.getElementById('pID').value;
            if(!name) return alert("請輸入 ID");
            localStorage.setItem('mc_user', name);
            window.location.href = 'buy.html';
        }
    </script>
</body>
</html>
