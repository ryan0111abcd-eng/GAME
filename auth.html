<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>遠征隊登入</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #161b22; padding: 40px; border-radius: 20px; text-align: center; width: 320px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #58a6ff; }
        input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: #58a6ff; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #238636; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        button:hover { background: #2ea043; }
    </style>
</head>
<body>
    <div class="card">
        <h2>遠征隊入口</h2>
        <p>請輸入玩家暱稱開始</p>
        <input type="text" id="pName" placeholder="例如：Steve_TW">
        <button onclick="login()">下一步：選擇遠征方案</button>
    </div>
    <script>
        function login() {
            const n = document.getElementById('pName').value;
            if(!n) return alert("請輸入暱稱");
            localStorage.setItem('game_user', n);
            window.location.href = 'buy.html';
        }
    </script>
</body>
</html>
