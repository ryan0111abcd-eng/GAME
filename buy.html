<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>官方商城 - 方案選擇</title>
    <style>
        body { background: #0f0f0f; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 50px 20px; }
        .pricing { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; margin-top: 50px; }
        .plan { background: #1a1a1a; border: 1px solid #333; padding: 40px; border-radius: 24px; width: 320px; transition: 0.3s; position: relative; }
        .plan:hover { transform: translateY(-10px); border-color: #f1c40f; box-shadow: 0 10px 30px rgba(241,196,15,0.1); }
        .plan h2 { color: #f1c40f; margin-bottom: 10px; }
        .price { font-size: 48px; font-weight: bold; margin: 20px 0; }
        .price span { font-size: 16px; color: #666; }
        .features { list-style: none; padding: 0; text-align: left; margin: 30px 0; line-height: 2; }
        .features li::before { content: "✓ "; color: #2ecc71; font-weight: bold; }
        .btn { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 18px; }
        .btn-solo { background: #eee; color: #000; }
        .btn-family { background: #f1c40f; color: #000; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body>
    <h1>選擇您的遠征版本</h1>
    <p style="color:#888;">SUPER HUMAN 2026 官方授權中心</p>

    <div class="pricing">
        <div class="plan">
            <h2>個人方案</h2>
            <div class="price">NT$ 299 <span>/ 永久</span></div>
            <ul class="features">
                <li>單人完整冒險權限</li>
                <li>小隊人數上限：5 人</li>
                <li>全地圖挖掘與建築功能</li>
                <li>即時雷達探測</li>
            </ul>
            <button class="btn btn-solo" onclick="pay('ryan0111407')">購買個人金鑰</button>
        </div>

        <div class="plan" style="border-color:#f1c40f;">
            <div style="background:#f1c40f; color:#000; position:absolute; top:-15px; left:50%; transform:translateX(-50%); padding:4px 15px; border-radius:20px; font-size:12px; font-weight:bold;">最受歡迎</div>
            <h2>家庭 / 團隊方案</h2>
            <div class="price">NT$ 599 <span>/ 永久</span></div>
            <ul class="features">
                <li>解鎖終極多人權限</li>
                <li>小隊人數上限：20 人</li>
                <li>最高優先級方塊生成器</li>
                <li>多裝置同時激活授權</li>
            </ul>
            <button class="btn btn-family" onclick="pay('ryan-family-2026')">購買家庭金鑰</button>
        </div>
    </div>

    <div id="modal" class="modal">
        <div id="success" style="background:#fff; color:#000; padding:40px; border-radius:30px; width:350px; text-align:center;">
            <h1 style="color:#2ecc71; margin:0;">✓ 付款成功</h1>
            <p style="color:#666;">您的專屬方案金鑰：</p>
            <div id="key-display" style="font-size:20px; font-weight:bold; background:#f0f0f0; padding:20px; border:2px dashed #ccc; margin:20px 0; color:#d35400;"></div>
            <button class="btn" style="background:#000; color:#fff;" onclick="window.close()">複製金鑰並回到遊戲</button>
        </div>
    </div>

    <script>
        function pay(key) {
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('key-display').innerText = key;
            navigator.clipboard.writeText(key);
            alert("正在進行安全轉帳流程...\n付款完成後金鑰將自動複製。");
        }
    </script>
</body>
</html>
