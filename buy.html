<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>升級會員 - 75折福利</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #ddd; text-align: center; padding-top: 50px; }
        .premium-box { background: linear-gradient(145deg, #222, #111); border: 2px solid #ffd700; padding: 40px; border-radius: 20px; display: inline-block; max-width: 400px; box-shadow: 0 0 20px rgba(255,215,0,0.2); }
        .discount-badge { background: #e74c3c; color: white; padding: 5px 10px; border-radius: 5px; font-weight: bold; }
        .price { font-size: 2.5rem; color: #ffd700; margin: 20px 0; }
        .old-price { text-decoration: line-through; color: #666; font-size: 1.2rem; }
        ul { text-align: left; line-height: 2; margin: 20px 0; }
        .buy-btn { background: #ffd700; color: #000; padding: 15px 40px; border-radius: 30px; font-weight: bold; cursor: pointer; border: none; font-size: 1.1rem; }
        .buy-btn:hover { transform: scale(1.05); background: #fff; }
    </style>
</head>
<body>
    <div class="premium-box">
        <span class="discount-badge">限時福利：75折</span>
        <h2>PRO 開發者會員</h2>
        <div class="old-price">原價 $1,000</div>
        <div class="price">$750 <small>TWD</small></div>
        <ul>
            <li>✅ 解鎖最新 v1.1.0-dev 測試版</li>
            <li>✅ 遊戲內商城所有方塊 75 折</li>
            <li>✅ 優先解決「卡在地面」Bug 諮詢</li>
            <li>✅ 專屬金黃色玩家名稱標籤</li>
        </ul>
        <button class="buy-btn" onclick="purchase()">立即購買升級</button>
        <p><a href="index.html" style="color: #888; text-decoration: none;">返回首頁</a></p>
    </div>

    <script>
        function purchase() {
            if (confirm("確認要花費 $750 升級為 PRO 會員嗎？")) {
                localStorage.setItem('isVip', 'true');
                alert("升級成功！歡迎加入開發團隊。");
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
