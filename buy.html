<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>方案選擇 - SUPER HUMAN 授權中心</title>
    <style>
        body { background: #0f0f0f; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 50px 20px; }
        .pricing { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 50px; }
        .plan { background: #1a1a1a; border: 1px solid #333; padding: 30px; border-radius: 20px; width: 280px; transition: 0.3s; }
        .plan:hover { transform: translateY(-10px); border-color: #f1c40f; }
        .plan.featured { border: 2px solid #f1c40f; position: relative; }
        .plan h2 { color: #f1c40f; margin-top: 0; }
        .price { font-size: 36px; font-weight: bold; margin: 20px 0; }
        .features { list-style: none; padding: 0; text-align: left; font-size: 14px; color: #aaa; }
        .features li { margin-bottom: 10px; }
        .features li::before { content: "✓ "; color: #2ecc71; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-pay { background: #2ecc71; color: #fff; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body>
    <h1>選擇您的遠征方案</h1>
    <p style="color:#666;">解鎖不同層級的模擬權限</p>

    <div class="pricing">
        <div class="plan">
            <h2>基礎版</h2>
            <div class="price">NT$ 99</div>
            <ul class="features">
                <li>單人模擬權限</li>
                <li>基礎 3000m 聖山地圖</li>
                <li>永久存取權</li>
            </ul>
            <button class="btn btn-pay" onclick="pay()">立即購買</button>
        </div>

        <div class="plan featured">
            <div style="background:#f1c40f; color:#000; position:absolute; top:-15px; left:50%; transform:translateX(-50%); padding:2px 10px; border-radius:5px; font-size:12px; font-weight:bold;">推薦</div>
            <h2>專業版</h2>
            <div class="price">NT$ 299</div>
            <ul class="features">
                <li>多人小隊 (上限 15 人)</li>
                <li>[K] 鍵能量攻擊解鎖</li>
                <li>即時雷達探測器</li>
            </ul>
            <button class="btn btn-pay" onclick="pay()">立即購買</button>
        </div>

        <div class="plan">
            <h2>大師版</h2>
            <div class="price">NT$ 499</div>
            <ul class="features">
                <li>無限小隊 (上限 20 人)</li>
                <li>全部建築方塊解鎖</li>
                <li>優先獲得未來更新</li>
            </ul>
            <button class="btn btn-pay" onclick="pay()">立即購買</button>
        </div>
    </div>

    <div id="modal" class="modal">
        <div id="loading" style="color:#fff;">⌛ 正在處理安全支付...</div>
        <div id="success" style="background:#fff; color:#000; padding:30px; border-radius:20px; width:300px; display:none;">
            <h2 style="color:#2ecc71;">✓ 付款成功</h2>
            <p>您的萬用授權金鑰：</p>
            <div style="font-size:24px; font-weight:bold; background:#eee; padding:15px; border:2px dashed #999; margin:20px 0;">ryan0111407</div>
            <button class="btn" style="background:#000; color:#fff;" onclick="window.close()">複製金鑰並離開</button>
        </div>
    </div>

    <script>
        function pay() {
            document.getElementById('modal').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('success').style.display = 'block';
                navigator.clipboard.writeText('ryan0111407');
            }, 2000);
        }
    </script>
</body>
</html>
