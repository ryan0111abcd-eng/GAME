<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>選擇您的遠征方案</title>
    <style>
        body { font-family: 'PingFang TC', sans-serif; background: #0a0a0a; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .header { text-align: center; margin-bottom: 50px; }
        .header h1 { font-size: 32px; letter-spacing: 2px; }
        .header p { color: #666; font-size: 14px; }

        .container { display: flex; gap: 20px; align-items: flex-start; }

        /* 卡片基礎樣式 */
        .card { background: #161616; border: 1px solid #333; border-radius: 24px; width: 280px; padding: 40px 20px; text-align: center; position: relative; transition: 0.3s; }
        
        /* 推薦標籤 */
        .recommend-tag { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: #f1c40f; color: black; padding: 2px 12px; font-weight: bold; font-size: 12px; border-radius: 4px; }

        /* 專業版特殊邊框 */
        .pro-card { border: 2px solid #f1c40f; box-shadow: 0 0 20px rgba(241, 196, 15, 0.1); }

        .card h2 { color: #f39c12; font-size: 20px; margin-bottom: 10px; }
        .card .price { font-size: 36px; font-weight: bold; margin: 20px 0; }
        .card .price span { font-size: 14px; color: #888; }

        .features { text-align: left; margin: 30px 0; font-size: 13px; min-height: 120px; }
        .features div { margin: 10px 0; color: #bbb; display: flex; align-items: center; }
        .features div::before { content: '✓'; color: #2ecc71; margin-right: 8px; font-weight: bold; }

        .buy-btn { background: #2ecc71; color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .buy-btn:hover { background: #27ae60; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="header">
        <h1>選擇您的遠征方案</h1>
        <p>解鎖不同層級的模擬權限</p>
    </div>

    <div class="container">
        <div class="card">
            <h2>基礎版</h2>
            <div class="price">NT$ 99</div>
            <div class="features">
                <div>單人模擬權限</div>
                <div>基礎 3000m 聖山地圖</div>
                <div>永久存取權</div>
            </div>
            <button class="buy-btn" onclick="selectPlan('free', false)">立即購買</button>
        </div>

        <div class="card pro-card">
            <div class="recommend-tag">推薦</div>
            <h2 style="color: #f1c40f;">專業版</h2>
            <div class="price">NT$ 299</div>
            <div class="features">
                <div>多人小隊 (上限 15 人)</div>
                <div>[K] 鍵能量攻擊解鎖</div>
                <div>即時雷達探測器</div>
            </div>
            <button class="buy-btn" onclick="selectPlan('pro', true)">立即購買</button>
        </div>

        <div class="card">
            <h2 style="color: #e67e22;">大師版</h2>
            <div class="price">NT$ 499</div>
            <div class="features">
                <div>無限小隊 (上限 20 人)</div>
                <div>全部建築方塊解鎖</div>
                <div>優先獲得未來更新</div>
            </div>
            <button class="buy-btn" onclick="selectPlan('master', true)">立即購買</button>
        </div>
    </div>

    <script>
        function selectPlan(planName, isVip) {
            // 詢問二次確認 (你之前的規則)
            if (!isVip) {
                const ask = confirm("確定要選擇基礎版嗎？\n升級專業版可享有「能量攻擊」與「75折」福利！");
                if (!ask) return;
            }

            localStorage.setItem('plan', planName);
            localStorage.setItem('isVip', isVip ? 'true' : 'false');
            localStorage.setItem('planSelected', 'true');
            alert("方案啟動成功！即將進入遠征世界。");
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
