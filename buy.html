<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>SUPER HUMAN 2026 - 方案商城</title>
    <style>
        body { background: #0f0f0f; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 50px 20px; }
        .pricing { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 40px; }
        .plan { background: #1a1a1a; border: 1px solid #333; padding: 30px; border-radius: 20px; width: 250px; transition: 0.3s; }
        .plan:hover { transform: translateY(-10px); border-color: #f1c40f; }
        .price { font-size: 32px; font-weight: bold; margin: 15px 0; color: #f1c40f; }
        .features { list-style: none; padding: 0; text-align: left; font-size: 13px; color: #aaa; line-height: 1.8; }
        .features li::before { content: "✓ "; color: #2ecc71; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body>
    <h1>選擇您的遠征等級</h1>
    <div class="pricing">
        <div class="plan">
            <h3>學生版</h3><div class="price">NT$ 99</div>
            <ul class="features"><li>單人模式</li><li>地圖挖掘</li><li style="color:#e74c3c;list-style:none;">✕ 無雷達</li></ul>
            <button class="btn" style="background:#eee;" onclick="pay('STUDENT-2026')">購買</button>
        </div>
        <div class="plan" style="border:2px solid #f1c40f;">
            <h3>專業個人</h3><div class="price">NT$ 299</div>
            <ul class="features"><li>5人小隊</li><li>即時雷達</li><li>K鍵能量攻擊</li></ul>
            <button class="btn" style="background:#f1c40f;" onclick="pay('ryan0111407')">購買</button>
        </div>
        <div class="plan">
            <h3>家庭方案</h3><div class="price">NT$ 599</div>
            <ul class="features"><li>20人小隊</li><li>即時雷達</li><li>全功能開放</li></ul>
            <button class="btn" style="background:#2ecc71;color:#fff;" onclick="pay('ryan-family-2026')">購買</button>
        </div>
        <div class="plan">
            <h3>至尊企業</h3><div class="price">NT$ 999</div>
            <ul class="features"><li>50人超大型軍團</li><li>最高權限</li><li>優先更新</li></ul>
            <button class="btn" style="background:#9b59b6;color:#fff;" onclick="pay('ULTIMATE-RYAN-2026')">購買</button>
        </div>
    </div>

    <div id="modal" class="modal">
        <div id="success" style="background:#fff; color:#000; padding:40px; border-radius:30px; width:350px; text-align:center;">
            <h1 style="color:#2ecc71;">✓ 付款成功</h1>
            <p>您的方案授權碼：</p>
            <div id="key-v" style="font-size:20px; font-weight:bold; background:#eee; padding:20px; border:2px dashed #999; margin:20px 0; color:#d35400;"></div>
            <button class="btn" style="background:#000; color:#fff;" onclick="window.close()">複製並回到遊戲</button>
        </div>
    </div>

    <script>
        function pay(key) {
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('key-v').innerText = key;
            navigator.clipboard.writeText(key);
        }
    </script>
</body>
</html>
