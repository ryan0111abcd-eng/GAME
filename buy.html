<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>官方商城 - 方案選擇</title>
    <style>
        body { background: #0f0f0f; color: #fff; font-family: sans-serif; text-align: center; }
        .pricing { display: flex; justify-content: center; gap: 20px; margin-top: 50px; }
        .plan { background: #1a1a1a; border: 1px solid #333; padding: 30px; border-radius: 20px; width: 220px; }
        .btn { width: 100%; padding: 10px; background: #2ecc71; color: #fff; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>尊貴會員，請選擇您的方案</h1>
    <div class="pricing">
        <div class="plan"><h3>個人版</h3><p>NT$ 299</p><button class="btn" onclick="pay('ryan0111407')">結帳</button></div>
        <div class="plan"><h3>家庭版</h3><p>NT$ 599</p><button class="btn" onclick="pay('ryan-family-2026')">結帳</button></div>
    </div>
    <script>
        if(localStorage.getItem('isLoggedIn') !== 'true') window.location.href = 'auth.html';
        function pay(k) {
            alert("付款成功！金鑰為：" + k);
            navigator.clipboard.writeText(k);
        }
    </script>
</body>
</html>
